body:
  text: 田間詩學卷二桐城錢澄之撰鄘一之四說詳邶風柏舟序曰共姜自誓也衛世子共伯早卒其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之也鄭云共伯僖侯之世子年按共伯娶齊武公之女史記載齊武公立二十六以宣王三年卒僖侯立四十三年以宣王十五年卒共伯死于僖侯之卒後則齊武公之卒久矣故詩中惟稱母只也泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只毛傳興也朱注同死季氏云柏舟堅實而在河中以比志節之堅而夫無所著也髧說文作紞繫髦之彩也匹毛云髧兩髦之貌髦者髮至眉子事父母之飾儀也郝氏云髦毛同散之曰髮束之曰髦古之幼學稱髦士猶今垂髫也兩髦丱也齊風甫田曰總角丱兮是也內則曰雞初鳴櫛縱笄總拂髦冠緌男女未冠笄者亦櫛縱拂髦總角其言婦事舅姑止櫛縱笄總衣紳不言拂髦則髦為男子已冠未冠及女子未嫁之通飾也先何氏云據內則以拂髦先冠緌先總角則冠者必拂髦而後加冠髦當在冠內未冠者髦而總之為角斯真童子之飾所謂兩髦者是也玉藻云父死脫左髦母死脫右髦豈有既冠即不稱髦者耶其儀爾雅云匹也國語丹朱憑其身以儀之注謂憑身而匹偶之也陸氏云女子從母而已故稱母只命何灝云亦因父殁後惟母耳泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只季氏云柏舟在河側則有畔岸蓋以禮義為依也慝特之言獨音之近也從一而終故稱夫曰我特通作匿陰邪也言不惟他適之事不可為即一念邪思之微亦誓死而靡發則貞固之至矣柏舟二章章七句愚按衛之淫者至宣姜而極新臺之後即宜次以墻茨而乃置柏舟于其間為鄘風之冠以見同為齊女同為衛夫人而貞淫不同如此然共姜之貞不足以式後而宣姜之淫至以成風甚哉淫之易以導人也柏舟之詩存為衛國遺型亦見為齊姜間氣矣墻有茨序曰衛人刺其上也公子頑通乎君母國人疾之而不可道也鄭云宣公卒惠公幼其庶兄頑蒸于惠公之母生子五人齊子戴公文公宋桓夫人許穆夫人墻有茨不可掃也中冓之言不可道也所可道也言之醜也毛傳興也朱注同曰茨茅茨也周禮圉師職云茨墻則翦闔以茅蓋墻茨左傳叔孫豹曰人之有墻以蔽惡也令加茨以覆之惟恐其壞防人窺見其中厚茨猶恐不密況可掃而去之乎歐陽子曰公子頑國人共惡而不得而誅誅則暴宣姜之惡而傷惠公母子之恩比之蒺藜人所共惡之草生于墻不能掃除恐損其墻也中中冓應劭注材搆在堂之中也蓋室搆結深密之處墻有茨不可襄也中冓之言不可詳也所可詳也言之長也襄通作攘說文云推也推而去之也詳猶盡也盡言之則其說甚長蓋不欲言之也墻有茨不可束也中冓之言不可讀也所可讀也言之辱也毛傳云束束而去之也讀誦言也辱謂辱君也愚按謂為言者之辱猶云汚其口也詳道詳讀有次第先導之使言而後知其詳既知其從而誦言之也墻有茨三章章六句按左傳惠公之即位也少齊人使昭伯蒸于宣姜不可強之生子五人齊之強豈慮其甥不足以君衛耶亦以衛國久無人倫下淫上蒸不足為怪可怪者宣公蒸于夷姜而生伋居然以伋為世子不知公子頑所生居然父頑耶亦猶父宣公耶齊人使之則為齊者可知君子偕老序曰刺衛夫人也夫人淫亂失事君子之道故陳人君之德服飾之盛宜與君子偕老也歐陽子云詩人之意責之愈切則其言愈緩君子偕老是也君子偕老副笄六珈委委他他如山如河象服是宜子之不淑云如之何朱注賦也毛傳缺為周禮王后首飾副編次三等副之言覆所以覆首之飾若後之步搖之類服之以從王祭祀者也編者編列他髮為之若今假紒服之以告桑也次者鬄他髮而次第其長短與己髮相合為紒服之以見王也周毛云笄衡笄也珈笄飾之最盛者所以别尊卑按禮衡笄連文為笄橫貫在頭上故名為衡笄男子之笄以維持冠婦人之笄則以固髮鄭云珈之言加也孔云珈字從玉則知為笄飾六珈言飾之以玉其數六也季氏云笄本婦人之常飾惟副之珈則后夫人有之他說文云負荷也委委狀其行步之舒他他狀其首容之重象服即下章翟也孔云翟而言象者象鳥羽而畫之故謂之象人君之服畫日月星辰亦謂之象也此章及次章皆以祭服為言極言其盛若子而不淑謂此象服何哉蓋惜其不稱也愚按是時宣姜內有淫行厭棄公老故首句以君子偕老風之謂夫人本從君而貴故有如此之服飾威儀也名位如此而有不淑之意意欲何居玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之晳也胡然而天也胡然而帝也玼說文玉色鮮也謂顔色衣服皆鮮明如玉也者上章言子指宣姜此言其承上文也翟山雉尾長取為衣名周禮王后六服褘衣褕狄闕狄鞫衣展衣褖衣注褘當作翬褕與搖同狄與翟同皆雉名凡雉素質而五色皆備成章曰翬青質而五色皆備成章曰搖褘衣畫翬褕翬畫搖闕則刻繒為翟形而不畫郝氏云喪大記闕狄作屈狄栖伏曰屈狄有褕屈猶衮龍有升降也鄭云侯伯夫人之服自褕狄而下如王后焉說按此為褕翟闕翟與上所言副皆祭祀之服鬒文云髮稠也鄭云髮黑也二義兼有髢說文云髲也宣姜髮美無資于髢故不屑也瑱說文云塞耳以玉為之亦曰充耳揥所以摘髮因以為飾疑即今搔首之類皙毛云揚眉上廣皙白也愚按稱碩人之美曲盡其妍此以揚之一字盡之想其動人處全在此矣此章極稱夫人之服盛而容美國人仰之如天尊之若帝以其為君夫人也不則胡為其然也問之令其自省瑳兮瑳兮其之展也蒙彼皺絺是紲袢也子之清揚揚且之顔也展如之人兮邦之媛也瑳說文云玉色鮮白也展衣赤色毛云用丹縠為之而云瑳兮者象皺絺䝉之色也此夫人以禮見君及賓客之服獨皺絺鄭云絺之蹙蹙者按凡繒薄細者皆稱絺不葛也蒙者于展衣之上加皺絺覆之即尚絅之意古婦人盛服必以薄綃蒙于外也一紲說文云系也袢近身衣即所謂䙝衣也此從第層外服以敘及第一層裏服皆無不鮮白如瑳色也愚按揚之上只贊以清所美在風神而不專在容色顔說文云眉目之間也此數字皆為宣姜傳神寫照處展如洵如也之人即之子之稱稱宣姜也言非因君而貴為君夫人洵如之人之美不過一國之殊色而已誰尊仰之如天如帝哉邦之媛也猶言國色耳與胡然而天二句相應君子偕老三章一章七句一章九句一章八句愚按宣姜以蕩婦之盛年值宣公之暮齒其不愜意可知所謂中冓之言不可道者多矣豈待公殁後始聽齊人使昭伯蒸之耶風以偕老必早有棄老之意詩人恐醜聲日著故極稱其服飾之盛君夫人之貴冀其自重耳其所以作詩之意總在言外惟宣姜心自省之前有墻茨後有鶉奔而置此詩其中則公子頑于宣公在時已有醜聲矣諸詩皆衛未渡河時事而以入鄘明衛之所以為鄘由宣姜淫亂人倫道絶以致衛化為狄而遷于鄘姜其禍之首也桑中序曰刺奔也衛之公室淫亂男女相奔至于世族在位相竊妻妾期于幽逺政散民流而不可止朱注以為淫者自作郝氏云淫者犯禮法方祕其事惟恐人知詩人為表暴其事指其所竊之女與其期送迎㑹之地韓詩所云匹夫匹婦相會于墻陰明日有傳之者矣爰采唐矣沫之鄉矣云誰之思美孟姜矣期我乎桑中要我乎上宫送我乎淇之上矣朱注賦也毛傳缺兔唐兔絲也淮南子云兔絲無根而生茯苓茯苓抽絲死按唐無根不擇物而附有苟合之象之沫即朝歌衛都也孔云人欲采唐者于何采乎必沫之鄉矣以興人淫亂者于何地乎必之衛之邦矣沫鄉唐所生比衛為淫亂之主也而蘇氏云姜弋庸皆著姓凡刺無禮則稱孟言雖長無禮也美有禮則稱季言雖少而知好禮也愚按漢儒稱周禮惟嫁長女仲季皆充媵娣故以孟稱然則宣姜二女何以為許宋二國夫人也期者相訂以日要者盟誓其情也按通典衛縣有上宫臺爰采麥矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣郝氏云麥秋不收冬不藏三時在外謂之宿麥有奔之象春秋定姒公榖作定弋豈弋與姒同姓耶蓋杞女夏后氏之後爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣葑蔓菁也義取下體賤其䙝也桑中三章章七句按史記紂使師延作新聲武王伐紂師延抱樂器投濮水死後師涓從衛靈公過濮上夜聞水中樂音因寫之為晉平公奏焉師曠撫之曰此亡國之音得此必于桑間濮上乎然則桑間乃紂樂非桑中詩也詩所稱當在朝歌去濮上甚逺朱子以為即此篇誤矣鶉之奔奔序曰刺衛宣姜也衛人以為宣姜鶉鵲之不若也鶉之奔奔鵲之彊彊人之無良我以為兄朱注興也毛傳缺匹鶉䳺屬一名鴽居郝氏云鶉好鬭無常居而有常莊子曰聖人鶉鵲性不淫傅枝受卵故亦曰乾鵲莊子曰鳥鵲孺以少欲也者陸氏云奔奔鬭也彊彊剛也鶉所以奔奔然喜鬭惡亂其匹而鬭也鵲能不淫其匹故以剛言鵲之彊彊鶉之奔奔人之無良我以為君君女君也上章人字指公子頑言惠公不宜以為兄下章人字指宣姜言國人不宜以為小君也鶉之奔奔二章章四句胡安國問楊時墻茨桑中及鶉奔之詩何以録于國風而不削時曰此載衛為狄滅之因也故列于定之方中之前愚按文公即此無良者之所出也楚宫既作禰廟為誰左傳狄滅衛宋桓公立宣姜之子申廬于曹是為戴公公卒復立其弟燬是為文公但稱宣姜之子據史記直書昭伯頑之子則宣公不得為之禰審矣宣姜始以子婦配舅後以繼母偶子與漢書所載胸奴俗何以異哉宜衛之化為狄也定之方中序云美衛文公也衛為狄所滅東徙渡河野處曹邑齊桓公攘戎狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓悅之國家殷富焉定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟朱注賦也毛傳缺時定北方之宿營室也孔云定星昏而正中謂小雪小雪十月之中氣在周初為十二月南劉公瑾云夏正以十月建亥之月昏時定星見當方之午位因記此星為營室此周以後說也在唐虞時定星以戌月昏中至今以子月昏中蓋嵗久而差耳左傳曰凡土工水昏正而栽栽築墻版也日至而畢則冬至以前皆為上功之時子楚楚丘鄘地也鄭云楚宫宗廟也楚室居室也君將營宫室宗廟為先廏庫為次居室為後極毛云揆度也度日出日入以知東西南視定北準以正南北考工記匠人建國水地以懸謂置水平地以取平而垂繩四隅以合水也置槷以縣槷與臬同柱也植木為柱以縣繩柱有四角四中垂以八繩繩皆附柱則其柱正矣眂以景為規蓋柱正然後視之以測日景也規者畫地為圓規朝識日景其端指西暮識日景其端指東兩端長端必與規齊測其端則東西正就其中而屈之則南北亦可正也云榛小栗大皆可供籩食椅梓屬梓即楸也陸璣楸之疏理色白而生子者為梓梓實桐皮曰椅其實兩木桐白桐也亦謂之華桐以其華而不實漆本作漆陳𤾉云古之琴瑟必以桐其唇必以梓則椅桐梓皆琴瑟良材而漆之為物所以固而飾之也陸氏云言其宫中所植皆能預備禮樂之用升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧毛傳虛漕虛也墟孔云知為漕虛者以文公自漕而徙楚丘故升漕登之以望寰宇記云景山在澶州衛南縣東南三里九域志云開德府有景山據二說皆今開州與商頌景山無涉京髙丘也郭璞云丘者自然而有京者人力所為其勢與景山相敵俱近楚丘蓋先是望楚與堂以審擇兩地之形勢可以建國及見景山與京皆在楚丘而都楚之計定矣桑土肥宜桑者必宜田既登髙觀其形勢復下而審其土宜然後定都之周禮太卜之職國大遷則貞龜如周原之契洛陽食是也云其吉者兆告以吉也卜吉乃建國而居之其後信如卜所言之善即下章所謂民物殷富也愚按戴公廬漕漕在漢為白馬縣今滑縣南猶有白馬廢城楚丘在漢為濮陽隋改衛南今開州也在滑縣東六十里與漕相去不逺登漕虛可望楚考開州秦屬東郡漢晉以來皆為濮陽衛成公遷帝丘杜預注帝丘今濮陽也有顓頊墓今滑縣東北七十里有帝丘城俗名土山村是也漢書東郡縣二十二其首縣濮陽在郭而白馬正所屬也成公由楚丘遷帝丘只在開滑之間而當時總名為濮陽總屬東郡後人不辨東郡疆域所轄之廣遂専指山左東昌為東郡以東昌之濮州為濮陽以為顓頊墓在焉成公所遷之帝丘謂即其地謬矣界傅寅云堂楚傍邑即今博州堂邑以博濮二州連也按其地去楚丘逺不宜望見皆由誤認濮州為濮陽耳靈雨既零命彼倌人星言宿駕說于桑田匪直也人秉心塞淵騋牝三千靈星蒼龍之宿主田蠶三月見于東方靈星見而雨也零說文云雨餘也雨將闌之時鄭云星雨止星見文公于雨下命主駕者雨止即為我起早駕欲往說于桑田教民稼穡務農急也因雨零而命駕桑田之野以勞勸耕桑之人凡為國家根本之計萬民衣食之謀其能𢎞大帛大冠之風以興衛于此見矣人匪直猶云不但也人指耕桑之人言不但勞心于以下至于騋牝其心無不及也塞以言其收斂淵以象其深密謝說文云馬七尺為騋云騋牝者兼言騋與牝也氏云秉心也塞故事事朴實不尚髙虛之談秉心也淵故事事深長不為淺近之計程大昌云畜牧末事亦賴人主此心以之孳息故馬亦蕃庶是蓋莊周履豨之論也豨豕也豕之一身難肥者莫過于蹢踐踏豕足而見其豐肥則知其通身無不肥矣皆由末觀本之論也定之方中三章章七句愚按文公國都甫建即汲汲務農養馬收合滎澤之餘燼以急為富強之圖蓋未嘗一日忘狄難也左傳僖公十二年春諸侯城衛楚丘之郛懼狄難也明年春狄侵衛則衛國有備矣後世遷國者去敵稍逺即忘其寇讎不務實事而專欲粉飾太平者何與蝃蝀序曰止奔也衛文公能以道化其民淫奔之恥國人不齒也蝃蝀在東莫之敢指女子有行逺父母兄弟朱注比也毛傳缺成蝃蝀通作螮蝀毛云虹也而淮南子曰天二氣則虹謂陰陽相干也陰氣積上升日光映之乃成虹則劉公瑾云虹不映日不成蓋雲薄漏日日映雨氣生今以水噀日亦成青紅之暈氣陸氏云水氣在天成虹天之淫尚且惡之如此況于人乎愚按女子有行二句似是當時陳語故多引用之猶言女生外向本非父母兄弟之所能留但宜守正待聘何至于奔耶母泉水竹竿引此語言女子分當適人雖欲常在父兄弟之側不可得也彼則欲常在家而不可得此則欲急適人而不能待朝隮于西崇朝其雨女子有行逺兄弟父母朱注比也為隮本作躋爾雅云升也旦孔云虹隮也由升氣所故號虹隮崇終也從至食時為終朝愚按陰陽和而後成雨虹以陰陽之邪氣相干而亦成雨旋雨旋止崇朝其雨言其速也以比女子之奔不待媒聘而與人苟合合之易也夫父母兄弟既不能久留則女子以適人為終身矣終身之計如此其能久乎乃如之人也懷昏姻也大無信也不知命也朱注賦也愚按昏姻之事定以百年信之大者也如此苟合寧有信乎命天也凡人昏姻由天作之合而以己意為之是不知有天命矣蝃蝀三章章四句愚按朱注以為刺淫奔之詩序以為止奔因其篇次在定之方中之後謂文公新政初行風俗以革衛之民必有見淫奔而知以為耻者猶之刺也曰止者美文公也相鼠序云刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也相鼠有皮人而無儀人而無儀不死何為朱注興也毛傳缺世左傳曰有儀可象謂之儀惜郝氏云生而無為于者惟鼠人欲其速死無所者亦惟鼠相鼠相視死鼠也俗鄭云人以有威儀為貴今無之傷化敗不如其死相鼠有齒人而無止人而無止不死何俟鄭云止容止孝經曰容止可觀無止則雖居尊無禮節也相鼠有體人而無禮人而無禮胡不遄死愚按鼠晝伏夜行不欲人見人而無禮無儀亦不可以見人也雖賅然人形猶鼠之有皮有齒有體耳其所以為人者亡久矣故詛之以死晏齊景公飲酒酣曰願與諸大夫為樂飲請無為禮子蹙然改容曰君之言過矣羣臣固欲君之無禮也力多足以勝其長勇多足弒君而禮不使也今君去禮則君將安立矣敢又曰齊國五尺之童力皆過嬰又能勝君然而不亂者畏禮義也夫麋鹿惟無禮故父子同麀人之所以貴于禽獸者以有禮也相鼠三章章四句班固曰白虎通云夫婦榮耻共之相鼠三章此妻諫夫之詩也愚按衛人之妻能以禮諫其夫如此是衛風丕變得文公之教化不淺録詩者編為文公時之詩有以哉干旄序云美好善也衛文公臣子多好善賢者樂告以善道也郝氏云衛世中衰諸大夫艱難再造屈身求賢詩人不貴有姝子而貴有此大夫故盛稱其車旗篇末更屬望姝子則大夫益增重矣孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之朱注賦也毛傳缺干孑孑特出之貌干旄旄牛也干旄謂以牛尾著于首孔云九旗之皆有旄按九旗皆有旄此詩次章以干旟為言則此旄乃旟之旄耳旄旌二物凡旗皆有之凡旗于首飾以旄牛尾曰旄以鳥羽曰旌旌下有帛曰縿綴于縿下者曰旒以絲聫之曰紕旄旟旌總之一旟而分言耳愚按郊邑之人見大夫車旗式賢者之廬喜其下士而轉為賢者謀何以答其來意也孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之鳥隼曰旟下邑曰都云鄭云周禮州里建旟謂州長之屬組郭璞用綦組識旒之邊是也孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之毛云析羽為旌九旗中旟旌雖居其二然旗必有旌此直是旟之旌耳孔云干旄干旌一也既設旄縿有旃旟之稱未設旒縿空有析羽無旒縿也東祝鄭作屬屬著也按浚衛邑水經注云在濮陽縣南應去楚丘不逺非今浚儀之浚溝也愚按夏駕兩謂之麗殷益一謂之驂周益一謂之駟蓋于兩服之外加兩馬也今曰五之六之則車外副馬所以備傾蹶之虞者耳逺從子光夔曰豫觀今騾車皆四馬前一馬去車稍上岡則引之使後騎藉以力進後一馬下阪則曳之使前騎不致奔蹶也五之六之應是此義干旄三章章六句愚按衛文公遷楚丘以後敬教勸賢授方任能汲汲惟人才是務故其士大夫化之以禮賢相尚賢人所在式廬以請于是衛多君子蓋有由也載馳序曰許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所滅國人分散露于漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故作是詩也載馳載驅歸唁衛侯驅馬悠悠言至于漕大夫跋涉我心則憂朱注賦也毛傳缺虛毛云弔失國曰唁非漕戴公廬邑也言心口相語作此想而為之詞真有此事也告毛云草行曰跋水行曰涉鄭云跋涉者衛大夫來難于許時也朱注衛夫人馳驅而歸未至漕邑許之大夫有奔走跋涉而來者夫人知其必將告以不可歸之義故心以為憂也既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟嘉臧皆善也愚按不我嘉者言不善我此來也其勢必令我不能旋反旋濟矣視爾不臧蓋知其意不善也我思不逺言我之思與人情不逺不閟者言非祕不可以告人者也父母之國有難此行豈能已耶陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂偏髙曰阿丘虻貝母也貝按貝背同音亦女出嫁背其父母之譬也本草云母治中心氣不快多愁鬱言已之愁鬱成疾庶幾登丘采虻以自藥乎愚按善懷猶言善于憂思也但所懷之事各有不同若我之懷固有不得不然者許人之尤蓋執禮以繩我也而無知少年之輩乃羣起爭之舉國若狂斯所為不平耳從來國事本易挽坰以少年喜事者爭之過激遂成不可回之勢皆狂稚為之害也我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之野許之野也芃芃其麥紀時也狄入衛在魯閔公二年之冬明年為僖公元年麥已芃芃且入夏矣歷時已久衛人豈不知控于大邦以求救乎但不知其誰因誰極以此欲歸耳朱注因如因魏莊子之因極至也愚按極者迫切之至言控于大邦必有所因始能得請也必迫切之至始能動其聽也不知衛今有其人乎諸大夫為我千思萬慮畢竟不如我所之也不知夫人何所之亦不知即有所之將何以救衛祗是情不容已既知不可歸故為此語以致其不容已之情耳載馳四章二章章六句二章章八句毛氏作五章蘇氏合二三章為一章以春秋叔孫豹賦載馳四章取控于大邦之意故改為四章劉向列女傳許穆夫人衛懿公女初許求之齊亦求之公將與許女因傳母而言曰許小而逺齊大而近今舍近而就逺離大而附小一旦有車馳之難孰可與慮社稷衛侯不聽狄滅衛許不能救衛侯南徙許夫人馳驅往唁因疾之而作詩君子善其有逺識也愚按夫人為宣姜女懿公惠公子宣姜孫也向以為懿公女謬矣如列女傳所云則夫人雖有存亡之思而終非從一之道豈可入列女傳哉鄘國十篇二十九章百七十六句衛一之五淇奧序曰美武公之德也有文章又能聽其規諫以禮自防故能入相于周美而作是詩也孔叢子載孔子曰于淇奧見學者之可以為君子也瞻彼淇奧緑竹猗猗有匪君子如切如磋如琢如磨瑟兮僴兮赫兮咺兮有匪君子終不可諼兮毛傳興也朱注同崖毛云奧隈也緑王芻也竹扁竹也說文云奧隈也其內曰奧其外曰隈按漢武帝塞瓠子宫下淇園之竹以為揵寇恂伐淇園之竹為矢百餘萬淇竹其來舊矣河朔無竹淇奧獨産興武公特稟異氣而生以季氏云猗與依同倚也互相依倚則不摧折而得成其美以興工夫之夾持也章匪斐通考工記曰且其匪色必似鳴矣匪者有文之謂也楚倚相稱武公在輿有旅賁之規位寧有官師之典倚几有誦訓之諫居處有􅉏御之針臨事有瞽史之道宴居有師工之誦皆切磋琢磨之實此就成德後敘述故以四如言亦狀其有匪之象如此爾雅云骨謂之切象謂之磋玉謂之琢石謂之磨傳瑟縝密也僴說文云武貌左僴然授兵登陴亦武也瞻彼淇奧緑竹青青有匪君子充耳琇瑩會辨如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮陸氏云竹之初生其色緑長則轉而青矣扁宋熙寧中吳安度試緑竹青青詩不依注作王芻竹謂之失旨放罷富弼疏王芻扁竹柔脆之物不足以比武公之德史記河渠書有云淇園之竹明是竹箭之竹安度未為不識題義乞下學士院看詳于是賜安度出身充耳瑱也惟服冕旒時有之皮辨以下不得有充耳琇通作秀禾實也禾有實則下垂充耳之形如之故都人篇曰充耳琇實瑩潔也說文云玉色之辨皮辨也會其合縫處周禮注皮辨以皮六方縫其合縫處每貫結五采玉以為飾玉琢為珠如冕旒之數其名曰􅋒通作綦即此詩會辨如星及其辨伊騏是也天子諸侯皆服皮辨以視朝禮在朝君臣同服時武公入相于周則是亦在王朝之服也瞻彼淇奧緑竹如簀有匪君子如金如錫如圭如璧寬兮綽兮倚重較兮善戲謔兮不為虐兮簀席也言密如織席培植久也革圭制上圜下方璧制外圜內方如金如錫言其從之隨宜從容中道也如圭如璧言其方圜之各當周旋中禮也曰按車上橫木曰較乘者以手憑較較下重橫一木軾車上人致敬則憑軾以俯閒適則憑較故為寬綽之時較說文作較車輢上曲銅也蓋較在軾上恐其墜故以曲銅關之古謂較為車耳諺云仕宦不止車生耳吳童謠云黃金車班蘭耳闓閶門見天子符曲銅之說矣所朱注寬綽無斂束之意戲謔非莊厲之時皆常情忽而易致過差之地然猶可觀而必有節焉則其動容周旋無適非禮亦可見矣禮曰張而不弛文武不能也弛而不張文武不為也一張一弛文武之道也張陳傅良云古人肅肅不廢雍雍僮僮不廢祁祁有必有弛也按虐者戲謔之過必至任情凌物言善戲謔兮已是中節復言不為虐以足之耳一張一弛各得其宜所以為有斐也劉公瑾曰前章瑟僴赫咺張之時也此章寬綽戲謔弛之時也淇奧三章章九句嚴氏定為幽王時詩考世家武公四十二年平戎有功平王命武公為公意必此時入相耳徐幹中論謂此詩之作在武公年九十作抑詩之後歐氏補圖屬之于平是矣愚按武公作懿戒酒誥祗自勗以敬慎此篇則國人誦美其德者即敬慎之效也公九十之年好學不倦以禮自防可謂文德矣而平戎于王卒諡武公古人之武功必本于文德固非後世之所為武也考槃序曰刺莊公也不能繼先公之業使賢者退而窮處莊公名揚武公子考槃在澗碩人之寬獨寐寤言永矢弗諼朱注賦也毛傳缺也槃木器考槃猶扣盆擊缶之類所以節歌貧而樂碩人所謂大人也寬言其心廣也獨寐寤言者既寐而寤既寤而言皆獨自也心口自言永誓不忘此樂也考槃在阿碩人之邁獨寐寤歌永矢弗過毛云曲陵曰阿饑鄭云邁饑意言饑而自得猶泌水之樂也弗過不敢過望也考槃在陸碩人之軸獨寐寤宿永矢弗告軸說文云持輪也釋名云抽也入轂中可抽出也言其與世推移猶軸之隨輪以轉也莊子炙轂踝亦此意人朱注弗告者不以此樂告人一說不以姓字告劉若宜曰碩大也凡有大德之人而不得志者謂之碩人簡兮之碩人賢士失職者也莊姜申后之稱碩人無寵于君者也謂其有度量能容忍耳此詩寤言自得無所感憤故可以稱碩人也考槃三章章四句愚按此碩人非忘情于世如石隱者流也曰寬曰邁曰軸其作略器度具有大人之量故稱之為碩人惜衛之不能用也碩人序云閔莊姜也莊公惑于嬖妾使驕上僭莊姜賢而不答終以無子國人閔而憂之郝氏云此詩本為閔莊姜作而無一語道其憂閔之情及莊公不答之事但極稱夫人族類之貴容貌之美來嫁之儀及齊國之富就恆情易曉者開諭而莊姜之賢不足復為昏主道矣碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私朱注賦也毛傳缺之鄭云褧襌也國君夫人翟衣而嫁今衣錦者在塗所服也尚之以襌衣為其文之太著古褧與絅同亦作景士昏禮女登車姆為加景乃驅婦人盛服必加襌衣于外即周禮六衣之素紗偕老篇之蒙彼皺絺也言莊姜齊僖公姊妹也得臣為太子早死僖公立不僖公而係得臣者明其為適女也談孫炎云謂吾姨者吾謂之私則邢皆姊妹之夫互言之耳愚按首一句是于莊姜始至之時衛人初見而贊嘆之詞謂足以為吾君夫人也為衛慶也周禮言惟嫁長女餘皆為媵碩人既為衛侯妻而邢談之夫人又皆其姊妹行也足證其妄手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾睂巧笑倩兮美目盼兮茅始華曰荑同禮運疏曰革外薄皮曰膚膚內厚皮曰革凝冰字內則云凝者為脂釋者為膏蝤蠐桑蠧也白而長故以況其領廣犀瓠中瓣也相法齒瓣白如瓠犀毛云螓首顙而方鄭云螓蜻蜻也愚按此章備述夫人之美合首句玩之所謂長大美好也末二語略寫其姿然觀莊姜動以禮法自處則其倩盼亦自不苟宜其不足以爭嬖人之寵也碩人敖敖說于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞敖敖長貌農郊近郊也說舍也在鄭云言莊姜此來更正衣服于衛近郊按莊姜塗所服錦衣于此始易夫人嫁時褕翟之服也則敖敖亦狀其止于近郊以俟君迎從容自重不迫入國門之意四牡三句言莊姜自近郊更衣乘是車馬以入君之朝口說文云馬髙六尺曰驕鏕者馬銜外鐵所以斂其也一名扇汗一名排沫爾雅謂之钀朱幩鏕飾也嚴氏云鏕鏕非一鏕也每馬之鑣皆有幩之飾故曰鏕鑣自孔云婦人乘車不露車之前後設帳以隱蔽謂之茀夫人車以翟羽為飾愚按此章言莊姜始至國門進止有禮足以覘大國之威儀及夫人之莊重也國人樂得夫人以為君配而又鄭重大昏之禮故謂大夫之在公者且宜早退毋使君勞倦于政事而于禮文或有所缺耳非恐不得其相親也河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶姜孽孽庶士有朅此章即來途所見以起興自齊適衛河界其中北流入海活活說文云水流聲濊濊罟入水聲說文云凝流也鱣似鱘即鰉魚也鮪鱣屬即鱘也門陸氏云鮪岫居至春始出而浮陽北入河西上龍入漆沮故詩于漆沮及河皆言此魚發韓詩作鱍魚掉尾也諺云撥刺葭葦之未秀者即蘆也菼萑之初生者似葦而小長大名薍成則名萑又名隼薍或謂之荻揭說文云髙舉也馮時可云葭菼出河中者得氣尤厚北魏信都芳為律管吹灰得河內葭灰用之應節便飛餘灰不動也庶姜同姓之媵也庶出為孽孽孽言非一孽也兮庶士齊大夫送女者朅說文云去也楚詞車既駕朅而歸庶士送姜來衛既畢事則去衛而歸愚按此章極稱齊地物産之殷夫人媵送之盛以見齊為富彊之國鄭太子忽辭昏于齊曰齊大非吾偶也鄭人惜之謂失大國之援衛人方以為衛幸而豈知姜之無寵于公乎碩人四章章七句愚按詩旨因莊公不禮夫人國人為追述其始至之盛其族世容飾如此冀公為心動而悔悟也閔姜之情深于言外左傳謂衛人所為賦碩人也他左傳晉公子重耳如秦秦伯納五女懷嬴與焉日公享之公子賦河水疑即此末章因秦伯納女故有庶姜孽孽之咏耳氓序曰刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃偶故序其事以風焉美返正刺淫佚也朱注此淫婦為人所棄而自敘其事以道其悔恨之意愚按此改適之婦挾資適人而失身奸詐之徒賄盡愛弛因追敘為其所愚而轉念故夫也氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子涉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期朱注賦也毛傳缺周氓字從亡從民乃流徙之民非土著者楊慎曰禮凡治野以下劑致氓以田里安氓以樂昏擾氓以土宜教氓又曰新氓之治注謂新徙來者若本國民已授田矣何必以田里安之已安土矣又何必以土宜教之乎孟子謂天下之民皆悅而願為之氓許行陳相自楚宋之滕皆曰願為滕氓即其義也蚩蚩蠢而無知貌頓丘在淇水南今開州也愚按此婦之失全在誤認此氓為蚩蚩以為忠實可託終身也觀其假貿絲以誘婦此豈蚩蚩者志在利其賄耳猶氓即女謀本意不用媒合利在速成婦雖心許而鄭重其行故送之語以需媒而俟秋也周禮媒氏以仲春之月會男女之無夫家者四月賣新絲則已過仲春之期故無媒氏古人納采問名皆在八月之中以陰陽交會之月為昏禮之始也以此訂氓亦非同淫佚之婦草草苟合者乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷朱注賦也也復關關名氓往來所經之地疑與婦居近故可望寰宇記云澶州臨河縣南有復關城愚按此章蓋氓既去而復悔之恐其去而不來併日前良媒秋期之訂到此亦自悔其執著矣于是望而不見則泣既見其來則喜亦不問其前言乏踐與否也而蚩蚩者始終無媒惟以卜筮之吉紿之婦知媒競無人而秋不可待亦欲借卜筮以圓通耳車來賄遷此婦入蚩蚩之彀中矣桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽士之耽兮猶可說也女之耽兮不可說也朱注比而興也鳩說文云凡草曰零木曰落故桑葉沃若有椹以來食正是夏月時未及秋期即初嫁時之景以起興許鍾惺云淫婦人到狼狽時便看破許多道理說出多正論與烈女貞婦只爭事前事後之别耳愚按此章既至氓家之後窺氓意不良旋即愧悔已無及矣以鳩興女以桑興士沃若喻初時情意之濃鳩嗜桑椹之甘而至于醉猶女貪男情之濃而至于失身也耽情一往不反也說無以自解說也桑之落矣其黃而隕自我徂爾三嵗食貧淇水湯湯漸車帷裳女也不爽士二其行士也罔極二三其德朱注賦而比也隕隕說文云從髙下也曰其黃而隕桑葉先黃而後以比男子之情眷先淡而後衰也在帷裳箋云童容也車帷上曰幄在㫄日帷裳愚按此章述氓之情衰也氓意本利其賄三嵗食貧賄已盡矣能無棄乎淇水二句追憶初嫁之時即車來賄遷之時也水漸車帷相隨以去所謂嫁雞逐雞飛也回思往事女宜有怨乃女未爽其始意而士反有二心士真罔極哉罔極者言不可測度楚詞所謂怨靈修之浩蕩也二三謂變幻多端也蓋至此而始悟蚩蚩之氓為罔極之士婦初誤認為氓今復謬稱以士婦真無識矣三嵗為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣靜言思之躬自悼矣朱注賦也室此章承三嵗食貧言其為婦之勞男以女為室言之勞我自安之曽不以為勞也靡有朝謂無朝起盥櫛之暇也愚按言指來即我謀之言既遂謂車來賄遷之事前章疑其罔極今則至于暴矣至于者不意其至于此也此婦當是無父母惟有兄弟改適之時未嘗謀諸兄弟耳及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉朱注賦而興也愚按此章自傷其不宜改適也初以盛年新寡恐老而無依故及時轉嫁冀與偕老耳豈意所適非人老而仍寡詩曰內無怨女怨言無夫也或曰怨猶言怨偶也女子依于大夫猶淇之有岸隰之有泮謂得所依耳此自述其不得已而嫁之情乃今仍無依于是始追念其髫年夫婦之恩也內則注男女未冠笄者總角襟纓則男女小時皆得稱總角猶云垂髫耳雖冠而昏笄而嫁亦猶是總角之年此稱其年也言笑信誓述爾時之情好也反背也信誓旦旦曽不思及其背誓也謂世間男子皆然以是有今之見背亦初不之思耳我之誤矣亦已焉哉蓋無所歸怨之詞也諸說以總角之宴為與氓結褵之初玩篇中來即我謀等語婦非室女氓非稚男可知矣氓六章章十句序謂此詩或乃困而自悔又曰美反正刺淫佚也愚按悔則有之反正則未也夫悔者聖人之所急許以其為能反也至于婦人既失身于人其何以反如苟文若之于曹瞞栁子厚之于王叔文皆賢者也一失其身終身莫逭雖悔之何及耶竹竿序曰衛女思歸也適異國而不見答思而能以禮者也愚按序謂不見答者當是宋桓夫人初失志于桓公之時所作衛方全盛故所思在淇極言其風土親戚之可懷也籊籊竹竿以釣于淇豈不爾思逺莫致之毛傳興也朱注賦也也謂引竹竿以釣也說文無籊字當通作擢擢引陳式云生近水濵者以游釣為樂此章思淇之可釣末章思淇之可游泉源在左淇水在右女子有行逺父母兄弟泉源百泉也淇水出相州林慮縣泉源自西北東注之嚴氏云左右蓋主山而言相衛之山東面故以北為左南為右愚按若就地勢觀之則淇在左而泉在右矣嚴說似是女子有行是當時成語故詩屢引之言父母兄弟且逺況淇水乎淇水在右泉源在左巧笑之瑳佩玉之儺瑳玉白色言其笑而見齒白也佩玉所以節步儺緩行也愚按此章思在家時諸姑姊妹之朝夕相伴笑語步履宛然可念也淇水悠悠檜楫松舟駕言出遊以寫我憂說文無悠字通作攸行水也楫所以櫂舟也此章言淇水有舟楫之可樂也駕言即指舟楫篇終才出一憂字始露本意竹竿四章章四句愚按夫人未幾為桓公所出歸于衛在衛思宋復為河廣之詩則此詩非思衛也蓋大歸之幾已見故預為鄉國之思勢且必歸幸有父母兄弟以相依有姑姊妹以相伴有舟楫出游以舒懷聊自慰耳夫人豈樂于歸衛者哉芄蘭序曰刺惠公也驕而無禮大夫刺之左傳惠公之即位也少杜預注蓋年十五六芄蘭之支童子佩觿雖則佩觿能不我知容兮遂兮垂帶悸兮毛傳興也朱注同圓莞蒲之小者名芃蘭者以芄叢生水中似蘭而莖故字從芄而又呼以蘭也其質輕揚善泛故取為幼稚不能自主者之比大觿者成人之佩內則云子事父母左佩小觿右佩觿其下别云男子未冠笄者但佩容臭而已觿劉向云能治煩決亂者佩觿能射御者佩鞢鄭云貌如錐以象骨為之可以解結稱容者雍容遂者適意悸者傍人代為之驚悸言不其服也禮童子不垂帶走則擁之有事則收之今居然垂也故為之悸通篇比體借童子躐等之狀以為刺非正斥惠公為童子也芄蘭之葉童子佩鞢雖則佩鞢能不我甲容兮遂兮垂帶悸兮鞢說文云射決也周禮作抉謂鈎弦也愚按前章知字作智此言甲為十干之首猶長也能猶寧也所佩如此其識見寧有不智于我而材勇寧不足為我長乎反辭以譏之也蓋觽所以解結以象智也智不足則虛佩觿矣鞢所以發矢以象武也武不過人則虛佩鞢矣惠公稚年在位聽其母與庶兄淫亂亦不智而不武矣芄蘭二章章六句愚按通篇純以童子借言併不及君而刺在篇章之外河廣序曰宋襄公母歸于衛思而不止故作是詩也鄭云宋桓公夫人衛文公之妹生襄公而出襄公即位夫人思宋義不可往故作詩以自止雜記有諸侯出夫人禮春秋紀伯姬來歸及此宋桓夫人是也王后犯出則廢之而已天子以天下為家無所為出也桓夫人被出之故不可知而出妻與廟絶不可復返故河廣之詩聖人取之按說苑宋襄公為太子請于桓公曰請使目夷立公曰何故對曰臣之舅在衛愛臣若終立則不可以往不曰欲見母而曰欲見舅恐傷父之意也合此詩觀之母之慈子之孝皆止于義而不敢過焉誰謂河廣一葦杭之誰謂宋逺跂豫望之朱注賦也毛傳缺以葦說文云大葭也言河易渡宋易往直義不往耳非為其逺誰謂河廣曽不容刀誰謂宋逺曽不崇朝不容刀亦喻其狹言易渡也凡舟二百斛以上曰艇三百斛曰刀江南所謂短而廣安不傾危者也載馳見許穆夫人于衛為克孝之女河廣見宋桓夫人于宋為畏義之婦河廣二章章四句嚴氏云衛都河北宋都河南自衛適宋必涉河自魯閔二年狄入衛後戴公始渡河而南此詩誰謂河廣則是作于衛未遷宋襄公猶為世子時也伯兮序曰刺時也言君子行役為王前驅過時而不返焉周岐云此即繻葛之役伯兮朅兮邦之桀兮伯也執殳為王前驅朱注賦也毛傳缺矛朅說文云去也言其去從役也殳體八觚戈殳戟皆插車之輢上此云執者在車當插用則執之前驅如今道引也謂崔豹云殳前驅之器以木為之後世以赤油韜之之油㦸亦謂之棨㦸王公以下通用以前驅自伯之東首如飛蓬豈無膏沐誰適為容孔云鄭在衛之西南而言東者時三國從王伐鄭則兵至京師乃東行伐鄭也上云為王前驅即云自伯之東明從王為前驅而東也膏以澤髮沐濯髮也左傳遺之潘沐杜預注潘米汁可以沐頭蓬草之不理者葉散生末大本小遇風輒拔而旋謂一說自周室東遷天下稱為東周詩曰之東猶之之周耳愚按三國之士其始至京師以赴王命猶未知其果伐與否逮聞王師之東則伐鄭決矣伯也前驅室人殆有死亡之慮故憂思益深耳其雨其雨杲杲出日願言思伯甘心首疾凡人之憂思雨中為甚日出則意以少舒至憂思之久轉覺于雨相安而日出非所宜矣思伯而至于首疾或以為不宜過思者在我實甘心焉願言者意中語也焉得諼草言樹之背願言思伯使我心痗毛云諼草令人忘憂鄭云憂以生疾恐將危身欲忘之董子曰欲忘人之憂者則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈之以青堂青堂一名合歡陳度云北堂背南向北故謂之背愚按憂思之極不信世間有忘憂之草可樹北堂前章甘心首疾此章即心痗亦所不辭蓋思之不能自解亦竟不欲解也寧願已以思伯之故至于成病而祈祝伯之無恙意在言外伯兮四章章四句愚按周之東遷晉鄭焉依鄭有大功于王室桓王以小忿興師師先曲矣鄭莊公忍于誓母寧不敢于抗王王師必敗婦人女子皆知之卒之祝聃射王中肩而三國之師皆奔此執殳之伯存亡不可知矣有狐序曰刺時也衛之男女失時喪其妃偶焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也朱注曰國亂民散喪其配偶寡婦見鰥夫而欲嫁之作愚按篇中絶無喪偶求匹之情左傳秦伐晉筮之曰獲其雄狐解者曰狐蠱其君也狐可以目君亦可以目士大夫矣朱傳國亂民散當是狄初滅衛衛人東徙渡河之時士大夫逃亡相失不得渡者流離河外喪其車服躑躅于淇水之傍見之者傷之而賦是詩有狐綏綏在彼淇梁心之憂矣之子無裳毛傳興也朱注比也汔狐性善疑凡渡河聽氷下水無聲乃渡易稱小狐濟濡其尾亦以尾重易濡溺也古語有云狐欲渡河無如尾何垂綏通作緌冠結之餘散而下垂者謂之緌狐尾之似之綏綏狀其曳尾行遲不敢渡河也知石絶水曰梁失吳龍禎云上衣下裳章服也無裳其為士大夫其章服也有狐綏綏在彼淇厲心之憂矣之子無帶疊石水中踐之以渡曰厲狐性疑始猶在梁既而在厲不敢從梁渡也帶紳也有狐綏綏在彼淇側心之憂矣之子無服側㫄也非正渡之處轉疑轉怯併有厲石處亦不敢近矣防患之至也服命服也愚按合裳帶與服觀之其為士大夫而言審矣亡國孤臣失路潛蹤常恐路人物色之為敵人所覺情事危苦可以想見有狐三章章四句左傳衛戴公廬于漕齊桓公歸公乘馬祭服五稱何氏謂即詩所云憂之子無裳無帶無服者是也衛人感之故與木瓜並列以志齊桓之德愚按是時衛已渡河而猶稱在淇于義未合木瓜序云美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也投我以木瓜報之以瓊琚匪報也永以為好也朱注賦也毛傳缺筋木瓜楙也陶隱居曰梅望之而蠲渴楙書之而緩理有相感不可得而詳也瓊應劭云玉之華也之琚佩玉之名按佩有璜有珩有琚蘇氏云瓊琚于木瓜重矣然猶不敢以為報永以與之為歡好而已衛人感齊桓救患之恩故設為瓜瓊不等之喻言人遺我以微物猶必有以厚報之況齊桓之贈遺如此其厚則報之當何如望歸子慕云謂之報者平居分義無往來之道出于外者也衛之與國姜為異姓存亡之義不出于諸姬而出于姜氏詩人所以感思桓公之德無已時也投我以木桃報之以瓊瑤匪報也永以為好也舊說以木桃即桃木李即李姚旅云木桃樝子似木瓜小而酢澀色亦黃木李榠樝也似木瓜大而黃木瓜有重蒂木李單蒂耳心瑶從玉從䍃古人佩玉取其美質而易損用以攝寓戒也故從瑶即珩下之蠙珠是也投我以木李報之以瓊玖匪報也永以為好也玖從玉從久玉久土侵失白光似石故從久也非按琚瑶皆佩名玖乃玉名孔云瓊是玉之美名玉名也故許叔重云瓊赤玉瓊李雅云今稱雪者多比以瓊瓊州瓦皆白色則為玉之白者凌䝉初云齊桓存亡而衛忘亡故作此感思之詩夫子録于衛風之終王風之前正以見有齊桓霸業而後中國始知有王耳木瓜三章章四句郝氏云此章作于齊桓公既死之後衛文公忘其再造之恩乘五子之亂而伐其喪故詩人追思桓公以諷衛之背德夫子作春秋諸侯未有書名者衛文公滅邢書名刪詩存木瓜惡其不仁也衛國十篇三十四章二百三句愚按衛自康叔受封至武公有功王室命為公入相于周稱極盛矣及懿公時滅于狄而衛以亡賴齊桓存亡之力文公復興于楚丘是亡而復興者齊之力也故録衛風者以淇奭始以木瓜終焉王譜略王城者周東都王城畿內方六百里之地其封域在禹貢豫州太華外方之間北得河陽漸冀州之南始武王作邑于鎬京謂之宗周是為西都成王在豐欲宅洛邑使召公先相宅既成謂之王城是為東都今河南是也召公既相宅周公往營成周今洛陽是也武王居洛邑遷殷頑民于成周復還歸西都十一世幽王為犬戎所殺晉文侯鄭武公迎太子宜臼于申而立之是為平王以亂故徙居東都王城於是王室之尊與諸侯無異其詩不能復雅故貶之謂之王國之變風王一之六孔云王者王城也幽王滅平王東遷政遂微弱詩不能復雅下列稱風言其政令所及止于封域不復及于天下也以王當國猶春秋稱王人愚按王城謂之東都今河南府或曰新安縣是也成周謂之下都即洛陽而洛陽故城在今府城東洛水之北地道記云王城去洛城四十里東漢西晉後魏所都非今附郭之洛陽縣也遺址可考而知指自平王東遷之後凡稱西周指豐鎬也稱東都王城也及威烈王後東都下都又分二周所謂西周則東都王城也所謂東周則下都成周也黍離序云閔宗周也周大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去而作是詩也謝氏云能為閔周之詩者一行役之大夫之外無人也書文侯之命王所以訓戒晉侯者惟曰自保其國而已王室之盛衰故都之興廢悉置度外吾于黍離之詩重有感矣彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉朱注賦而興也毛傳缺為本草注黍有二種米黏者為秫可以釀酒不黏者黍如稻之有粳糯耳離通作麗重言離離者衆黍分布相屬著也亦稷似黍而小黑色古謂之粢曲禮稷曰明粢是也謂之穄云孔云黍言離離稷言苗則是黍秀稷未秀也謂毛靡靡猶遲遲也蓋意懶而足不前之貌搖搖心無所附著國策心搖搖如懸旌是也為鍾惺云知我者二句蓋以黍離為固然不復知此何地此詩之作為何由矣出楊在云謂我何求蓋習居東遷之小朝廷以一命使為榮而不復知有宗周之盛興亡國之悲也彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉穗說文云不成秀也通志云稷穗似蘆而米可食如醉言憂之沈昏不醒也彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉實謂成實而堅也羅孔云噎者咽喉閉塞之名言憂深不能喘息也氏云黍以大暑而種故農家以三月上旬為上時四月上旬為中時五月上旬為下時月令仲夏之月農乃登黍天子以雛嘗黍羞以含桃先薦寢廟黍固有早晚其晚者至孟秋始熟故庶人秋乃薦黍惟黍有早晚三種則當離離時而或值稷之苗稷之穗稷之實蓋以早晚為異耳憂又云黍大體似稷故古人併言黍稷行役之人有於內則有不察于外故于此或不能辨也劉協云思親者莪蒿不分閔周者黍稷莫辨蓋心在于憂與哀而視物之似而誤也黍離三章章十句申培說平王遷洛命秦伯帥師逐犬戎于鎬京尋遣尹伯封犒秦伯之師過故宗廟宫室秦人皆墾為田咸生禾黍旁徨不忍去故作此詩曹植亦云伯封作黍離之詩愚按犬戎弒幽王遂據有岐豐之地平王以賜秦襄公使自取之易世而後文公始有其地序云周大夫行役當是東遷數十年以後之事矣故所見如此君子于役序曰刺平王也君子行役無期度大夫思其危難以風焉朱注謂大夫久役于外其室家思之而作愚按篇中感物興思皆牛羊雞栖為尋常耕牧之家所見似非大夫妻也君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思朱注賦也毛傳缺計不知其期計時也猶云不知有還時否也曷至哉地也言逺不知所去也毛云鑿墻而棲曰塒雞之將棲日則夕矣日而已夕則羊牛下來相承而下陸氏曰先羊後牛者羊性畏露晚出早歸常先于牛故也役鄭云言畜産出入尚使有期節至于行者乃反不也君子于役不日不月曷其有佸雞棲于桀日之夕矣羊牛下括君子于役苟無飢渴不日不月言不計日月也佸說文云會也爾雅云雞棲于杙曰桀括說文云潔也猶挈也蓋以繩繫之挈而來歸曰下括也太𤣥經云四馬就括無苟鄭云且也且得無飢渴憂其飢渴也猶云庶幾疾病乎所謂萬里之外以身為本即此意也萋謝氏云雨雪霏霏遣戍役而預言歸期也卉木萋勞遷卒而詳言歸期也四牡之役寧幾何時勞之曰我心傷悲吉甫在鎬不過干里勞之曰我行永久所以體羣臣也豈有于役之人而使其家不知其期不知其地者哉匪鄒氏云觀杕杜采薇悲日月之繼嗣多恤于匪載來悼啓居之不遑烈憂于載飢載渴與此詩不甚相逺然彼則自上閔之此則自下述之民情舒鬱所由異乎先王以人道使人後世以牛羊使人而不知牛羊之歸猶有期也齊襄以瓜時遣戍及瓜弗代無知之禍因之人君勿以于役為細故哉人情固聖王之田也君子于役二章章八句愚按是時王室新造平王不撫恤其民而使逺戍于申申雖王舅而父仇也于役之民心已不服而況久無還期使役者怨于外處者思于家以彊秦方盛之世戍卒發難天下瓦解況新造之弱周乎大夫于時而思其危難亦深思逺慮者也君子陽陽序曰閔周也君子遭亂相招為祿仕全身逺害而已君子陽陽左執簧右招我由房其樂只且朱注賦也毛傳缺則毛云陽陽無所用其心也枯莊子以陽為充孔揚陽陽者氣充于內容貌不也篪孔云簧者笙管之中金薄葉也月令仲夏調竽笙簧于三器之下而别言簧者欲見三器皆有簧也而知其為笙者以笙師備言樂器有笙簧鹿鳴云吹笙鼓簧言吹笙則鼓簧是簧之用本施于笙言簧可以見笙非竽篪也路房謂路寢之下小寢之內也天子小寢如諸侯之寢也故得有左右房是人君燕息之所房中作樂蓋周禮大宗伯旄人所謂燕樂是也非廟朝之樂故曰房中朱子謂古人於房前有壁後無壁所以通內君子陶陶左執翿右招我由敖其樂只且陶陶樂貌翿纛也蓋執之以引舞者今之羽葆幢之類敖與奧通房中深處也君子陽陽二章章四句愚按房中之樂其始本后妃夫人侍御于其君子用女史歌之以節義序秦改曰壽人漢本周樂仍名為房中房中者婦人禱祀于房中髙祖唐山夫人所作也髙祖好楚聲故房中是楚聲也然則房中者是後庭燕私之樂而為之樂工者不過俳優之徒人主所狎昵玩弄決非士君子所肯為也郝氏以為與衛風之簡兮皆士人失職而溷跡於伶人誤矣彼固為籥師掌教國子之舞而屈之舞於公庭是人主用之非其地也若此之由房由敖居然陽陽得意蓋梨園教坊之輩以得親近人君為樂者申培說景王好音士遂習音君子諷之而作是詩蓋有以哉揚之水序曰刺平王也不撫其民而逺屯戍于母家周人怨思焉孔云平王母家申國惟應戌申併言甫許者以其同出四嶽俱姜姓也重章以變文借甫許以言申其實未戍甫許也如秦趙皆伯益之後同為嬴姓史記漢書多謂秦為趙皆此類也也按申姜姓之國四嶽之後初封于宛今南陽府是宣王時遷于謝則今信陽州是也甫本作吕姜姓唐世系表云宣王時改吕為甫故尚書吕刑亦作甫刑其後申吕皆入于楚許亦姜姓即今許州國語曰齊許申吕繇大姜又曰申吕雖衰齊許猶存是許與申吕皆同姓也竹書紀幽王被殺立宜臼于申者許男與焉則平王之德甫許當亦德申之亞也愚按申繒合西戎以伐周志在誅褒姒伯服重定太子耳不意戎殺王而遂據有周也不得已方立太子東遷于王城以周地賜秦秦戎世仇以秦滅戎未必非申伯之謀故戎仇申而王遣兵戍申併戍其同姓之國且以藩王室也先儒以王德申之立已而忘殺父之仇豈洵然乎揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月豫還歸哉毛傳興也朱注同流揚字從手以手播揚之義揚蘇氏云揚之水非自之水也水不能自流而或之雖束薪之易流有不流矣水之能自流者物斯從之安在其揚之哉周之盛也諸侯聽役于王室無敢違命及其衰也雖令而不至者歐陽子云彼其之子周人謂他諸侯國人之當戍也皆望不至之辭懷者指諸侯國人言言其懷安于家而不肯受役也揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉左傳楚子重請取于申吕以為賞田申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至於漢則申吕相距不逺此戍申亦以戍甫與揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉楚小于薪蒲輕于楚至不流束蒲則弱之極矣愚按古者列國有難方伯以王命徵諸侯之師戍之王室東遷不復能調遣侯國惟以王人從事而已揚之水言勢力之弱調發不動也彼其之子指諸侯國人而言揚之水三章章六句竹書紀年平王三十三年楚人侵申三十六年王人戍申吕氏謂平王之戍申與晉平公城把相類夫晉于把戚也非仇也以其棄諸姬而屏夏肄君子猶譏之若平王奄奄甘為讎人役又未可同日語矣中谷有蓷序曰閔周也夫婦日以衰薄凶年饑饉室家相棄爾朱注以為室家相棄婦人覽物起興而自述其悲歎之辭申培說民饑而流夫婦不保君子閔之而作是詩中谷有蓷暵其乾矣有女仳離慨其歎矣慨其歎矣遇人之艱難矣毛傳興也朱注同濵池澤其性宜濕蓷一名茺蔚即益母也好生海嚴氏云谷中之地陰潤蓷宜難旱也今暵其乾者旱則乾者先燥猶饑饉則貧者先悴也仳說文云别也近曰離逺曰别有女為夫所棄或近而離或逺而别見非一女也也歎說文云吟也亦謂之長太息艱難猶言窮厄蓋歸咎其夫之所遭云爾未有怨意今黃佐云周官行于盛時每遣小行人賙委其凶荒至于室家相棄唯付之無可奈何時事可知矣中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣修長也說文云脯也旱既久則草乾之極如脯然也條猶長也漢郊祀歌云聲氣逺條嚴氏云條條然而長嘯其悲恨深于歎矣不淑年凶荒猶言不幸也中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣嚴氏云生於濕今亦為所暵以興富足者亦乏絶矣啜說文云茹也詩詁云泣而縮氣也所謂飲泣也無聲出淚曰泣也何嗟及者雖其所遭之不幸亦自傷所從之非人蘇氏云中谷之蓷旱之所難及也既先燥其乾者及其甚也雖生于濕者亦不免也旱及于濕則盡矣始也人之艱難者棄其妻耳其後人之不善者棄之矣甚至有無故而棄之者故始而歎知其不得已也既而嘯嘯者怨之深矣至無故而棄則泣泣者窮之甚也中谷有蓷三章章六句愚按王室東遷舊都之民無所依怙故其流離顛沛至此王已棄之如遺保此東土而且孤人之子寡人之妻遣役戍申以報立已者之德録詩者次此詩于戍申之後欲王重恤此孑遺哉兔爰序曰閔周也桓王失信諸侯背叛搆怨連禍王師傷敗君子不樂其生焉繻葛之戰蔡衛三國之師先奔王師遂敗作詩者傷王室微弱諸侯攜心無肻為王力戰所傷者徒畿內之民而已愚按周鄭之交惡由周畀虢公政也繻葛之戰虢公林父將右軍而先奔坐視王卒之敗以致射王中肩自此一敗天下遂以輕周矣爰爰之兔所以罪林父也有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪毛傳興也朱注比也說爰爰爾雅云緩也宜通作緩緩毛云鳥綱為羅文云以絲罟鳥也吪說文云動也臥既覺必先有聲言自今以後庶幾寐而不動不見此景象也有兔爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺罦覆車也郭璞云今之翻車大綱有兩轅中旋罥以捕鳥展轉相解造搆也言禍端尚未搆有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰罿罬也韓詩云施羅于車上曰罿罿罦是一物或罿小而罦大耳聰開也凡寐者必呼之而後能覺故欲其無聞聞先于覺覺先于吪兔爰三章章七句朱注謂周室衰微諸侯背叛君子不樂其生而作是詩取興雉兔以比小人致亂而以巧計幸免君子無辜而以忠直受禍也申培說晉趙鞅殺萇𢎞周人傷之而作為按鞅與荀寅范吉射為難周劉文公與范氏世婚姻故周與范氏鞅討于劉遂殺萇𢎞以說詩中似以兔譏劉以雉傷𢎞也葛藟序曰王族刺平王也周室道衰棄其九族焉喪服小記說族之義以三為五以五為九自髙祖至𤣥孫其世九此言棄其九族謂棄其同出髙祖者也綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧毛傳興也朱注同樂葛藟枝蔓聫屬有宗族之義宋昭公欲去羣公子豫曰公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比爾雅云重崖為岸岸上為滸崖即下文之涘也所陸氏云滸危地也潤澤葛藟而生之亦以自固王棄其族曽是之不如矣綿綿葛藟在河之涘終逺兄弟謂他人母謂他人母亦莫我有嚴氏云莫我有言視之若無也左傳曰不有寡君綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞涘在滸之下漘在涘之下許氏以為岸下為水灑蕩齧入若唇是也葛藟三章章六句左傳周襄王欲以狄伐鄭富辰引棠棣之詩以諫曰雖有小忿不廢懿親王不聽此詩豈作于此時耶采葛序曰懼讒也鄭云桓王之時政事不明臣無大小使出者則為讒人所毁故懼之謀李氏云小人之譖人多乘間而讒之如上官桀等譖霍光伺光出沐日奏之𢎞恭石顯譖蕭望之亦候望之出沐日上之陷郝氏云小人之排君子未有不始于離間而終于害者韓愈謂日隔之疏加以忌者之說哲人憂讒每在去後故曰一日不朝其間容刀詩人憂一日之不見其慮深矣彼采葛兮一日不見如三月兮毛傳興也朱注賦也以箋云以采葛喻臣以小事使出一說葛可織以喻讒言之蔓引也彼采蕭兮一日不見如三秋兮蕭所以供祭祀以鄭云采蕭喻臣以大事使出一說蕭可爇以喻讒言之薰灼也彼采艾兮一日不見如三嵗兮艾所以療疾香鄭云采艾喻臣以急事使出今羅氏云蕭艾本皆草離騷曰何昔日之芳草兮直為此蕭艾也又曰户服艾以盈要兮謂幽蘭其不可佩則比之惡草矣采葛三章章三句左傳鄭武公莊公為平王卿士王二于虢王曰無之故周鄭交質疑此詩為莊公所作其後遂有繻葛之役則此詩為兔爰張本大車序曰刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉申培說周人從軍寓其室家之詩大車檻檻毳衣如菼豈不爾思畏子不敢朱注賦也毛傳缺也毳衣大夫之服大車牛車也檻檻毛云車行聲毳柔毛也菼是蘆之初生色青如隼蓋以柔毛織成為衣而有色青如菼者有色赤如璊者為子男之服天子大夫四命服視子男古者比出車一乘則有兩車一正一副小者曰輕車即兵車所以戰者大者曰重車即役車所以載輜重者毳季氏謂毳冕五章之畫衣以絲為之如菼如璊之衣以毛布為之菼隼也薍也璊虋也即大雅之維穈也詩人意謂役久衣敝其䝉茸綻裂有如此耳大車啍啍毳衣如璊豈不爾思畏子不奔啍說文云口氣也啍啍口氣遲重之貌以象車行遲重也璊玉赤色奔行速也穀則異室死則同穴謂豫不信有如皎日此章承上畏子不敢而言言已之不得歸也此生離異惟死得合葬耳誓之皎日以明已誠蓋寄訊室家而為永别之辭也大車三章章四句朱注以大車為大夫之車謂大夫能聽男女之訟而淫奔者畏之而作愚按大車為役車也自戍申以後王人久役于外不得歸者多矣申說為是丘中有麻序曰思賢也莊王不明賢人放逐國人思之而作是詩也郝氏云留周大夫劉氏古劉與留通大雅桑柔篇曰捋采其劉亦謂殘葉存留者也晉士會奔蔡既返而其子有留秦為劉氏國䇿云處者為留則留即劉也愚按王子朝之亂單旗劉蚠忠于王猛子朝黨逐之劉子奔楊已而如劉及子朝敗劉子始入于王城此詩當是王城之望劉子之來也丘中有麻彼留子嗟彼留子嗟將其來施施朱注賦也毛傳缺令麻有實者名苴無實者名枲月秋食麻與犬愚按此章似劉子初奔楊時張皇去國詩人憂而嗟之望其謀定而來施施從容也丘中有麥彼留子國彼留子國將其來食麻與麥先後熟李與麥同熟謂之麥李皆夏秋間物愚按子朝之亂正在其時此章聞劉子之已返劉劉食邑也知在其國矣喜其來居于食邑也丘中有李彼留之子彼留之子貽我佩玖愚按此章望其早來共解佩以贈之相與合力攻子朝也貽我佩玖者貽以我所佩之玖以明佩服之子之久也木植物中麻最多子五榖中麥最先熟李亦之多子者以況留子之多助也丘中有麻三章章四句朱注謂婦人望其所與私者而不來疑有留之者而作郝氏謂留為周大夫劉氏但未指其事其人以實之耳王國十篇二十八章百六十二句田間詩學卷二
