body:
  text: 田間詩學卷七桐城錢澄之撰彤弓之什二之三彤弓序曰天子錫有功諸侯也鄭云諸侯敵王所愾而獻其功王饗禮之于是賜彤弓彤矢百玈弓矢千凡諸侯賜弓矢然後得專征伐朱云此天子燕有功諸侯而錫以弓矢之樂歌也太郝氏云謂錫弓矢是也謂燕非也燕與饗異饗用牢爵盈而不飲所以示恭儉也燕則盡醉爵行無算所以示慈惠也燕饗皆酒而饗主于錫以酒行禮非行禮以飲酒也周語王饗有體薦燕有折爼公當饗卿當燕故燕或至夜而饗行于朝成禮而罷故曰一朝饗之左傳鄭饗趙孟禮終乃燕是饗不終日也彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之朱注賦也毛傳缺弦彤弓朱弓也周弨弛貌說文云弓反也徐鍇云弛而體反也尚赤故賜弓以赤為重朱嚴氏云賜弓不張之鄭云言者謂王策命也王錫弓必策其弓以命受出藏之乃反入也曰左傳晉范宣子來聘公享之季武子賦彤弓宣子城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏丐也先君守官之嗣也敢不承命即此詩所云藏之也貺賜也即彤弓之賜也曰中心貺者言中心實欲貺之非有勉强而然如內疑其臣而外牽于其功內忌其臣而外迫于其勢雖貺非本于中心矣以彤弓非常賜也鐘鼓大樂也饗盛禮也設盛禮所重彤弓之賜也考晉文公事饗賜正同日傳先言饗而后言賜詩先言賜而後言饗行文異耳孔云饗之日先受弓矢之賜后受獻酬之禮彤弓弨兮受言載之我有嘉賔中心喜之鐘鼓既設一朝右之毛云載載以歸也鄭云出載之車也王朱云載抗之也右與宥同皆助也莊十八年左傳饗禮命之宥注謂以幣物助歡也僖二十五年二十八年皆云饗醴命宥詩話云古者燕饗有賜以章其志謂之右彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼓既設一朝酬之櫜韜也即弓衣也說文云櫜在車上則上言載之亦載之于車耳禮于食有侑賔勸飽之幣上章言右是也于飲有酬賔送酒之幣此章言酬是也飲為饗兼言右酬者以饗亦兼食故也彤弓三章章六句鄒氏云王制諸侯賜弓矢然後征賜鈇鉞然後殺後儒遂以為得専征伐特因王制之語誤增一字失之逺矣𦙍后之征羲和必曰承王命徂征南仲之伐玁狁必曰自天子所謂我來矣則諸侯固無専征伐之事愚按玁狁之伐本承商王之命至于伐崇伐密詩但稱文王之赫怒未曽言請命于天子也豈非文王方伯得以専征耶管仲之對楚使曰昔召康公命我先君太公曰五侯九伯汝實征之以夾輔周室此即専征之命矣然則彤弓之賜得専征伐未為謬論也菁菁者莪序曰樂育材也君子能長育人材則天下喜樂之矣王制鄉子弟卿大夫餘子皆入學九年大成曰秀士升之司徒曰選士司徒論選士升之大學曰俊士升干司徒者不征于鄉升于大學者不征于司徒曰造士大樂正論造士進于王曰進士司馬論定而後官之任官然後爵之此先王所以樂育材也鄭云長育之者既教育之又不征役也愚按周自文王都豐之後始建辟雍武王倣之故鎬京亦有焉詩之作必美其所自始故菁菁者莪當為文王咏也菁菁者莪在彼中阿既見君子樂且有儀毛傳興也未注同菁陸氏云草之初生其色𤣥盛則青霜死而後黃落從青詩曰何草不𤣥言其生何草不黃言其死也詩郝氏云小曰莪大曰蒿蒿易長俄然而成故名莪曰三月茵陳四月蒿言易長也故比育材國阿丘之曲也中阿為人所不見之地興士之藏修學無慕于人之知也吕氏云長育人材之道多術矣而莫先于禮儀禮儀者內外兼養非心過行無所從入人材所以成也菁菁者莪在彼中沚既見君子我心則喜羅氏云莪即蘩蘩之醜秋為蒿春時各有種名至秋老成皆通為蒿采蘩者多于沼于沚也在沚興多士之得灑濯也已我心則喜因肓才之有地喜材之得成也菁菁者莪在彼中陵既見君子錫我百朋大阜曰陵莪在中陵人皆得見之矣士之才已成就為人所瞻仰其象如之錫我百朋者辟雍之中人材所聚新至者得于斯取友焉喜其受益之多故本其所自而以為君子之錫我也泛泛楊舟載沉載浮既見君子我心則休朱注比也水楊舟以況賢才書曰若濟巨川用汝作舟楫沉浮濵虛舟待渡以比賢才待用也休言安定也既見君子則論定而官任官而爵不患成材而不見用則學者皆一心向學而不事躁求矣菁菁者莪四章章四句申培說天子燕賔興之士則歌此詩朱子直以為燕飲賔客之詩愚按詩中無燕飲之事或因有歸美君子之語則燕饗通用無不可者非為燕飲作也六月序曰宣王北伐也鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福祿缺矣采薇廢則征伐缺矣出車廢則功名缺矣枤杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則亷恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣南有嘉魚廢則賢者不安下不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基墜矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四海交侵中國微矣鄭云六月言周室微而復興美宣王之北伐也雅按自此至無羊十四篇皆宣王之詩所謂變小也六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國朱注賦也毛傳缺棲朱云六月建未之月盛夏不興師六月明其急也棲猶言皇皇倉卒興師人情搶攘其象如此大戎車革路之車也衆日月為常周禮司常職云若師則建大常比軍誅後至者小司馬職云凡小祭祀㑹同饗射師田掌其事如大司馬之法是知興師之始必建大常以致軍衆凡遣將出師皆得建不必王親征也知服韋辨服蓋戎服也載常以致衆載服以備用人其將有事矣乃告之以出師之故如下文所云字我主吉甫言以吉甫為主將乃發令者後章二我同于往也鄭云于曰也愚按吉甫受王之命代王出征猶王親往征也以匡王國此吉甫初徵兵而述王命以告之周六月建已月初夏也宣王時自用周正比物四驪間之維則維此六月既成我服我服既成于三十里王于出征以佐天子物類也指馬言馬周禮凡大祭祀朝覲㑹同毛馬而頒之凡軍事物而頒之注云毛馬齊其色物馬齊其力齊孔云戎事齊力尚强不取同色而言四驪者雖以力為主而又同色益見其盛也間習之也則法也間習之久則進退馳驅不失其則言其教閲有素也服兩服馬也鄭詩云兩服上襄兩驂鴈行舉服可以該驂鄭姚文燮云服猶習也凡馬之馴習者皆可曰服馬詩謂巷無服馬是也既成二字承間之維則而言發孔云軍法車行三十里為限按志武王伐紂師初以殷十月戊子日在析木月在天駟戊午度于孟津孟津去周九百里凡三十一日而度是師行三十里之證也上章王于出征以匡王國是統命軍衆之辭此章王于出征以佐天子乃責成吉甫之辭四牡修廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國修以言其身之長廣以言其腹背之充顒以言其首之大三者相稱所以成其大也古人戰車所重者四牡故詳言其盛嚴毛云膚公大功也謂有嚴以下是吉甫誓衆之辭戒也不敢輕敵之翼敬也不敢亂行之謂共與供同爾雅云具也服事也兵凶戰危通將帥士卒凡有事戎行者皆當致其嚴敬以供武事也玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乘以先啓行茹茅根相牽引貌易拔茅連茹是也言玁狁異類匪托根于中國而整其旅以居焦穫之地絶無去志所謂他族逼處將與我爭此土也地爾雅十藪周有焦穫按焦穫既為十藪之一其必美水草玁狁所以久駐牧而不去也旄織幟字通用鳥章前軍所建所謂朱雀也一云旗旟旗之類各有織文此獨以鳥章言則織乃鳥章之織文耳武白斾後軍所建爾雅繼旐為斾旐畫龜蛇所謂𤣥也斾惟旐有之白通作帛通帛為旃帛皆絳也北王氏云元戎十乘所謂選鋒也兵法兵無選鋒曰韓嬰章句云元戎大戎謂兵車也車有大戎十乘名曰陷軍之車所以冒突先啓敵家之行伍也孫叔敖稱詩云元戎十乘以先啓行先人也軍志曰先人有奪人之心薄之也愚按焦穫據郭璞云今扶風池陽縣瓠中是也池陽即今三原縣去鎬京甚近而劉向謂千里之鎬猶以為逺則詩所謂鎬非鎬京矣若以焦穫即在三原無緣既據內地復侵千里以外之鎬以及朔方之極邊也以焦穫為在三原因涇陽而傅㑹之耳涇陽蓋涇州也朱云鎬未詳所在方疑即朔方今寧夏也玁狁自太原循邊而西以及朔方則焦穫與鎬皆在方之東北由朔方以至涇州蓋自北而南也戎車既安如輊如軒四牡既佶既佶且間薄伐玁狁至于太原文武吉甫萬邦為憲上章言鳥章之旟選鋒之乘皆前軍也至此戎車四牡則又大隊繼之矣鄭云戎車之安從后視之如輊從前視之如軒然後適調也則馬援疏云居前不能令人輊居後不能令人軒然輊似前重而後低軒是後重而前昂今自後視之如輊自前視之如軒是前後適平也佶說文云正也甘誓云御非其馬之正汝不共命四牡既佶則範我馳驅矣間習也前言間之是以人間馬此曰且間是馬之自間也太原亦名大鹵春秋晉荀吳帥師敗狄人于大鹵穀梁傳云中國曰太原夷狄曰大鹵是也自穆王遷戎于太原而太原為夷狄之居左傳晉籍談曰晉居深山戎狄之與鄰而逺于王室王靈不及拜戎不暇則以太原之地為戎所薦居故也愚按玁狁聞王師之出已離焦穫轉入太原將返其故地王師逐之至于太原驅之出境而已不似采芑出車有執訊獲醜之事明未交戰也至于太原明王師已踰方至鎬而玁狁始返太原也故下文云來歸自鎬吉甫即尹吉甫北伐之大將也言吉甫不徒能文而又能武于嵩髙蒸民詩見其文于此篇見其武以文為賔武為主憲法也吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炮鱉膾鯉侯誰在矣張仲孝友鄭云吉甫既伐玁狁而歸天子以燕禮樂之自首一句是飲至之燕天子燕之來歸以下則吉甫叙其契濶諸友私燕之相樂也天子之燕不過牢牲炮鱉膾鯉非禮所載故知為私燕也喜謂吉甫喜也喜承天子威靈疆場無事非為成功而受賜喜也歸自鎬二句此吉甫意中語詩人代為之言也來勸侑曰御曲禮御食于君是也愚按忠孝一也士君子取友必以其類視吉甫之友則為吉甫者可知世未有不孝而可以言忠而可以勤王事成大功者也皆言飲御諸友友非一張仲可知同時卿士在坐者不稱及而以得張仲為榮結此一語直令吉甫勳名皆落第二義矣六月六章章八句鄒氏云六月之師宣王中興第一舉而不與江漢常武並列大雅者彼之為告廟䇿勳此之為燕賔欵叙彼之為六飛親駕此之為四牡徂征彼則歸功于天子此則歸美于人臣辭義固有大小不侔也采芑序曰宣王南征也竹書紀宣王五年秋八月帥師伐荆蠻按是年六月伐玁狁是一年再用師矣觀篇末有征伐玁狁荆蠻來威之語則南征固在北伐后也蘇氏云方叔之南征先治其兵既衆且治而蠻荆遂服詩人詳其治兵而略其出兵至于卒章而後言其遇敵何氏云前三章乃大閲之事首章叙方叔承命為帥而將行大閲之事次章治兵辨旗物故其詩曰旗旐央央三章言振旅之事故其末句曰振旅闐闐愚按方叔治兵既畢率以南征而蠻荆奪氣矣所謂有征無戰也薄言采芑于彼新田于此菑畝方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟笰魚服鈎膺鞗革毛傳興也朱注同維芑說文云嘉穀也郭璞云今之白粱粟詩云維穈芑毛云菜也新田田之新成者三嵗田也菑畝田之初反草者一歲田也乘其車三千合兵車重車而得此數兵車一千五百計甲士步卒共得一十萬二千五百人重車一千五百乘計炊家子廏養樵汲等共得三萬七千五百人合之為十五萬人天子六鄉六遂之衆也天子六軍每軍萬二千五百人所用七萬五千人今合而簡之正以備六師畨休之用也涖干扞也試肄習也謂如步法止齊之類此方叔初止而播告之辭至第三章乃試之實率其車三千所謂簡車也師干之試所謂簡徒也通作帥將也四騏為方叔駕路車者在車左右如鳥之有翼兩服兩驂故重言翼翼也禮路車革路也奭說文云大赤也詩云韎韐有奭周凡兵事韋辨服皆韎韋也左傳郤至衣韎韋之跗注韎韋韋染為赤色者也則軍中衣辨裳芾之類皆用赤色故統稱有奭也傳魚服與采薇篇矢箙不同當是以魚皮飾馬服左齊桓公歸衛夫人魚軒注云車以魚皮為飾上下文皆言車馬之飾故知其非矢箙也鈎膺樊纓也樊讀如鞶帶之鞶纓今馬鞅在膺者周禮金路鈎樊纓九就同姓及上公之車鈎馬項下飾樊纓當馬胸膺鞶馬胸前革帶也一說鈎即馬腹帶之飾帶必有鈎以拘之以金為鈎施之于膺所謂鞶也鞗革解見前愚按朱子謂軍行采芑而食故賦其事以起興觀篇中新田菑畝有彼此之分則芑之所産自有不同以言田之必須熟耕而兵之必須慣練故先行大閲之禮而後用之薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩蘇氏云中鄉民居在焉故其田尤治今日者彼田之新田異日者亦猶此地之中鄉也所以然者田愈治則愈善以興衆愈練則愈精旗日月為常交龍為旗通帛為旃雜帛為物熊虎為鳥隼為旟龜蛇為旐全羽為旞析羽為旌几旗中太常旞旌三者王所建其餘諸臣之旗旗為上旐為下此言上下所建則餘得兼舉矣有毛云軧長轂之軧也按輪內有輻輻內有轂轂內軸轂者輻所凑也三分其轂長除一分在輻內不可見者其二分在輻外可見者名之為軧即轂端是也約軧必以革而上加以朱漆為飾說文云錯金塗也車軛為衡塗金于軛所以為文乘車鸞在衡戎車鸞在鑣如蓼蕭庭燎韓奕烈祖皆在衡之鸞也駟鐵之鸞鑣及此八鸞皆在鑣之鸞也注云馬口兩旁各一四馬故八鸞命服天子所命之服也芾作韍韠也即蔽膝也兵事尚赤故貴者以朱芾卑者以韎韐韎韐即一命之緼韍也皇猶煌煌也按爾雅青謂之葱象其色也珩說文云珮上玉也所以節行止也通作衡瑲其聲也鴥彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐隼急疾之鳥也飛乃至天喻士卒徑勇能深攻入敵也爰于也亦集于其所止喻士卒須命乃行也隼鷂屬陸氏云今鷹之搏噬不能無失獨隼為有準故其每發必中古之訓字以此鉦者節鼓之器說文云鐲也一名丁寧晉語趙宣子云戰以丁寧警其民注謂鉦也鄭云鉦也鼓也各有人焉言鉦人伐鼓也互言耳節潘江云按毛氏謂鉦以靜之鼓以動之是鉦所以鼓非收軍之器與鐃自别而說文解鐲為鉦又解鉦為鐃解鐃為小鉦混矣命鞠通作鞫告也孔云誓而告之以賞罰使之用也司馬法曰有虞氏戒于國中夏后氏誓于軍中殷誓于軍門之外周將交刃而誓之此言鞠旅亦周法也顯允蒙鞠旅而言顯謂號令明允謂賞罰信振伐鼓凡六節自進而退無不用鼓故但言伐鼓通作整說文云齊也治兵禮畢整衆而還闐闐衆盛也至此而大閲之事始畢蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威蠢動也蠻荆荆州之蠻也楚王氏云春秋之初曰荆而已後乃為楚穀梁傳曰何謂之荆狄之也聖人立必後至天子弱必先叛故蠻族不一荆其最大而强者其亂必挾諸蠻而起概之曰蠻荆郝氏云商周中興必先服楚若蠻夷則先王荒之耳何以伐為商頌曰維汝荆楚居國南鄉言近也朱注大邦猶言中國也則元老即易所稱丈人長子也商師若烏周師為茶商國喜用少而周喜用老焉猶謀也言方叔雖老而謀則壯也蓋方叔尚謀不尚戰以謀為壯不以力為壯所以為老將也戎車還師之車也嘽嘽焞焞如霆如雷皆車聲也嘽嘽指輕車言焞焞指重車言霆說文云雷餘聲也承嘽嘽以車聲之舒緩似之如雷承焞焞以車聲之重速似之時凱旋而歸從容就道故其車聲如此愚按篇末忽出征伐玁狁一句則知北伐之役方叔佐吉甫以成功而六月之詩但美吉甫略不叙及方叔至此因南征之功而始併及之于此見古人將權之一而諸將不爭功之美采芑四章章十二句郝氏曰善說詩者觀采芑六月軍旅之事思過半矣六月事勢張皇采芑氣象暇豫吉甫承頺敗之後敵驕兵惰應變不得不敏及北虜既平軍聲既振方叔再出服命服乘命車從容運籌而南蠻奪氣矣故吉甫薄伐才兼文武方叔元老賤戰貴謀著之篇什豈徒以其辭而已乎車攻序曰宣王復古也宣王內修政事外攘夷狄復文武之境土修車馬備器械復㑹諸侯于東都因田獵而選車徒焉鄭云東都王城也而孔云序言因者以見王為因㑹獵也以㑹諸侯為主愚按春秋成周宣榭火公羊傳謂成周者東周也夫東都則召公所營之王城成周則周公所營之洛邑所謂下都也相去僅三十五里成周有宣榭者意宣王㑹諸侯于王城因講武于洛邑楚語云先王之為臺榭也榭不過講軍實成周之宣榭為講武而建也我車既攻我馬既同四牡龐龐駕言徂東朱注賦也毛傳缺齊攻治也毛云堅也同齊也宗廟齊毫尚純也戎事力尚強也田獵齊足尚疾也嚴氏云言往東都未言所為之事田車既好四牡孔阜東有甫草駕言行狩嚴氏云此章乃言徂東所為之事象四牡所以駕王車周禮田車木路是也上言龐龐其大此言孔阜象其髙而且厚藪鄭云甫草甫田之草鄭有甫田圃爾雅作圃田十之一孔云宣王之時未有鄭國田在東都畿內故宣王得往田焉者狩冬獵之名按下章之子于苗則是夏獵而云狩孔云凡田之禮惟狩最備故以為獵之總名又搜苗獮狩四時異名若比年簡徒亦名為搜三年大簡車徒名為大搜豈非以春搜為田事之始冬狩為田事之終故大其名而可以概用乎之子于苗選徒囂囂建旐設旄搏獸于敖之子有司也不敢斥王故以有司言禮夏獵曰苗選通作算亦作撰數也選徒囂囂即周撰車徒讀書契辨號名之事時王行未至東都而有司戒徒以待其事如此周禮中秋教治兵則郊野載旐及國之大閲則縣鄙建旐建樹也樹以致民非建之于車之謂蓋以召致縣鄙之民近于敖地者俾皆來㑹而搏獸于敖此又出選徒之外西敖山名秦于此築倉曰敖倉按古敖城在滎澤縣南十七里圃田在中牟縣西北七里其澤南北二十六里東西長五十里則敖正在圃田界中故狩于此而搏獸于彼左傳晉師救鄭在敖鄗之間又士季設七伏于敖前則敖山之下平曠可以屯兵翳薈可以設伏狩于甫草正在此也愚按宣王在東都以㑹諸侯為主因田獵以選車徒而二章三章先言田獵者蓋有司先為戒具以待㑹畢而后田獵也駕彼四牡四牡奕奕赤芾金舄㑹同有繹此章王已行至東都而諸侯來朝也諸四牡王所乘也奕奕大而相連之貌天子朱芾侯赤芾禮君韠用朱則諸侯在其國亦得用朱惟入朝于天子乃用赤芾所以别于天子也孔云重底者名舄單底者名履詩咏周公曰赤舄几几咏韓侯曰𤣥衮赤舄舄以赤為上王冕服之舄也諸侯舄亦與王同鄭云金舄者黃朱色也謂周禮時見曰㑹殷見曰同繹往來不絶即絡繹之言諸侯先此既行㑹同之禮矣因王有于苖之舉復于㑹同之外絡繹而來朝見大宗伯以賔禮親邦國以軍禮同邦國此所謂軍禮也㑹陳際泰云宣王時天下新服借搜狩之禮略地而諸侯以振耀其甲兵是故天王狩于河陽因狩而行朝禮文公之微權也車攻狩于東都因狩而行㑹禮宣王之微權也愚按車都居四方之中四方朝聘貢賦道里均焉故成王營建以㑹諸侯夷厲以來此禮久廢宣王中興復為此㑹故車攻謂之復古決拾既佽弓矢既調射夫既同助我舉柴決通作抉毛云鈎弦也拾遂也佽利也重鄭云佽謂手指相次比也調謂馬強弱與矢輕相得孔云決著于右手大指所以鈎弦開體遂著于左臂所以遂弦手指相比次而後射得利詩詁韜左臂拾其衣䄂以利弦曰拾亦名為遂取其能遂弦也弓觀下章四黃既駕専主王車而言則此次决拾調矢皆是待王射之事以毛云田者大芟草以為防褐纒旃以為門裘纒質為摯左者之左右者之右然後焚而射焉處孔云芟殺野草以為防間作田獵之場擬殺圍之因設周衛而立門以毛曷纒通帛旃之竿以表門之兩傍其門南開並為二門又以裘纒椹質以為門中之闑以天子六軍分為左右其屬左者之左門屬右者之右門不得越離部伍故有二門也為穀梁云艾蘭以為防置旃以為轅門以葛覆質以摯按蘭香草艾之為防則逢草盡除矣置旃為轅門者謂以車為營舉轅為門又建旃以表之質者中門之木椹恐椹傷馬足故以葛覆之以為𣙗合毛傳穀粱二說則設防當如柴籬豎橛門中原需短木故皆用柴本射夫自諸侯而下凡與于射者之通稱菜田立表虞人事而衆射夫協為之則諸侯命其部衆舉之故名助也四黃既駕兩驂不猗不失其馳舍矢如破此章方言田獵之事専主宣王言君四黃宣王乘也明堂位曰周人黃馬蕃鬛樂府云馬黃臣馬蒼不倚獨言兩驂驂在服外易于出入也握穀梁傳謂建旃表門門廣容車去車之兩軸各一入此門馳而入不得徐也若車軸頭掛于門則不得入故有貴乎兩驂不猗乘車馳之勢以從禽稍徐則禽必失矣故貴于不失其馳不失其馳然後射者能中是以舍矢如破也如破巧而力也蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈毛云天子發然後諸侯發諸侯發然後大夫士發上章是天子發之事蕭蕭馬鳴當是諸侯大夫士所乘之馬更進迭騖而然郊斾惟旐有之與第三章建旐設旄相應以其地在野故曰始事至終事皆建此旐旌即虞旌也所以屬禽者按山虞以旗澤虞以旌各有専屬圃田澤也故以旌言先既設旐後復設旌蓋正當比禽之時而獵事亦將畢矣私不驚言不擾也此言其分禽之時大獸公之小獸之民志素定無驚擾也習穀梁傳曰禽雖多天子取三十焉其餘與士衆以射于射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也按古者田獵獲禽面傷不獻踐毛不獻不成禽不獻擇取三等自左膘射之達于右腢為上殺以為乾豆奉宗廟達右耳本者次之以為賔客左髀達于右􅞞為下殺以充君庖每禽取三十焉之子于征有聞無聲允矣君子展也大成朱注聞師之行而不聞其聲言至肅也所一云有聞謂有聲譽著聞無聲謂不事條教號令謂不動聲色而人自化之也人蘇氏云我必聲之然後人聞之我則不聲而則聞之必其實有餘也車攻八章章四句鄒氏云無逸之訓曰繼自今嗣王則其無淫于觀于佚于遊于田乃詩美宣王田事何也此正宣王所為無逸也古者搜苗獮狩之法實與軍政相為表裏先王隂用其道使人由而不知宣王乘積衰之後奮然圖治蠱事終而鼎事始東萊吕氏所謂王賦復軍實盛師律嚴上下洽綜理周者蓋具見之吉日序曰美宣王田也能慎微接下無不自盡以奉其上焉慎微言祭馬祖也接下言獲禽以享賔也故臣下無不自盡誠心以奉其上周禮中秋教振旅遂以搜此詩之作殆為大搜咏耳吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜朱注賦也毛傳缺午戊剛日也曲禮曰外事用剛日內事用柔日如甲治兵壬午大閲吉日維戊吉日庚午皆外事者也故用剛日丁丑燕之乙亥嘗之凡祭之用丁用辛內事也故用柔日伯馬祖也將用馬力必先為之禱其祖馬祖天駟房四星也云伯鄭司農讀作禡故說文既伯作既禡也何氏周禮搜苗獮狩有司皆表貉于陳前貉與貊通此既伯即田獵之日表貉之祭毛云禱禱獲也戰必禱克田必禱獲禱孔叢子云凡類禡皆用甲丙戊庚壬之剛日此伯即禡祭之禮嚴氏云田車四語皆禱辭言告神以將田獵其實戊日未田也也醜衆也田而升大阜從禽獸之羣衆愚按朱注以戊日為戊辰夫吉日維戊即田獵之日以次章推之當在庚午後八日為戊寅非戊辰也若此日戊辰則既言四牡孔阜從其羣醜何待閲二日庚午始行差擇其馬乎吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所孔云必用午日者于辰午為馬故也力差次也不齊等也爾雅云田獵齊足即差等其足之謂也此以給從王于田者吉日庚午乃追述之辭言先此己差馬以待矣麌說文作噳言麀鹿羣口相聚也羅氏云鹿無角者名為麀麀牝鹿也或曰麕之牡曰麌于鹿則舉牝于麕則舉牡盡于麕鹿之類矣毛云漆沮之水麀鹿所生也從漆沮驅禽而至天子之所以獵有期處故驅禽從之也漆沮出岐山北沮水與漆水合流至岐山入渭瞻彼中原其祁孔有儦儦俟俟或羣或友悉率左右以燕天子祁大也或曰祁通作岐謂山道之旁出者待孔云指獸言趨曰儦儦行曰俟俟俟當作俟言相而緩行也獸三為羣二曰友射燕安也鄭云悉驅禽順其左右之宜以安待王之也騶虞傳曰虞翼五牡以待公之發即此安待之說也其孔云趨逆之車驅而至于彼防虞人乃悉驅之循左右之宜以禽必在左射之或左或右皆驅之使天子得其左射之便也既張我弓既挾我矢發彼小豝殪此大兕以御賓客且以酌醴我謂天子也大發見其巧殪見其力小者射中必死苦于不能中者射則易中惟不能即死小豝云發言發即中之大兕言殪言射著即死毛氏所謂中微而制大也射以得兕為雋唐叔虞射兕于徒林殪以為大甲為是武也以享晉封或賔客謂從王大搜之諸侯也御者給與充用之辭曰御進也進禽于賔客即車攻大庖不盈之義且以為爼實酌醴而行饗賔之醴孔云天子饗諸侯每云總醴命之宥是饗有醴也愚按醴味薄與酒味殊穆生不嗜酒故楚元王為之設醴王饗諸侯則設之示不忘古禮之重也吉日四章章六句竹書紀成王八年大搜于岐陽左傳楚椒舉言于楚子曰夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜杜預云成王歸自奄大搜于岐山之陽愚按岐陽石鼓文至今傳為宣王時物考周地有兩漆沮其一在岐粱間古公所遷自土漆沮是也其一則禹貢導渭東過漆沮涇水之下遊也去鎬京不逺疑宣王之搜秪在近地未必至岐陽也按毛傳以南有嘉魚至吉日十篇為南有嘉魚之什鴻鴈序曰美宣王也萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所焉鄭云宣王承厲王衰亂之弊而起興復先王之道以安集衆民為始也此詩當是遣使臣安集衆民既還而勞使臣之作鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡毛傳興也朱注同小鴻鴈二句比流民下四句勞使臣之辭大曰鴻曰鴈鄭云鴻鴈知避隂陽寒暑喻民知去無道就有道來羅氏云淮南言鴈乃兩來仲秋鴻鴈來季秋候鴈候鴈比于鴻鴈而小北方有白鴈似鴻而小秋深乃來來則霜降河北謂之霜信之子指使臣也劬勤也其勞頻數謂之劬勞老矜人謂此待斃可憫之人鰥寡即所矜之人也左而無妻曰鰥老而無夫曰寡然亦有男子稱寡傳齊崔杼生成及疆而寡娶東郭姜小爾雅以凡無夫無婦通謂之寡寡夫曰㷀寡婦曰嫠是也毛傳亦云偏喪曰寡則鰥是未娶者寡是已娶而喪偶者耳鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻鴈性好居澤書彭蠡既瀦陽鳥攸居是也墻蘇氏云使者所至招徠流民使反其都邑築其垣而安處之然後民知所止如鴻鴈之集于澤也矢公羊傳云五版為堵五堵為雉陸氏云雉飛若一往而墮不能逺飛崇不過丈修不過三丈故雉髙一丈濶三丈也禽經曰雉上有丈鷃上有尺言飛而上也雉上能丈故計丈以雉集左國材曰前勞在招來此勞在安勸勉之辭鴻鴈于飛哀鳴嗸嗸維此哲人謂我劬勞維彼愚人謂我宣驕嗸說文云衆口愁也心哲人美之子也我王自謂也謂我劬勞者體我此也彼愚人反謂我興廢補敗不肯自靖以為宣驕耳為宣驕猶云喜事毛云宣示也鄭云謂我役作衆民驕奢也朱善曰此詩不作于流離之時而作于安定之日蓋哀恤思痛者是以知者以為勞苦而不知者反以為宣驕也愚按宣驕謂作歌以自宣其安定之勞而有驕心也宣王世連年大旱百姓流散故有勞來安集之事此詩當在雲漢後鴻鴈三章章六句朱子謂流民所作郝氏云小雅自鹿鳴而下至此二十餘篇皆朝廷制作不應忽采民謠一篇雜入其中以為勞使臣之詩信矣庭燎序曰美宣王也因以針之郝氏云序謂因以針之者蓋夜未半而起太早非可繼之道進鋭者退速始勤者終怠所以卒有姜后之諫詩人蓋先見也何氏云宣王初年勵精圖治故能使諸侯尊王㑹同有繹此詩君子至止言觀其旗明是諸侯來朝非常朝也然始勤終怠自不藉千畝而後求治之志寖不如前故詩人作此以諷考外紀姜后脫簮諌王晏朝事在二十二年與詩同意序所謂因以針之也夜如何其夜未央庭燎之光君子至止鸞聲將將朱注賦也毛傳缺同周禮雞人職云大祭祀夜旦以􅑧百官大賔客㑹軍旅亦如之司烜職云凡邦之大事共墳燭庭燎此詩蓋雞人司烜之輩所作外毛云庭燎大燭按在地曰燎執之曰燭又樹于門曰大燭于門內曰庭燎此時夜尚未半業已設燎于庭以待王朝其光甚盛而諸侯已有來朝而至止者鸞聲將將見諸侯之勤于趨朝如此王其知之乎夜如何其夜未艾庭燎晰晰君子至止鸞聲噦噦鄭云艾通作艾左傳秦后子云一世無道國未艾也注訓艾為絶夜未艾言夜漏尚未盡也盡則天明矣殺將將鸞聲相應者衆也噦噦則來者將盡其聲漸蓋諸侯有後至者驅車疾行如將不及故其聲如此夜如何其夜鄉晨庭燎有輝君子至止言觀其旗上二章聞鸞聲耳今夜向明我見其旗是朝之時也朝禮别色始入輝與暈同周禮視䘲掌十輝之法即暈字也日月之旁氣為暈火之旁氣為輝覲吳棫云天欲明而烟光相雜也旗建于車上即禮所謂龍旗也夜且向明五等諸侯之旗一一可辨則辨色之時可以朝矣杜佑云朝辨色始入所以防微日出而視之所以優尊詩曰夜向晨言觀其旗臣辨色始入之時也又曰東方明矣朝既盈矣君日出而視之之時也愚按詩人但述諸侯趨朝之早候朝之久而王之晏朝自在言外向晨視朝未為失禮然于宣王初年勤政漸不同矣詩人亦窺見其微憂其漸也庭燎三章章五句按周自康王而後王室漸卑昭王南征不復穆王時荒服者不至及懿王王室遂衰夷王始下堂而見諸侯至于厲王不享終流于彘非宣王中興諸侯誰復以時來朝使重覩周官威儀乎是可美也序謂因以針者蓋欲王之勤政始終如一諸侯無有二心使在庭常覩此朝儀也後篇即繼以沔水則為諸侯不朝而憂亂之作詩人見之早矣沔水序曰規宣王也郝氏云王信讒逺諸侯不敢直諌而但呼其親戚朋友念亂以感動王故謂之規愚按汲冢周書宣王信女鳩之讒囚杜伯于焦左儒九諌而不聽併殺之意宣王以信讒殺無辜諸侯因有內攜而不朝者畏讒也詩人憂亂非但憂諸侯之不朝憂讒言之興國將大亂耳沔彼流水朝宗于海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母毛傳興也朱注同侯沔水流滿也是鄭云水流而入海小就大也喻諸朝天子亦猶也諸侯春見天子曰朝夏見曰宗自載之言則也言隼欲飛則飛欲止則止喻諸侯之驕恣欲朝不朝自由無所懼心也父王符云一國盡亂無有安身詩云莫肯念亂誰無母言將皆為害然有親者憂益深也是故賢人君子既以憂民亦以為身棟析榱崩懼將壓焉愚按誰無父母言亂將纍及父母憂之至也沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不蹟載起載行心之憂矣不可弭忘毛云湯湯放縱無所入也不蹟不循道也蹟與迹同言讒口之生不必有迹可據載起載行起立而復行憂念之深不遑寧處也不弭止也按弭乃弓末反之可以解紛不可弭猶云可解也蓋上憂國家之將亂下憂父母之難保故至于不可解釋而使遺忘也鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興率循也有隼之飛揚亦有循中陵而止者喻諸侯之跋扈亦循禮守法度者訛通作訛鄭云僞也鄭云友謂諸侯也言諸侯有敬其職順法度者讒人猶興其言以毁惡之如是則諸侯尚有來朝者乎且其禍豈止于不朝而已乎愚按訛言出于民王之信讒播于民口遞傳而益甚遂為訛言夫禁止訛言豈無法乎惟在王之不信讒而已然臣之事君豈可因國有讒口遂生二心敬之哉小心翼翼恪共爾職聖明自能照察讒言其興言不興也此又勉臣子毋以畏讒而不盡其敬也沔水三章二章章八句一章六句王應麟云宣王晏起姜后請懲則庭燎之針始勤終怠可見矣殺其臣杜伯而非其罪則沔水之規讒言其興可見矣鶴鳴序曰誨宣王也鄭云教宣王求賢人之未仕者何氏云此宣王末年之詩意其時山甫吉甫張仲召虎諸賢皆已次第凋謝故其詩曰園有樹檀其下維蘀至如諫廢魯適諫不藉千畝諫料民太原諫殺杜伯諸讜論皆不見聽詩人所以益致意于他山之石也鶴鳴于九臯聲聞于野魚潜在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯毛傳興也朱注比也列臯澤也或云即澤字之訛澤或省作睪睪有臯音子望其壙睪如荀子作望其壙臯如後漢書郡國志以成臯為成睪亦一證也澤鄭云臯澤中水溢出所為坎也郝氏云九臯深猶九泉九天極言其深也九禽經曰鶴老則聲下而不能髙近而不能逺鳴于臯鶴之俊者以喻士之及時而未仕者而鶴鳴深澤中人莫之見而聲聞于野毛云言聲逺名著也淵回水也水盤旋處為淵亂鄭云魚之性寒則逃于淵溫則見于渚喻賢者世則隱治平則出在時君也檀之材堅軔可為車喻賢者才堪任重蘀木葉墮也檀之下所見惟蘀則檀已凋零矣喻賢者衰謝也錯厲石也禹貢有磬錯治磬用之鶴鳴于九臯聲聞于天魚在于渚或潜在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉上章聲聞于野野之人知之此言聲聞于天亦既升聞在上矣魚在于渚喻賢者出矣或潛于淵言又將去也生榖惡木也易生之物伊陟相太戊亳有祥桑榖共于朝七日而大拱論衡曰樹檀以五月生葉後彼春榮之木其材彊徑車以為軸商之桑穀七日大拱長速大暴故為變怪首章言其下惟蘀第歎賢人凋謝耳此言其下惟榖則所進用者無非小人又不僅無賢人而已王符云攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固以賤理貴者可以攻玉較為錯又進一層愚按鶴鳴二句喻賢者不可見徒有名可聞而已魚潛二句此難進易退見幾則去之輩皆未可強致也王政既衰賢人不出老成凋謝朝廷虛無人矣維蘀敗葉也維榖惡木也所存秪此猶足以為國乎他山之石質理粗頑雖非賢比然可以為鍇可以攻玉焉賢者不可得庶幾得此猶足以勵世磨鈍乎鶴鳴二章章九句朱子以為此詩之作不可知其所由然必陳善納誨之辭也彤弓之什十篇四十章二百五十九句疑脫二句當為二百六十一句祈父之什二之四祈父序曰刺宣王也鄭以此詩之作在戰于千畝而敗之時周語宣王二十九年戰于千畝王師敗績于姜氏之戎而晉穆侯以千畝之戰生桓叔命之曰成師則諸侯之師是時皆從也諸侯之師無恙而王師獨敗以勤王之不力耳故恨而責之祈父豫王之爪牙胡轉豫于恤靡所止居朱注賦也毛傳缺士祈父司馬也職掌封圻之兵甲鄭云司馬掌祿故司士屬焉又有司右主勇力之士間此勇力之士責司馬之辭言我乃王之爪士為王守之衛何以見使從軍與羌戎戰而敗也六軍之士出自六鄉法不取于王爪牙之士方董氏曰古者畿內之兵不出所以重內也卒有四之役調兵諸侯故征徐以魯追貊以韓平淮夷以江漢略見于經可考也自宣王廢魯嫡立庶以成魯亂諸侯不睦于王室或不奉調調亦不為力戰故屢敗焉愚按轉移也謂諸侯敵王所愾執殳前驅皆諸侯之師也爪牙之士衛王之左右而已今反移以冒鋒鏑而侯國之衆坐觀成敗則祈父之所職謂何祈父豫王之爪士胡轉豫于恤靡所底止爪士虎士也周禮虎賁氏其徒有虎士八百掌先後而趨以卒伍軍旅㑹同亦如之舍則守王間王在國則守王宫國有大故則守王門注云舍王出所止宿處也以其宿衛故以士名又司右與虎賁連官虎賁掌虎士司右掌勇士愚按爪士即虎賁所掌之虎士也前章爪牙即司右所掌之勇士虎士以為宿衛勇士以備車右之選今荷戈從征皆失其職矣祈父亶不聰胡轉豫于恤有母之尸饔亶實也謂已之更端以告祈父漠不動念是聽若無聽也故以實不聰詆之毛云尸陳也熟食曰饔吕氏曰越勾踐伐吳令有父母耆老而無昆弟者皆遣歸魏公子無忌救趙亦令獨子無兄弟者歸養則古者有親老而無兄弟其當免征役必有成法故責祈父之不聰謂此法汝獨不聞之乎驅豫以就死地而使吾親有菽水之勞也愚按宿衛之士大抵皆死事之孤漢時所謂羽林孤兒軍是也故尸饔之念獨念其母祈父三章章四句愚按宣王承周室衰頺之餘赫然奮武遂成中興之業如六月采芑江漢常武之師不一而足其時王既勤政又有吉甫方叔召虎輩為之將故師出功成晚年政既衰矣老成凋謝而且猶用兵不已所致輒敗如竹書所紀三十八年王師及晉穆侯伐條戎奔戎王師敗逋國語王二十九年戰于千畝王師敗績于姜氏之戎殆亦漢武帝窮兵黷武之流亞也為此詩者亦冀其有輪臺之悔心歟似非専譏諸侯之不用命也白駒序曰大夫刺宣王也鄭云刺其不能留賢也愚按王室政衰賢者爭思潔身以去亦有不能去者于其去也繾綣難别亦猶東門之祖送也既羡其去又望其去後之爾音則詩人欲去不能去之情言外隱然所以諷朝廷者深矣皎皎白駒食我場苗縶之維之以永今朝所謂伊人于焉逍遙朱注賦也毛傳缺草場圃也說文云田不耕者文嚴氏云穀始生曰苗之類始生亦曰苗縶說亦作􅎗絆馬足也維繫也日永長也得賢人與語則覺此之長愚按託言白駒之食場苗而欲縶維其駒以留伊人蓋謔辭也于焉逍遙羡伊人之解職而逍遙遊也皎皎白駒食我場藿縶之維之以永今夕所謂伊人于焉嘉客藿爾雅云蔨鹿靃其實莥本草云味苦苗似豌豆人取以為菜亦微有豆氣或以為即豆葉也愚按嘉客喜伊人之去官而為我嘉客也意必伊人臨去而同志者邀之飲餞于家故以嘉客稱之皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優遊勉爾遁思賁然光華之貌謹宋人經義云以爾為公則夙夜在公以爾為侯則爾侯度逸無期矣職思其憂豫無期矣蓋為國家計則深惜賢者之去為賢者計則又深體其情之不容不去愚按賁然之來明為言别而來因設言使伊人在位為公為侯安得有逸豫之期而來過我乎今既得優遊矣猶當慎自保護母乖衛生之節既已行遁矣須勉初終毋復萌出山之志朋友同志規誨如此皎皎白駒在彼空谷生芻一束其人如玉無金玉爾音而有遐心愚按此章為臨别之辭謂伊人此去匿影空谷不惟人不可見併白駒亦不可得見矣飼以生芻以志别駒之意所以代苗藿謝縶維之愆也因駒去空谷益見伊人不磷不淄比德于玉也隨即囑以入山之後時以起居相聞毋以我身羈未去鄙非同流而有疏逺之心蓋以伊人之隱遁為髙絶不冀其復出王室之事大可知矣白駒四章章六句鄒氏以為餞箕子之詩謂殷人尚白凡殷人皆白馬白駒此詩當在陳範後遜荒之時留之不得而作也愚按箕子避地朝鮮周從而封之箕子復來朝周過殷故墟作麥秀之歌殷之遺民聞之莫不流涕其或朝回有送别之作而此詩殊不類也黃鳥序曰刺宣王也郝氏云民不得所時政使然詩人託為民言以諷王也始以故鄉失所而來今又以此邦失所而歸故自託于黃鳥非以黃鳥為刺刺病黃鳥者耳黃鳥黃鳥無集于榖無啄我粟此邦之人不我肯穀言旋言歸復我邦族毛傳興也朱注比也必羅氏云黃鳥性好雙飛故鸝字從麗所謂鸝必匹飛瞗單棲故重言黃鳥也榖惡木也幽州謂之榖桑或曰楮桑皮斑者楮皮白者榖粟羅氏云古者不以粟為穀名但米之有浮殼者皆也愚按無啄我粟是勸黃鳥擇木而棲無以粱粟之戀久集惡木而不去明己之即去此土而還故國矣穀善也黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄伊陟相太戊亳有祥桑榖俱生于朝七日而大拱劉向以為桑猶喪也桑榖俱生謂之不祥上章言榖此言桑其醜可知鄭不可與明言不可與分剖是非耳云明當為盟盟信也黃鳥黃鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父栩即櫟也樹羅氏云木不出火惟櫟為然莊子言匠石之齊見櫟社去之不顧曰散木也是不材之木也無所可用集三舉木之惡者皆鳥所不宜以見此邦之必不可居也愚按人聚居一室與宗族父兄視猶路人及流離異國而人心叵測觸處畏途然後見宗族與諸父諸兄之可依也黃鳥三章章七句郝氏云二雅皆朝廷獻納之詩小雅若此篇之類託民風以諷上故為小雅大雅則専言君德所以與小雅異我行其野序曰刺宣王也朱子謂民適異國依其昏姻而不見收恤故作此詩收郝氏云民適異國則流離失所矣依其昏姻而不見恤上所以教民睦姻任恤之行安在故序謂之刺我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家朱注賦也毛傳缺于樗惡木也言樗雖惡木其下尚可借庇而我見棄昏姻則惡木之不如也畜有止義亦有養義我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸思復毛云蓫惡菜也而鄭云牛蘈也陸氏云今人謂之羊蹄菜似蘆蔔葉長色赤一云似萵苣而色深夏中即枯愚按宿止也暫托宿而已非遂為久居之計也而亦不見容曲盡富人之惡態與貧親望門投止之苦趣我行其野言采其葍不思舊姻求爾新特誠不以富亦只以異葍䔰也嵗陸氏云幽州人謂之燕葍其根正白可溫噉之饑蒸以禦饑按此即俗名老鴉蒜蓫與葍皆惡菜猶可時以療饑而昏姻反不足恃如此愚按舊姻世戚也新特謂姻之始締者蓋特起之家也世亂反常舊族零替而特起者富厚故往投之而為其所棄乃自悔其舍舊而求新也言我之此來以姻也不以其富也而跡似之新特不足論徒使我自異于舊姻耳蓋深悔其來也我行其野三章章六句王氏云先王躬行仁義以導民厚矣猶以為未也又建官置師以孝友睦姻任恤六行教民以為徒教之或不率也故使官師以時書其德行而勸之以為徒勸之或不率也于是乎有不孝不義不睦不姻不任不恤之刑焉方是時也安有如此詩所刺之民乎斯干序曰宣王考室也孔云按顧命成王崩陳器物于路寢云𦙍之舞衣大貝鼖鼓在東房兊之戈和之弓垂之竹矢在西房若路寢制如明堂則五室皆在四角與中央而曰左右房者鄭以文王未作明堂其廟寢如諸侯制度周公制禮建國土中其明堂寢廟皆在王城為之鎬京其留都也故成王之崩有二房之位承先王之宫室也及厲王之亂故宫廢毁宣王重建一依天子之制故其宗廟路寢皆制如明堂不復如諸侯也秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣毛傳興也朱注賦也作秩秩有序也干水涯毛云澗也按韓詩考槃在澗考槃在干幽之為言窈也深而又深故曰幽幽指所面之山即終南山也如竹苞松茂皆表此地物色之美乃枚舉之辭其云者猶云孰如之也也兄弟謂同姓兄弟之國也也鄭云猶當作愈愈病言骨肉相愛好無相語病朱云猶謀也言兄弟相好而無相謀皆頌禱之辭似續妣祖築室百堵西南其户爰居爰處爰笑爰語似嗣也鄭云妣先妣姜嫄也後曲禮君子將營宫室宗廟為先廏庫為次居室為此章言宗廟也周禮春官大司樂職舞大濩以享先妣舞大武以享先祖妣先于祖故知是姜嫄也又周禮春官守祧奄八人注謂天子七廟通姜嫄為八廟廟一人故奄八人室與宫皆為所居之通稱爾雅云室有東西廂曰廟無東西廂有室曰寢西百堵槩舉之也以其為宫室堵墻故曰築室百堵南其戶則又特于百堵內首指宗廟而言其何氏云廟在朝之左與朝皆南向其內則南其户外之通于朝者適在廟之西故曰西其戶今朝內太廟制可見其居處笑語皆主妣祖而言禮曰思其居處思笑語是也約之閣閣椓之槖槖風雨攸除鳥鼠攸去君子攸芋首二章主垣墻言中二句兼棟宇言也椓謂㨨土也㨨者以手平物之名鄭云約縮板築墻者每束一板必以二長杙貫其兩端使不動搖所謂閣閣也椓築也孔云如椓􅍻之椓謂以杵築之也槖所以盛土以非一槖故曰槖槖鄭朱注閣閣上下相乘也槖槖杵聲也除亦去也云其墻屋𢎞殺則風雨之所除其堅緻則烏鼠之所去主朱注芋尊大也畜芋本作蕷通作預取豫備之義廏庫而言廏為牧之所庫則財用所藏風雨鳥鼠最足為患故特言之此章言次作廏庫也如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋以下三章始言作所居之宫室此章則路寢也如跂通作企釋文云腳跟不著地翼如論語所云翼之翼也人舉踵則踈臂翼如如鳥舒翼堂既髙而體勢方嚴故有此象棘歐陽子云急也矢行緩則枉急則直謂亷隅繩直如矢行也革本作䩯急也鳥隼之屬謂之革鳥言其急疾也此以簷阿軒翥之勢言簷是屋之前後正簷阿是棟邊飄出之側簷也云翬雉名爾雅云素質五色皆備成章曰翬吕大臨覆以瓦而加丹雘有文采而勢搴舉也之如鳥斯革以言其勢之搴舉如翬斯飛以言其文璀燦躋升也周制天子堂九尺以堂髙言故曰升殖殖其庭有覺其楹噲噲其正噦噦其冥君子攸寧此章言小寢也在路寢之後亦名燕寢殖殖通作直自堂下至門謂之庭庭與門相直曰殖者合路寢燕寢之庭而通言之也行覺通作梏禮記緇衣篇引詩有覺德行作有梏德可證按梏械也楹謂之柱柱孤立無依賴衆材交持其端使不得動漢柏梁詩柱枅欂櫨相支持是也楊森曰易稱何校校亦械也于覺音更近當作校噲正謂正朝之所指路寢也百官聚集之地重言噲人衆而聲氣雜也冥說文云幽也爾雅云幼也幼通作窈指燕寢也君子休息之所人跡罕至重言噦噦屋深而響逆也君子攸寧専承其冥一句而言下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇莞本草云楚謂之莞蒲蓋蒲之細者可以為席宜鄭云竹葦曰簟所以覆席也孔云以常鋪在上用堅物當是竹簟愚按北地少竹簟多以葦為之下莞上簟皆寢具也此章承上章君子攸寧而言因紀當日獲夢之異乃安斯寢乃寢乃興二寢字皆謂卧也非燕寢之寢幽熊羆生男之祥而與虺蛇同夢宣王所生之男即王也虺蛇其龍漦之徵乎乃同入新宫之夢固知亡國非偶然也彼大卜安能知之大人占之維熊維羆男子之祥維虺維蛇女子之祥朱注大人大卜之屬占夢之官也先祥猶兆也徐鍇云祥之為言詳也天欲降以禍福以吉凶之兆詳審告語之也乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王此與下二章皆未然事因夢而預卜其將然亦頌禱之意也床說文云安身之坐也半圭曰璋裳下之飾也璋臣之職也棫朴詩云奉璋峩峩髦士攸宜是也孔云王子孫當為君而言臣者王肅所謂無生而貴之理明欲為君父當先知為臣子也黃芾者天子純朱諸侯黃朱斯皇者朱色而雜之以諸侯之芾也或室家一家之內宣王將生之子或且為天子且為諸侯皆將佩純朱黃朱之芾愚按衆子為諸侯以君稱嫡長為天子以王稱乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母詒罹鄭云卧于地卑之也女子法地以示天尊地卑之義非賤之也裼褓也孔云褓縛兒被也詩詁云男子裳之出其手示有志于四方女子裼之并手足褁之示無外務也瓦紡磚也曹大家云古者生女三日卧之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也非通作誹訾議也左傳云有儀可象謂之儀孔云婦人少所交接無丈夫周旋揖讓之棣棣也議語也一曰謀也詒通作貽罹心憂也自無非無儀以下預期其長大有家之後其行如此愚按此雖祝願之辭亦周代教女之家法也教之以此即異日豈有漢唐公主之醜行乎斯干九章四章章七句五章章五句申培說王者落其新宫史佚美之何氏謂此即古新宫詩也燕禮升歌鹿鳴下管新宫鄭注新宫小雅逸篇考後漢明帝詔曰下管新宫是新宫之詩後漢尚在何云逸也愚按左傳昭公二十五年宋元夫人生子以妻季平子叔孫昭子如宋聘且逆之宋公享昭子賦新宫吾意宋公所賦必是此詩之末章咏乃生女子事正為婚姻發耳朱子亦疑元公賦新宫恐即此詩無羊序曰宣王考牧也鄭云厲王之時牧人之職廢宣王始興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕朱注賦也毛傳缺文鄭云爾汝也指宣王也雅陸氏云羊性喜羣故于羊為羣犬為獨也爾云牛七尺為犉又云黑唇犉當是舉其最髙大者以言下此章先舉其羊牛之歸來者而言其未歸來者則二章所稱是也而嚴氏云羊不歸而聚則不見其角之濈濈牛不歸息亦不見其耳之濕濕兩言來思皆所以見牢之成也濈毛云聚其角而息濈濈然呞而動其耳濕濕然說文云和也王氏云羊以善觸為患故言其和謂聚而不相觸也言陸氏云牛之為物病則耳燥安則潤澤而和先羊後言牛者羊躁進競前又其性畏露每歸常先于牛君子于役篇稱羊牛下來是也愚按羊性喜羣羣必有長長居衆羊之後莊子云牧羊者視其後者而鞭之鞭其長也長趨則衆羊皆趨矣或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具阿山曲也訛通作吪卧將覺而動也或云將覺有聲氣也前章言羊牛歸者自歸不俟牧者之收也此言其未歸者種種自適如此牧乃次第驅以來歸爾牧即牧養牛羊之人與末章牧人不同彼乃官名統此牧者則蓑笠皆雨具何者以為備也笠兼以禦暑日向夕笠亦無所用故皆云何物為毛物與比物四驪之物同齊其物色而别之每物三十隨所用之牲無不備矣始養之曰畜將用之曰牲具備也爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升此章再言爾牧牛羊多則牧亦多故復舉之也上言來思是方歸來之時此則已歸至于所矣鄭云言牧人有餘力則取薪蒸搏禽獸以來歸也粗曰薪細曰蒸又言爾羊來思此是續歸之羊即前章所言降阿飲池或寢或訛者専以羊言羊多于牛也矜矜者陵矜不讓兢者兢先爭歸此羊態也陸氏云矜言羊之愛牧人也兢兢言羊之畏牧人也死騫虧也崩羣疾也皆耗敗之意按羊疾則盡羣而升升入牢也畢來兼牛羊言以牛隨羊後而至故槩括之至是而一日之牧事畢矣愚按此章描寫牛羊馴擾牧人收放直是一幅太平畜牧圖宣王之治于此極盛而王之志從此荒矣史稱漢武初年國家無事財用富足因之窮兵黷武萬里蕭然盛極而衰固其勢也宣王晚年勤兵不息至于千畝之敗王業遂衰讀無羊知為盛之終衰之始矣牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱上章言牧事有成物各得所將時和年豐故其兆先形于牧人之夢初見為衆而忽見為魚初見為旐而忽見為旟皆夢景如此魚周禮占夢職云嵗終獻吉夢于王王拜受之維鄭云人衆相與捕魚也旐旟所以聚衆也按人衆捕魚則所取必廣故為豐年之兆司常職云州里建旟縣鄙建旐鄉遂所建惟旐旟今皆入夢則鄉遂之衆咸集故為室家溱溱之兆言生齒殷盛也愚按魚隂物也衆化為魚中國將有夷狄之禍其犬戎之兆乎牧人心不關乎治亂而旐旟入夢則兵象己早見矣太卜之官占為豐年溱溱者諛辭也無羊四章章八句馮時可云宣王雅終無羊隱之哉三百九十濈濈濕濕牧盈而牧人之志亦盈矣衆維魚旐維旟盈之感也太卜雷同獻諛豐年溱溱何以稱焉太子晉曰自我先王厲宣幽平貪天禍至于今未弭宣王之埒于二王也其鮮終哉按毛傳自鴻鴈至無羊十篇為鴻鴈之什節彼南山序曰家父刺幽王也春秋魯桓七年天王使家父來求車維時距幽王之卒已七十五年當是家父後也古人以父為字或纍世同之宋大夫有孔父其父正考父其子木金父雲漢序曰仍叔美宣王作而春秋桓五年仍叔之子來聘以世考之逺不相及則仍叔亦非彼仍叔也春秋時趙氏世稱孟知氏世稱伯猶周世虞仲之後亦稱虞仲皆此類也節彼南山維石巖巖赫赫師尹民具爾瞻憂心如惔不敢戲談國既卒斬何用不監毛傳興也朱注同石節通作岊徐鍇云山之陬隅高處曰岊巖巖積貌師太師周之三公也尹尹氏為太師竹書幽王二年錫太師尹氏皇父命即其人也憂心家父自寫也如惔心如火熱也不敢戲談言不敢以談為戲猶云不敢不以正告也下言國運將終正是正告之語斬斷也謂國祚中斷也監通作鑑誡也節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟實滿也猗倚也謂山中卉木叢生則交加相猗也孔云草木之生而云山者山出雲雨能生草木故薦重也瘥病也謂天怒而重之以疾疫禍亂甚多而死喪甚𢎞民言無嘉朱注人怨而謗讟其上鄭云天下之民皆以災害相弔唁無一嘉慶之言創憯朱注曾也說文云痛也時事如此尹氏略無懲之志嗟嘆之聲此家父所以痛心也愚按詩意専刺政之不平周室大亂由當國者非秉均之人偏黨狥私政事失平故下章云式夷式已又曰君子如夷又曰既夷既懌又曰昊天不平秪望其平也尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不宜空我師公羊傳云尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿非禮也按宣王時吉甫稱氏其後見于春秋經傳者多稱尹氏則尹氏世執權于周亦若漢大將軍霍氏秉政専權特氏之而不名也繼王應麟曰春秋于平王之末書尹氏卒見權臣之世也于景王之殁書尹氏立王子朝見權臣之危國也根氐徐鍇云天根也天文角亢下係于氐若木之有故名為天根毛云氐本也謂政本也朱子云均當從金如所謂泥之在鈞所秉國之均言持國之平猶商相名阿衡亦謂天下依平也毗輔也弔恤也天方薦瘥而尹氏不恤故曰不弔昊天與我師以大師之官言嚴氏云非其人而處其位無人同故謂之空愚按尹氏吉甫之後太師三公之首開口一語警省尹氏當顧其家聲思其官職也弗躬弗親庶民弗信弗問弗仕勿罔君子式夷式已無小人殆瑣瑣姻亞則無膴仕朱注王委政于尹氏尹氏又委政于姻亞之小人不肯躬親王事庶民所以不信服也夷平也謂當平其心視所委任不富者則已之毋為小人所誤至于危殆其國也鄭云殆近也無小人近猶云無近小人亞惟當事者持平則小人自不干權而姻亦平叙以進不至私以髙爵厚祿矣愚按弗信謂不信其所委政之人尹氏信之而民弗信也因民之弗信遂駕言無可委之人亦惟爾弗問耳弗與仕耳勿誣朝廷遂無君子也殆姻亞之膴仕皆由小人以之獻媚而固寵也不惟及國家將來亦併殆及姻亞倘不用小人使姻亞官所應得之官乃所以安之也則字承無小人殆來昊天不傭降此鞠訩昊天不惠降此大戾君子如屆俾民心闋君子如夷惡怒是違上章望尹氏之退小人此章望其進用君子也毛云傭均也届至也闋息也說文云事已而閉門為闋惡怒為惡而至于怒也言若進用君子君子至則民怨望之心息矣君子用則政自平而民之惡怒違矣違者猶言自違其初心愚按計功取直曰傭小人居髙位猶無功而受厚直也惠順也君子退而小人進謂之不順稱昊天者天意不以為傭不以為順故降此窮極之訩亂降此乖沴之大災上章所云薦瘥是也時必有纍年災疫民心洶洶思亂計惟用君子可以救之不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成不自為政卒勞百姓承上章言昊天之示譴如此而仍復不恤則亂正未有所止也亂之始生如月之哉生明漸以至于盈俾民不寧言人人皆有亂心矣酲病酒也憂心如惔如烈火之乍然不可忍也憂心如酲如宿酒之不醒不可解也誰秉國成怨而問之問尹氏也王以國付之尹氏而尹氏任用小人不自為政前章所云弗躬弗親是也民受其害亂將作矣愚按不曰百姓必亂而曰卒勞猶云終必勞百姓為亂耳巧語也駕彼四牡四牡項領我瞻四方蹙蹙靡所騁凡駕四牡必加衡軛于頸上故以項領言愚按此章言諸侯背叛號令不行雖有四牡之項頸整齊可觀而行無所之豈復如向時周道之倭遲容其騑騑駸駸者乎方茂爾惡相爾矛矣既夷既懌如相酬矣此章言民心無常惟上所召爾指尹氏茂盛也茂爾惡自下視上之惡為日盛一日也相視也矛字屬下言言視爾所為使人刺心如矛之欲挺矣倘上能反于公平則此惡怒皆轉為和悅虐我則仇撫我則后其報如賔主之相酬酢必不爽也昊天不平我王不寧不懲其心覆怨其正不平不寧承前章語而申言之惟師尹之不平以致昊天之不平言天怒也俾民不寧以致吾王之不寧言王危也種種禍亂皆由不平之造猶不自懲其非反怨人之規正爾者何哉家父作誦以究王訩式訛爾心以畜萬邦訩即凶也究窮也言欲窮王室未然之禍而言之以警當事訛卧將覺而動也畜養也蓋欲呼尹氏之夢使覺改心易慮以畜養此萬邦之民也氏吕氏云篇終窮其亂本而歸之王心致亂者雖尹而用尹氏者則王心之蔽也誦誦說文云諷也周禮注云背文曰諷以聲節之曰鄒氏云其詩諫尹氏而非諌王故不嫌自稱其字以王應麟云吉甫作誦美詩以名著者也家父作誦究王訩與寺人孟子作為此詩皆刺詩以名著者也為吉甫易為家父孟子難節南山十章六章章八句四章章四句左傳魯隱公五年桓王之二年也曲沃莊伯伐翼王使尹氏武氏助之又桓公八年天王使家父來聘則桓王之十六年也何氏謂尹氏家父皆為桓王時人愚按此家父竭忠王家不憚以身嬰權臣之怒風節矯然若春秋時聘魯之家父為天王求金求車曲狥王命曽無一語以爭之以彼當此不倫甚矣正月序曰大夫刺幽王也左傳昭十七年夏六月甲戌朔日有食之祝史請所用幣季平子曰止也惟正月朔慝未作日有食之于是有伐鼓用幣其餘則否太史曰在此月也蓋以四月為正月即周之六月也正竹書紀幽王四年夏六月隕霜即此詩所謂月繁霜也正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以癢朱注賦也毛傳缺時顔師古云四月正陽之月故謂之正月洪範謀寒若急恆寒若以聽屬金金主寒謀者聽之用急者謀之反故有恆寒之異訛言繁興王聽不聰之應也訛僞也真氏云以是為非以非為是一日也蘇林云將者甫始之辭謂其所傳將日盛毛云京京憂不去也朱注大也十億曰兆十兆曰京京數之極多也癙癢皆病也愚按訛言屬諸民非讒言也蓋言不知所自起猶妄言也意必廢后奪嫡之謀雖尚未行而外已竊知之民已傳之猶熒惑之下為童謠若或使之者士君子聞而不忍信故斥以為訛言也癢瘍同義亦作癢鼠潛穴內不敢見人己之小心畏謹似之而念及國事則所憂者又不能自已如皮膚之有癢欲不抑搔之而不得也父母生我胡俾我愈不自我先不自我後好言自口莠言自口憂心愈愈是以有侮愈病也莠醜也愈愈益甚也當嚴氏云人窮則呼父母父母生我豈使我病乎適其時不先不後是我生之不辛也自好言誇諛之言莠言害正之言莠害苗草也曰口者為毁為譽惟其口之自出也愚按詩人無所歸怨而歸怨于父母之生我非時生我適以病我也小人輩好醜自口彼方譸張得意而我憂懼益甚愈愈者益甚之辭是以有侮侮非必嫉害之也小人以君子之深憂過計為迂濶相與戲狎之耳不但莠言是侮即好言亦是侮也憂心惸惸念我無祿民之無辜并其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋周禮注云人無兄弟曰惸孟子通作煢惸惸是獨憂之意無祿猶言不幸左傳無祿獻公即世是也辜罪也并相從也箕朱注古者以罪人為臣僕亡國所虜亦以為臣僕子謂商其淪喪我罔為臣僕是也之毛云富人之屋烏所集也上何氏云玩于何從祿語則能祿人者必在權門文言無罪之民遭此訛言孔將之世惴惴焉莫必其命將來必盡皆服屬于權門為其臣僕庶可自免下言小人趨炎附勢奔走求祿亦必盡萃于權門如烏止于富人之屋以求食也愚按管子云烏集之交初雖相歡後必相咄烏易合亦易散也小人趨附勢利大抵如此此痛國亡被虜不知臣僕于誰氏也瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎中林林中也鄭云林中大木之處而惟有薪蒸耳喻朝廷宜有賢者而但衆小人愚按此章言小人之害勢必使賢者俱盡如中林之木將來皆為薪蒸聽其斬刈而已生今之世者寧不殆哉以今視天之于善惡若夢夢然者豈知人之報應一定不爽特此時天猶未定耳猶云時未至也孰謂人可勝天哉尊之為有皇上帝謂其至公無私也善則降之祥惡則降之殃一聽人之自取果誰云憎乎蓋深恨小人無可奈何而望天之主張也謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊之占夢具曰豫聖誰知烏之雌雄此言王之信訛言而棄老成史伯所謂棄髙明昭顯而好讒慝暗昧去和而取同是也夫山非不髙也謂之為卑另求所為岡陵猶謂舊人不足用而以新進之小人為賢也故老雖在徒訊占夢而已而是小人者遂皆自以為聖也而周語衛彪傒曰自幽王而天奪之明使迷亂棄德即慆淫夫周髙山廣川大藪也故能生之良材而幽王蕩以為魁陵糞土溝瀆其有悛乎正謂此也歐陽子云凡禽獸之雌雄多以其首尾毛色不同别之烏之首尾毛色雌雄不異人所難别愚按此烏與上章集屋之烏同指小人皆羣然為利來者也雌雄莫辨其識趣鄙陋無以相别猶云如一丘之貉也謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴局曲也蹐纍足也倫道脊理也民鄭云局蹐者天髙而有雷霆地厚而有淪陷也此疾苦王政上下皆可畏怖之言也號說文云呼也愚按斯言即指訛言號者大言不諱也其言皆有倫有理一一可據非漫說也聞者既莫之懲而此新進之人為虺為蜴猶爭以毒螫相尚亦胡為哉哀我人斯指受害者而言哀今之人指害人者而言瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力山脅曰阪菀茂也鄭云阪田崎嶇墝埆之處而有菀然茂特之苗謂昏亂之朝而已挺然而特立首章所謂念我獨兮是也不扤動也謂動搖之也鄭云天以風雨動搖我如將勝我謂其迅疾也承上文有菀其特來使不得成其為特也君子居危世推其命于天也歐陽子云天之扤我鍾惺曰士居亂世拚一去位不仕耳讀此詩乃知亂而可去猶士君子之幸也愚按小人竊柄其始必引用一二正類以為標榜所謂彼求我則也賢者或耻為所引則卑辭盛禮以致之所謂如不我得也究竟何嘗見用徒羈縻之而已非留我也執我也外為氣類實為仇讐而仇之亦不甚力進不獲用退不得去此正扤我之事扤者搖動之而不拔其根所謂死活不得耳自恨墮其術中無可奈何而歸其咎于天心之憂矣如或結之今兹之正胡然厲矣燎之方揚寧或滅之赫赫宗周褒姒滅之正正月也厲與沴同當正陽之時而有繁霜之異所謂厲也朱善曰桀亡于妹喜而天下遂為商以有湯代之也紂亡于妲己而天下遂為周以有武王代之也幽王亡于褒姒而天下不易姓以惟有褒姒以滅之而無湯武以代之也此以見天之未厭周德而幽王祇足以滅其身而已愚按周語史蘇謂褒姒與虢石父比逐太子宜臼而史記亦稱石父為人佞巧善諛好利王以為卿用事然則訛言之興由二孽也蓋主之者褒姒翼之者石父故詩人推本言之終其永懷又窘隂雨其車既載乃棄爾輔載輸爾載將伯助豫承上章言宗周雖未滅亡其究竟必至于此有逺識者宜長存此懷也此一語截住為開口喟歎之辭又窘隂雨辭義在其車既載之下謂車既任重載而行則泥濘而車易以陷既字與又字相應古文故多此倒句法也孔其車既載指王所任國事之人隂雨指危時也云考工記車人為車不言作輔此云乃棄爾輔則輔是可解脫之物之張文潛云輔之為物有功于車而非車也考一車物而輔不與焉然正六轡謹輪輻僕在前馬伏軛而輔不至則車不安登險而憂傾涉淖而憂濡視車中之載如寄物焉天下之物固有不相有而相須不同域而同成者豈獨輔也哉王氏云唐太宗敗于髙麗乃思郭元振𤣥宗蒙塵入蜀乃思張九齡不用而思之晚矣愚按載輸二字連讀載輸者載諸車以輸諸彼也爾載者車所載之物也其車既載必俟輸所載訖而後載之事始畢值陰雨而棄輔猶棄載也臨危難之時始呼伯以助亦無及矣伯者何即終其永懷之輩也至此時而呼伯始知爾僕不足恃也與下章語氣呼應乃棄爾輔二句作一氣讀將伯助豫另一句無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意輪輻皆車中所有所以喻政輔則車外之物所以喻賢員益也屢數也僕將車者也顧猶視也愚按員于爾輻言車所任者輪輻輔雖不足任而亦不可棄也留以扶危出險為爾輻備員可也猶備數也之屢顧者自詩人顧之謂數視爾將車者必有覆敗患不能輸爾載也輔既棄矣將車者復非其人前路更有絶險當踰危亡立見曾不以是為意乎爾僕以比當時用事即虢石父之流也魚在于沼亦匪克樂潜雖伏矣亦孔之照憂心慘慘念國之為虐愚按承上章言國事之危如此君相曾不以為意吾人雖在事外終亦與之同盡而已魚在于沼其生已蹙亦猶釡中游耳有何可樂雖匿于極深之淵安所逃于網罟之患憂心慘慘一身不足恤惟念虐及宗社耳彼有㫖酒又有嘉殽洽比其鄰昏姻孔云念我獨兮憂心殷殷彼指小人也洽合也二人為從反從為比相與密也毛云云旋也按云即古雲字其文象周旋盤薄之形愚按承上章言我心雖憂小人則樂日有㫖酒嘉殽與其鄰近歡洽親比而瑣瑣姻婭之輩往返盤旋置國事于度外其殷殷懷憂者獨我一人而已也念我獨兮與首章應謂人皆不憂而已獨憂佌佌彼有屋蓛蓛方有穀民今之無祿天夭是椓哿矣富人哀此惸獨佌佌小也蓛蓛陋也之李氏曰衰亂之世其極也貧富俱受其禍若一時虐政富者猶可以勝其求貧者益不堪也愚按佌佌者向皆蓬蓽而今且有屋矣彼者同輩相羡之辭蓛蓛者向惟藜藿而今且有穀矣方者此人自幸之辭承上章言小人不特酒食徵逐而已終日經營為問舍求田之計其所以有者不過虐此民耳傷哉今民惟天薦瘥天既夭之此輩復虐政以椓之民生盡矣末句言富人之猶可勝所以重惸獨之可哀也止月十三章八章章八句五章章六句朱子引或曰此東遷後詩也時宗周已滅矣其言褒姒滅之有監戒之意而無憂懼之情劉公瑾深然之謂使宗周未滅褒姒方寵詩人之言未應指斥如是鮮季氏云此詩憤世嫉邪不避忌諱自後世論之不蒙禍而當時敢于直言如此類者皆得免焉豈非先王立采詩之官本欲得人憤鬱之情以觀國政之闕失言雖誹謗而不以為尤故凡情之不得伸者皆因詩而達文武之澤所以沒世不忘也愚按大雅瞻仰之篇其激切不諱亦然蓋凡伯作也老成憂國故言之無忌此詩疑亦出其手篇中曰念我獨兮蓋宣王時舊人盡亡惟己獨存耳或喪亂之後此詩始出亦未可知十月之交序曰大夫刺幽王也鄭以為刺厲王作節南山刺師尹此篇譏皇父幽王時司徒乃鄭桓公友非此篇之所云番也按竹書紀幽王元年錫皇父命二年涇渭洛竭岐山崩三年王嬖褒姒冬大震雷四年夏六月隕霜五年王世子宜臼奔申皇父作都于向六年冬十月辛卯朔日有食之其事與此詩及正月之詩合幽何氏云皇父以幽王五年作都于向而鄭桓公至王入年方為司徒正是皇父徂向後故以友代之耳此詩與雨無正同為一人之詩十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀朱注賦也毛傳缺正鄭云周之十月夏之八月也月按詩有夏正有周如七月篇皆夏正也詩云十即夏正建亥之月如鄭說作八月則是秋分左傳昭公二十一年秋七月壬午朔日有食之公問于梓慎對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災是則八月日食未足為災忌之孔云日月之食本無常時惟正陽之月君子沈括云先儒以日食正陽之月止為四月不然也正陽乃兩事正謂四月陽謂十月詩嵗月陽止十月也正月繁霜與十月日食二者先王所惡也蓋四月純陽不欲為陰所侵十月純隂不欲過而干陽也蘇氏云四月純陽純陽而食陽弱之甚也十月純隂純隂而食隂壯之甚也故交日月之交㑹也孔云日月行相逮及交而㑹際云交㑹朱子謂晦朔之間也按㑹與交不同㑹但同度而已交則同度又交道㑹不必食而交則食厯家所謂交㑹也此詩特以交言缺來斯行云唐虞之時厯象已極詳密獨日月之食而不講良有深意後世推算預定視為固然戒省之意蔑如矣異宋徽宗時下詔言此定數不足為災異古人以為者皆不曉厯之故故宜其以天下不足畏也意鄭云微不明也謂日月被食而不明也彼月而微前此必有月食之事今又日食所謂日居月諸胡迭而微也管子曰日食修德月食修刑則日月之食皆宜為災愚按詩自七月外未有用夏正者先儒以十月為夏十月陽月也日食非陽月不為凶下文日月告凶則月食豈為凶乎詩人以日食月食川沸山崩種種災異並舉而言豈拘拘于陽月非陽月乎且六月隕霜何以指為四月言正月繁霜也日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧鄭云告凶告天下以凶亡之徵也行道與度也不用者謂相干犯也凌濛初云告者天不言以日月示之也云王室失政則四方綱紀俱壞故云四國無政左雄幽厲昏亂不自為政褒閻用權七子黨進賢愚錯綜深谷為陵故其詩曰四國無政不用其良愚維其常者言既視之為常事矣日食則非常事也臧善也于何不臧喚醒之辭班固所謂推日食之占循變復之要也􅏎􅏎震電不寧不令百川沸騰山冢崒崩髙岸為谷深谷為陵哀今之人胡􅉃莫懲􅏎􅏎震電貌震雷也崒陸氏云電與雷同氣發而為光山頂為冢鄭云者崔嵬也言山頂崔嵬之峯今皆崩落是君道壞也髙岸為谷深谷為陵言易位也君子居下小人處上之謂也此承上二章因十月之日食而推及于前此之月食又及雷電崩竭諸災異皆追述之辭非同時事也意以昔年天變頻仍如此胡不少自悛改而復致十月日食之大變也皇父卿士番維司徒家伯冢宰仲允膳夫棸子內史蹶維趣馬楀維師氏艷妻煽方處皇父家伯仲允皆字番棸蹶楀皆氏也季氏云稱氏者由世族而進也稱子者年尚少竹書載宣王二年錫太師皇父命又載幽王元年錫尹氏太師皇父命系尹氏于皇父之上所以别于宣王時之皇父耳卿孔云卿士謂卿之有事左傳鄭武莊公為平王士杜預注王卿之執政者鄭云六人之中雖官有尊卑權寵相連朋黨于朝皇父則為之端首兼擅羣職故但目以卿士天官注云以百官總焉謂之冢列稱于王則稱大按漢書古今人表稱太宰冢伯禮天子之妻曰后不言后而言妻不豫其為后也愚按司徒當在冢宰下膳夫趣馬皆士職當在內史師氏之下而序于上者亦因當時權勢之輕重而次第之也羽處安也七子恃褒姒為奧援褒姒布七子為翼互相鼓煽虐焰益張自以為根株盤據久安無患矣自識者視之正如燕雀之處堂母子相安突決棟焚而怡然不知禍之將至也抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰豫不戕禮則然矣鄭云抑之言憶也疾而呼之之辭焉謂孔云汙者池渟水之名萊者草穢之名戕殘也我非殘下之從上惟上所使禮實當然言文過也庚彭執中曰三代之君每有興作謀及庶民如盤遷殷必登進厥民而告之故云胡為我作不即我謀愚按不時者必非興作之時不敢怨其不時但怪其不先告以遷期皇父以親寵封于畿內既封即築都邑驅其邑人往居故邑人曰為我作也遷民之時先毁其舊居之墻屋而世授之田亦使拋之而去民情不忍故述其情呼而責之皇父孔聖作都于向擇三有事亶侯多藏不憗遺一老俾守我王擇有車馬以居徂向向地名在東都畿內左傳隱公十一年桓王與鄭人蘇忿生之田共十二邑向在其中忿生周初人書所謂司寇蘇公者向本其食邑後復歸于王故幽王以之與皇父而桓復以之與鄭耳鄒氏云向在京都畿內此時周都西鎬皇父總集朝權舍此徂彼豈見西戎方強王室方騷自知負天下之怨而營狡窟以自固耶且如鄭桓公亦賢司徒也懼周難之及謀何所可以逃死乃東寄奴與賄于虢鄶蓋當時諸侯皆有郿塢之營而皇父實為之俑也父憖爾雅云強也且也鄭云心不欲自強之辭也皇播棄黎老不肯勉強留一人于朝以衛天子蓋所用者多藏則所棄者故老趣向使然也愚按皇父徂向亦知煽方處者之不可以久處也其自為謀也頗有先幾之見故諛之曰孔聖詩人早窺其心矣以皇父既出居私邑而所選擇為王朝三事之官留輔佐天子者皆貪墨多藏之人意其人亦以賄得官耳史稱虢石父為人佞巧善諛好利王立以為卿士國人咸怨皇父所擇者即此輩也皇父既盡室以遷人擇徙富民以實新邑視去王國棄之如遺矣黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由入皇父輩既棄王以去一二留居王朝者勉力以供王事此自臣子常分敢言勞苦乎而無如讒言之難防也囂囂謂口衆也無罪無辜泛指被讒之人憂已亦將不免耳鄭云孽妖孽謂相為災害也噂說文云聚語也沓朱云重復也鄭云噂噂沓沓相對談語背則相憎讒人之態如此職競由人與匪降自天相應蓋此害人之孽天偶然生之極力成之故曰降之自天而曰主之由人通論云孽蘖也罪人之女沒宫得幸于君有所生若木既廢而生枿故于文子薛為孽童妾感龍漦而生褒姒褒姒姁得之因以贖已罪而納之于后宫所謂孽也諌何氏云方王嬖褒姒之初使在朝同心合辭悉力止必不至釀成廢立之禍由皇父輩隂相比附其聚議于上前者無非醜正毁直之語使忠言不行故王惑溺不悟也如唐髙宗欲立武昭儀為后長孫無忌禇遂良韓瑗皆力爭不可李績許敬宗反詆正論為異議以成唐室之亂此所謂噂沓背憎也悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢效我友自逸痗病也羡餘也猶言寬也愚按此章思歸鄉里不能得去而亦不忍言去也悠悠言道里之長痗者思之至于病也四方甚寬何天不可飛乎同朝僚反大半先幾早去足以自適我獨戀戀于此日以憂國為事居憂猶云止于憂也即同朝有不去者亦與世浮沉以圖自便耳我獨盡瘁不肯休息我友未嘗不笑其不逹天命也然念國事至此食其食者當事其事明知憂勞無益而我終不敢效我友之自逸所以思故里而不忍言歸者以此我友僚友也泛言則為民斥言則為友十月之交八章章八句按漢人譏女寵之盛多以褒閻為戒艷閻通用尚書緯說艷妻謂厲王之婦顔師古注亦謂此詩刺厲王淫于色皇父之屬因嬖寵而為官政化失理故致災異鄭氏則以幽王時司徒非畨為刺厲王之證愚按若厲王時别有閻妻則當序閻于褒之前不應先褒後閻也且厲王若因艷妻用事以致亂亡國語史記不應沒而不見而竹書紀幽王事與此詩種種相合其為刺幽王明矣雨無正序曰大夫刺幽王也雨自上下者衆多如雨而非所以為政也鄭云刺王之所下教令甚多而無正也馮時可云雨無正之篇不刺王而言天不指天而稱雨其稱名也隱其慮患也深鄒氏云詩人慨正大夫離居莫知我勩又曰曾我􅉏御憯憯日瘁其為􅉏御所作無疑出何氏謂與十月之交篇同為一人之作是時經營都為郿塢之計者不獨皇父一人如司徒冢宰皆正大夫也若仲允棸子蹶楀之流則所謂三事之大夫莫肯夙夜者也上篇因災異頻仍而作此因戎饑荐臻而作浩浩昊天不駿其德降喪饑饉斬伐四國旻天疾威弗慮弗圗舍彼有罪既伏其辜若此無罪淪胥以鋪朱注賦也毛傳缺德駿大也亦取馬行疾速之義與疾威疾字相應惠也喪死亡也下章所謂戎成不退也饑饉下章所謂饑成不遂也威吳天仁愛閔下又謂旻天今施德則不駿速而降反迅疾若此當思所以亟圖挽回之術乃弗慮弗圖何哉鄭毛云舍除也淪率也朱注陷也胥爾雅云皆也鋪云遍也無言除却有罪者當死既伏其辜而死無論矣若此罪乃同遭戎饑之禍相率淪陷而死亡略遍也此將然之辭周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧復出為惡此章言正大夫恐國亡禍及爭先出都以為自安之計不知若宗周果滅我輩臣子將安所止戾乎毛云戾定也言無定止也勩離居謂逺離京師居于封邑若皇父之徂向也說文云勞也正長也周官八職一曰正謂六官之長皆上大夫也三事指六卿三事之屬各有中大夫周官篇云三事暨大夫敬爾有官是也不夙夜者早夜在公恪供爾職也莫肯朝夕言朝也古者旦見曰朝暮見曰夕愚按于時在朝者無仕勞之人去者既得逸矣居者亦惟狥私自利豈有以王事為心者哉故莫知我勞也善此輩既皆莫肯勞者我任其勞彼享其逸庶幾其我乎今反以為惡也覆出者猶云出于意外也如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天鄭云如何乎昊天痛而訴之也迷辟言法語之言也讒言髙張法語不聽如行逺者而不轉茫茫莫測其所至也亦凡百指浮沉諸在位者而言王事縱不足恤爾身足重也苟敬其身則旻天疾威如此寧不相畏而泄泄聽之是不畏天也人王氏云世雖昏亂君子不可以為惡自敬故也畏故也畏天故也戎成不退饑成不遂曽我􅉏御􅉃􅉃日瘁凡百君子莫肯用訊聽言則答譖言則退戎兵也謂兵戎之禍已成而計不知所以退饑困之災已成而生不知所以遂憂之迫也按遂即古嵗字言無嵗也國􅉏說文云日狎習相慢也御侍也􅉏御近侍之官語云居處則有􅉏御之針曽者疑問之辭曾我為王之左右小臣且憂痛以至于病凡百君子視我所居之職位何如反以國事置之度外耶愚按用訊者實心訪問必求所以定亂救荒之䇿莫肯訊者恐犯時政之諱也既不訊人而人有言及者隨所言答之而已不自出一語也一聞譖人之言則默然以退惟恐責之及已曲盡鄙夫容頭過身之態哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休鄭云巧善也不欲悖逆使身舌皆安亂世之言順說為上孔云表記云辭欲巧是正言亦欲巧但人有不能耳非佞巧也之朱注言之忠者當世之所謂不能言也佞人言當世所謂能言者也愚按此章承上二章謂在上者既不信直言而在位者復不欲人之深言乃自傷其拙直不能言也哀哉言之出于舌適以瘁其躬蓋惡其言即以所言之事盡責之其人故至于瘁也因羡能言之輩隨人意㫖如水流旋轉無滯國事雖危躬則處于休矣維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友此章自言其去住兩難也正鄭云棘急也不可使者不正不從也可使者雖不從也居今衰亂之世云往仕乎甚急迮且危以此二者也耳按使猶用也不可使謂時政不可用猶云使不得衆人皆云可使而我云不可是違功令而得罪于天子矣衆人皆云可使而我亦云可使是雷同附和以從王之欲而見怨于朋友矣此朋友亦是正流而見幾先去者前篇所謂自逸之我友也愚按云不可使猶之三事之大夫莫肯夙夜自謂不足以供任使也天子雖不加罪而揆以臣子之大義豈不得罪于天子乎亦云可使所謂維躬是瘁也同官之僚友又咸相怨忌以為適形其短進退不可此謂孔棘且殆也謂爾遷于王都曰豫未有室家鼠思泣血無言不疾昔爾出居誰從作爾室朱注爾謂離居者以毛云賢者不肯遷于王都也亦詩人勸其遷還而王都無室家可居為辭其人存憂國之心至于鼠思泣血鼠思者心憂而身匿也泣血者不敢出聲而飲泣也疾者疾惡也所言無非疾惡之言特身不肯出耳乃托辭于無家焉爾還無家則昔之爾出寧有室耶出既能作室則還何患無家固知未有家室為託辭也愚按此詩與十月篇所譏不同此篇譏者非皇父輩也即所云自逸之我友潔身逺引者故曰正大夫非指皇父一輩小人也小人亂國正人爭去國事其誰賴乎篇中無刺王語人心如此即所以刺幽王也雨無正七章二章章十句二章章八句三章章六句元城劉氏云嘗讀韓詩有雨無極篇序云雨無極正大夫刺幽王也至其詩之文比毛詩篇首多雨無其極傷我稼穡八字按詩中明有正大夫離居莫知我勩對彼言我其不作于正大夫明矣鄭箋以為刺厲王之詩謂在王流彘後所作此要泥于周宗既滅一語而有此揣摩之辭也朱子謂此實正大夫離居之後􅉏御之臣所作祈父之什十篇六十四章四百二十六句小旻之什二之五蘇氏云小旻小宛小辨小明皆以小名篇所以别其為小雅也東按小東大東亦在小雅何以不名小東而名大若謂大宛大辨夫子刪之則頌有小毖又寧有大毖乎之郝氏云篇目皆作者自名或太史記之大師目未有二雅先有篇目如蘇說則先有小雅而後以詩從之小旻序曰大夫刺幽王也朱注大夫以王惑于邪謀不能斷以從善而作此詩潰鄒氏云小旻作于幽王之世與召旻相表裏彼云潰回遹靖夷我邦此謀猶回遹所自來也國語史伯策周之必弊謂其棄和而與剸同猶之聲一無聽色一無文味一無果物一不講此正所謂舍臧而用不臧者旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭朱注賦也毛傳缺遍嚴氏云旻天以仁憫為稱今乃疾用其威使下土受其害言災禍薦臻皆人事有以召之也本文可見謀主臣言猶主王言各有所屬觀篇中徐鉉云慮一事畫一計為謀猶者獸名性多疑取為熟思覆酌之意也遹回避也回遹者回轉而避于正道言去正就邪沮通作阻卭當作窮窮之為言困也爾雅以為病廣雅以為勞也鄭云甚病天下潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底上章指王言此章指小人言從潝潝和同也訿訿詆毁也劉向謂衆小在位而邪議潝潝相是而背君子潝通作歙縮氣出聲也訿通作呰苛細之義不具通作俱言謀之善者羣小皆訾議必欲違之其善者則皆附和而必欲依之先立一從違之幟以簧鼓于君側王之不從而覆用全根于此愚按具違具依小人黨附雷同使王不得不棄善而從惡也我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道上章言謀此章言猶詩意重責王也虞書曰官占惟先蔽志昆命于元龜洪範曰謀及乃心謀及卿士謀及庶人謀及卜筮綿之詩曰爰始爰謀爰契我龜今王心無定見聽熒于不臧之謀雖乞靈于龜何益此龜所以厭之而不告其所圖之吉凶也非謀夫孔多言既與臧者謀之復使不臧者亂之是相奪莫適所從我龜既厭正由于此不集者謂龜之神靈不來集也鄭云謀事者衆訩訩滿庭而無决定是非事若不成誰云已當其咎責者言小人爭知而讓過朱注各是其是無肯任其責而决之者愚按帝王出政貴集衆思惟其合衆是以成一是也謀夫孔多是非相奪無有一是烏能集之若違衆而獨持其是則盈庭之咎歸焉誰敢任之耕當問奴織當問婢行路當問于行邁之人向未嘗行邁者而問道問其所不知豈有得哉哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成程法也猶道也潰遂也是經說文云織也東西其緯曰經大猶是經言取大非大利害所在圖回于心如織者之往來于其中也欲經大猶必先取程先民矣邇言正與大猶相反桓榮云聽在上爭在下上之人固惟邇言是聽而下之人見上之聽邇言也亦隨有起而以邇言爭邇言者蓋始合終離自相犄角小人情態如此思鄒氏云向猶有臧否之兩端至此則能為臧者咸卷舌退矣向猶有從違之兩見至此則具是依又相與攘臂起矣纎計小談不勝異指聽者聽所不必聽爭者爭所不必爭國是具何定之有國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗國以國事言止定也謂紛紜之論未有定止正可就聖者以决之或聖或否猶云豈盡否而無聖哉聖足以該下四德故特揭言之靡凌濛初云言民正見野有遺賢不在謀夫之列者膴謂才識豐美者誠不多見然哲謀肅艾之四德或各有其一焉亦可取裁而用也召旻曰維今之人不尚有舊亦此意也淪水流轉貌謀臧不臧無所分别正如泉流之清淪而至于溷濁也胥以敗言賢人與國與民同盡也蘇氏云雖世亂民辟猶有賢者在焉苟能用之愚者可賴以皆濟苟廢而不用而使愚者壅之于上則相與皆敗譬如泉水苟疏而通之則淤腐者從之而行苟不疏其源而瀦畜之亦相與陷溺腐敗而已矣愚按國是由小人主張及事壞則君子與同歸于盡皆為小人所纍也無者詩人為賢者囑付小人之辭不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄冰徒涉曰馮徒傳曰暴小鄭云人皆知暴虎馮河立至之害而不知當畏慎人能危亡也一與他泛指而對舉之辭衆人之慮不能及逺近而易見者則皆知畏之若夫無形之禍逺在嵗月則恬然不以為憂此所謂人知其一莫知其他者也愚按此篇刺王未嘗不聽言而所聽者細人之言未嘗不好謀而所謀者纎末之計以先民為朴拙以大猶為迂濶是故邇言最易動人主之聽也千古危亡之禍總由人主是非之不明所謂知其一不知其他也是非之辨介在幾微遂有毫釐千里之判則聽言之際戰兢恐懼曷可已哉小旻六章三章章八句三章章七句馮時可云此詩言朝廷諸臣瑣尾齷齪謀猶反復君子無所容其身而局天蹐地故以小旻名篇小宛序曰大夫刺宣王也鄭云當為刺厲王王孔氏徑改序為刺幽朱注謂大夫遭時之亂而兄弟相戒以免禍之詩飲又云時王以酒敗德臣下化之故二章兄弟相戒酒愚按孔謂刺幽王觀第五章言時政苛虐即所以刺王也朱注謂兄弟相戒以免禍時政可知蓋不刺之刺矣宛彼鳴鳩翰飛戾天我心憂傷念昔先人明發不寐有懷二人毛傳興也朱注同冬宛小貌嗚鳩爾雅以為鶌鳩司羅氏云鶌鳩春來去備四時之事故少皡以為事之官許陸氏云一名鳴鳩月令所謂嗚鳩拂其羽是也氏云鳴鳩迅其羽直刺上飛數十丈入雲中其勉而飛如此愚按此兄弟相戒安分勿妄思髙舉恐一跌將為父母辱也憂傷者憂其髙而危此父母之心也能以父母之心為心則不至有喪德喪身之患矣人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又朱注賦也醉此章兄弟相戒飲酒也疾郝氏云醉人多怒故不而怒曰奰酒誥曰厥心狠不克畏死惟齊聖之人醉能溫克也而朱善云溫和克勝也溫和以自勝不止能勝乎酒已萬尚烈云一醉日富者言能謹之于初飲不至醉則末路可持惟一醉焉則其繼也遂日甚一日有不能自禁者酒使之也愚按各敬爾儀彼此互戒之辭朱子所謂相戒也天命不又猶云大福不再也中原有菽庶民采之螟蛉有子蜾螺負之教誨爾子式穀似之朱注興也小此章相戒教子孫也細毛云螟蛉桑蟲也即桑上青蟲也蜾螺蒲慮即腰蜂也董葉翁云蜾螺負螟蛉埋土中而寄子其身如雞抱子暖之而使生然其子即蜾螺之子非以螟蛉之子為子之置物于背曰負螟蛉之背有子乃蜾螺之子也使負之借以孚化其子耳教子之道日漸月絫俟之自化何以異是以首章警以二人此章感以爾子敬威儀以善身所繼先人也式穀以教子所以繼吾身亦所以繼先人也愚按采之者有所取也負之者使孚化也此非身為之教明當從賢人以為師也師賢人則可以免禍矣題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生朱注興也令此章相戒及時努力也取題通作睇比禽經云脊共母者飛鳴不相離故為兄弟之我日斯邁兄自謂也猶云日薄西山也而汝也謂弟也征進也言弟之春秋方進未父當勉于自修如下文所云也月徐幹云有進業無退功我日斯邁而斯征遷善不懈之謂也交交桑扈率場啄粟哀我填寡宜岸宜獄握粟出卜自何能穀朱注興也易此章為相戒免禍之本㫖言時事昏濁法綱煩苛觸禁也毛云交交小貌歐陽子云參雜相亂之謂云交扈爾雅云竊脂也粟竊脂肉食不食粟淮南子馬不食脂桑扈不啄非亷也率循也食肉之物循場以啄粟反其常也以方畿云食脂者而今啄粟無所不取貪之至也是及于填寡犴朱注填與癲通病也或曰與㒹通危也岸作獄也按韓詩傳云鄉亭之繫曰犴朝廷曰獄愚按兩宜字甚悲填寡之民法所當宥而今陷于犴獄者偏多似惟填寡者宜岸宜獄也上二句刺貪言非所食者而盡食矣下二句刺酷言不宜虐者而偏虐矣亂政如此何以獲免握粟出卜蓋為善不足恃而問之鬼神求所以自善之䇿也史記日者傳云卜而有不審不免奪糈則知古人以粟問卜也溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄氷朱注賦也恭此章相戒以免禍之道常恭人謙恭之人言溫溫謙之人雖無取禍之道懷不免之憂如集于木恐顛也惴惴小心如臨于谷恐墜也戰戰兢兢如履薄氷恐陷也生乎亂世時恐不得免耳荀子云行而拱翼非漬淖也立而俯項非繫戾也偶視而先俯非恐懼也然夫士欲獨修其身不以得罪于此俗之人也小宛六章章六句申培以嗚鳩名篇按左傳趙孟賦小宛則小宛之名舊矣人國語秦伯燕公子重耳賦鳩飛公子賦河水疑河水之篇即碩人鳩飛之篇即小宛左氏第摘其篇中二字以名亦文家變體也小辨序曰刺幽王也太子之傅作焉竹書幽王三年嬖褒姒五年太子宜臼出奔申此詩當是奔申時所作辨彼鸒斯歸飛提提民莫不穀我獨于罹何辜于天我罪伊何心之憂矣云如之何毛傳興也未注同烏辨通作拚拊手之義鳥之將飛而拊翼似之鸒雅也說文云楚烏也秦謂之雅或作鴉者張揖云純黑而反哺者謂烏小而腹下白不反哺謂之雅烏嚴氏云鴉烏不能反哺猶已之不能致養是為不孝自罪之辭也無歸飛羡之也烏得所歸而飛不若宜臼被放逐而所歸也提提為言舉也羣飛而髙舉之貌者鄭云穀養也罹憂也安凡民為子無不得養其父我獨所遭如此其故在遲回自審以探被放之由非謂自仄果無缺也愚按云如之何尚思補救之術朱子直謂知其無可奈何而安之也踧踧周道鞠為茂草我心憂傷惄焉如搗假寐永嘆維憂用老心之憂矣疢如疾首上章怨已之不得于親而思慕此章憂親之終棄乎已而自傷也陳式云太子被放不得復至故都回首周道足跡斷絶雖坦途皆化為茂草無路可達此是紀實非比語也謝枋得云事關心者夢亦長吁故曰假寐永嘆憂愁多者少亦髮白故曰維憂用老疢如疾首言憂非但能老人又能使人病也愚按周道坦平之道以喻父子天倫本無間阻今忽生荆棘其間猶周道為茂草阻塞也踧踧不安貌因茂草而踧踧于周道耳維桑與梓必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在言桑梓為父母所植一望見之尚生恭敬之心况父母乎我所瞻惟有一父他無可瞻也我所依惟有一母他無可依也而忍自暌離乎傷已既為父所逐又其母申后見黜不得瞻父依母也屬說文云連也毛者血之餘離麗也裏說文云衣內也主皮膚言謂與衣之裏相親近者也愚按日月之㑹為辰所謂月建也我辰安在鄭以為指六物之吉凶是也菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦淠淠譬彼舟流不知所屆心之憂矣不遑假寐蜩衆蟬之總名其類不一美陸氏云鄒陽栁賦云蜩螳厲響蜘蛛吐絲蓋蟬得䕃則其鳴益清厲又蜩形大而黑古人啖之禮有雀鷃蜩范皆人君燕食所加庶羞也說文云嘒小聲也不一其聲漼深也淵回水也淠動也放鄭謂蜩鳴于栁間萑生于淵側物各得其所依被之人如不繫之舟漂流何所止乎心之憂矣併假寐亦不可得視前章假寐永嘆憂更深矣鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知伎伎舒貌也鄭云鹿之奔走其勢宜疾而足伎伎然舒留其羣陸氏云古者麗皮為禮說文云麗旅行也鹿之性見食急則旅行麗皮蓋鹿皮也今宜臼出奔孑然一身絶無與為偶者則鹿奔之不如矣羅氏云雊鵒以足相勾雉以頸勾夏小正云正月雉震詬注云震晨之訛也爵乳子而集以春雉求雌而詬以朝蓋雉當春而雊桴粥是也得鄭云雉之嗚猶知求其雌今太子放棄其妃匹不與之去又鳥獸之不如矣條壞木爾雅作瘣木郭璞云謂木病尫傴癭腫無枝者殷大白云鹿奔也而留其羣雉雊也而求其雌放逐之人兄弟妻子不得近若無枝壞木也悲哉寧字有怪嘆之意莫之知指王也相彼投尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之未注投兔投人之兔也導之使前進曰先之者劉敞云兔為人所驅急而投人人哀其窮則及驅未至而先存之兔雖可利以其可憐猶存之也今俗言飛烏入懷勿殺殺之者不祥瑾毛云路冢也孔云瑾者埋藏之名于道旁曰路冢左傳道墐相望是也也兩言尚或者言雖未必盡然亦未必盡無辭之婉愚按維其忍之謂君子之執心以忍為其道也涕既隕之謂憂心而不敢哭而不知其涕之自出也此章承上寧莫之知而言君子信讒如或酬之君子不惠不舒究之伐木掎矣析薪杝矣舍彼有罪豫之他矣承上章原王心之忍由于信讒而為讒者又非一人此王之所以終不悟也鄭云酬旅酬也凡酬者無有不受惠愛也窮舒通作紓緩也苟亦無信苟亦無然所謂舒也究也真氏云父子天性之恩太子天下之本王一聽褒姒之讒如受獻酬之爵得則飲之曽不少拒夫讒者之言驟而聽之則不能無惑徐而察之則可得其情幽王惟無愛子之心故聞讒言不復舒緩以究其實而遽加放逐太子所以不能自明也掎說文云掎偏引也左傳辟如捕鹿諸戎犄之注謂其足也釋文云從後牽也說文云析破木也孔云杝者施也言觀其裂而漸相施及也以嚴氏云木附著于本根伐木者既以斧斤伐之又繩索從其后牽拽之以倒其木使絶離其木根薪本一木相聯屬析薪者既斧之又以手杝而離之使一木祈而為二喻父子天性本附著聨屬為一體而讒人橫離絶之也國語謂褒姒有寵與虢石父比而逐宜臼所謂伐木之掎析薪之杝也取說文云他負荷也猶負罪也畜有槖他其負重愚按有罪不専指讒人凡有罪者王皆可舍獨豫之所負至重不可舍耳莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後鄭云山髙矣人登其巔泉深矣人入其淵謂人無所不至屬垣之耳難以逃避也朱子謂莫髙如山莫浚如泉君子亦不可易言恐有人聞之言潘江曰劉琦問自安之策于武侯登樓去梯而不亦此意也申任意而言曰由言雖輔氏云此章總其始終言之后之黜宜臼之逐由于讒言亦王之昏亂先嘗泄此意于言語之問左右得以附㑹而成之吕東萊以為推本亂之所由生言語以為階者是也愚按竹書宜臼奔申在幽王五年至八年始立褒姒之子為太子計奔申之時宜臼尚未見廢史伯所謂王欲殺太子以成伯服必求之申是也此詩猶惓惓屬望無以廢嫡立庶之意輕泄于左右則羽翼伯服者甚多而媒孽宜臼者益甚勢不至廢立不止矣逝梁發笱指竊據儲位而言已念身且不容遑恤其位蓋至此而太子之望絶矣小辨八章章八句申培說尹伯竒為後母所讒而出其鄰大夫作此詩以諷其父吉甫朱子以為太子宜臼作序謂太子之傅所作是也巧言序曰刺幽王也大夫傷於讒故作是也竹書幽王十年春王及諸侯盟于太室秋九月王師伐申左傳椒舉亦云周幽為太室之盟戎狄叛之據此篇有君子屢盟之語則盟于太室後作也何以盟太室謀伐申也何以謀伐申時宜臼奔申將求而殺之也誰為此謀乎虢石父也以鄭語史伯謂桓公曰申繒西戎方強王室方騷將縱欲不亦難乎王欲殺太子以成伯服必求之申申人弗畀必伐之繒與西戎方將德申申吕方彊其隩受太子亦必可知也王師若在其救之亦必然矣王心怒矣虢公從矣凡周存亡不三稔矣此詩人豫策周之必亡于申則虢石父之讒階之故以巧言名篇悠悠昊天曰父母且無罪無辜亂如此憮昊天已威豫慎無罪昊天泰憮豫慎無辜朱注賦也毛傳缺民呼昊天而曰父母親之之辭也無罪無辜泛指下憮爾雅作憮覆也言被禍者廣也也豫詩人自謂也言毛云慎誠鄭云已泰皆甚也愚按上四句言亂階于一人而禍延于衆人使無罪無辜同歸于盡故呼昊天而訴之下四句言昊天之威虐已甚不暇憂人先憂已之不免夫人之罪辜或不知其有無若已則自信其誠無罪誠無辜也今視天之意似一無可逃者蓋灼見周之必亡故危懼如此鄭桓公謂王室多故余懼及焉其何所可以逃死即此意也亂之初生僣始既涵亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄已朱注賦也所僭不信也之嚴氏云亂生于讒讒生于優柔不斷謂懷狐疑心者信讒賊之口持不斷之意者開羣枉之門也云朱注祉猶喜也遄左傳范武子將老召文子曰詩君子如怒亂庶沮君子如祉亂庶遄已君子之喜怒以已亂也愚按小人初為不信之語以嘗試人君君涵容之而不辨其真僞乃始敢為讒言以肆害于人君復信之則其讒益甚故僭者亂之萌而禍起于涵讒者亂之成而禍由于信苟當僭之始即怒而拒之則讒言不興而亂庶幾即時沮矣當其讒之至而疑而不信則福在國家而亂庶幾從此已矣是君子之不信即其祉也傷王之有以成其亂也君子屢盟亂是用長君子信盜亂是用暴盜言孔甘亂是用餤匪其止共惟王之卭朱注賦也盟謂之數屢數也時見曰㑹殷見曰同非其時而荀子云不足于信者誠言故春秋善胥命而詩非屢盟其心一也也盜指石父也公羊傳云賤者窮諸盜謂賊之極盡小人投間刺隙為讒言以中王其心與穿窬無異故以盜目之發說文云暴疾有所趣也言其亂之來甚疾所謂卒之禍也餤說文云食也言之甘者人嗜聽之猶餤之也是餤亂也共通作恭敬也卭通作窮困也韓詩外傳哀公問取人孔子曰無取健無取佞無取口讒健驕也佞諂也讒誕也故弓調然後求徑焉馬服然後求良焉士信慤而後求知焉士不信焉又多知譬之豺與其難以身近也周書曰為虎傅翼也不亦殆乎詩曰匪其止共惟王之卭言其不共其職事而病其主也何氏謂屢盟正指王及諸侯盟于太室之事王亦覺諸侯離心不得已為盟以要之曰屢盟前此不一盟矣奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍毚兔遇犬獲之古宗廟前制廟後制寢以象人之居前有朝後有寢也春秋時子太叔之廟在道南其寢在道北此古者前廟後寢之遺制也廟秩秩有序也大猷謂經常之道莫通作謨聖人以中之聖人言文武是也言大猷皆定自聖人不可移易所說文云躍迅也或作躍踊也毚說文云兔之狡也謂狡兔也狡兔騰躍自喜而不知田犬伺其旁為所獲也愚按他人與豫對舉之辭他人有心豫可以忖度則豫有心他人豈不知之太子以承宗廟為社稷主既有七廟之崇即有主器之重立嗣以嫡綱常秩然所謂大猷也謨定自聖人不可亂也今廢嫡立庶將大猷以隳寢廟且不祀矣是時太子出奔申而儲位尚虛讒人之謀惟欲伐申殺太子以成伯服王雖不言而此心路人已知之矣人知豫之心猶之豫能忖他人之心也彼固有備矣兔雖狡終為田犬所獲候之早也荏染柔木君子樹之往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣荏柔也即色厲而內荏之荏染通作姌說文云弱長貌柔木以比太子宜臼柔弱不能自立王宜愛護之勿聽讒言傷害之也嫡中侯云無易樹子注以樹子為子也愚按往來行言謂往來行道之言蓋公論也雖其言不敢明斥讒人而其心皆能指其人以數其惡謂害太子之隂謀路人皆知之也蛇蛇委蛇也碩大也委曲以逢王之意而故為大言以堅王之信漫無圖度惟隨其口所出耳如笙中之簧隨氣鼓動髙下抑揚惟其變換王信以為可任其人亦居然自任識者羞其顔之厚矣此蓋虢石父建伐申之謀以為王師無敢抗者而為王所信任也彼何人斯居河之麋無拳無勇職為亂階既微且腫爾勇伊何為猶將多爾居徒幾何愚按此承上章來謂其徒能大言以禍國耳無一可恃也上四句専指虢石父言麋通作湄左傳吾賜汝孟諸之麋是也河之湄石父所居之采邑也石父既無拳勇但用讒口以為亂階而石父之徒黨既微且腫形狀猥陋如此此即爾所謂勇者也其為勇者安在爾既欲立伯服又欲殺太子以成之又欲伐申以求太子而申繒與西戎合必先為禦繒與戎之策是為謀將益多矣居徒者石父所收聚之徒衆也居猶居貨之居即微腫之外另有所居之徒能得幾何而欲興此大難恐禍不旋踵矣史伯謂侏儒戚施實御在側微即侏儒也腫即戚施之類此雖王之弄臣要皆石父之黨為其所引進者巧言六章章八句鄒氏謂詩以悠悠吳天發端而摘第五章中巧言二字為目意詩章原止于五其末章當與下篇相屬按左傳衛獻公使太師歌巧言之卒章以朝林父時林父如戚將為亂則所歌居河之湄一章也與毛傳六章合矣何人斯序曰蘇公刺暴公也暴公為卿士而譛蘇公焉故蘇公作是詩以絶之鄭云暴蘇皆畿內國名春秋文公八年公子遂㑹洛戎盟于暴鄭地也蘇即書所謂司寇蘇忿生後也春秋時蘇稱子以國在溫又稱溫子此云公者謂以子爵而為三公暴公為暴辛公蘇公乃蘇成公也何氏云詩為見譖于暴公而作所深責者蘇公之友有附和暴公以行譖者過門求見公不見而責之以暴公交誼不如此人之深此人去蘇從暴無義之尤暴不足刺矣彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云朱注賦也毛傳缺新何人斯若為不相識之辭絶之也此指蘇氏之友從暴公者鄭云艱難也逝之也其人從暴公過蘇公之門欲不入見則似忘舊誼欲入見則恐拂新歡遲回于見不見之間有甚難為心者故曰其心孔艱疑梁水橋也初逝梁之時尚未及門故其不肯入也愚按蘇公深惡其人而不指其名姓亦古人絶交不出惡聲之道也二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可二人謂暴公與此人相從而行是二人交深矣譖我者豈即汝意耶若非汝意逝梁而不入唁何也汝始者于我何如而今如此豈我有不可于汝心而今悔其始交耶云者代揣其意中之事不我可而可暴也彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天爾雅云堂塗謂之陳陳鄭云堂塗堂下至門之徑也戰國策美人充下下陳猶堂下也逝陳則入門矣愚按其人亦深情厚貌者逝陳入唁以表其譖之不關于已也蘇公拒而不見但聞其聲亦未免有愧怍之情其天不容昧也故詰之曰汝即不愧于人寧不畏于天乎彼何人斯其為飄風胡不自北胡不自南胡逝我梁秖攪我心飄風郭璞云旋風也嚴氏云旋風回旋無定故不自北不自南言無凖也何氏云此章彼何人斯指暴公也先是二人從行以逝梁矣既而彼一人者入門至陳將以求見而暴公留梁間以待故此仍云胡逝我梁也愚按此章代述此人意中之苦既與蘇公為怨則不相聞問可矣忽如飄風之來不南不北無端而逝其梁不入見則明與譖者同謀欲入見則覺負愧已甚進退忸怩即蘇公亦代為旁皇不寧故曰秪攪我心爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其盱愚按此友既求見蘇公而暴公待之于梁則其人意在速去不欲久留蘇公以為我本不留爾也爾即無事安行欲暫舍于此我亦不遑舍矣况爾之亟行爾自速駕遑待我脂爾之車乎蓋爾與暴公二人從行今一人來此一人留彼不知留者如何張目而望怪爾之久不出也爾還而入我心易也還而不入否難知也一者之來俾我祇也此章蓋蘇公既不見此友而心不忍終絶之也若還時再來求見是故情猶在我心坦易原無芥蒂也還而不入則爾之為情大可見矣否難知猶云不難知也復囑其但以一人來勿同暴行庶使我心安耳惟絶暴乃可交蘇無腳踹兩船之理愚按蘇公語意猶與此友有棄怨修好之望古人不肯輕于絶交如此然蘇公亦知其必不能舍暴公而獨還則亦不絶而絶也伯氏吹塤仲氏吹箎及爾如貫諒不我知出此三物以詛爾斯二章謂始者不如今此則述其始也為塤周禮作塤爾雅云大塤謂之嘂郭璞云燒土之馬端臨云古者雅塤如鴈子頌塤如雞子其聲髙濁合乎雅頌故也箎本作䚦爾雅大箎謂之沂周禮注謂之箎七孔廣雅言箎八孔蓋不數其上出者故七出也張萱云古今言樂律者七音各自為五聲如宫磬鳴而徵磬和獨塤箎則二器共為一音塤為宫而箎以徵和伯宫也仲徵也此古人所以喻同氣也程良孺云他音一音各為一節惟塤箎二音同為一節毛云三物豕犬雞也左傳使卒出豭行出雞犬以詛射潁考叔者豭即豕也盟周禮盟萬物之犯命者詛其不信者疏云盟者將來詛者詛過往愚按諒不我知恕其人之辭也始交如此而今云不我可必我之心汝諒不深知耳三物以詛若不我知而為此舉我以情恕爾也寬一步愈嚴為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側嚴氏云此章峻辭責之不復含隱也其毛云蜮短狐也陸氏云一名射影含沙射人之影瘡如疥栁宗元云射工射虱含怒竊發中人形影動成瘡痏居水中以氣射人者名射工居水旁山林間含沙射人者名射虱暗說文云靦面見也傾險往來無常蜮之為害潛形害則吾不得而知之今以面目可見之人而如鬼如蜮莫可測度真足畏也心殷大白云恩之重者曰罔極情欲之甚者曰罔極術之險者曰罔極極窮極其情猶孟子云極之于其所往之極使反側之情無所逃也愚按怨其見背而尚兾其復好故不曰怨歌而曰好歌何人斯八章章六句郝氏云與其人分誼已絶而其言傷往望來有不忍遽絶之情何其厚也蓋言不如此不可以為詩人能以詩之言養性則性定以詩之義操心則心安以詩之氣處人則人和以詩之性情處變則無往而不自得故曰不學詩無以言巷伯序曰刺幽王也寺人傷于讒故作是詩也申培說幽王之時孟子遭讒而被宫刑作此朱注同秦鄭云巷伯奄官寺人內小臣也按巷是宫內道名漢所謂永巷是也伯長也巷伯內小臣之長即寺人也萋兮菲兮成是貝錦彼譛人者亦已太甚毛傳興也朱注比也釋毛云萋斐文章相錯也貝錦錦文也萋盛貌斐文通作菲薄也文有盛處又有薄處見其濃淡之相錯也已陸氏云錦文如貝謂之貝錦鄭云喻讒人集作過以成于罪猶女工之集采色以成錦文白貝有二種餘蚳黃白文餘泉黃文哆兮侈兮成是南箕彼譛人者誰適與謀朱注比也夏毛云哆大貌南箕箕星也旦箕東方蒼龍之宿秋見于南方占星者皆于昏南中故曰南箕天官書箕為敖客曰口舌敖調弄也箕以簸揚調弄為象又受物有去去來來客之象也凡四星東向橫張如口故為口舌大哆口微張貌侈則大張矣因人小過而以口舌張之也適往也誰往就汝謀乎怪其言多且巧緝緝翩翩謀欲譖人慎爾言也謂爾不信朱注賦也往緝緝接續不絶之貌翩翩來成羣之貌愚按此即如後世打事件之類日日訪人小過而文致成罪蓋謀以譖人為事者然所訪未必確則爾言亦且宜慎事一涉虛則爾言不足信爾之寵不足恃矣相恨之極反作相勉之語捷捷幡幡謀欲譛言豈不爾受既其汝遷朱注賦也幡朱注捷捷儇利貌幡反復貌愚按謀欲譖人惟以譖人為謀謀欲譖言惟謀工所以譖人之言也倉卒之際豈不誤聽倘一旦謂爾不信則爾所加人之禍恐轉遷于汝矣驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人朱注賦也草鄭云好好者喜讒言之人也草者憂將妄得罪也愚按驕人不指讒人指與此輩往還者同處斯時任其縱恣無憂讒畏譏之慮勞人則日勞于職事而不免于羅織也草通作懆愁不安也呼蒼天者猶呼王耳彼驕人之驕豈不共見乎勞人之勞豈不足憫乎則譖人者之言不足信明矣彼譛人者誰適與謀取彼譛人投畀豺虎豺虎不食投畀有北有北不受投畀有昊朱注賦也譖此章深恨為之謀者而又不得其主名姑但欲取人者而甘心焉蓋無可奈何而為咒詛之辭何有北北方寒涼不毛之地鄒投畀有昊蓋無可奈付之天惟天處置可也氏云五刑之屬宫居一而詬為甚所謂中才莫不傷氣何况慷慨之士巷伯所以痛心疾首撫膺而籲天也愚按譛人者不過左右細人摘其小過以飾成大罪因其疑似以構成實罪所謂成是貝錦成是南箕非有士大夫為之謀主其言不足取信也取彼譛人即此謀譛之人恨之而不知其人故惟有痛詆而深詛之楊園之道猗于畝丘寺人孟子作為此詩凡百君子敬而聽之朱注興也畝楊宜卑濕近水故園為下地丘如田壠曰畝丘故丘為髙地嚴氏云楊園下地以况卑人畝丘髙地以况大臣欲陵畝丘則必道楊園言將譛大臣必始于卑人也猗通作倚言其地相倚近也王楊氏曰寺人內侍之微者出入王之左右親近于而目所見者宜無間之可伺矣今亦傷于讒則讒逺者可知故呼凡百君子而警戒之愚按班固史贊厯數春秋以來禍敗皆自小及大由疏逮親因斯以觀讒人之禍豈止被讒者受之併信讒者還自受之是以申后黜宜臼廢而幽王亦競不免于僇向令早聽巷伯之言不及此巷伯七章四章章四句一章五句一章八句一章六句何氏謂巷伯行讒之人故以名篇舊說即寺人非也周禮官名有寺人而無巷伯按班固評史遷曰跡其所以自傷悼小雅巷伯之倫何以稱焉愚按蘇公孟子皆自傷被讒之作無關獻納而載之于雅者惟幽王信讒一時上下內外皆以工讒為事使人材盡喪而國隨以亡録是詩以明周之所以亡亡于讒也按毛傳自節南山至巷伯十篇為節南山之什谷風序曰刺幽王也天下俗薄朋友道絶焉朱子以為朋友相怨之詩習習谷風維風及雨將恐將懼維豫與女將安將樂女轉棄豫毛傳興也朱注同連嚴氏云谷風來自大谷之風盛怒之風也習習然續不斷繼之以雨喻遭變恐懼之時鑑郝氏云東風習習不斷久之風必至于雨風范世云薰風為凱風冷風為谷風凱風長物冷殺物凡與人恩情絶者皆以谷風為喻故衛風去妻詩亦託興于習習谷風將且也恐有危疑之意安者恐之反懼者有局蹐之意樂者懼之反維豫與女我能先施也女轉棄豫施而無報也轉者驚訝之辭習習谷風惟風及頺將恐將懼置豫于懷將安將樂棄豫如遺爾雅云焚輪謂之頺扶搖謂之猋李巡云焚輪者暴風從上來降謂之頺頺下也扶搖者暴風從下升上故曰猋猋上也云置于懷親愛之至也棄如遺猶棄之如敝屣也習習谷風維山崔嵬無草不死無木不萎忘我大德思我小怨朱注比也山嚴氏云大風摧物惟戴土之石山崔嵬獨存而其之草木無不萎死喻昔時所共之大患難也大德謂共濟患難之大恩小怨謂言語行事之小失孔云草小或連根死故言死木大或一枝枯故言萎也谷風三章章六句蓼莪序曰刺幽王也民人勞苦孝子不得終養耳鄭云不得終養者二親病亡之時時在役所不得見也蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞毛傳興也朱注比也云蓼草蒼蒨貌大莪即蘩也蘩之醜秋為蒿嚴氏始生為莪長為蒿莪始生香美可食為蒿則不可食矣喻父母生長我身至于長大無用不能終養也劬勤勞劇也其勞頻數謂之劬勞如第四章所云是也蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁朱注比也青蔚牡菣也按蔚即蒿之雄無子者故云牡菣今蒿葉端皆作子大如米蔚獨無爾以喻父母得我之難今皆無報雖有猶之乎無子也勞瘁勞苦之見于貌者瓶之罄矣維罍之耻鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至朱注比也容瓶小而罍大皆酒器也酌禮圖云罍大一斛其所甚多瀉酒于瓶以供斟按易井卦羸其瓶則汲器也儀禮罍水在洗東則盛水者也罍嚴氏云瓶汲水以注于罍猶子之養父母瓶竭則無所資為罍之恥猶子窮困不能養貽親之羞也民鮮寡也鮮民謂單獨之民以父母亡也一云鮮之生猶云無生人之樂不如死之久矣痛切之言也無鄭云孝子之心怙恃父母依依然以為不可斯須也出門則思之而憂入門不見如入無所至愚按入則靡至至到家也謂親既亡則無家可到也父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極朱注賦也鞠此章正上章所言父母生我劬勞勞瘁之實也通作掬說文云兩手曰掬幼時母嘗置手中也拊謂拊摩其身體察其肥瘠憂其痛癢也畜兼止與養二義既乳哺之又謹其出入也長者如南風之長養萬物日盛一日也肓者肓其德也其調理在性情氣質之間顧還視也常目在之察其所行復反復丁寧諄諄然命之也腹懷抱也自少至長惓惓置之于懷出入以之不暫釋也鞠拊畜三事次于生之後皆以養言育顧復三事次于長之後皆以教言出入腹我總括教養而言君之恩捐軀足報以身為吾有也至于親則身亦親之有也雖捐軀莫報也而况身之外乎而况身之外且不能致之親乎呼昊天訴其痛也愚按生我屬父言而鞠拊畜則母為之長我屬母言而育顧復則父為之養與教其事雖有分而于父母之心無有分也出入之腹慮其失養又慮其失教何時始釋然哉南山烈烈飄風發發民莫不穀我獨何害朱注興也皆朱注烈烈髙大貌發發疾貌指鄭云穀養也言民得養其父母朱注穀善也民之父母俱存者害禍也親死不及見是為極禍愚按烈字從火比山之峯峻如火之烈焰而加以飄風之暴疾勢甚可畏以喻虐政不敢逃役也南山律律飄風弗弗民莫不穀我獨不卒朱注興也也律崒嵂也髙愚按律律是山峯排列不亂之貌弗弗狀風威之彊有不讓崒嵂之勢不卒謂不得終養是不能終為人子之道也蓼莪六章四章章四句二章章八句晉王裒以父死非罪每讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者為廢此篇朱善曰此詩與陟岵鴇羽皆孝子行役不得養其父母而作然陟岵鴇羽思念于父母尚存之日蓼莪之詩感傷于父母既殁之後故其詩尤痛誦之未有不流涕者也大東序曰刺亂也東國困于役而傷于財談大夫作是詩以告病焉竹書紀幽王三年初增賦是詩之作其在此時乎周道雖衰而誅求之令尚行于天下及至東周則不然矣也陳氏云晉之乘楚之檮杌魯之春秋皆東遷之史古者諸侯無私史有邦國之志則小史掌之而藏周室魯人所謂周人御書晉人所謂辛有之二子董之晉于是乎有董史也是故費誓係于周書漢汝江沱至于談大夫下國之詩皆編入于南雅有饛簋飱有救棘匕周道如砥其直如矢君子所履小人所視眷言顧之潸焉出涕毛傳興也朱注同陳饛說文云盛器滿貌客鄭云飱者客始至主人所之禮也楊慎曰飱始至之禮饔將幣之禮今謂朝饔夕飱按客至必夕夕食未盛故曰夕飱飱食不備禮也享燕以早為敬故曰朝饔周禮注謂小禮曰飱大禮曰饔餼是也赤救通作觩角上曲而長之貌此亦以曲而長言棘心之木匕所用以取飯亦所以載牲體謂出之于鼎而升之于爼也國語周定王云禘郊之事則有全蒸王公立飫則有房蒸親戚宴享則有殽蒸體解折節而共飲食之此棘匕所用當主殽蒸而言此追思周之盛時待諸侯之客禮意殷勤如此故賔至如歸而今不能然故觀周道而不勝今昔之感也周道適周之道砥言平也矢言直也愚按履者朝覲㑹同循斯道以往來視者沿途父老覩車騎而樂觀瞻也小東大東杼柚其空糾糾葛屨可以履霜佻佻公子行彼周行既往既來使我心疚朱注賦也絲鄭云小亦于東大亦于東言其政偏談無他貨維麻耳今盡杼柚不作也說文云杼機之持緯者柚通作軸所以卷織者朱注受經者也為葛屨夏屨也糾糾敝而纒縛之也用以踐霜則知夏日供賦適周至履霜時始反國也為時既久而財貨復盡亦以見有司需索之苦毛云佻佻獨行貌朱注輕薄不耐勞苦之貌謂形體脆弱也公子談公子大夫所從行者也朱注周行大路也鄭云周行周之列位也因送轉餫使行周之列位者發幣焉行彼者即今行賂之謂因日久財盡所以行賂兾得速返也有洌氿泉無浸穫薪契契寤歎哀我憚人薪是穫薪尚可載也哀我憚人亦可息也朱注興也小側出曰氿泉穫艾也則艾通作刈按薪大者析之者刈之薪欲其燥浸濕不可㸑穫薪生意已稿而又浸之則腐矣契契憂苦也寤嘆不寐而嘆也憚通作痺勞病也司㸑者欲薪是穫薪尚其載之勿使受浸可也牧民者哀此病民尚其休息之勿重勞之可也愚按氿泉為側出之泉以喻朝政之旁出者下國竭膏脂以上供而左右需索不饜則上供皆委諸草莽猶氿泉之浸穫薪必使至于不可薪也載猶積也此時不以穫薪為苦惟兾其視以為薪而載之則此勞病之人亦可以暫得休息歟可尚可亦可皆疑問之辭猶云得無乎東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試朱注賦也下皆同朱東人泛言東諸侯之人談亦與焉毛云來勤也注慰撫也嚴氏云東人困弊雖貴者猶葛屨以履霜西人逸樂雖賤者皆善服厚祿言不均也愚按京師之供億皆取給于東人東人職勞固所不辭西人復苛虐之不思所以來之也彼在位者以東人為外府勿論已凡西人之子粲粲衣服下及舟人之子熊羆是裘此皆安從出乎取諸東也以至私人之子本至賤之屬今皆用之百僚以作威福于我東人東人其能堪乎舟人熊羆是裘之日正東公子葛屨履霜之時能無憤歎或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄酒之薄者為漿周禮有酒人漿人漿薄酒厚素問云今時之人以酒為漿是也璲通作瑞後漢輿服志曰古者君臣佩玉五伯迭興戰兵不息釋去紱佩留其係璲以為章表韍佩既廢秦乃以采組連結于璲轉相結受故謂之綬漢承秦制用而不改即說文無璲字范曄以璲作縌謂縌者古佩璲也意是珮璲之絡耳德不以其長言非有所長也鄭云徒美其佩而無其刺其素餐夏小正云七月漢案户注云案户直戶也古者户皆南是時初昏天漢直南是不言日月之明而云漢之光歐陽子謂不能下監也刺王不明之意市織女在漢旁三星跂然如隅左按織女三星在天東主絲帛婺女四星主布帛傳昭十年有星出于婺女杜預注婺女既嫁之女織女為處女也鄭云襄駕也駕謂更其肆也孔云肆謂止舍處在天為次在地為辰每辰為肆厯其肆舍有七也晝夜各六辰數者舉其終始故曰七謂自卯至酉也終日晝也晝不得見而言移七肆者據其理當然矣一曰跂通作企舉踵也愚按此言西人奢侈東人寒儉西人責賄于東東人竭力供之而西人不以為德如餽之以酒自以為酒之厚矣而視之漿之不如贈之以珮璲自以為鞙鞙其長矣而不以為長猶嫌其短皆不能如其意也天無日月誰實監之然河漢尚在若肯下監亦有光也杼柚其空惟望跂然三星之織女終日經行駕更七次勤敏如此庶幾能濟我機杼之急乎雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有救天畢載施之行孔云織之用緯一來一去以報反而成章今織女之駕有西而無東不見倒反是有名無成也說文云箱大車牝服也大車平地任載之車牛所駕者牝服長八尺謂較也兩較之內謂之箱是車內容物之處對說文云睆大目也明貌睆彼牽牛與跂彼織女相爾雅云明星謂之啓明孫炎云太白也晨出東方髙三舍命曰啓明昏出西方髙三舍命曰太白畢天畢天星也史記曰畢曰罕車主弋獵後漢書云為天網武王伐紂王祭于畢求助天也言載之言則也施旗逶迤貌行謂二十八宿之行列畢星救曲逶迤于星宿之列愚按七襄不能成章則二東其空之杼柚不敢告乏也牽牛不以服箱則二東轉輸之車牛不敢告勞也虛想無補實患愈深而日者君象啓明先日而出長庚後日而入日無光星以其光或前或後有輔導之義以喻君雖昏為之左右者豈無下燭民隱者乎畢所以掩兔天畢之狀類之小人罔利之象也罔利之小人布在周行猶天畢逶迤星宿之列今且侈然自如則安用啓明長庚為也維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭箕四星二為踵二為舌狀如簸箕步天歌云箕下三星名木杵箕前一黑是糠皮北斗七星第一至第四為魁第五至第七為杓合而為斗以郝氏云粟米之貢簸揚用箕南方空有箕而不可簸揚酒漿之貢斟酌用斗北方空有斗而不可以挹酒漿古詩所謂虛名竟何益也孔云箕斗之形成于柄舌翕引也揭髙舉也舌言箕斗非特不可用已也箕踵狹而舌廣今引其反若有所吞噬斗且西揭其柄以其方如斗者向東若將有所挹取喻在位貪饞者之皆耽耽逐逐于東國也愚按自維天有漢以下蓋人無可訴不得已而求諸天乃天象虛懸不肯見恤且併天亦似助之為虐將于何請命乎哀苦之至矣大東七章章八句楊慎云周自平王去鎬而遷洛周始東也故曰大東敬王遭兄弟之變子朝居王城曰西王敬王居狄泉曰東王周又東也故曰小東自有二東之分王室大亂大國攻戰㑹盟小國貢賦奔走故空其杼柚而怨刺作焉愚按篇中以西人與東人對言明指西周非東遷後之詩也四月序曰大夫刺幽王也在位貪殘下國搆禍怨亂並興焉孔叢子載孔子曰于四月見孝子之思祭焉左傳文公十三年鄭伯㑹公于棐請平于晉與公宴子家賦鴻雁季文子賦四月杜注謂義取行役踰時思歸祭祀不欲為還晉則文子賦詩之意與孔子思祭之說正合愚按漸漸之石序亦曰下國刺幽王也戎狄叛之荆舒不至乃命將率東征疑此詩當作于此時故有江漢南國之語觀詩憂亂之情多而苦役之意少至思祭又苦役意中之一端耳四月維夏六月徂暑先祖匪人胡寧忍豫朱注興也毛傳缺夏鄭云徂始也四月立夏矣至六月乃始盛暑由厯秋與冬見征役為時之久祭祀久缺不獨傷夏祭之廢也孫先祖匪人猶云獨非人情乎凡人未有不望其子之報本者為人上者胡寧忍豫蹈不祀之罪也而左傳楚子文云鬼猶知求食若敖氏之鬼不其餒久役于外祀典缺焉是忍豫之餒其先祖矣愚按篇中思祭之說只據此一語徂周以卯辰巳為夏四月夏二月也六月夏四月也暑言暑氣向往日盛一日也秋日淒淒百卉具腓亂離瘼矣奚其適歸腓通作痱說文云風病也面鄭云凉風用事而衆草皆病賈誼䇿云夫辟者一病痱者一方痛從征之人如百草遭風其枝葉當風者先受摧折也郭璞云東齊謂病曰瘼愚按言不惟已之困于征役且亂離已兆舉世皆病恐役返亦無所歸矣周以夏五月後即為秋八月即為冬五月宜暑而淒淒八月宜凉而烈烈天時失正也冬日烈烈飄風發發民莫不穀我獨何害烈烈謂寒苦也飄風回風也民泛指不從征者而言李氏云天下莫不被害乃云民莫不善此據作詩者言之也山有嘉卉侯栗侯梅廢為殘賊莫知其尤卉草也通言之則草木皆卉也其殘賊謂傷殘之賊害之也斫伐其根本無復存留地廢矣尤通作郵過也惡彭執中曰四時之氣樂者遇之皆美愁者觸之皆四月之大夫夏則苦于徂暑秋則悲夫百卉冬則傷夫飄風觸景生愁無一得以自寬也可見當時之亂愚按嘉卉殘賊是實事非借喻也嵗荒民病果木不實觸目皆凋零夭札之象所以致其然者過必有在而曽莫之知也相彼泉水載清載濁我日構禍曷云能穀相省視也無清期也泉水有時濁亦有時清怪主心昏亂永我謂王朝也時事如此猶日與下國構禍大迷不寤如泉濁不復清也禍及臣民何由得遂其生養乎滔滔江漢南國之紀盡瘁以仕寧莫我有滔滔水大貌紀絲别也朱注謂經帶包絡之也鄭云江漢南國之大水紀理衆川使不壅滯愚按此即征役之地所見而起興也言我從役至此惟有鞠躬盡瘁而已死亡不保而朝廷㑹不知有我寧念我先祖之乏祭乎匪鶉匪鳶翰飛戾天匪鱣匪鮪潜逃于淵說文云鶉作鵰也之陸氏云鵰亦名其飛上薄雲漢若鶉則無戾天理鳶鴟類爾雅云鳶鳥醜其飛也翔云蘇氏云鳥飛不在翼而在翰翰者翼之鋭也鄭鵰鳶之髙飛鱣鮪之處淵性自然也非鵰鳶能髙飛非鱣鮪能處淵皆驚駭辟害耳喻民性安土重遷今而逃走亦畏亂政故也山有蕨薇隰有杞桋君子作歌維以告哀杞枸檵也桋赤棘也爾雅以女桑為桋桑愚按蕨薇與杞可食桋桑可以供蠶為衣行役之人思在深山窮谷草衣木食真如魚鳥天淵之樂而不可得也其作此歌惟以訴哀傷之情而已以君子詩人自謂也禮不下庶人君子則有位之稱見已當守禮而不得歸祭所以哀也四月八章章四句申培說大夫遭讒流離南國而作是詩何氏謂厲王世之詩蕩之詩曰內奰于中國覃及鬼方以鬼方荆楚之地滔滔江漢南國之紀意即為覃及鬼方之事而發小旻之什十篇六十五章四百十四句田間詩學卷七
