body:
  text: 田間詩學卷五桐城錢澄之撰陳譜略陳者太皥虙戲氏之墟帝舜之胄有虞閼父者為周武王陶正武王賴其利器用與其神明之後封其子媯滿于陳都于宛丘之側與黃帝之後封于薊堯之後封于祝者共為三恪妻以元女大姬其封域在禹貢豫州之東其地廣無名山大澤西望外方東不及孟諸大姬無子好巫覡禱祈鬼神歌舞之樂民俗化之五世至幽公當厲王時政衰大夫淫亂所為無度國人傷而刺之陳之變風始作孟諸一作明豬愚按陳即陳州秦為潁川郡地漢淮陽國治此伏羲陵在焉周武王克殷求舜之後得虞閼父之子滿封之于陳庸以元女大姬是為胡公按左傳史趙云胡公不淫故周賜之姓使祀虞帝則胡公姓媯武王所賜也左傳又稱夏后氏少康逃奔有虞虞思妻之以二姚虞思在胡公之前仍為姚姓明是胡公始姓媯耳陳一之十二宛丘序曰刺幽公也荒淫昏亂游蕩無度焉朱注國人見此人嘗游蕩于宛丘之上故序其事以刺之子之湯兮宛丘之上兮洵有情兮而無望兮朱注賦也毛傳缺游毛云子大夫也鄭云子者斥幽公也此章直是人相謂之辭所以喚起下二章而著幽公荒淫之實耳一爾雅云丘上有丘為宛丘郭璞謂中央隆峻狀如丘諸說以為四方高中央下者非也愚按下章所言歌舞之場即在此丘之下有情謂有游覽之情無望謂無君人之望一云望責望也謂此歌舞之樂乃吾君之所為女無責望之也言無望乃所以深望之耳坎其擊鼓宛丘之下無冬無夏值其鷺羽坎通作竷說文云舞也舞者之行步坎坎然似有所屣而進舊以為擊鼓聲非也舞必應節擊鼓所以為舞節也故曰坎其擊鼓翳值持也鷺鳥之羽可以為翳舞者所持以指麾即下章所謂翿也與周禮之羽舞不同彼乃翟羽舞人所執衛詩右手秉翟是也此舞師所執宋大樂文舞不用翟羽而用鷺羽正為此詩所惑坎其擊缶宛丘之道無冬無夏值其鷺翿毛云盎謂之缶史記藺相如使秦王鼓缶國語缶絲尚宫陳𤾉云缶之為器中虛而善容外圓而善應中聲之所自出者也易之鼓缶見于離詩之擊缶見于宛丘翿纛通翳也陳祥道云春秋傳曰舞師題以旌夏則鷺翿若今大樂工執之以引舞者也之詩故云擊鼓擊缶舞鷺羽鷺翿皆以娛神踵大姬餘習也宛丘三章章四句春秋桓五年書正月甲戌己丑陳侯鮑卒穀梁傳云陳侯以甲戌之日出己丑之日得不知死之日故舉二日以包也此詩蓋刺陳侯鮑也愚按自幽公以來游蕩無度陳侯鮑出而不返流弊使然卒至靈公淫乎夏氏株林之適匪朝伊夕皆幽公作法于涼所致耳東門之枌序曰疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹于道路歌舞于市井耳陳俗巫覡盛行女子往往棄其業而往觀焉詩以刺之化譜云大姬無子好巫覡禱祈鬼神歌舞之樂民俗而為之是也孔云大姬無子而左傳子産謂陳我周之自出杜預注陳周之自出者蓋大姬于後生子以禱而得子故彌信巫覡也東門之枌宛丘之栩子仲之子婆娑其下朱注賦也毛傳缺隂枌白榆也陸氏云先敷葉後著莢榆性扇地故其下五穀不植而人就以息焉栩解見前枌栩之隂皆人之所趨而聚者所子仲氏也子女子即女巫也婆娑盤辟舞也舞以娛神或舞于枌之下或舞于栩之下明非一時非一處也穀旦于差南方之原不績其麻市也婆娑孔云無隂雲風雨謂之穀旦旦朝也穀善也差不相值也朱注差擇也言以穀旦另擇舞場而遷也子仲之子向皆婆娑于枌栩之下今忽徙于南方之原自故處求之不可得矣市即原上之市也諸婦女聞其所在因棄麻不績往從而觀之穀旦于逝越以鬷邁視爾如荍貽我握椒逝往也鬷通作總說文云聚束也孔云麻縷每數一升用繩紀之邁行也言挾其麻總而行不暇績也蓋急欲從觀子仲子之婆娑舞耳幹荍爾雅云蚍衃也郭璞云今荆葵也其花自根及而上連接甚密有類蟣窠故名蚍蜉觀子仲子者士女凑集亦如此密也椒實芬香取以相貽辟除不祥之意周禮女巫掌嵗時祓除釁浴如今上已修禊以薰草香藥沐浴滌邪穢是也愚按椒性暖宜子其實蕃衍以貽婦女取多子之義此尤婦女所敬信而樂觀者大姬之好巫覡本由禱子故以為俗東門之枌三章章四句按漢王符潛夫論曰詩刺不績其麻女也婆娑今多不修中饋休其蠶織而起學巫祝鼓舞事神以欺誣細民熒惑百姓婦女羸弱則此詩正指巫覡之事衡門序曰誘僖公也願而無立志故作是詩以誘掖其君也歐陽子亦云詩人以陳僖公性不恣放可以勉進于善而惜其懦無自立之志故作詩以誘進之衡門之下可以棲遲泌之洋洋可以樂饑朱注賦也毛傳缺好毛云衡門橫木為門牛觸橫大木蓋牛抵觸用橫木闌制之說文云不曰忘饑而曰樂饑惟樂而饑雖饑亦樂矣樂饑一作􅓼饑說文云􅓼治也豈其食魚必河之魴豈其取妻必齊之姜歐陽子云如食魚凡魚皆可食若必待魴鯉則不食魚如取妻諸姓皆可娶必娶齊宋則不取妻矣此所謂誘掖之也豈其食魚必河之鯉豈其取妻必宋之子齊姜宋子言其族類之貴足為係援非謂色之美也衡門三章章四句序言誘僖公誘其求賢也言衡門泌水之間大有其人愚按可以豈必數字其人苟安知足無求仕之心賢不求仕君宜急求之也東門之池序曰刺時也疾其君之淫昏而思賢女以配君子也東門之池可以漚麻彼美淑姬可與晤歌毛傳興也朱注同麻漚久漬也孔云謂漸漬之使之柔韌也宋均云枝葉成謂之衣三變圭成形一變也漚取皮二變也績成為縷三變也東門之池可以漚紵彼美淑姬可與晤語紵說文云檾屬陸璣云紵亦麻也科生數十莖宿根在地至春自生不嵗種也荆揚之間一嵗三收東門之池可以漚菅彼美淑姬可與晤言爾雅云白華野菅黃左傳引詩雖有絲麻無棄菅蒯蒯與菅皆謂苕也華者俗名黃芒即蒯也白華者俗名白芒即菅也紵菅二物皆賤于麻古人貴麻與絲並言故說文云衣錦檾衣曹風曰麻衣如雪東門之池三章章四句序謂思賢女以配君子欲藉其晤歌語言為成德之助比之池之漚麻漸漬而不自知也士大夫不能格君因其好色思得淑女以默化之亦不得已之極思矣愚按淑姬自是賢女之稱諸家以為指夏姬謬矣蓋因淫于夏姬迷而不返而思得淑姬之美者以奪其所惑耳東門之楊序曰刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂昏以為期明星煌煌毛傳興也朱注同之鄭云楊葉牂牂三月中也興者喻時晚也失仲春月親迎之禮以昏時女不肯時行乃至大星煌煌然東門之楊其葉肺肺昏以為期明星晢晢肺肺猶沛沛與蔽芾同此郝氏謂霜降以後氷泮以前皆昏姻之期楊葉如春已暮矣親迎以昏為期今啓明之星煌煌晢晢而猶不至違禮可知東門之楊二章章四句朱注此亦男女期㑹而有負約不至者故因其所見以起興也火按周語定王六年單襄公假道于陳以聘于楚朝覿矣道茀不可行也及陳陳靈公與孔寧儀行父南冠以如夏氏留賓不見何氏謂此詩正此時所作詩言楊葉牂牂肺肺皆赤色也霜降後則楊葉色赤正心星晨見之時靈公經東門而適株邑其相訂約皆以昏為期及至啓明之星煌煌然而猶盥桓不忍去也墓門序曰刺陳他也陳他無良師傅以至于不義惡加于萬民焉陳他陳文公之子桓公鮀之弟桓公疾病他殺其太子免而代之國人大亂他奔蔡蔡人殺之此詩追咎先君不能為他置良師傅致有弒逆之事也墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣毛傳興也朱注同以毛云斯析也墓門幽間希行用生此棘薪惟斧可開拆之喻陳他無賢師良傅以開導之也之毛云夫傅相也鄭云陳他之師傅不良羣臣皆知已猶去也知其罪惡而不誅退終致禍難愚按墓門不宜有棘而有棘者歎剪除之不早也誰昔猶云疇昔言其不置良師傅縱惡養亂蓋非朝夕之故矣墓門有梅有梟萃止夫也不良歌以訊之訊豫不顧顛倒思豫梟與梟異廣雅以為􅬠鳥廣志云梟楚鳩所生如蛩蛩巨虛種類不滋乳也嚴氏云萃集非一梟喻羣小附和之衆慫恿之為惡也言歌以訊之訊豫不顧指昔日言顛倒思豫指今日訊爾雅云告也雖訊之而我言終不蒙其顧念使地下有知必思我所歌之言然已無及矣愚按梅華實皆在衆木之先指太子免也梟惡鳥攫鳥子而食鴟梟篇所謂既取我子是也指陳他言萃止言惡黨聚也墓門二章章六句愚按此詩當是陳之忠臣于太子被弒之時哭桓公之墓追恨其昔言之不見信也梅棘皆墓門所見者因以起興左傳載陳他如鄭涖盟歃如忘泄伯料其必不免夫臨大事而如忘者其心必專有在也他之黨非一人謀非一日矣國人知之忠臣言之而桓公不早為之所寧無追咎之乎防有鵲巢序曰憂讒賊也宣公多信讒君子憂懼焉史記載宣公有嬖妾生子欵欲立之殺其太子禦寇禦寇素愛厲公子完完懼禍及乃奔齊此其信讒之一證也防有鵲巢卭有㫖苕誰侜豫美心焉忉忉毛傳興也朱注同氏防隄也羅氏云鵲水大則巢高水小則巢卑陸云鵲巢居而知風嵗多風則去喬木巢傍枝故能髙而不危也蓋鵲性多懼就利違害莊子所謂瞿鵲子者義取此言其時瞿瞿驚顧以防患也陸禽經曰燕以狂䀪鵲以驚瞿卭丘也苕草之秀也氏云苕饒也幽州人謂之翹饒可生食如小豆藿也有苕可生食故曰㫖苕有陸氏云言不驚懼之故防鵲巢不殘賊之故卭㫖苕也侜爾雅云誑也于鄭云豫美謂宣公也忉當作怊悲也所言鵲以巢防而安苕以生于丘而茂我為讒人搆憂心靡寧則鵲苕之不如矣中唐有甓卭有㫖鷊誰侜豫美心焉惕惕唐訓大周禮以唐弓為大弓廟之中路謂之唐此所居宮室之中路為大也甓瓴甋也鷊綬草也按甓即㼾甎之類以甓中路所以防圯壞坦踐履也善鷊五色作綬文故曰綬草陸氏云鷊綬鳥也鷊相其天而吐綬樂則見其文采有戕賊之疑則不吐也歐陽子云讒言惑人非一日一夕之故如鵲巢積纍以搆成之又加苕饒之蔓引牽連以及之也中堂有甓非一甓也必凑砌而為路綬草亦雜衆色以成文猶多言交織以成謗如萋菲篇之貝錦也皆主讒言愚按吐綬鳥閩粵間有之遇天晴正午則吐物長數寸五色如綬過午不吐未必如陸所云也且鳥産于極南恐非陳地所有讒言中堂壘甓瀉水下浸卭有㫖鷊吐綬成采我為人所構觸步畏途有懷莫吐是甓與鷊之不如矣防有鵲巢二章章四句愚按詩當是太子禦寇被殺公子完出奔國人為完憂危而作也子美指完侜周同言誰為周旋之也然鵲巢必獲其安唐甓必履其坦㫖苕㫖鷊必不為人所吐棄完之後大于齊于此詩已先兆之矣月出序曰刺好色也在位不好德而悅美色焉月出皎兮佼人僚兮舒窈糾兮勞心悄兮毛傳興也朱注同晝說文云皎月之白也郝氏云月主隂司昏俾夜作比女色也佼姣同孔云方言自關而東河濟之間凡好謂之姣思僚好貌舒遲也窈糾舒之姿也悄默憂也言所者匪才匪德一佼人耳反復思念至于勞心展轉不已所以為刺愚按當月出之時思其人僚然姣好與皎月相映且憶其人于月下遲回却步脈脈以相思也月出皓兮佼人懰兮舒懮受兮勞心慅兮皓本作皓說文云白貌余懰劉同劉殺也謂心如刀刺也懮愁也楚辭云傷心之懮懮受謂受諸憂愁向誰吐也慅動也愚按懰與懮皆指佼人獨處傷愁之情自所歡思之為騷然不寧耳月出照兮佼人燎兮舒夭紹兮勞心慘兮照明所燭也愚謂照廣也兩地皆見也見燎如火之燎原不可撲滅此當自佼人之思已不而言說文云天屈也紹緊糾也慘作懆愚謂傷也愚按此章蓋想其對月之思至于中心如燎屈鬱糾緊而不可解則吾心安得不為之慘傷乎月出三章章四句朱注此亦男女相悅而相念之詩株林序曰刺靈公也淫乎夏姬驅馳而往朝夕不休息焉夏姬陳大夫御叔之妻徵舒之母鄭女也徵舒字子南胡為乎株林從夏南匪適株林從夏南朱注賦也毛傳缺殺郡國志陳有株邑蓋朱襄之地今柘城縣也楚徵舒左傳謂之戮夏南是知夏南即徵舒也言從夏南者婦人夫死從子夏南為株林主故以夏南言之愚按胡為乎二句訝之也匪適株林二句從而疑之也言必無此理也始訝之而終疑之深于譏者矣駕我乘馬說于株野乘我乘駒朝食于株乘馬指靈公也乘駒指孔寧儀行父也毛云大夫乘駒愚按上章言適株林其地尚泛由株林而株野由株野而食于株明明在夏南之所居矣雖欲為之隱諱不可得也也于乘馬者言稅野于乘駒者言朝食互相備抑又甚大夫之惡以為君諱者然株林二章章四句朱善云衛之亂至牆有茨而極于是有狄入衛之禍陳之亂至株林而極于是有楚入陳之禍然則非狄與楚之能為禍宣姜夏姬召之所謂女戎也澤陂序曰刺時也言靈公君臣淫于其國男女相悅憂思感傷焉朱注此詩之㫖與月出相類也按月出男思女之辭此則女思男觀篇中碩大且卷等句可見彼澤之陂有蒲與荷有美一人傷如之何寤寐無為涕泗滂沱毛傳興也朱注同而毛云陂澤障也時蒲說文云似莞而褊有脊滑柔溫荀子云與屈伸柔從若蒲葦席陸氏云荷善傾攲蒲無骨幹而柔從思蒲可以為取以况女荷蕳菡萏别言之以况所之男子也為鄭云傷思也無他無所事也彼澤之陂有蒲與蕳有美一人碩大且卷寤寐無為中心悁悁蕳蘭也荷比其容華蕳比其芬香也卷猶鬈也鬢好貌彼澤之陂有蒲菡萏有美一人碩大且儼寤寐無為輾轉伏枕菡萏荷華之未舒者以况年少也儼矜莊貌愚按儼謂不露狎邪之態使人測也此女所喜而思者澤陂三章章六句愚按序不指靈公言公之淫亂使國人男女相悅習以成俗也然觀首篇曰子之湯兮則陳之男女借禱祀以游觀久矣禮禁婦女無觀游觀者淫之始也故始以宛丘終以澤陂陳國十篇二十六章一百二十四句檜譜略檜者高辛氏火正祝融之墟在禹貢豫州外方之北滎波之南居溱洧之間祝融氏名黎其後八姓惟妘姓檜者處其地焉當夷王厲王之時檜公不務政事而好潔衣服大夫去之于是檜之變風始作愚按鄭桓公用史伯之謀以圖檜桓公死犬戎之難其子武公始滅檜而遷國焉鄭語史伯曰主芣騩而食溱洧按芣騩即大隗具茨山也在密縣水經稱潩水出大騩山即溱洧之源也其水一東流一東北流至新鄭而㑹為雙泊河本檜地鄭都于此朱注謂即鄭州非也檜一之十三蘇氏以為檜詩皆為鄭作如邶鄘之于衛也愚按若是鄭詩當列諸鄭風之前如邶鄘之先衛魏之先唐以明檜之即鄭矣無緣次于陳之後蓋檜雖滅而其詩上憂君而下念民讀素冠而生孝思讀匪風而生忠義詩止四篇聖人所急録也羔裘序曰大夫以道去其國也國小而迫君不用道好潔其衣服逍遙遊宴不能自强于政治故作是詩也郝氏云檜君之過不在潔衣服大夫之去亦不以潔衣服特以逍遙不能自强故託辭于衣服言服飾之外都無所事云爾猶曹風之蜉蝣也羔裘逍遙狐裘以朝豈不爾思勞心忉忉朱注賦也毛傳缺錦鄭云羔裘諸侯之朝服也厚玉藻云君衣狐白裘衣以裼之論語狐貉之以居則狐裘燕服也狐逍遙而以羔裘是法服為嬉遊之具矣視朝而以裘是臨御為䙝媟之場先言逍遙後言以朝是以逍遙為急務而視朝在所緩矣是忉當作怊悲也莊子云怊怊乎若嬰兒之失其母也羔裘翺翔狐裘在堂豈不爾思我心憂傷孔云以朝者謂日出視朝在堂者謂正寢之堂人君日出視朝畢乃退適路寢以聽大夫所治之政二者于禮同服羔裘今皆以狐裘二章互見之羔裘如膏日出有曜豈不爾思中心是悼陸氏云日出有曜然後見其如膏此正聽朝之時而反以燕游又與狐裘以朝狐裘在堂異矣按如膏祗于游燕時見之上言以朝次言在堂則游燕之後尚有視朝適寢之時今併視朝在堂皆無之則自辨色而起以至竟日皆游宴也羔裘三章章四句國語史伯謂鄭桓公曰檜仲恃險有驕侈怠慢之心而加之貪冒此詩蓋驕侈怠慢之實證也愚按檜君無大過惡而其勢必至于亡國有識者見幾而去既去而故主之思有不能恝然者故為此詩素冠序曰刺不能三年也周衰禮廢三年之喪不行如春秋諸侯居喪而親迎盟㑹征伐大夫以下可知孟子去春秋未逺而滕之父兄曰吾宗國魯先君莫之行吾先君亦莫之行魯猶不行他國更可知矣庶見素冠兮棘人欒欒兮勞心慱慱兮朱注賦也毛傳缺縞庶見者憂不得見之辭云素冠大祥之冠玉藻云冠素紕既祥之冠也注紕緣邊也黑經白緯曰縞其冠用縞以素為紕故謂素冠孔云凡言素者皆謂白絹未有以布為素者鄒氏云親喪再期則大祥之後將即吉于是不以布為冠而以縞不以采緣而以素蓋雖漸易凶而不敢遽用吉也說居喪而骨立見者為棘人即此冠素冠之人也文無慱字依作團結聚不散之謂欲一見而終不得見其勞心如此相輔氏曰言庶見素冠繼以棘人欒欒言服與情之稱也不然服于外而忘于內亦何為哉庶見素衣兮我心傷悲兮聊與子同歸兮毛云素冠故素衣也同謝氏云同歸如書云同歸于治歸于亂愚按喪禮久廢為此詩者亦不能獨行但得見有素衣冠之一人即與之同歸矣歸于禮也庶見素韠兮我心藴結兮聊與子如一兮韠說文云韍也所以蔽前以韋為之古者席地而坐以臨爼豆故設蔽膝以備濡漬惟冕服謂之韍他服曰韠裳禮大祥祭服朝服縞冠朝服之制緇帶素韠韠從色則素韠是大祥祭服之韠詩人所願見謂其能舉祥祭者耳終喪而後有祥喪禮不終則未祥而服已除無論禫也愚按上章同歸言同歸于禮也此言如一欲與同心遵禮服制如一二人同心則不為俗所奪亦漸可以變俗矣素冠三章章三句按上章刺檜君在位好潔衣服計其居先君之喪服制必不能如禮此詩亦當為刺檜君而作隰有萇楚序曰疾恣也國人疾其君之淫恣而思無情欲者也朱注以為政煩賦重人不堪其苦而作隰有萇楚猗儺其枝夭之沃沃樂子之無知毛傳興也朱注賦也枝陸氏云萇楚今羊桃是也葉長而狹華紫赤色其莖弱過一尺引蔓于草上猗通作倚依也儺通作那弱長貌夭少好貌沃沃光澤貌子指萇楚猶今人對物而稱爾也愚按此詩困于賦役借萇楚以起興不自訴現前之苦而但羡少時之樂又不直言人少之無知為樂而以萇楚夭之沃沃無知為樂寄興愈逺而情愈迫矣萇楚之夭而沃喻人幼時不識不知無家無室雖有虐政漫不關心壯大以來始有憂慮始有家室種種苦事回思少時不知有困于賦役之事誠足樂耳無知無室無家恰似為萇楚之夭者而言情辭甚幻隰有萇楚猗儺其華夭之沃沃樂子之無家陸氏云有一種羊桃華實皆連理故取以喻室家之義愚按萇楚枝條本弱漸且開花結實則枝益重而弱益甚喻有家有室人事日繁而身愈困也隰有萇楚猗儺其實夭之沃沃樂子之無室女以男為家男以女為室華之敷在外故以興家實之含在內故以興室愚按百姓之困至以無家無室為樂則國事可知隰有萇楚三章章四句愚按萇楚莖弱稍長則引蔓于草草不能自立則萇楚安得不仆地乎而萇楚不知猶生意沃沃也人非萇楚焉能如其無知無室無家故憂戚無以為主以比國小君弱逼于大國將有危亡之勢民無所依附也匪風序曰思周道也國小政亂憂及禍難而思周道焉呂氏云匪風思周道何也曰政出天子則强不凌弱各得其所政出諸侯則徵發之煩供億之困侵伐之暴惟小國偏受其禍所以惓懷宗周為獨切也戰國時厲喜為韓王曰大國惡有天子而小國利之以詩驗之其理益明匪風發兮匪車偈兮顧瞻周道中心怛兮朱注賦也毛傳缺作匪風猶言非常之風發風大起也偈疾也漢書揭云髙舉也車升高則在車上者必震蕩不安此車中即事之語指孔云言顧瞻則周道已過回首顧之按顧瞻雖適周之路而意之所托仍在西周盛時其禮樂刑政布在方策者與今之所行大不相同孔子云我觀周道幽厲傷之是也匪風飄兮匪車嘌兮顧瞻周道中心弔兮毛云回風為飄嘌無節度也車聲也上言風發未明其為何風此言飄則回風也上言車偈則行不安此言嘌則其不安之見于車聲者也上言怛此言弔先驚痛而後悲傷也誰能烹魚溉之釜鬵誰將西歸懷之好音說文云鬵大釡也陸德明云鼎上大下小若甑曰鬵烹魚以喻治國曰溉之者取洗濯更新之義王城在滎陽之西然此詩之所念者西周周猶都鎬當是幽王世之詩愚按此與大東詩皆一時事檜人行役于周皆所謂東國大夫也大東詩曰周道如砥懷古也此云顧瞻周道傷今也匪風言風起異常不可謂之風匪車言車行臲􅑶不可謂之車蓋王室弊政多端四方來者視周道為畏途耳積弊已久須洗滌一新如烹魚而溉釡鬵猶易所云顛趾出否也有新政聞諸四方則好音也今四方諸侯西向而歸心者誰乎庶幾以好音懷之所謂懷諸侯也蓋四方離心久矣匪風三章章四句愚按此詩作于幽王之世正當王室多難鄭桓公方為寄孥與賄之謀以圖檜時也大夫乃以王室為憂憂王室正所以憂下國耳使王室無故桓公豈預為逃死之訃亦豈能用成周之衆以伐人國者乎嫠不恤其緯而憂宗周之隕誠見其禍之必相及也曹譜略曹者禹貢兗州陶丘之北雷夏荷澤之隂周武王既定天下封弟叔振鐸于曹今定陶是也夾于魯衛之間曹之後世雖為宋所滅宋亦不數伐曹故得寡于患難十一世當周惠王世政衰昭公好奢而任小人曹之變風始作愚按曹定陶是也一統志謂即曹州金大定末河決徙治州東北七十里明初改州為縣正統間復置曹州于古曹國漢有定陶國想此地屬定陶耳孔云魯在其東南衛在其西北魯衛雖大于曹畏懼霸主不敢侵伐所以寡于患難而驕侈無復重厚之風也曹一之十四蜉蝣序曰刺奢也昭公國小而迫無法以自守好奢而任小人將無所倚焉朱注此詩蓋以時人有玩細娛而忘逺慮者故以蜉蝣為比而刺之序以為刺其君愚按序謂刺奢正指任用小人章服充滿于朝所謂三百赤芾是也非以修飾衣裳之為奢也蜉蝣之羽衣裳楚楚心之憂矣于我歸處毛傳興也朱注比也羅蜉蝣渠略也嵗夏小正云蜉蝣有殷殷者衆也氏云鶴壽千以極其游蜉蝣朝生暮死以盡其樂蓋以旦暮為期逺不過三日耳取興于蜉蝣之羽者以羣臣徒竊衣服以華其躬不知其死亡之無日也憂詩人憂曹君也愚按末句于我歸處等句當為大夫言也無德而竊章服服之不稱比之蜉蝣朝暮之榮而已故為之心憂曰歸處歸息歸說不即勉其去位且勸其暫歸如後世乞休沐之例曰于我者欲其于已取法也計此時心憂者已先歸矣蜉蝣之翼采采衣服心之憂矣于我歸息歸息者由處而息也蜉蝣掘閲麻衣如雪心之憂矣于我歸說掘說文作堀突也即所謂堀起也閲猶閲人閲世之閲言其從土中突出而為人所見也鄭云麻衣深衣諸侯之朝服朝夕則深衣也云孔云衣純用布而色白者惟深衣為然凌濛初說謂從容開諭之正上章所以欲其歸處歸息之意朱注說音稅舍息也猶言稅駕也愚按掘閲兼起滅二義言突然之間已閲人世一度猶云石火電光也蜉蝣三章章四句鄒氏疑為刺曹羈作魯莊二十三年曹莊公射姑卒明年冬戎侵曹曹羈出奔陳蓋在位日淺無如羈者羈方在喪故曰麻衣如雪而先之以楚楚采采意羈亦如魯昭公居喪而不哀在戚而有嘉容乎詩人逆知其稅駕無所諷以于我歸處殆如楚申亥舍靈王于家之為矣候人序曰刺近小人也共公逺君子而好近小人焉彼候人兮何戈與祋彼其之子三百赤芾朱注興也末章比也毛傳缺掌毛云候人道路送迎賓客者孔云秋官有環人訝皆掌送迎賔客按環人掌執節導引使門關無禁掌訝以禮送迎詔贊進止候人則何戈兵防衛奸寇雖同是送迎而職掌不同為何與荷同說文云儋也毛云祋殳也芾韠也以韋之即蔽膝也大夫以上赤芾乘軒言候人雖一職之微既係籍于公猶當勤率所屬以各供其事蕞爾曹佩赤芾者三百人何功德稱此服哉晉文公入曹令三百人獻狀亦謂其無勞竊位故責令自陳功狀也愚按諸侯之制大夫五人以曹之小國舉羣臣不能三百而况大夫乎三百人者曹君之諧臣媚子也赤芾亦假借服色以榮其軀非真有位也候人雖微各有所司以不忝其職則此赤芾者何為也哉維鵜在梁不濡其翼彼其之子不稱其服毛云鵜濩澤鳥也郭璞云今之鵜鴣也俗呼之為淘河魏黃初中嘗有鵜集靈芝池文帝識之曰此詩人所謂汙澤也曹詩刺共公逺君子近小人今豈有賢智之士處于下位否則斯鳥胡為而至哉鵜出沒汙澤而得魚今在梁之上而竊人之魚以食未嘗濡濕其翼猶之子無功而竊祿也維鵜在梁不濡其咮彼其之子不遂其媾咮說文云鳥口也于陸氏云鵜性沉水食魚則濡其咮翼宜矣今徒立粱上非特不濡其翼又且不濡其咮小人無嘉言獻㬱尸居于位亦猶是也愚按易于君臣之相遇比之婚媾媾遇之厚也言此輩無功受祿大負君之厚遇之意不遂猶言負也薈兮蔚兮南山朝隮婉兮孌兮季女斯饑薈蔚草多貌南山曹南山也十按春秋盟于曹南即此山鄒氏云周禮視祲掌輝之法九曰隮隮者虹也虹映日而成朝焉日在東則虹在西而雨輒隨之蝃蝀之詩朝隮于西崇朝其雨是也薈蔚夤緣山岊而虹見于西又當邀雨澤之霑被見君寵方隆而未艾也婉孌季女之容也君子之持身如處子故以季女目之愚按山以出雲致雨朝隮則淫邪之氣所致非時雨也南山之草木所以薈蔚者以常邀朝隮之雨耳喻君有邪德所寵用者皆邪人也彼婉孌之季女堅貞自守肯從邪以干祿乎惟祿遍邪嬖季女斯以饑耳序曰共公逺君子而好近小人由小人日近故君子自逺通篇好近小人惟此末二句見君子之逺候人四章章四句朱注引左傳晉文公入曹數其不用僖負羈而乘軒者三百人與此詩合愚按晉語重耳如楚子玉請止狐偃王曰不可曹詩曰彼其之子不遂其媾郵之也夫郵而效之郵又甚焉則曹風此詩傳于文公未返國之前久矣僖負羈事在後也鳲鳩序曰刺不一也在位無君子用心之不一也郝氏云民風不醇由上無身教而下無表率也故君必誠一為本天下不見君子之心見君子之儀而即儀可以徵心鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮毛傳興也朱注同摩鳲鳩亦作尸鳩秸鞠也一名布穀牝牡飛鳴翼相拂取其骨佩之宜夫婦嚴氏云即郯子所謂鳲鳩氏司空也鳲鳩平均故為司空平水土陸氏云鳲鳩有均一之德其哺子朝自上而下暮自下而上均也其子在梅在棘在榛而已常在乎桑一也儀度也毛云義也凡舉動之合義而有法度者謂儀端儀之一由其心之貞固而不變也淮南子曰賈多則貧上多技則窮心不一也有百技而無一道雖得之弗能守故曰其儀一兮心如結兮君子其結于一乎劉向云鳲鳩之所以養七子者一心也君子所以理萬物者一儀也以一儀理物天心也鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其辨伊騏毛云在梅飛在梅也在蘇氏云從其在梅則失其在棘從其在棘則失其榛居一以俟之無不及者帶大帶也絲素絲也玉藻篇天子諸侯皆素帶廣皆四寸素熟絹也大夫帶亦用素惟辟緣之色君朱緑大夫𤣥黃其辟緣之制天子諸侯皆終辟謂竟此帶盡緣之也郝氏云辨制大于冠古冠止撮髮辨下覆額融騏當作􅋒周禮注引此作綦書顧命四人綦辨馬本亦作騏蓋騏綦古通用耳綦又與􅋒通辨飾也皮辨之縫中貫結五色采玉以為飾也周禮尊卑皆得服皮辨所異者􅋒耳此言其衣服有常服有常即儀有常而心可知矣鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國忒毛云疑也人無常度故可疑其儀不忒者明白洞達表裏如一不令人有疑惑也正四國者謂足以表正四國也鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年陸氏云榛卑小于棘梅先實棘後之榛又後之故詩以此為序陳櫟曰心結而儀一且不忒表裏一也四國國人之皆正逺邇一也由是久而胡不萬年久近一也愚按上章言以不忒之儀能正四國則所及逺于國人矣此章始言正是國人而不云其儀謂國人化之皆有儀也鳲鳩四章章六句愚按此詩以鳲鳩名篇鳲鳩有均一之德其均也常均均亦一也故序曰刺不一也一者心也而驗之于儀傳曰有威可畏有儀可象謂之儀其帶其辨儀之一端所謂其儀者不忒是也不忒者父子兄弟之足法也惟其一故足法耳臣又序曰在位無君子用心之不一也則似兼君言君君臣臣各守其常則紀綱法度秩然不亂國人奉以畫一四國以為表率矣下泉序曰思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也朱注謂王室陵夷而小國困弊故以寒泉下流而苞稂見傷為比洌彼下泉浸彼苞稂愾我寤歎念彼周京毛傅興也朱注比而興也莠洌寒也下泉泉下流也物叢生曰苞稂郭璞曰類也與禾相雜古者以飼馬魯仲孫它馬餼不過稂莠謂此也耳愾說文云太息也寤歎者悲憤在中惟寐則稍忘一寤則愾然發歎矣侵周京念其盛時也稂泉水寒洌不能生物比國政刻也田無五穀惟與蕭比閭閻凋弊無力供誅求也洌彼下泉浸彼苞蕭愾我寤歎念彼京周蕭蒿也洌彼下泉浸彼苞蓍愾我寤歎念彼京師蓍蒿屬京陸氏云蓍草之壽者也然上二章皆言京周此稱師言周嫌同于列國隱有共主之尊芃芃黍苗隂雨膏之四國有王郇伯勞之芃盛也徐鍇云言泛泛若風之起隨陸氏云方黍之苗也暑雨暴息無隂雲以覆之日蒸焉則苗槁矣故以隂雨為譱國語趙衰對秦穆公曰重耳之卬君也若黍苗之卬隂雨也若君實庇廕之使能成嘉報正此謂也傳郇伯郇侯為州伯文王子按左畢原酆郇文之昭也愚按泉在下者所及有限况洌則不能生物徒使黍苗化為稂蕭而已以喻伯國主盟小國之重困也明王在上四國共稟一尊又有方伯以時巡省諸侯賴之若黍苗之卬隂雨無所資于下泉矣隂雨之膏非下泉之洌比也黍苗之芃非稂蕭之浸比也此所以念周京之盛耳下泉四章章四句左傳昭二十三年王子朝入于王城于是子朝稱西王天子居于狄泉稱東王狄泉者成周也何氏謂即下泉是也二十五年晉人為黃父之㑹以謀王室令諸侯之大夫輸王粟具戍人曹人與焉二十七年復㑹于扈令戍周也曹人亦與焉時子朝奔楚子朝之黨多在王城王畏之劉文公與萇𢎞欲城成周天子使告于晉晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且城成周曹人又與焉此詩殆曹大夫受役于周喜而賦也下泉即指狄泉自周公營洛以來空而不居東遷以後荒廢久矣天王居之蓋儼然京師也而凋弊已甚所見者蕭稂苞草而已合諸侯以城成周王得寧處今而後四國始有王也雖諸侯之勞實盟主有以勞來之耳故以邭伯誦晉歸功于晉焉曹國四篇十五章六十八句豳譜略豳者后稷之曽孫曰公劉者自邰而出所徙戎狄之地名今屬扶風枸邑公劉之先不窋以夏太康時失其官守竄于此地至公劉復修后稷之業勤恤愛民民咸歸之而國成焉其封域在禹貢雍州岐山之地原隰之野至商之末世太王又避戎狄之難入處于岐陽民又歸之公劉之出太王之入雖有其異由有事難之故皆能守后稷之教不失其德成王之時周公避流言之難出居東都二年思公劉太王居豳之職憂念民事至苦之功以比序已志太師大述其志主意于豳公之事故别其詩以為豳國變風焉之郝氏云七月豳俗也始二南而終邠者邠周道始二南周道之成也左傳吳季札觀魯樂邠次齊先秦及夫子刪詩以邠終思周公也然周公之詩何不遂以屬魯周公未嘗一日居魯也邠何不遂為雅乎公劉草創區區耳未足比諸侯而况可為天子乎稱風本舊也鴟梟以下非豳亦屬豳何也皆周公之事也周公老于周而魯無風可係進不敢係于周南故退而係之邠也愚按周自后稷封邰邰今武功縣也逮不窋失官始去邰而竄于戎狄之間今慶陽府有不窋城是其地也再傳至公劉復遷于邠邠在今邠州與武功縣皆屬西安府相去百餘里是公劉遷邠乃自不窋城復遷入內地也自公劉至古公十世居邠邠今猶有古公城古公避狄人之難乃由邠而遷于岐周自此始大不係周公之詩于豳者周公之志也周公是時身在朝端其詩不得列諸二雅亦未嘗退居魯國又不得列諸國風思王業之始于豳因自署為豳人而列其詩為豳風亦猶令士大夫之書題姓氏標其先世之郡國也豳一之十五七月序曰陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也朱注周公以成王未知稼穡之艱難故陳后稷公劉風化之所由使矇瞽朝夕諷誦以教之以金履祥云讀七月之詩意為邠之遺詩周公陳之為矇工之頌使成王知故國衣食之原然不居二南之前而居變風之末何也蓋詩皆采之當世而前世之詩存者不可泯也故豳七月附于十五國風之後猶商那附于三頌之末也徐光啓云讀七月想其先公之所以為教不過世間一勤儉忠厚之家而已然一家如此其家必興一國如此其國必昌昔人有言太和在成周宇宙又曰王道本乎人情信其然與七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜朱注賦也毛傳缺時所用者夏正也七月斗建申之月公劉正當夏毛云火大火也按火心星也左傳張躍曰火星中而寒暑退月孔云季冬十二月平旦正中在南方大寒季夏六黃昏火星中大暑退是火為寒暑之候事也知此兩月昏旦火星中者由昏而知旦也左傳哀十二年冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯遏也周十二月夏十月也火猶西流者以此火未盡沒尚是九月厯官失一閏故也是可見火六月昏中之後下而過西皆稱流也劉瑾云堯典日永星火以正仲夏蓋堯時仲夏日在鶉火故昏而大火中及周公攝政凡一千二百四十餘年嵗差當退十六七度故六月而後日在鶉火大火昏七月則日在鶉首而昏時大火西流于未方此詩上述邰俗乃當夏商之時而言七月流火者據周公時所見而言耳之授衣家長授衣于家衆也下文云無衣無褐褐乃賤者服豳地多寒故豫為禦寒之計月自夏十一月至二月皆以日稱自夏四月至十一月皆以稱本天而言則主日以冬至為日長一線之始也本厯而言則主月以孟春為夏正建寅之始也孔云四月之詩曰冬日烈烈飄風發發以發是風故知烈是氣觱發風寒也栗烈氣寒也仲冬之月待風乃寒季冬之月無風亦寒也程子曰嵗過中而將暮矣當有卒嵗之具禦寒之備故以七月流火為首為張子云慮事有預當于半年前提掇故頻舉七月言范氏云言何以卒嵗足見二之日為嵗之終此所謂夏正也以上言衣之為急于往也黃佐云于耜謂昔改嵗時入此室處今則往中田之廬而修田器錢鎛之屬獨以耜言者農器以耜為先將以起土而耕必資于耜也邠孔云月令季冬命農計耦耕事修耒耜具田器今人正月修耒耜二月始耕豳土晚寒鄭謂寒晚溫亦晚故修耒耜始耕皆較中國遲一月也舉趾猶言興作也月令仲春之月耕者少舍言無或舍急急農之至也舉趾即所謂少舍也晉田畯典田之官漢嗇夫是也按嗇夫不獨漢及東有之夏書𦙍征篇嗇夫馳則夏時有此官矣但周禮無田畯之職故疑此詩及甫田大田皆非周有天下以後之詩之朱義曰三隂之月隂氣始盛故于是而豫為禦寒備三陽之月陽氣始盛故于是而豫為治田之備候大寒之候在于丑月而圖之于建申之時收成之在于酉月而慮之于建寅之日其為豫備可知所此首章以衣食發端先衣而後食自二章至五章以終前六句之意自六章至八章所以終後五句之意七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸再言流火授衣者鄭云將言女功之始故又本于此按九月授衣自今秋言也春日載陽以下又是明春事矣思秋衣之何以得授本女功之勤于春日也第三章倣此月令仲春之月倉庚鳴夏小正云二月采蘩此章兩春日皆謂二月爾雅四時春為青陽載始也筐本作匡受物之器懿美也猶言精好也微行小徑毛云牆下徑也遲遲日行舒緩也在春日載陽之後自是晝刻較長非但晝夜平分時矣徐光啓云蠶未出者鬻蘩沃之則易出故毛傳云所以生蠶祁祁衆也亦有舒緩之意毛云傷悲感事苦也又云春女悲秋士悲感其物化也謂有韶光易去之悲春秋傳諸侯之子凡男女皆得稱公子左傳凡公女嫁于敵國姊妹則上卿送之公子則下卿送之于大國雖公子亦上卿送之愚按載陽之月正四之日農夫方舉趾而婦子行饁之時其執懿筐以求柔桑者室中之女也蓋其時無一閒者矣下四句以春日重起遲遲言日之長而求桑之久也采蘩為宫中浴蠶之用祁祁言其隨從之衆多而行步之舒緩此公女出親蠶事也懿筐之女忽覩祁祁之衆為之心傷傷草野微賤而今得見貴主之威儀形影相顧不覺悲也目送心隨不忍舍去殆欲與祁祁者相從還宫是女子眷戀之恆情也此數句是采桑圖中添設一段情景補出公子親蠶事耳或問後章再稱公子亦公女乎要自女子稱者即公女也自男子稱者公子也衣此章與下章專言蠶績以終首章無之意七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黃我朱孔陽為公子裳月令季春之月具曲植籧筐注云曲薄也植槌也所以架曲與籧筐者朱注蠶月治蠶之月王氏云蠶長非一月故不指定某月采毛云豫蓄萑葦可以為曲條桑鄭云條桑枝落其葉也逺揚逺枝揚起者桑性以斬伐而始茂今浙桑嵗生嵗伐率皆稠行低幹無高及二丈者猗通作倚嚴氏云猶依也不斬其條但就樹以采其葉也毛云角而束之曰猗鄭云束而采之也女桑爾雅云桋桑也上章柔桑桑葉之嫩者始生未多故以懿筐求之養新出之蠺耳同采蘩言之言蠶事之始也此章女桑乃桑樹之小者蠺已大食故桑之大小取之無遺蓋蠶事之成也劉瑾云蠶月雖不可指定某月然觀其條桑猗彼女桑當在辰月蠶盛之時也或疑此詩獨缺三月蓋已具于此矣朱注斧隋銎斨方銎釋文曰銎斧孔也隋孔狹而長斨即斧唯孔方耳陽鵙爾雅云伯勞也陸氏云倉庚知分鳴鵙知至故氣分而倉庚鳴可蠶之候也隂氣至而鵙鳴可績之候也月孔云衣之所用非緣即麻春既養蠶秋當緝績八絲事畢而麻事起也絲織成帛麻織為布布暑服帛寒服也按篇中所言授衣皆寒服也于此句暗將暑服補入織𤣥黃朱皆色之正者于是始染以獻總上絲麻所成者而言孔陽者言朱色之甚鮮明也周官秋染夏夏五色也秋時天朗氣清五色皆可以染故係之八月之下𤣥黃以獻之君朱色以為公子之裳士冠禮爵辨服纁裳朱深纁色也公子未襲位者稱士故以朱為裳愚按首章自七月而豫念卒嵗之寒早計授衣之事二章言七月之早計不自七月始已始于春月矣三章又言春月之早計自隔嵗八月已豫備矣蓋預而又豫也四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐貍為公子裘二之日其同載纘武功言私其豵獻豜于公王氏云陽生則言日隂生則言月四月正陽而言月者何也四月隂生氣之先至者也葽郭璞云逺志也味極苦月令孟夏苦菜秀野人呼為苦葽則苦菜即苦葽也鄭云夏小正四月王萯秀葽其是乎秀葽也鳴蜩也穫禾也隕擇也四者皆物成而將寒之候物成自秀葽始張子云秀葽者物成之初鳴蜩者嵗秋之漸也秀王氏云四月隂生氣之先至者也葽感隂氣而先蜩感隂氣而先鳴以上四句言隂氣由萌而盛而極見于物者如此以起裘褐不可緩之意于貉往祭貉也周人將獵必先祭貉故謂獵為貉蓋貛之將出貉為先導表貉之所在知獸之所在故祭而取之言往祭表貉思取狐貍之皮為公子裘也之蠶績狩獵不專為君但于勤生之中有先公後私義鄭云其同言君臣及民因習兵俱出田也之周禮仲冬大閲則表貉之祭當在一之日而言二日載纘武功舊謂邠地晚寒故習兵晚耳何氏謂此詩自說邠俗在周禮未作之先不宜律以周禮或是一之日聽民相與祭貉以獵君未同往至二之日君方帥有司致民于田以講武耳故曰其同言纘者嵗以為常繼續其往事也非謂繼前日之于貉也以朱注此章專言狩獵終首章無褐之意愚按五月一隂生于四月隂已萌矣至五月而一隂始成猶之冬至一陽生于十月陽已萌矣故十月謂之陽月則四月應謂隂月而謂之正月者以四月純陽故為正陽之月然陽極而隂生聖人不謂陽也貴者衣裘賤者衣褐邠民因已之資褐而重念貴者之資裘也二之日一段則又因于貉而併及之耳五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐戶嗟我婦子曰為改嵗入此室處陸氏云斯螽蝗類長而青長角長股股鳴者也江東人謂之蚱蜢爾雅云螽醜奮蓋于是時股成而奮迅之方春尚弱也合莎雞狀如蚱蜢頭小而身大色青而有鬚其羽晝不鳴夜則氣從背出吹其羽振振然其聲有上有下正似緯車今人呼為絡緯者是也莎雞斯螽皆陽蟲也陽氣出則此蟲鳴陽氣入則此蟲盡著其將寒之有漸勸人早備于寒也莎莎雞與絡緯是一物蟋蟀與促織是一物詩别言雞蟋蟀知是兩種蓋二蟲皆似機杼之聲可以趣婦功耳陸璣云莎雞六月中飛而振羽索索作聲今按其鳴乃止而振羽不待飛也陸氏云其鳴以時故有雞之號七月在野以至在户蒙上文皆謂莎雞也寒則漸近于人三蟋蟀一名促織健鬭其鳴亦在股間錢繼章曰蟲皆相類而蟋蟀為殿自蟋蟀吟罷而蟲絶響矣塞穹通作空呂覽伊尹生于穹桑穹或作空是也窒也熏鼠使不得穴其中也塞向避北風也以孔云為寒之備不塞南窗鼠墐塗也庶人蓽户所須塗陸燧云隙能生寒又能生隙故窒熏之使隙不得自內出塞墐之使寒不得自外入何氏曰改嵗乃預計之詞室者邑中之室當去田廬而入處于此室也行孔云蟲既近人大寒將至故塗塞其室又告妻子將改嵗當入此居處也班固云春令民畢出在野冬則畢入于邑所以順隂陽備寇賊習禮文也呂氏云十月而曰改嵗三正之通于民俗尚矣周特舉而迭用之正朱子曰周歷夏商其未有天下之時固用夏商之朔然其地僻逺無純臣之義又自有私記其時月者故三正皆用也劉瑾曰夏書有怠棄三正之語則自夏以前已有子丑之正是三正通于民俗其來既逺故邠公創國邊方亦有十月改嵗之俗及周有天下因以為一代之正朔正如公劉徹田為糧而後遂為成周之徹法也楊龜山曰堯命羲和以昏中之星正四時鳥獸氄毛希革之類為之應七月所陳以倉庚鳴鵙為蠶績之候以秀葽隕蘀其穫為取皮之候以斯螽蟋蟀為處室之候皆此意也六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉壽七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫鬱薁皆李屬鬱一名車下李毛云薁櫻薁也戴侗云蔓生類蒲萄六月熟又本草注云即葡萄生隴西五原山谷日本草云葵為百菜之主種類不一皆可食道家十一食葵菜所以調和五臟菽大豆也廣雅云大豆菽也小豆答也孔云大豆葉謂之藿月剝毛云擊也蓋收棗以撼而落之者為上蔡雍令章句云十月穫稻人君嘗其先熟故在季秋九月熟者謂之半夏稻稻有秫有粳粳可以作飯秫可以釀酒毛月令云乃命大酋秫稻必齊大酋酒官之長也云春酒凍醪也冬釀春熟介訓助王氏云眉壽衰矣養氣體以助之也邵氏云古人以酒為養老之具餘人不得飲焉曰介眉壽蓋釀酒之意如此自首章至此皆羞耉之具不特釀稻為酒足以養老而已七月食瓜以下則農夫之所以自養也按夏小正五月乃瓜乃瓜者治瓜之辭也八月剝瓜謂蓄瓜時也此七月瓜正成食之而已壺瓠屬圓者曰壺劉彛云壺枯者可為壺嫩者可供茹八月宜斷其梢令勿復花所以堅其壺而大其茹朱注食瓜斷壺亦去圃為場之漸也叔叔說文云拾也按叔叔菽三字有辨季父之稱作從草者豆名也拾取之義作叔從又又者手也明苴麻之有實者亦名蕡其無實者曰牡麻亦名枲堂月令秋則食麻與夫而至仲秋則又以犬嘗麻先薦寢廟九月叔苴蓋食農夫者不嫌于晚也荼苦菜凌冬不凋一名游冬樗惡木也惟堪為薪養取豵以為私取豜以獻公上下之分著矣以美者老以惡者自養長幼之序明矣意朱義曰此章重介睂壽食農夫六字介有助之之非以為常食也食有養之之意因以是為常食也果酒嘉蔬非不可以及少而供老疾奉賓祭之義多瓜瓠苴荼老者未必不食也而不可以為常于以見食稻食肉乃老者之常而果酒嘉蔬則于常食之外助之以此也九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百穀此章述農事終而復始其勤勞未嘗息也之毛云春夏為圃秋冬為場場圃同地故須築而堅納通作內王雪山謂納禾稼與下章納凌隂皆納之公家云豳民遇事先公後私也藳實並刈曰禾禾之秀實而在野曰稼先重本作穜穋亦作稑鄭衆云先種後熟曰重後種熟曰穋黍稷皆有穜稑兩種孔云再言禾者以禾是大名非徒黍稷穜稑四種而已其餘稻秫苽粱之類皆名為禾麻與菽麥則無禾稱故于麻菽麥之上更言禾以總諸禾也知魏學渠曰黍稷麻菽麥稟五行之氣謂之五穀故重穋在黍稷中也種嚴氏云廣舉禾稼之類以見其多謂至十月則諸皆成熟矣不專是十月納之也月令五月登黍四月登麥非十月也都即同言已聚也下毛云入為上出為下自田野入邑為之上又以供上之事亦曰上謂宫猶言公室也宫功謂公室之事第乘升也鄭治野廬之屋是也按邑居之宅于五章詳言熏窒墐塞亦既入處矣此復亟治田野之廬以待明春之出蓋明春播穀伊始不暇及此耳播布種也輔廣云豳民于田畝則曰雨我公田遂及我私于居室則曰上入執宫功然後索綯以乘屋其忠君親上不待使之而然也矣王氏曰宵可以息矣而索綯冬可以息而乘屋愚按熏窒墐塞是在野而早計邑中之室于茅索綯又在邑而急治田中之廬邠人無事不豫無時不豫也二之日鑿氷沖沖三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆月令季冬之月氷方盛水澤腹堅命取氷氷以入氷凌隂氷室也風俗通云積氷曰凌當是積氷之處之多如山陵然隂暗處也謂周禮凌人掌氷正嵗十有二月令斬氷三其凌注三倍其凌備消釋也取氷藏氷在十二月此言納于凌隂乃在正月惟時東風解凍氷漸消釋故取氷室所藏更貯于內之陰處令不復釋斬氷三倍正為此也氷其蚤何氏謂二月朔也月令仲春天子乃鮮羔開先薦寢廟注云鮮當為獻出陸氏云開氷春祭也故獻羔祭韭藏孔云時韭新故用之鄭云古者日在北陸而氷西陸朝覿而出之祭司寒而藏之獻羔而啓之其出之也朝之祿位賓食喪祭于是乎用之上章備寒故此章備暑先公禮教備也天蘇氏云古者藏氷發氷以節陽氣之成陽氣之在地猶火之著于物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納氷于地中故曰日在北陸而藏氷至于二月四陽作蟄蟲起陽始用事則始起氷而廟薦之故曰仲春獻羔開氷先薦寢廟至于四月陽氣畢達隂氣將絶則氷于是大發食祿之家老疾喪浴氷無不及故曰火出而畢賦按聖人裁成天地之道實在于此而賔食喪祭因以致其用焉耳場肅霜朱注氣肅而霜降也滌場農事畢而滌掃其也月令孟冬是月也大飲蒸蒸升也升牲體于俎豆所謂房蒸也孔云古者設尊之法每兩尊並設故云朋耳輔氏云以介睂壽祝其親也萬壽無疆祝其君也君朱子云躋彼公堂是民得升君之堂矣周初國小民相親其禮樂法制未備民事艱難君盡得以知之成王時禮樂備法制立但知為君之尊未知國初之事故周公作詩使之因是以知民事也愚按豳國草創上下之等威未備國人以朋酒羔羊躋堂上壽忘其尊卑貴賤之殊真邠俗也何氏以為是臣子祝君與月令大飲禮合何氏知詩在周禮未制之先不宜律以周禮今復拘于月令之文何哉七月八章章十一句程子曰此詩多陳節物大要言嵗序之遷人事當及時耳節嚴氏云七月之詩一言以蔽之日豫而已凡感物之變而修人事之備皆豫為之謀也周禮春官籥章云祈年吹豳雅蠟祭吹豳頌郝氏謂此詩歌于朝廷可為雅歌于祭祀可為頌孔云詩始為風中為雅成為頌朱子云先儒因此說而謂風中自有雅自有頌雖程子亦謂然似都壞了詩之六義愚按籥章有吹豳詩豳雅豳頌之文鄭氏三分七月之詩以一章二章為風三章四章五章六章之半為雅六章之半至七章八章為頌朱子闢之王安石謂豳本有雅頌而亡之或者又疑但以七月全篇隨事而變其音節或以為風或以為雅或以為頌饒魯曰雅有雅音頌有頌音風有風音故邠風亦曰邠雅亦曰邠頌蓋一詩而備三體也朱子則謂雅頌之中凡為農事而作者皆可以冠豳號如大田良耜諸篇是也鴟梟序曰周公救亂也成王未知周公之志公乃為詩以遺之名之曰鴟梟黃佐云鴟梟之詩乃周公居東之時豫見二叔武庚將有潰亂之勢而作一以釋罪而明吾之心二則勸王為先事之備尚書金縢篇曰武王既喪管叔及其羣弟流言于國曰公將不利于孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得于後公乃為詩以貽王名之曰鴟梟王亦未敢誚公鄭云讀辟為避以居東為避居東都黃氏辨之謂管蔡流言之時尚未有東都也考書成王感風雷之變出郊以迎意當時亦如今之大臣釋位待罪出國之東郊以居耳詩申培說周公避居于魯考周公未嘗至魯且云此作于殷人叛後則所云未雨綢繆者謂何斯始流言之起成王未知罪人為誰居東三年罪人得知其為管蔡也公乃作是以貽王王亦未敢誚公至風雷之變親迎公歸二叔懼遂脅武庚以叛王命公征之東征往返首尾又三年也愚按周召分陜而治陜以東周公主之則必有周之采邑或出郊退居于采邑也鴟梟鴟梟既取我子無毁我室恩斯勤斯鬻子之閔斯毛傳興也朱注比也鴟顔師古云鴟鵂鶹怪鳥也梟惡聲鳥也郭璞以為類以其為惡聲之鳥故公取以比夫流言者于鬻通作粥粥養也為劉瑾云此詩歸罪于武庚而二叔有憫惜之意親者諱也如書之大誥亦然意輔氏曰言已之深愛王室先事為備以防禍亂之疑當時流言必以公平日勤勞皆是自為已謀故今攝政而不利于孺子周公以此曉成王也愚按子指管叔蔡叔二叔雖兄自國家言之皆子也取我子謂武庚取之為己用也室即鳥巢也以比王室通章大㫖只在無毁我室一語逮天之未隂雨徹彼桑土綢繆牖户今女下民或敢侮豫毛云桑土桑根也巢朱注牖巢之通氣處戶其出入處也鄭云下民下之民或敢者正恐猶有侮者在所以宜綢繆也前以毁室屬鴟梟此以侮豫屬下民蓋室一毁則探鷇取卵之事即有起而乘之者猶武庚蠢動而頑民亦遂洶洶不靖也愚按惟牖户綢繆堅固乃足以徐伺禍患之來而預為之地豫手拮据豫所捋荼豫所蓄租豫口卒瘏曰豫未有室家豫字代鳥自謂而周公以自况也也朱注拮据手口共作之貌毛云捋取也荼萑苕一云茅秀也蓄積也租通作蒩說文云茅藉也禮封諸侯以土蒩以白茅亦作租上文綢繆牖户必取桑根之皮此但納茅秀于窠中以為之藉作窠之始事也蓄捋荼手之為也手之用不足因以口繼之租而曰蓋有資于口者故承之曰豫口卒瘏卒通作盡也室家巢也愚按周公以王室為室家也王室初創人心未定故視此室家皆有不敢即安之意武庚之變公蓋早慮之矣豫羽譙譙豫尾翛翛豫室翹翹風雨所漂搖豫維音嘵嘵毛云譙譙殺也翛翛敝也翹翹危也以其托巢于高枝而結構未牢故危之也漂屬雨搖屬風乃未然事與隂雨綢繆相應今雖未至於此其勢必至于此也鄭云維音嘵嘵恐懼告訴之意正指逮天之未隂雨五句而言而恩斯勤斯鬻子之憫斯其大指畢露乎此愚按維音嘵嘵即自述其作詩喻王之㫖蓋多難將作情有不容不汲汲者不自知其音之嘵嘵也鴟梟四章章五句愚按武庚之叛周公計之早矣流言之起公心知為武庚反間而出自二叔則情有不忍言者居東二年而罪人斯得成王祇知為管叔之誣公猶未知為武庚之圖周也公貽以鴟梟之詩極道武庚之情所憂在國家而不在區區一已之謗成王得詩亦未敢誚公然猶未信以為真也逮風雷感悟公歸攝政武庚叛逆已成王始命公東征東山之詩所以即繼于其後也東山序曰周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言室家之望女也四章樂男女之得及時也君子之于人序其情而閔其勞所以說也說以使民民忘其死其惟東山乎朱注周公東征三年既歸因作此詩以勞歸士我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋蒸在桑野敦彼獨宿亦在車下朱注賦也毛傳缺杜凡言我者皆設為軍士自道之詞徂往也唐收以河北為山東秦漢謂山東山西者皆主太行山而言東山即河北商故都也以慆慆久也零說文云餘雨也濛雨微也行役最雨為苦餘雨濛濛若繼若續極狀羇旅愁慘之景此四句即景紀事故每章以為起語我東曰歸以下又追言其將歸時之情向未言歸乃心敵愾幾忘其家矣才說將歸則室家入念翻以喜極生悲故身猶在東而心已西望而悲此羇旅之情也枚朱注裳衣平居之服毛云士事也行枚行而用所以止語辦軍事既畢曰歸有期釋介胄不用而新製裳衣以為歸時居家之服且奏凱言旋亦無事于銜枚而行矣見蠋蟲名韓非子曰鱣似蛇蠶似蠋人見蛇則驚駭蠋則毛起然婦人拾蠶漁者握鱣利之所在皆為賁育云庚桑子曰奔蜂不能化藿蠋蠋食葵藿而肥羅氏蠋雖蠶類而不食桑曰蒸在桑野葵藿之下亦桑野之地也而爾雅云蒸衆也敦不動之貌獨宿指軍士離室家言王氏云古用戰車止則為營衛與塹栅無以異故夜則宿于車下蜎言此離家之軍士敦然不動而獨宿于車下與蜎之蠋獨行而散處于桑野無以異也人殷大白云看亦字正匪兕匪虎之意以語出于上則為能體其情耳按序謂此章言其完也蓋全師而歸也我徂東山慆慆不歸我來自東零雨其濛果裸之實亦施于宇伊威在室蠨蛸在户町畽鹿場熠耀宵行亦可畏也伊可懷也爾雅云果裸栝樓也郭璞云齊人呼之為天瓜者伊威蟲名陸璣云在壁根下甕底土中生似白魚是也雅本草名濕生蟲也常惹著鼠背故一名鼠負為爾云蠨蛸長踦也郭璞云小鼅蛛長腳者俗呼喜子荆州河內人謂之喜母者揚慎云左傳町原防井衍沃注云平川廣澤可井井之原阜隄防不可井者則町之町小頃也土之中疏云童土疃也畽本作疃莊子舜舉于童言征夫久不歸家町畽之地踐為鹿場非謂町疃即鹿場也熠熠耀螢火也本草云一名夜光一名熠耀朱注耀明不定貌宵行蟲名令卑濕處有蟲如蠶蠋夜行喉下有光如螢者是也揚慎以熠耀自是螢火朱子因下章熠耀其羽故云然古人用字有虛有實小雅交交桑扈有鶯其領言桑扈之領如鶯之文非謂鶯即桑扈也此言倉庚于飛熠耀其羽謂倉庚之羽如熠耀之明非謂熠耀即倉庚也上章述初即路之景此則漸近于家而念家中之景象也也陳式曰下章是征夫之有家者此則無家者故後章分二種愚按畏者是别家已久作許多淒涼之想便生出許多恐懼之情唐人詩近家心轉急不敢問來人畏也乃轉念之而釋然以喜即淒涼處正自可懷曲盡久客回家將到家門之情景矣我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室灑掃穹窒我征聿至有敦瓜苦蒸在栗薪自我不見于今三年毛云垤蟻冢也將隂雨則穴處者先知之鸛好水長鳴而喜也鄭云鸛將隂雨則鳴行者于隂雨尤苦婦念之則歎于室也如易占云蟻封其穴大雨將至今朔地蟻封高大有冢者所謂蟻冢也禽經云鸛俯鳴則隂仰鳴則晴此承零雨其濛之後必非將雨當是仰鳴則晴晴則征夫將至故灑掃穹窒以待之以其宜至而猶未至望之之切故歎也灑掃穹窒與上章伊威蠨蛸等語相應嚴氏云此皆想其婦在家之歎望蓋行人念家之情如白居易詩云想得家中夜深坐還應說著逺行人也瓜苦瓜之苦者栗薪以栗為薪取以制棚架之類行者至家因見苦瓜纍纍係于栗薪之上而曰我不見此亦已三年矣到門之初是物皆可喜也是錢柄曰古者兵出于農故其所思皆農家風物愚按不言與婦久别初見之喜而但叙門外所見之物且驚且喜則夫婦相見之喜不必言矣我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠耀其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何鄭云倉庚仲春而鳴嫁娶之候也熠耀羽鮮明也也皇爾雅作騜云黃白曰騜駵白曰駁言其車服盛也親即之子之母也爾雅云婦人之褘謂之縭縭緌注云繫也郭璞以為即今之香纓邪交絡帶繫于體因名為褘垂陳祥道云纓帶曰襟昏禮所謂施襟是也帶結而曰縭考爾雅襟謂之袸郭璞云袸衣帶也是則襟者纓之帶縭者襟之緌先施襟而後結縭總是一事皆女母為之九者數之盛十者數之終舉九與十喻其多也謂嘉美也婚禮名嘉以隂陽際㑹之嘉愚按序以此章樂男女之及時玩前三章皆為有家室者曲叙其情此則為無家室者預道其喜所以慰勉從征之士無不至也古者男子三十而娶從征之士大半未有室家于凱歸之時自應及時婚娶耳末二句因其樂而戲之并及舊有家室者之樂也言新婚者洵足樂矣彼夫婦久别而乍㑹者其樂視新婚者且如何耶統為之志喜也東山四章章十二句朱注謂成王既得鴟梟之詩又感風雷之變始悟而迎周公于是周公東征已三年矣既歸因作此詩愚按尚書周公承王命作大誥東征一篇之中首言王若曰繼而屢言王曰又言沖人又曰寧考皆自成王而言則是公之東征王實命之當在王既感悟而迎公以歸之後也朱子以東征三年而王始迎歸蓋誤以居東即為東征若武庚管蔡之誅皆出自周公者然晚年亦自知其誤矣破斧序曰美周公也周大夫以惡四國焉朱注謂從軍之士以前篇周公勞已之勤故言此以答其意詩輔廣云東山之詩周公能得歸士之心也破斧之歸士能得周公之心也所謂上下交而其志同者也既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將朱注賦也毛傳缺築司馬法輜輦載一斧一斤一鑿一梩一鋤二版二皆軍中樵蘇築壘用之斧斨亦伐木所用非指兵器至嚴氏云周公奉命討罪有征無戰四國聞王師之窮蹙自守周公遲之三年不為急攻之計未嘗從事攻戰惟行師有除道樵蘇之事斧斨之用為多歷時之久故俱敝也書傳云奄君薄姑謂祿父曰武王死成王幼周公見疑矣此百世之時也與祿父及三監叛毛云四國管蔡商奄也多士篇曰昔朕來自奄豫大降爾四國民命既于奄之外復言四國則奄不在四國數內矣朱義曰匡四國即所以哀我人匡四國者以其功言也哀我人者以其心言也皇通作遑說文云急也言周公東征豈得已哉祗為四國不靖天下將危故皇皇如斯耳將大也言其為德于民者大也方畿云將有提攜之義謂提攜斯人出于阽危也既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉錡說文云鉏䥏也司馬法輜載一鉏疑即此又說文云江淮之間謂釡曰錡召南維錡及釡是也是則錡乃軍中所以炊者亦非兵器寐說文云吪動也徐鍇云卧既覺有聲氣也故曰尚無吪言周公東征為四國倡亂故寤寐不安耳既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休韓詩云銶鑿屬一曰鑿首以木為之加于鑿之首即鑿柄也用之既久其毛茸茸如毛之散裹者故名為銶晝毛云木屬曰銶以說文云遒迫也吪深于皇皇猶時情事吪則夜繼日矣遒又深于吪吪僅思慮不安遒則迫而必應矣休安也破斧三章章六句愚按武庚之亂挾三監併奄與淮徐之地幾半天下自秦漢之世言之所謂山東大抵皆反也周公征之三年始平蓋新造之周于是而再造也當其時周公以王室為心軍士皆能以周公之心為心故破斧缺斨從軍之士言之皆以見周公之勞而不言已之勞也伐柯序曰美周公也周大夫刺朝廷之不知也按鴟梟既作公尚留滯東土成王感風雷之變執金滕之書泣曰惟朕小子其新逆我國家禮亦宜之王出郊厚新逆馬融本作親迎也孔云國家尊崇有德宜用禮詩稱衮衣籩豆是王出郊者意成王俟于郊而以使者先之此詩當王議迎公之時為王商遣所使之人及所以待公之禮耳伐柯如何匪斧不克取妻如何匪媒不得朱注比也毛傳缺求柯斧柄也喻鄭云伐柯之道唯斧乃能之此以類其類也以成王欲迎周公當使賢者先往媒者能通二姓之言定人室家之道以喻王欲迎周公先使曉王與周公之意者以先往伐柯伐柯其則不逺我遘之子籩豆有踐鄭云伐柯者必用柯其大小長短近取法于柯所謂不逺求也王欲迎周公使還但所遣賢者之心以為安則公亦安矣曰我者詩人代王籌度之詞詩話曰泛見曰見接見覯踐行列貌國語所謂折俎加豆是也言孔云飲食之事聖人以之為禮今勸迎周公而陳列籩豆是令王以此籩豆與公饗燕也伐柯二章章四句愚按成王感風雷之變悔而迎公此周家治亂之轉關詩之所係甚重也九罭序曰美周公也周大夫刺朝廷之不知也郝氏云前篇諷成王以饗禮迎公此篇諷王以冕服迎公一章謀所以迎公之禮二章三章揣公必歸而托為辭東人之語四章迎公西歸而托為東人留公之語是時公居東已二年矣信處信宿諷王之速迎公也王雖不諒公公終未忍忘王往迎則必返耳嗟乎東人悲公歸而朝廷不恤公去序所以刺其不知也九罭之魚鱒魴我覯之子衮衣繡裳毛傳興也朱注同郭爾雅云緵罟謂之九罭謂魚之所入有九囊也璞云緵今之百囊網也鱒似鯤魚赤眼多細文羅氏云鱒多獨行亦有兩三頭同行者見網輒遁魴則說苑所謂若存若亡若食若不食者也以比公有難進易退之操隆程子云鱒魴魚之美者施九罭之網則得美魚用厚之禮則得聖賢我欲覯之子當用上公禮服往逆之鴻飛遵渚公歸無所于女信處鴻大鴈也雁多羣而鴻寡侣遵渚自北而南之時以況公之去國而居東也左傳云再宿曰信鄭云時東都之人欲周公留不去故曉之曰公西歸而無所居則可就女處是東都也今公當復其位不得留也腰朱子曰此章飛歸字是句亦用韻詩中亦有此體鴻飛遵陸公歸不復于女信宿高平曰陸遵陸漸有自南歸北之意以况公將還京師留相王室而不復來東也言公之留于女地不過信宿間耳行且歸矣是以有衮衣兮無以我公歸兮無使我心悲兮衮龍衣也天子升龍公降龍龍形卷然故謂之衮是朱子曰是以有衮衣兮是以二字緣公暫至于此以此間有被衮衣之人為東山願留之意愚按是以二字緊接上章公歸不復一句為東人怨望之詞初見衮衣繡裳以為王錫之命所以慰問公也今乃知為迎公而歸是以有衮衣也末二語知其不可留而請諸使者無以公歸亦無可奈何之情人心之愛慕者至矣九罭四章一章四句三章章三句朱注以為周公居東東人喜之而作愚按篇中有于女信處于女信宿之語則非出于東人之口可知當是迎公之時望公至者初為使者諭東人之詞既為東人請諸使人留公之辭皆所以重公而悟王也狼跋序曰美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也朱注謂周公雖遭疑謗然所以處之不失其常故詩人美之狼跋其胡載㚄其尾公孫碩膚赤舄几几毛傳興也朱注同胡毛云跋躐㚄跲也胡說文云牛項垂也今狼亦稱者頷下垂皮亦如牛然孔云跋與㚄皆是顛倒之類進則躐其胡謂躐胡而前倒也退則跲其尾謂却頓而倒于尾上也公周公也孫鄭云讀當如公孫于齊之孫孫之言遁也周公避位居東所謂孫也毛云碩大膚美也謂公大美在躬孫而愈彰也禮記云四體既正膚革充盈人之肥也所謂碩膚孔云上公九命得服衮冕履赤舄其蘇氏云周公之輔成王亦多故矣二叔流言以病外成王不信以憂其內人之視周公如視狼然前憂其躐胡而後憂其跲尾也然周公居之從容自得而二患皆釋人徒見其履赤舄几几然安且閒而不知其解患釋難之方也或嚴氏云凡人處利害之變則舉止不安其常懼者至于喪履喜者或至于折屐詩人以赤舄几几見周公之聖其善觀聖人矣愚按跋胡比公之進而立朝遭流言之變疐尾比公之退而居東至二年之久如易所稱羝羊觸藩也狼㚄其尾載跋其胡公孫碩膚德音不瑕狼既退而㚄其尾矣于是復進則又跋其胡前章主公居東而言意在㚄尾此章意在跋胡公居東二年可謂㚄尾矣罪人斯得之後又作詩以貽王獨不慮其跋胡乎公身雖孫而碩膚如故凡所矢口莫非有德之言無得而瑕疵之者王亦未敢誚公不瑕之謂也愚按此公至周周人見公而驚喜之辭以公居于東之久也跋胡㚄尾憂懼多端謂必憂讒畏譏意趣蕭索形貌憔悴矣今乃益見碩膚也而且步履從容如故音吐未嘗少損此周人所共慶者耳狼跋二章章四句鄒氏云易明夷之彖傳曰內文明而外柔順以蒙大難文王以之周公當流言之起孫而居東所謂善用晦者固即柔順蒙難之家法處明夷以艱貞者也愚按公一聞不利孺子之言即告二公曰我之弗辟我無以告我先王居東二年則罪人斯得何其見之捷而策之中乎項氏謂既不居中則不利之謗自息故公不汲汲于自明也所以釋羣疑而悟王心者惟在此一孫耳豳國七篇二十七章二百三句劉安世云名之為豳實周公詩耳周公作詩意在于豳而周公于他詩無所可係故因附之豳也范氏云豳居風雅之間何也風之所為終雅之所為始也變風終于曹思明王賢伯之不可得于是次之以豳反之于周公而後至于鹿鳴言周之所以盛由周公也田間詩學卷五
