body:
  text: 田間詩學卷十二桐城錢澄之撰魯頌譜略譜曰魯者少昊摯之墟也國中有大庭氏之庫則大庭氏亦居兹乎其封域在禹貢徐州大野蒙羽之野成王以封周公元子伯禽十九世至僖公當周惠王襄王時遵伯禽之法養四種之馬牧于坰野修泮宫守禮教僖十六年冬會諸侯於淮上謀東略遂伐淮夷三十六年新作南門又修薑嫄之廟至于復魯舊制未遍而薨國人美其功季孫行父請命于周而作其頌初成王以周公有太平制典法之勳命魯郊祭天三望如天子之禮故孔子録其詩之頌同于王者之後問者曰列國作詩未有請于周者行父請之何也曰周尊魯巡守述職不陳其詩至于臣頌君功樂周室之聞知是以行父請焉于序稱季孫行父請命于周而史克作頌因行父文公六年始見春秋史克于文公十八年始見左傳故孔氏以為皆文公時人按史克魯人左傳季文子使史克對宣公是其人也周嚴氏云風有變風雅有變雅魯頌頌之變也公之衰也風變而雅頌亡頌聲之息前乎風雅之變矣越桓莊僖至衰而魯乃有頌是故雅變而亡頌亡而變雅之亡甚于變頌之變甚于亡也愚按孔氏云魯僖公之時周王嵗二月東巡守至于岱宗柴季孫行父為之請于周太史克為之作頌則請命作頌即在僖公時也今考僖公之世于周則惠王襄王俱未嘗東巡惟僖公二十八年襄王冇狩于河陽之事而僖公朝于王所行父之請其在此時乎嗚呼魯而冇頌僭也聖人何以存之夫魯請于王王既賜之矣亦猶成王之賜禮樂也聖人尊王王賜之聖人安能刪之乎魯頌四之四毛傳于魯頌分駉之什第二十九商頌分那之什第三十朱注分魯頌四之四商頌四之五因篇少不成什也今從朱愚按魯雖名頌體實國風非告神之歌故有章句此亦史克故卑其體不敢上擬王頌耳駉序曰頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重穀牧于坰野魯人尊之于是季孫行父請命于周而史克作是頌按頌俱言僖公之事春秋十二公魯僖公賢焉賢僖公者魯亡乎人之詞也左傳文公二年有事于太廟躋僖公夏父弗忌何曰躋聖賢明也魯人之稱僖公為聖賢舊矣行父之請亦因國人之公論也按春秋經傳皆不以多馬美僖公莊二十九年春新延廏言新者明先世設有延廏至此重新之耳莊公者僖公父也意莊公時即修舉伯禽牧政至僖公時馬遂盛也愚按莊公作延廏春秋非之傳曰書不時也凡馬日中而出日中而入愚謂方春而作廏則馬不在坰可知馬不在坰惟芻秣是賴其弊至于害民妨農馬不足用逮僖公始修馬政于是以坰為牧所而馬遂大盛序所稱公有三德備此一舉矣或疑不見于春秋考魯頌四篇其事皆不載經傳胡庭芳謂春秋經也魯頌亦經也今幸有魯頌以補春秋之缺誦其詩尚何過疑之有哉駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧朱注賦也毛傳缺郊毛云駉駉良馬腹幹肥張也坰逺野也邑外曰郊外曰野野外曰林林外曰坰鄭云必牧于坰野者避民居與良田也周禮曰以官田牛田賞田牧田任逺郊之地據説文云坰在野之外今曰在坰之野似于文理不順駑毛云諸侯六間馬四種有良馬有戎馬有田馬有馬孔云每章各言其一首章言良馬朝祀所乘故云彭彭見其有力有容也二章言戎馬齊力尚強故云伾伾見其有力也三章言田馬齊足尚疾故云繹繹見其善走也卒章言駑馬主給雜使貴其肥壯故云祛祛見其強健也凡説文云駉牧馬苑也重言之一苑又一苑也左傳馬日中而出日中而入注云日中者春秋分也春分百草始繁則牧于坰野秋分農功始藏水寒草枯則馬還廏此言離駉在坰當是春分時也彭焱云坰為牧馬苑亦秦漢以來之名因詩稱馬為駉故以坰名其苑耳今曲阜有地名坰或因僖公牧馬于此因以為名職薄言者舉大略之詞謂略舉坰所有之馬也校又云凡馬特居四之一謂一牡可配三牝言牡之盛其牝之盛可知跨驪馬白跨曰驈黃白曰皇純黑曰驪黃騂曰黃髀間也正所跨據之處其間白色黃白皇者謂黃而雜白黃騂者謂黃而赤色騂赤色也彭通作騯無疆謂所思無一處之不到故馬政亦精詳如此斯張文潛曰良馬而曰斯臧所謂稱驥以德也思馬臧者思其馬如此之善則當思其所以致是者愚按上思字指君心言不專為馬思也下思字詩人自言以君心無不周到因思坰馬之盛蓋由斯以盛耳駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才蒼白雜毛曰騅黃白雜毛曰駓赤黃曰騂蒼綦曰騏伾伾有力也才多材也孔云雜毛是體有二種之色相間雜上云黃白曰皇黃騂曰黃止一毛色之中自有淺深與此二色者異故不云雜毛也周人尚赤而牲用騂剛禮稱陽祀用騂牲是騂為純赤色上云黃騂曰黃謂黃而微赤此云赤黃曰騂謂赤而微黃此其異也騏者黑色之名青而微黑今之驄馬也按此四色馬以序推之當是戎馬戎馬貴多力故毛以伾伾為有力也不無期言其思無一息之不周則所為畜戎馬以備虞自有所不能已矣張文潛云斯臧良馬也斯方戎馬也臧者言其德才者言其用陳于禮者尚德用于戰者尚才故也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作青驪驎曰驒白馬黑鬛曰駱赤身黑鬛曰駠黑身白鬛曰雒按青驪驎曰驒色有淺深斑駁似魚鱗也郭璞云今之連錢驄也馬陸氏云今呼黃馬尾鬛一道通黑如界者為駱蓋無分于黃白皆謂之駱若今衣脊絡縫故曰駱也明堂位曰夏后氏駱馬黑鬛此以别白馬朱鬛之駱也月令曰孟秋駕白駱此以别黃馬黑鬛之駱也而駵本作騮説文云赤馬黑毛尾也月令五時駕馬騮處其二夏用赤騮中央用黃駠故孔云此章言田馬田獵尚疾毛以繹繹為善走也愚按繹者為相續不息之義今稱繹者本此斁厭也作奮起也作即震卦為作足之作謂常奮迅而動作馬乃健也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂隂白雜毛曰駰彤白雜毛曰騢豪骭曰驔二目曰魚袪袪強健也按隂淺黑也郭璞云今之泥驄陸氏云皇華篇曰我馬維騏我馬維駱我馬維駰其先後次序與此合則駰不如駱駱不如騏矣是詩卒言駰者以言馬雖彌劣所以御之滋善謂郭璞云彤赤也赤白雜毛即今赭白馬是也徐錯色似霞故名騢也毛傳于豪骭下增一白字謂豪毛在骭而白長羅氏云相馬之説馬目欲黃又欲光有紫焰魚者目小多白則驚畏馬之大病故其序尤在後此所謂駑馬駕給雜使之車者也袪通作驅策逐而行也徂往也御之有道習之有法故能變駑為良而使之利往如此汪蛟云思無邪者猶云無雜思也莊子云百里奚爵祿不入于心故飯牛而牛肥殆即此歟駉四章章八句何氏謂序中首以僖公能遵伯禽之法為言名頌僖公實頌伯禽特以此詩作于史克與閟宫之詩同載遂槩歸之僖公耳愚按伯禽牧事無考惟費誓篇有曰今為淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑云云此臨敵用馬戒圉人保護之詞凡出師者誰不惜馬而可據以為伯禽考牧之證耶僖公中材之主早年聽季友為政季子乃心公室政無不舉又值五伯迭興日有事于征伐會盟其修馬政也宜矣惟又按今詩三百五篇當正考父未得商頌之詩國風及二雅周魯二頌而已除今商頌五篇恰足三百之數是以知詩三百之云不兼商頌言也故王通有曰詩三百始終于周子曰詩三百一言以蔽之曰思無邪其以是與有駜序曰頌僖公君臣之有道也朱注此燕飲而頌禱之詞也何氏謂僖公大飲蒸也禮十月農功畢諸侯與羣臣飲酒于大學以正齒位謂之大飲僖公行此禮其臣美之序漳浦黃氏云孟夏之酎則序爵于朝孟冬之蒸則齒于學所以正功德奠天地之義也正齒位者同位以齒同齒以位必于太學教孝弟之道也有駜有駜駜彼乘黃夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮朱注興也毛傳缺者駜馬肥健貌僖説文云馬飽也黃馬色之最貴乘黃四馬也公所乘按周書諸侯初見康王皆布乘黃或朱注明明辨治也振振羣飛貌鷺鷺羽舞者所持坐或伏如鷺之下也咽通作鼘説文云鼓聲也相也醉而起舞以相樂也朱注鼓聲之深長也胥毛云鷺白鳥也鄭云興潔白之士羣集于君之朝君以禮樂與之飲酒以鼓節之咽咽然至于無算爵則又起舞燕樂以盡其歡有駜有駜駜彼乘牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮乘牡即乘黃也黃以色言牡以體言所鄭云鷺于飛喻羣臣飲酒醉欲退也歸者自公而歸時已入夜不獨賔歸君亦還宫矣不醉無歸欲盡歡也醉而即歸以禮節之也酒以行禮不繼以淫此之謂大樂也有駜有駜駜彼乘駽夙夜在公在公載燕自今以始歲其有君子有穀詒孫子于胥樂兮青驪曰駽郭璞云今之鐵驄也駽按樂府云君馬黃臣馬蒼蒼者淺青也以此黃與相對為言明有君臣之分賔按燕禮與卿燕則大夫為賔與大夫燕亦大夫為賔定而後行燕禮自今以始等語皆賔所致詞也在在公載燕為臣者侈其遭遇之隆也毛孔云上言公載燕即據燕為今與將來為始云歲其有豐年也有鄭云穀善也詒遺也君臣安樂則隂陽和而豐年其善可以遺子孫也愚按君臣道合則隂陽協和風雨時若自今以始歲其有言歲歲豐登也是則所以詒子孫者大矣固知君子有善未有不詒子孫者也欣贊之詞有駜三章章九句何氏以此詩為飲酒于大學者據振振鷺一語以鷺居水澤中辟雍及泮宫皆有之魯固有泮宮也所以知飲酒為孟冬大飲蒸者以自今以始歲其有知之農功畢而後舉此禮蓋祝願其歲之豐登以至子孫歲歲行此禮也愚按僖公在位本無可稱政歸季氏自僖公始然莊公以後子般閔公皆遭弒逆魯國大亂君臣之間朝夕不保自季友立公以靖亂公委政季氏無無虞常有燕飲之樂魯因以大安是亦可頌也季氏深德僖公公之善即季氏之善也故即燕飲之事行父亦上請于天子而為之作頌泮水序曰頌僖公能修泮宫也朱注此飲于泮宫而頌禱之詞也許衡云此頌伯禽之詩蓋伯禽時始有征淮夷之役費誓序云魯侯伯禽宅曲阜徐戎並興東郊不開于是作費誓此伯禽征淮夷之證因蘇氏謂泮宫魯之學也自魯先君而有之矣僖公其舊而修之是以不見于春秋愚按泮宫作于伯禽歷世既久而廢至僖公始修復之既成請于王而作頌以頌僖公之功頌既僖公時所作觀前三章則皆詩人親見魯侯戾止之盛豈自後世想像之為此語乎至稱昭格烈祖靡有不孝始見僖公能遵伯禽之法蓋謂泮宫作自魯公而僖公繼修之也泮宫作而淮夷服皆魯公實事詩人因修泮宫而望公繼魯公之功朱子謂因魯侯在泮而願其有是功其説近是思樂泮水薄采其芹魯侯戾止言觀其旗其旗筏筏鸞聲噦噦無小無大從公于邁朱注賦其事以起興也自三章以下賦也末章興也毛傳缺毛云天子辟雍諸侯泮宫鄭云泮之言半也半水者蓋東西門以南通水北無也采陸氏云芹取有香士之于學也攬其芳香而至則芹之譬也則戾至也筏筏飛揚也噦噦和也車行則旗建馬動鸞鳴觀其旗筏筏而有容聽其鸞噦噦而有節此視學之儀也愚按魯侯下學而國人踴躍爭從以觀其講學行禮則魯之秉禮多儒由來久矣漢明帝開辟雍而圜橋觀聽者以億萬計庶幾此風思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教藻水草也下施澡取其自潔如澡也也毛云蹻蹻言強盛也鄭云其音昭昭公之德音昭昭言其德音明白易曉載色者顔之和笑者聲之和洪範所謂而康而色也色載笑言未嘗有怒也教之而已契之敷教在寬是也思樂泮水薄采其茆魯侯戾止在泮飲酒既飲旨酒永錫難老順彼長道屈此羣醜茆鳬葵也泮鄭小同云江南人名之蓴菜生陂澤中鄭云在飲酒者徴先生君子與之行飲酒之禮而因以謀事也養孔云難老者言其身力康強難使之老此為魯侯老而致其祝願之意漳浦黃氏曰養老之道廢則子弟易其父兄庶姓慢其長上驕奢薦出而叛亂滋起故夫養老者所以教子弟而崇齒讓也羣醜之屈即本于此晉文公謂民未知禮未生其其于是大搜以示之禮城濮之役望其師少長有禮曰其可用也用之遂以勝楚禮之足以治兵也如是然則民習養老之教而羣醜之屈何疑朱注此章以下皆頌禱之詞愚按長道言木古人所以服淮夷之道猶云中國長伎也順者言僖公順行其道也穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜穆穆即上章戾止泮宫臣民所見之德容也其所以為穆穆者惟是一敬故稱文王以穆穆亦曰敬止既敬以明其德而又致其慎于威儀之間有威可畏有儀可象故能為民之所法則也鄭云信文矣為修泮宫也信武矣為伐淮夷也朱注烈祖謂周公魯公也愚按靡有不孝謂文武周公以來靡不以孝德相傳言善繼善述也自求伊祜乃歸美于魯侯之能繼述先志而修泮宫以獲福也明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如皋陶在泮獻囚季氏云明明即穆穆之著見也也考僖公十三年從齊桓公會于鹹為淮夷之病把十六年又會于淮為淮夷之病鄫也淮夷在徐州之界最近于魯所以數會伯主為把鄫謀者亦自謀也孔云王制出征執有罪反釋奠于學以訊馘告注謂釋菜奠幣禮先師以告克故既伐淮夷而反在泮宫也司馬光云古人受成獻馘莫不在學欲其先禮義而後勇力也愚按僖公時淮夷不靖魯人病之因公修復泮宫視學養老行古之道以為有文德必有武功故以服淮夷致祝蓋君臣意中第一事也古人克敵告成于學故因在泮而祝望焉明修泮之志足以平戎也濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功此章美獻功于泮者之有禮也之多士以將帥言獻馘獻囚者皆在其內廣推而大也德心謂心德寬𢎞並無褊躁也桓桓二句追言其深入建功之事言狄通作逖逺東南斥淮夷也蒸蒸皇皇以成功言其功烈盛著也謂説文云吳大言也揚飛舉也告通作誥相曉語之訩訟也言多士克敵而後各有大功而皆能恬以處之不喧譁不矜躁不聞以彼此爭功之語告于上者皆于泮宫自獻其功愚按即此見泮宫之以禮教人作者之功大而修之者之功不小也角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲毛云觩弛貌五十矢為束搜衆意也徒角弓四句言班師之事蓋師凱旋在道弓弛而反見其觩然上曲而已也搜求也遍求而聚之一處所謂無亡矢遺鏃之費鄭云博安利也説文云大通也謂道塗之上馳驅自如無所阻也于斁解也戰勝而歸士氣百倍故其徒御在途皆勤所事無有厭倦淑善也言淮夷服而向化為善不復逆命所謂南人不復反矣式用也猶謀也固者固守之義爾指僖公也爾猶謂敷教泮宫使人知義即謀也即所以服淮夷之長道也式固爾猶即前所謂順彼長道言能固守此道淮夷雖目前未能向化而終致其來為我所得前章所謂屈此羣醜非虛語也愚按上文既云既克淮夷末復云淮夷卒獲則知無克淮夷之事前此皆祝願之耳前稱有文德必有武功末乃専歸文德式固爾猶謂能堅守此文德也雖不用武而淮夷終必自服下章正言卒獲之事翩彼飛梟集于泮林食我桑黮懷我好音憬彼淮夷來獻其琛元龜象齒大賂南金梟惡聲之鳥也黮者桑實也説文云桑椹之黑者椹有白黑二種以黑者為美尹焞云周原膴膴堇荼如飴美土可以變惡味食我桑黮懷我好音美味可以變惡聲琛寶也元龜尺二寸賂遺也南荆揚也鄭云大賂猶廣賂也賂君及卿大夫也青禹貢荆揚之州厥貢惟金三品鄭氏以為銅三色白赤也左傳鄭伯始朝于楚楚子賜之金既而悔之與盟曰無以鑄兵故以鑄三鐘則知金是銅也禹貢于徐州紀淮夷土産惟蠙珠暨魚至于象齒與金乃荆揚所有元龜獨荆有之兹附言于獻琛之後據閟宫篇曰淮夷來同及彼南夷莫不率從則知此數物者又南夷所貢乃繼淮夷之獻琛而來者不但足以服淮夷而已愚按所重在泮林也惟桑黮為泮林之黮故梟食之而變惡聲為好音以見禮樂之道足以格乎鳥獸况人類乎憬覺悟也謂修明禮教于泮宫以悟之上云既克淮夷孔淑不逆明淮夷固可與為善者今則不必用兵惟憬之而已來獻其琛蓋以玉帛相見不必以一矢加遺也末章全無兵威淮夷之意直欲以德懷之其非魯公平淮夷之事明矣曰懷我曰憬彼上文所言卒獲者由此道也不但可以獲淮夷並可以獲南夷總以明修泮之功所及者逺也泮水八章章八句按平淮夷者魯公也觀篇中云既作泮宫淮夷攸服則泮宫必作于魯公而序謂僖公修之是矣意魯公服淮當在作泮之後僖公既修泮而在泮飲酒亦值淮夷不靖時耶頌者祝其功如魯公朱子所謂因魯侯在泮而願其有是功也戴氏謂春秋二百四十二年所書莫大于復古僖公登臺望雲氣小事也左氏猶詳書之學校久廢而乍復所關甚重何經傳略不及也愚按魯為秉禮之國其君之視學常也泮宫必不盡廢此或因淮夷不靖而在泮宫行飲酒之禮因與諸大夫謀之故有此頌序曰修泮者修復其故事也閟宫序曰頌僖公能復周公之宇也朱子謂僖公修廟詩人歌咏其事以為頌禱之詞宫馬端臨云所謂祀周公以天子之禮樂者如樂用懸舞用八佾以天子所以祭其祖者用之于周公之廟謂之尊周公可也至于郊祀后稷以配天禘者禘其祖所自出而以其始祖配之則非魯所宜僭也且郊禘所祀未嘗及周公何名為報周公之勳勞而尊之乎以其祖宗之勳勞而許其子孫僭天子之禮樂以祭之已非矣况所祀者乃天子之太祖而本非有勳勞之臣乎不知成王何名而賜之伯禽又何名而受之用按明堂位所云賜以天子之禮樂者當時止許其郊禘之禮樂以祀周公未嘗許其遂行郊禘之祀也後乃至于禘嚳郊稷祀天配祖一一僭周天子之制竹書載魯公請郊廟之禮于天子桓王使史角如魯諭止之吕氏春秋亦載其事若成王已與魯則惠公不請矣隱公考仲子之宫問羽數于衆仲若魯既久用天子之禮樂何以至隱公始問羽數也衛祝鮀稱魯公分封之賜典物備載不聞有郊禘之禮然則魯之有郊禘者僭也春秋五年桓大雩是大雩之僭始于桓也閔二年禘于莊公是禘之僭始于莊也僖三十一年四卜郊是郊之僭始于僖也蓋魯自伯禽而下十有八世自僖公始有郊祀而詩人頌之而何氏云祭統所云大嘗禘謂于魯太廟嘗祭之時用周天子禘祭之禮故名為大嘗非謂魯有大嘗又有禘也此詩第言嘗而不及禘則是魯祭但用禘禮而非實有禘祭可知方畿云按禘嘗皆成王所賜之重祭恐當是二祭孔叢子引書云髙宗報上甲微孔子謂親盡廟毁有功而不及祖有德而不及宗故于每歲之大嘗報祭焉則是大嘗所以昭功德也故並賜魯以報周公而其禮樂與禘同乎愚按成王賜魯公得用郊禘魯公受之原殺于天子一等非全僭也哀公問曰寡人聞郊而莫同何也夫子對以冬至之郊主日配月啓蟄之月則又祈榖于上帝觀僖公三十一年夏四月四卜郊不從乃免牲其曰四月者夏正之二月也是則其卜為啓蟄之郊又曰正月卜郊周四月亦稱正月非冬至郊也使魯果有大禘之祭當以周公為太祖推太祖之所自出則文王是也而後始得以周公配之若禘嚳則周公無緣配祭而成王命祀周公以天子之禮樂何所施之然載諸詩書未聞有禘文王之事則魯有大禘之禮樂而無其祭審矣意從前所用即天子之樂章明堂位所云魯大嘗禘升歌清廟下管象舞是也至隱公問羽數于衆仲而用六羽是其心已有不安僖公之世晉文公納王有大功請隧弗許凛然王章之不可干澤故祀僖公行父請于王另為作頌異其體製示不敢用天子之樂章也然則魯之作頌非僭也以示貶也夫子刪詩而存魯頌意在斯乎吉禘祭有三一曰時禘王制所謂礿禘蒸嘗也一曰禘謂國君喪畢致先君之主于太廟也一曰大禘所謂不王不禘也魯閔公二年吉禘于莊公及文公二年有事于太廟躋僖公皆吉禘也左傳晉人言寡君之未禘祀則諸侯吉禘之禮不獨魯有之矣僖公八年秋七月禘于太廟用致夫人則時禘也魯無大禘之祭明矣左傳晉荀偃曰諸侯魯宋于是觀禮魯有禘禮賔祭用之燕享而用禘樂則是魯之異于諸侯以有禘之樂耳若追始祖之所自出以為禘魯固未行也閟宫有侐實實枚枚赫赫薑嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稚菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒朱注賦也毛傳缺仲毛云閟閉也先妣薑嫄之廟在周常閉而無事孟子曰是禖宫也侐清靜也按閟宫即帝嚳時所謂禖宫薑嫄所禋祀后稷所由生也魯祖后稷故亦立閟宫以其地在郊非郊禖之時無人至其處故其宫門常閉而清靜也出郝氏云魯不聞有薑嫄廟詩言薑嫄者誇魯之自以明郊祀后稷之故耳終枚枚礱密也實實鞏固也也鄭云依依其身也彌也終十月而生子不遲晚詳見生民篇朱月令注云先種後熟謂之穜後種先熟謂之穋注奄有下國封于邰也黍稷穜穋二句是后稷自己稼穡即誕后稷之穡一章也俾民稼穡以下是教民稼穡即誕降嘉種之一章也奄有下國指其所受之國奄有下土指其所教之地穀朱注緒業也禹治洪水既平后稷乃播種百愚按禹雖平水土若無稷何以利民是禹之緒實賴后稷以纘成之后稷之孫實維太王居岐之陽實始翦商至于文武纘太王之緒致天之屆于牧之野無二無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔按翦商言其勢非言其志也興隆在周則凌替在商矣太王生當祖甲之時去高宗中宗未逺後二百有六年商始亡且武王十三年以前尚臣事商則翦商之云大王決無此志後人追遡王業之事以太王為創始耳至郝氏云屆至也猶屆期之屆致猶奉也謂天時已武王奉行之于牧野耳無二二句牧野誓師之詞與敦治也咸同也言輔佐之臣同有其功而周公亦焉也常武篇云鋪敦淮濆注云敦厚也謂厚集其陳也此即大明所云殷商之旅其會如林言其旅之厚也克勝也厥功專指周公言書大傳云周公封以魯身未嘗居魯也詩稱王曰叔父云云意武王時伯禽尚少留侍世子計周公教世子撻伯禽時伯禽已侯至世子即位而後遣之之國錫之以命此則先喻意于周公之詞耳愚按首章上遡薑嫄備陳后稷始末次章由后稷下及文武稱道周公之功以明魯為周後后稷之所自出周公又有大功故成王賜以天子之禮樂而魯得郊禘也乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女鄭云既告周公以封伯禽之意乃䇿命伯禽使為君于東加賜之以山川土田及附庸山川使主其祭土田使有其賦附庸使廣其封周春秋時之邾國顓臾須句皆魯之附庸也僖公為公十世孫龍旗二句乃下文郊嘗二事之總冒公曹氏云日月為常王建之交龍為旗諸侯建之僖雖僭行郊天禮猶以龍旗承祀不建太常猶不敢全僭天子之禮也子承祀謂親祭事也四馬故六轡耳耳柔從也孔謂魯無冬至大郊之事是知魯郊以夏正之孟春郊則配以后稷嘗則祀周公廟以天子之禮樂此二者魯祭之盛禮故特舉之賜毛云騂犧天子所用既按是饗是宜魯人因成王以天子之禮樂行之久顧以享帝為宜亦詩人之微詞也云鄭云此皇祖謂伯禽也孔云以周公皇祖而下即白牡騂剛騂剛是魯公之牲故知謂伯禽也用公羊傳曰魯祭周公用白牡羣公騂剛愚按周室封建分土惟三地方百里皆以田言其山川間錯在百里田制之外此錫之山川是也春秋匪解一語春以郊言秋以嘗言則魯之郊是孟春啓蟄之郊非冬至郊也皇祖后稷指郊祀周公皇祖指嘗祀秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炮胾羮籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三壽作朋如岡如陵鄭云載始也秋嘗而言始者秋物新成尚之也之明堂位云季夏六月以禘禮祀周公于太廟即魯僭用亦在于夏以禘本夏祭也夏僖公七年秋七月禘于太廟以夏正準之六月則四月也七月則夏五月也獻子曰正月日至可以有事于上帝七月日至可以有事于祖正月之日至冬至也七月之日至夏至也蓋欲尊其祖與天相對故改六月為七月欲用夏五月也魯禘之在夏審矣魯禘以夏則猶是時禘也至于嘗秋祭也此詩已明載之云朱注楅衡施于牛角所以止觸也楅逼也説文以木有所逼束也衡牛觸橫大木也謂牛好抵觸以木闞制之牡鄭云秋將嘗祭于夏則養牲所楅之牛即下文白騂剛是也色繁露曰成王使祭周公以白牡上不得與天子同下有異于諸侯愚謂白牡殷牲也時禘之禘亦名殷祭蓋以殷禮客之而不臣也之阮諶云犧尊飾以牛象謂于尊腹之上畫為牛象形王肅謂通作牛象形犧以該象也明堂位云祀周公尊用犧象此獨舉毛云毛炮豚也胾説文云大臠也羮大羮鉶羮也大羮謂太古之羮煮肉汁不和貴其質也鉶羮肉味之有菜和者也鉶者盛羮之器大羮則盛之于登毛籩以實乾實豆以實菹醢大房所以載牲體者云大房半體之俎也周語禘郊之事則有全蒸王公立飫則有房蒸親戚燕享則有殽蒸房蒸半體也今以大房為半體之俎于禘不合豈亦于天子降一等耶天萬舞兼文武二舞之總名自白牡騂剛而下謂用子之禮萬舞謂用天子之樂也孝孫僖公也有慶即所謂周公福女也熾以勢言昌以象言惟壽而臧壽乃足貴曹氏云不虧如月之常盛不崩如山之常固不震如地之常靜不騰如水之常平三壽謂魯邦與下岡陵相並而為三也愚按祭統云成王欲尊魯賜之以重祭外祭則郊社是也內祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏天子之禮樂也又曰禘者陽之盛也嘗者隂之盛也故祭莫重于禘嘗意成王所賜之重祭併禘與嘗乎于此二祭皆行合食之禮為祫禘祫嘗而用天子之禮樂故謂之大嘗禘要之皆時祫也故魯未聞言禘其祖之所自出也魯人行之既久以其嘗之與禘同禮也總名為禘行父謂于王而作頌諱言禘而但舉嘗惟嘗與禘同禮言嘗即以言禘不言禘者自嫌其僭也明堂位謂祀周公于太廟牲用白牡注云止用時王之禮者諸侯之事通用先王之禮者天子之事故郊特牲云諸侯祭以白牡乘大駱謂之僭禮也據此則魯廟羣公通用騂剛從時尚之色非惟魯公一人用也而專于周公用白牡以表異于諸侯耳周公用白牡羣公用騂剛則魯公以下合食于太廟可知然則魯固時禘也時禘謂之祫禘與大禘異者大禘祭其祖之所自出而配食者秪是未毁廟之主不及毁廟之主也祫禘則毁廟與未毁廟之主皆得合食于太祖而祭不及其始祖之所自出觀白牡之祀明以周公為始祖未嘗及其所自出而騂剛以祀羣公明為合食固知名為禘實為祫也成王賜魯重祭以大嘗禘言大嘗者祫嘗也嘗與禘並賜則禘與嘗同禮可知中庸稱禘嘗之義明其為一義也此專言嘗舉嘗以見禘也禘本夏祭之名嘗為秋祭自周改夏祭為礿特以禘為天子之大祭而與嘗併以賜魯則猶是夏祭也不謂之礿而謂之禘尊其名以異于諸侯其實皆祫也特其所用者乃天子之禮樂耳公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾壽而富黃髮台背壽胥與試俾爾昌而大俾爾耆而艾萬有千歲眉壽無有害毛云大國之賦千乘二朱注成方十里出革車一乘甲士三人步卒七十人將重車者二十五人千乘之地則三百六十里有竒也云毛云朱英矛飾也縢繩也重弓重于鬯中也孔朱英絲纒而朱染之以為矛之英飾弓束以緑繩縢謂約之以繩非訓縢為繩縢即小戎所謂竹閉緄縢者蓋納弓于閉以繩束之也人鄭云二矛重弓備折壞也兵車之法左人持弓右持矛中人御即此甲士三人也孔云朱英緑縢與二矛重弓自相充配朱英是二矛飾之以朱英也緑縢是重弓約之以緑繩但二矛各自有英重弓共束一繩耳人軍制大國三軍所用不過五百乘每乘除甲士三但舉步卒七十二人而言合五百乘當三萬六千人曰三萬舉成數也朱貝胄貝飾也朱綅以朱綅綴之增增衆也孔云綅直謂赤線耳文在胄下則是甲之所用謂以朱線連綴甲也兵法兵車以戰重車以載輜重重車之卒每車二十五人隨兵車而進故曰增增因舒羣舒也荆楚之别號舒其與國也周昌年云其來而遏之曰膺謂當其強也聲其罪而討之曰懲謂懲其惡也戎承説文云受也鄭云僖公與齊桓舉義兵北伐與狄南殳荆及羣舒是也文昌熾壽富前于祭祀祝之此于兵車更祝之觀下黃髮二語則所謂壽而富富有老成人也國無老成人人君雖壽其何能臧壽胥與試言此黃髮台背壽考者皆相與為公用也耆指事使人也艾爾雅云養也承上壽而富來言使爾得其所使又得其所養得所使則安佚得所養則強固所以壽也謂鄭云眉壽秀眉壽徵也無害無有患害也愚按則莫我敢承則字言其勢所必然非實有其事也皆祝願之辭僖公之世所謂老成人則季友與臧文仲也頌其有所指乎泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功史記云泰山之陽則魯其隂則齊一曰岱宗春朱注泰山魯之望也詹與瞻同龜山在泗水縣秋龜隂之田在其北蒙山在沂州居魯之東一名東山顓臾在蒙山下孔云龜蒙在魯地故言奄有泰山則在齊魯之界故言所詹見其不全屬魯也下孔云大者廣逺之言地之極東至海而已大東之即云至于海邦言其極盡地之東偏也淮季氏云極東近海之國如萊牟之類是也萊牟與夷相近萊牟服則淮夷同而諸夷莫不率從矣愚按僖公從齊桓公伐楚楚服詩人因以為公功而併引伯禽淮夷之功以望之國人祝頌其君蓋不嫌夸侈也復魯弱不能立功僖公未嘗建功徒能共事霸主修祖業霸主之功即其功先祖之業即其業耳保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若鳬繹二山名繹通作嶧年鳬嶧在鄒地鄒古邾國左傳邾文公遷于繹宣十伐邾取繹即此嶧也邾本魯附庸之國孟子時魯穆公改曰鄒此言保有鳬繹者謂能保有附庸之國不為強大所吞併不獨奄及東蒙而已魯徐宅即徐戎居于徐州之地故云宅憂李見羅云侯封于曲阜與徐淮按壞世為封境故伯禽至不避三年之喪袵兵革以聞東郊之難費誓所由作也後之子孫世仰其功故為臣子者亦以此致君之祝海前篇至于海邦即以荒大東為至海邦此言至于邦則先由荒徐宅而後至海邦也徐宅在內海邦在外蜜貊南夷又自淮夷而推言之兩曰莫不率從所包者濶矣鄭云諾應詞也遵號令聽約束之義而毛云若順也逺人來服則魯侯從順其情以撫安之也天錫公純嘏眉壽保魯居常與許復周公之宇魯侯燕喜令妻壽母宜大夫庶士邦國是有既多受祉黃髮兒齒純全也嘏福也無福不有乃稱純嘏下文眉夀以下皆是也眉壽承前篇眉壽而言人惟壽可以享福故以壽始終之主國語齊桓公曰吾欲南伐何主管子對曰以魯為反其侵地常潛則常為齊所併故詩人欲公復之杜預云成王營王城有遷都之志故賜周公許田以為朝宿之邑後世因而立周公别廟春秋時魯不朝周鄭以泰山之祊田易之故詩人亦望其復之也燕安也享壽富康寧之福有令妻壽母之樂所謂安而喜也夫按令妻聲薑也壽母成風也禘于太廟用致夫人人兼母妻而總稱之禘而致者昔未廟見今始廟見也成風聲薑本非正嫡前此未得稱為夫人今同于廟祭故兼致崇號也考成風薨于文公十四年聲薑薨于文公十六年僖公世兩人固在故詩人及之母妻俱受尊榮則僖公之燕喜可知惠大夫兼卿而言庶士謂上士中士下士宜即所謂于朋友不得罪于巨室也邦國是有言常有之也愚按自僖公以前魯君多不以壽終隱及于鍾巫桓乘于彭生般賊于罔犖閔戕于卜齮國危者數矣祝公眉壽保魯魯人之所深禱也公在位三十有一年春秋書曰乙巳公薨于小寢慶之也宜者言母妻皆廟見正夫人之位大夫士皆以為宜也純嘏之嘏至于享眉壽復故土尊母妻而宜臣民則公之受祉亦既多矣又祝其黃髮兒齒當眉壽之年而齒落更生飲噉如兒時乃更為福耳皆祝願之極詞也徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若前頌僖公郊天禘祖之事此則備言其修廟也禰毛云新廟閔公廟也鄭云薑嫄廟也何氏云廟也禰廟者莊公之廟也閔二年夏五月乙酉吉禘于莊公杜預謂三年喪畢致新死者之主于廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公喪制未闋時别立廟廟成而吉祭又不于太廟故詳書以示譏然則莊公之有新廟可知成公二年新宮災穀梁謂新宫者禰宫也其廟作于慶父為政之時制度壯麗僖公因而不改曰奚斯所作奚斯慶父黨也詩人雖侈言之而刺在言外徂來山一名尤來山後魏志云魯郡汶陽縣有新甫山量松柏就已取者言山特指所産之地度以繩墨其所用之宜桷榱也秦謂之榱周謂之椽魯謂之桷舄通作寫俗作㵼屋之有桷其形斜長首髙而末低所以瀉雨水故曰有舄者路寢正寢也郝氏云廟後正寢以藏死者衣冠路大也人君所居曰路與小寢異碩大也舉路寢之大則廟規制之大可知新廟舉全廟而言路寢亦在其內毛云曼長也鄭云修也廣也奚斯公子魚也閔公二年共仲使卜齮賊公于武闈已而奔莒僖公立以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往曰奚斯之聲也乃縊則奚斯作廟正閔公初立慶父為政時也又僖公三十一年始卜郊而卜不從蓋因禘而益進于郊也萬民是若言萬民皆心順之以為合理也愚按頌僖公有稱無刺觀下文萬民是若魯人皆以為合禮史克作頌行父主之豈猶含刺乎慶父為莊公立廟使閔公吉禘于莊公魯之僭禮踰制皆自慶父始當隱公時猶問羽數則從前未聞有僭者僖公以來好侈大而因舊貫又以天子之賜為名遂一切仍之而不改矣然終是吉禘非大禘也閟宫九章五章章十七句內第四章脫一句二章章八句二章章十句毛傳分八章二章章十七句一章十二句一章三十八句二章章八句二章章十句句按三百五篇之中以一百二十成篇者僅見于此愚按郝氏以閟宫為僖公之廟前三篇頌其生平功德此一篇新其廟宇將以為世室配武宫告成功也且謂奚斯僖公時大夫子魚也其廟作于奚斯至季孫行父當成公時修之故曰新謂重新也夫奚斯見于僖公即位之初年僖公在位三十三年奚斯尚能俟僖公之沒為作廟乎何氏謂頌僖公始郊之詩篇中魯侯皆指伯禽謂其初受封于魯故以魯侯稱而天錫公純嘏之功乃稱僖公因僖公無平淮夷之事而平淮夷者魯公也則魯公亦豈有膺戎狄懲荆舒之功乎朱子但以為僖公修廟詩人歌咏其事以為頌禱之詞其説雖無所發明然猶君子闕疑之意也魯頌四篇二十四章二百四十三句商頌譜略譜曰商者契所封之地有娀氏之女名簡狄者吞鳦卵而生契堯之末年舜舉為司徒有五教之功乃賜姓而封之世有官守十四世至湯則受命伐夏桀定天下其後世有中宗有高宗此三主者有受命中興之功時有作詩頌之者商德之壞武王伐紂乃以陶唐氏大正閼伯之墟封紂兄微子啓為宋公武庚誅為商後其封域在禹貢徐州泗濱西及豫州孟豬之野自後政衰散亡商之禮樂七世至戴公時當宣王世正考父者校商之名頌十二篇于周太師以那為首歸以祀其先王孔子録詩之時則得五篇而已問者曰列國政衰則變風作宋何獨無乎曰有焉不録王者之後時王所客也巡狩述職不陳其詩亦示無貶黜客之義也又問曰周大師何由得商頌乎曰周用六代之樂故有之今商者契所始封之地皇甫謐云今上雒是也即商州以地有商山得名契之孫相土遷于商丘今商丘縣也季氏云稱商丘者其亦因契本封而以名丘歟自契十四傳至成湯凡八遷湯始遷諸亳蓋南亳也本帝嚳都湯自商丘遷焉故史記曰從先王居相傳偃師穀熟皆湯所都而景亳則湯會諸侯之處是為三亳皇甫謐云蒙北亳也穀熟南亳也偃師西亳也三亳惟南亳為亳本名地在商丘故湯有天下都焉仍商舊號若景亳則本名殷以景山近亳故曰景亳先是上甲微遷于殷即景亳也據竹書成湯居亳之後厯八世至仲下遷于囂河亶甲遷于相祖乙遷于耿又自耿遷于庇及南庚遷于奄至盤庚自奄遷于北蒙曰殷盤庚篇所謂先王恪謹天命不常厥邑于今五邦者合囂相耿庇奄而言也自相以下皆在河北至是仍遷河南書所云惟涉河以民遷是也書序言盤庚五遷將治亳殷孔安國謂殷者亳之别名也湯昔在殷以會諸侯而不都殷盤庚遷都殷實上甲微舊迹因而更號曰殷其後厯小辛小乙以及武丁又傳四世至庚丁皆居殷至帝乙始去殷復徙居河北都朝歌及紂為周所滅乃以商丘封微子為宋公使奉商祀愚按蒙即景亳在今商丘北五十里地有景山故謂之景亳與穀熟相近穀熟今考城也書二十八年昆吾氏伐商會諸侯于景亳是知景亳在商封內也商頌四之五那序曰祀成湯也微子至于戴公其間禮樂廢壞有正考父者得商頌十二篇于周之太師以那為首魯語閔馬父云昔正考父較商名頌十二篇于周太師以那為首孔云宋之禮樂雖則亡散猶有此詩之本考父恐其舛謬故就太師校之校之而得其初本故亦為之得也及孔子録詩之時又已亡其七篇惟存五篇而已宗何氏謂此詩作于高宗武丁之世遍考經傳惟髙武丁祭湯見于尚書序及史記猗與那與置我鞉鼓奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作溫恭朝夕執事有恪顧豫蒸嘗湯孫之將朱注賦也毛傳缺先毛云那多也時按那儺同行有節也當是未祭之陳設鐘鼓之美其執事之人也之鄭云置讀曰植以殷楹鼓楹鼓者貫之以柱故謂植鞉雖不植貫柄而搖之亦植之類于八音中惟舉鞉鼓者以楹鼓為殷之先制而鞉乃兆奏鼓者首舉之以概其餘也鄭云奏鼓者堂下之樂也朱注簡簡和大也衎樂也烈祖湯也也齊維嶽云簡簡謂大而不煩為有節歐陽子云湯孫斥主祀之時王耳自太甲以下皆可稱湯孫假與格同言奏樂以格于祖考郊特牲云殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告于天地之間陳暘云凡樂皆文之以五聲播之以八音禽獸知聲而不知音衆庶知音而不知樂通聲音之號而知樂者其惟鬼神之靈乎如之何不詔告以此樂凡聲陽也商人之祭先求諸陽故于未祭之先作如周人取蕭祭脂亦在未祭之先也之殷人之祭必先作樂三終然後出而迎牲于廟門外欲以此樂之聲音號呼而詔告于兩間庶幾其聞之而來格來享故曰奏假其禮記云齋之日思其居處思其笑語思其志意思所嗜思其所樂齋三日乃見其所為齋者祭之日入室僾然必有見乎其位周旋出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其嘆息之聲此之謂思成思蘇氏云其所見聞本非有也而生于其思故謂之成惚綏安也期陳式曰綏有固結義思之既成常恐恍不定故有以固結之也陳際泰云商人尊鬼而尚聲聲召風風召氣氣召神然神懼其雜而集焉則有湯孫之思矣思者氣之精者也鬼神非其類也不至必有精氣而借聲以召之神無不格而格者惟我烈祖斯湯孫之心安矣故曰綏我思成陳㿩云鼓所以作樂者也鼗鼓所以兆奏鼓者也言奏鼓則鼗從之矣言鼗鼓繼之以淵淵言管聲先之以嘒嘒者蓋鞉鼓必待奏了然後聞其聲管聲與鼗鼓合奏聞其嘒嘒之聲知為管聲而已此細大不踰無相奪倫之意云孔云既和且平兼堂上堂下八音諸器而言鄭磬玉磬也郝氏云玉磬在堂上鞉鼓管在堂下故曰依記曰磬以立辨辨故難諧磬聲諧則八音諧矣鄒氏云磬聲非如諸聲可以人力高下故依之則為和平毛云大鐘曰庸玉朱注上文言鞉鼓管籥作于堂下其聲依堂上之磬無相奪倫至于此則九獻之後鐘鼓交作萬舞陳于庭而祀事畢矣三斁説文云解也鐘鼓有斁謂樂闋時也萬舞名代之舞皆名萬夏小正曰丁亥萬用入學大奕大也美其綴兆之衆大也在商為大濩在周為武周官皆以大司樂掌之行此時樂已闋而將迎牲矣舞者皆立其行列以待禮而舞也朱注嘉客先代之後來助祭者也廟于虞曰虞賔在位于周曰我客戾止古聖人于宗以得客為重夷悅也鄭云我客之來助祭者亦不悅懌乎言悅懌也對今皆謂古進古言昔則昔人在古之前先民謂聖人也有作作為祭禮也執事謂執廟中之事也言自古昔聖人其于將祭之前及祭而行禮惟此恭敬耳孔云祭將畢而思古人之敬蓋恐禮行既久而式有愆也蓋黃佐云商人尚聲牲猶未入樂三闋然後備禮物時制也故此詩以樂舞悉數于前而溫恭有恪之言始見季氏云嘗秋祭蒸冬祭祭以秋冬為備故言祭者舉蒸嘗以見其餘將奉也愚按於赫湯孫赫兼威明二義言湯孫清明在躬其威神足以懾伏在廟之人而湯孫方穆穆然聚精凝神于厥聲之中與祖考相接對也惟穆穆所以益有赫也夷有頽惰之義初祭時人皆莊敬及樂闋而漸以懈矣夷者莊之弛也懌者敬之衰也二字正與下文溫恭朝夕執事有恪相對亦不夷懌謂能始終不懈也也朝夕自將祭以至祭畢也執事自迎尸以至送尸溫恭于無事時言有恪在有事時見上既言豫下變稱湯孫者謂豫非他人湯之孫也一氣感通不為非類之祀寧有不顧者乎上文思成即思湯也那一章章二十二句按閔馬父引自古四句為輯之亂韋昭云輯成也凡作篇章義既成撮其大要以為亂辭詩者歌也所以節舞者也曲終乃更變章亂節故謂之亂也後或據此分作三章愚按古樂府體一章之中亦有亂仍從舊烈祖序曰祀中宗也鄭云中宗殷王太戊湯之玄孫也有桑榖之異懼而修德殷道復興故表顯之號為中宗德郝氏云成湯至于太戊七世矣商道寖衰太戊修中興遂號中宗禮祖有功而宗有德故殷祖成湯宗太戊武丁此祀太戊之樂歌也前篇專言樂此篇專言味祖逺難格故衎之以聲宗近易感故侑之以食朱注此亦祀成湯之樂何氏謂肜祭成湯也肜祭者祭明日又祭之名周曰繹商曰肜夏曰復胙竹書載武丁二十九年肜祭太廟有雉來皇王大紀載高宗祭于成湯有飛雉之異書序及史記皆言飛雉升鼎耳而詬通志稱祖己訓王後武丁責躬思道三年編髮重譯者六自是章服多用翟羽孔子曰吾于高宗肜日見修德而報之疾也愚按前篇言樂此篇言味而味止于清酒和羮益見殷祀之尚音不尚味矣嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酤賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉壽黃耉無疆約軧錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧豫蒸嘗湯孫之將朱注賦也毛傳缺君朱注烈祖湯也秩常也申重也祜福也爾主祭之自歌者指之也斯所猶言此處也祊何氏云斯所謂烈祖神之所在指祊而言説文訓謂門內祭先祖所以倣徨也蓋正祭祀畢神可以歸矣孝子未忍其遽歸也故于明日又設祭不知神之所在于彼乎于此乎則于門內以求之亦意神之當依依于門內而未遽去也而申錫二句是倒句法曰庶其及爾神之尚在此處重錫我以無疆之福乎載謂載之于尊酤説文云一宿酒也致思成義見那篇祭義云祭之明日明發不寐享而之又從而思之是也為朱注儀禮于祭祀燕享之名每言羮定蓋以羮熟節然後行禮戒夙戒也平猶和也鬷中庸作奏奏族聲相近族聲轉平而為鬷耳堂毛云鬷總也鄭謂來助祭者至于設薦進俎總升而齊一皆服其職勸其事寂然無言語無爭訟者徴眉壽以眉言黃以髮言耉以面言三者皆壽也約軧錯衡解見采芑篇軧衡以諸侯所乘之車言八鸞以諸侯所駕之馬言歐陽子云以假以享者諸侯既至而助享也者我指湯孫也自先祖而指主祭者曰湯孫自主祭而言曰我曰豫陳偉云諸侯助祭得人也降康穰穰得天也黃佐云上云賚我思成曰綏我眉壽黃耉無疆曰降福無疆至此又曰顧豫蒸嘗何也蓋祖考雖享而孝孫之心未敢必其享也故又致其丁寧之意如此愚按那云綏我思成蓋未祭之先齋而思之既已成矣惟恐其去來不定故有以綏之此云賚我思成則祭之明日精神未散思之即成故以為神賚之也合觀二語以為明日之又祭固是戒者戒廟中執事之人也平者人與事皆相宜也既戒則奏格無言既平則時靡有爭將猶率也溥天之下皆率之以祀先王即上文以假以享謂湯孫能以之也曰受命溥將言非我所能將我有所受之也上文以格以享謂人心歸也湯孫得乎人心故能以之下言來格來饗謂天意順也烈祖合于天意故知來也此篇祝望無疆者三自湯以來至武丁凡五遷國國勢殆者數矣又自大戊而外多享年不永故詩人拳拳以此禱之厥後武丁在位五十九祀歷數世而不遷果應無疆之頌矣烈祖一章二十二句輔廣云那與烈祖皆祀成湯之樂那詩則專言樂聲至烈祖則及夫酒饌商人尚聲豈始作樂之時則歌那既祭而後歌烈祖與序謂祀中宗也朱子謂未見其為祀中宗也愚按篇中有申錫之語似是祭之明日又祭所謂繹者是也則以為髙宗之肜祭有據但未定其祀成湯與祀中宗耳玄鳥序曰祀高宗也按中宗十三傳至武丁而商業又寖衰武丁恭默思道乃復中興號稱高宗頌高宗而推本祖德所以表中興也鄭云祀當為祫祫合也高宗崩而始合祭于契之廟歌是詩焉愚按鄭氏謂高宗崩合祭于太廟所謂大祫也祫者毁廟與未毁廟之主皆陳諸太廟合食兹特舉其功德不祧者誦之細玩篇義序以専祀高宗為是誦其能繼湯以殷中興也盛稱宅殷之善言自玄王封商早有芒芒之殷土待其宅以興王故湯雖居商丘而會諸侯于景亳以有天下是殷為湯受命之地自生商時已命之矣故曰古帝武丁繼湯之武仍以殷中興足與湯比烈云天命玄鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旗十乘大糦是承邦畿千里維民所止肇域彼四海四海來假來假祈祈景員維河殷受命咸宜百祿是何朱注賦也毛傳缺狄毛云玄鳥鳦也春分玄鳥降湯之先祖有娀女簡配高辛氏帝帝率與之祈于郊禖而生契故本其為天所命以玄鳥至而生焉月鄭云鳦遺卵娀氏之女簡狄吞之而生契蔡雍令章句云玄鳥感陽而至其來主為孚乳蕃滋故重其至日因以用事契母簡狄蓋以玄鳥至日有事高禖而生契焉九宅居也芒芒大貌注孔云左傳稱芒芒禹迹畫為州亦言大也朱古猶昔也帝上帝也武湯以其有武德號之也史記云湯曰吾甚武號為武王愚謂即長發篇帝立子生商之帝也湯之受命早已命于生契之日矣得陸燧云正域言四方之封域自湯正之使人不割據而侵擾也毛云九有九州也皆孔云九有是同有天下之辭言分天下以為九分為己有也王制注云殷湯更制中國方三千里之界分為九州而建千七百七十三國先后當指盤庚湯後八世居亳其后五遷皆在河北而圮于耿岌岌殆矣盤庚復遷于殷而國始定盤庚初號商遷殷後始號殷稱商之先后明殷之本商也其遷殷天命之也盤庚之遷亦惟保其不殆耳而中興之業乃在武丁之為孫子也朱注武王湯號而其後世亦以自稱也龍旗諸侯所建交龍之旗也大糦黍稷也鄭云十乘者二王之後舉諸侯之尊者言之邦畿即指殷邦千里為畿所謂居重以御輕宅中以圖大也惟民所止言民志定于此不復有遷徙之患夷肇説文云始開也王肅云殷道衰四來侵至高宗然後以四海為競域也景山名即殷都之山殷武篇亦云陟彼景山景亳因景山得名在今睢州盤庚云古我先王將多于前功適于山山即景山也言朱注員與幅􅊷義同蓋言周也河大河也景山四面皆大河也愚按契為受封之祖故謂生契為生商然才敘生商便接以宅殷殷商並舉以明湯由商興武丁以殷興也雒芒芒雖訓大亦有草昧之義契始封于商地在上其後子亥遷殷為有易氏所滅契幾不祀上甲微能滅父仇復其故土宅居于殷亂亡之餘人稀土曠芒芒可想見也此一語當指上甲微楚語椒舉曰湯有景亳之命景亳即殷也湯雖居亳仍會諸侯于殷猶周都鎬而頒封猶在豐廟正域四方豈即景亳之命為諸侯正其封域耶厥方命方字承上文四方方字帶下猶臣工篇將受明接以明昭上帝皆截上一字為起語也此言湯以正域四方之命命羣后羣后受命則九州之地雖為諸侯有而皆承湯之命即湯已奄有之也亳商之先后即指湯也湯雖居商丘而會諸侯于景以有天下是殷為受命之地也其後五遷河北而圯于耿商之命岌岌殆矣逮盤庚遷殷武丁因以中興而始轉危為安使湯命不殆以武丁為之孫子也殷遷于盤庚而興于武丁在者由前遞敘而及之也湯名履號武王武丁名昭而稱武丁豈亦其號耶湯與武丁皆可稱武王蓋能繼湯之武也惟其武靡不勝所以諸侯服從至今皆來助祭其廟也以自此以下皆贊武丁中興之功上文稱湯烈祖所引起之也變四方言四海者必武丁中興之後疆土更拓于湯時也據沈約謂高宗輿地東不過江黃西不過氐羌南不過荆蠻北不過朔方而頌聲作此不足信江黃于景亳豈可謂之東乎東方近海最廣沈説獨遺之何也二節皆稱殷建都之得地也上言維民所止惟其宅天下之中民心輻輳又以便四方之朝會也下文來假祈祈祈祈舒遲貌言助祭之諸侯道里既均舒徐續至無取奔命也景員維河此言形勢之壯武丁受命于此地百姓安之諸侯便之復有形勝可據蓋無所不宜也曰殷受命咸宜以贊殷土亦以贊遷殷之功也百祿是何為主祭者祝願之辭春秋傳何作荷玄鳥一章二十二句序為祀高宗也朱子謂詩有武丁孫子之句故序得以為據雖未必然然必是高宗以後之詩至集注復泛稱為祭祀宗廟之樂豈因殷武篇為祀高宗之詩不欲重出耶則那與烈祖何以皆為祀成湯耶商頌散缺僅存十二篇而又亡其七存則録之矣長發序曰大禘也蘇氏云大禘之祭所及者逺故其詩歷言商之先后又及其卿士伊尹蓋與祭于禘者也商書曰兹豫大享于先王爾祖其從與享之是禮也豈其起于商之世與朱注按大禘不及羣廟之主此宜為祫祭之詩此郝氏云大禘即祫也故雍周禘也并頌烈考文母商禘也并頌玄王相土成湯及卿士蓋追配逺祖則子孫咸集也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商朱注賦也毛傳缺也濬深也哲知也沈長久也土敷説文云布也猶分書曰禹敷土蔡謂分别地以為九州是也方四方也尚書序云帝釐下土方水毛云諸夏為外孔云對京師為內也言禹治之後分别土地定其方域自京師之外凡可建為大國者區畫其疆界以待有功者之受封也此為封契發端之辭注毛云幅廣也隕均也史隕當作員員謂周也朱有娀契之母家也記桀敗于有娀之墟按其地在陜虢之間愚按濬深也遡源及流之謂濬濬哲言知足以窮其源也祥即玄鳥之祥商受命之符蓋兆于此其由來也長矣商尊契為大祖首節專敘契母之所自出猶周之尊后稷而推本薑嫄也方四方也如方里而井為方百里之類皆取其方也禹既分别九州各于其地方其土而立之國外此之大國勢有不能方者亦從而疆之聽其幅隕之長而已有娀則外國而方大者也上五句皆為有娀發端蓋尊契母必稱其母家以出于大國為足重也帝上帝也有娀之子簡狄也立猶植也玄鳥降祥即帝植之矣商周之祖所自出者皆帝嚳也周詩但頌薑嫄商詩亦頌有娀是未嘗及嚳蓋推本二母則其所自出之帝不言而自見然據魯語展禽所云商人禘舜而祖契郊冥而宗湯此又不可解矣玄王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截玄王契也矣孔云國語曰玄王勤商十四世而興玄王為契明朱注或曰以玄鳥降而生也王者追尊之稱桓武也撥治也云撥昏而使之明撥亂而使之治皆撥也桓通作和漢書注陳宋之間言桓聲如和酈道元讀尚書桓夷底績桓亦為和桓撥謂和以撥之即舜所云敷教在寬也鄭云始堯封之商為小國舜之末年乃益其土地為大國皆能達其教令達即百姓親五品遜教化無所窒礙之意率循也履禮也發應也侯相土契之孫昭明之子丘竹書載帝相十五年商相土作乘馬遂遷于商乘馬即甸賦也班固漢志謂殷周以兵定天下立司馬之官設六軍之衆因井田而制軍賦是謂乘馬之法據竹書則相土已創于夏后氏之世矣夷烈烈威也截整齊也何氏云海外之與海內華之限也自乘馬法行兵威大振彼海外蠻夷之國界限截然毋敢軼者故曰有截也愚按發者奮起之意率履不越以身教也遂視既發言民視效而興起也曰遂曰既速化之辭契始封商在上雒至相土遷於閼伯之墟以主大火所謂商丘也厥後湯以亳興其地即在商丘東南是開商基者契而開興王之基者相土故商人祀契為始祖其次即祀相土為不遷之宗帝命不違至於湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍齊等也至于湯亦不違帝命與契相土等齊也生蘇氏云齊至湯而王業成與天命會也朱注降也言湯之生也應期而降適當其時云躋升也聖敬而曰日躋盤銘日新又新是也毛九圍九州也式九圍所謂表正萬邦未便是為天子也下二節正式九圍之事愚按自湯以上契與相土皆能順天之命不敢有違至于湯則德足以配天湯心即帝心也故曰齊也湯當夏桀之時人怨天怒己甚應期而生帝欲湯之代夏急矣而湯方以敬止存心日進不已其敢有非分之覬乎以此日躋之敬為上帝所鑒故且緩其代夏之期而先命式于九圍此見帝以湯心為心也遲遲與不遲相對不遲者降湯之帝心而遲遲者昭格之帝心也受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百祿是遒毛云球玉也磬按禹貢雍州厥貢球琳虞書曰戛擊鳴球球者玉之名禮玉藻篇曰笏天子以球玉則玉可以為磬亦可為笏圭朱注小國大國所執之玉也鄭云小球尺二寸也大球珽也長三尺執圭搢珽以與諸侯會同賔竹書載夏桀二十三年釋商侯履于夏臺諸侯遂于商詩言受球受其皆此後事也也毛云綴表也旒章也謂説文無旒字本作瑬垂玉冕飾故毛云章也或之繁露言其狀也若旗旗之垂者則名為斿此公羊傳曰君若贅旒然言諸侯反繫屬于大夫也言綴旒則以湯為冕下關諸侯為旒綴之取其相繫屬之意緩鄭云競逐也不逐者不與人爭前後也絿朱注也不競不絿以交鄰國言不剛不柔以布政于本國言優優寬裕之意遒説文云迫也言多福來迫近之如富貴迫人之意愚按旒以比下國諸侯而湯為之綴綴于冕也率諸侯以上奉其主使相聨屬是為綴旐遒正與優優相對湯意愈緩而天意愈迫受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦百祿是總鄭云共執也猶小球大球也為共通作供左傳君謂許不共即此義何氏云湯夏方伯得專征伐受小共大共者謂將征伐四方小大諸侯皆來供給如卒乘器具糗糒芻秣之類也觀下文敷奏其勇等句可見上章言諸侯來聘問此章言從征伐皆所謂帝命式于九圍也毛云駿大也厖厚也駿通作峻説文云厖石大貌為下國駿厖言下國諸侯恃湯以安如倚磐石也齊詩作駿厖謂馬也猶云為下國先驅耳以龍通作寵功敷奏指下國從湯征伐者小大分布各奏其勇戁恐也竦懼也不震不動二句孟子所謂歸市者不止耘者不變也懼戁通作赧爾雅疏謂面慙曰戁竦通作悚説文云也謂湯出師有名故無愧怍亦無恐懼總聚也下國安危之責萃于湯則天之祿亦萃于湯矣武王載斾有虔秉鉞如火烈烈則莫我敢曷苞有三蘖莫遂莫達九有有截韋顧既伐昆吾夏桀毛云武王湯也詳玄鳥篇續此章述湯伐桀之事蓋至是始為天子也斾蓋旐之末為燕尾者左傳晉治兵建而不斾已而斾之諸侯畏之將戰則斾也載之以待戰而建耳朱注虔敬也言恭行天討也説文云虎行貌虎之行競競然有威故謂敬為虔史記言夏桀為虐政淫荒諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀然則載斾專為伐昆吾夏桀紀事韋顧既伐特追數之耳上章敷奏其勇則伐韋顧之事也三朱注曷誰何也苞本也蘖旁生萌蘖也言一本生蘖也歐陽子云韋也顧也昆吾也所謂三蘖也之遂達從蘖字取意勾則能遂萌則能達莫之者阻也九有九州也有截謂九州諸侯截然判斷不與三蘖相通之鄭語史伯云祝融其後八姓己姓昆吾顧則夏滅彭姓豕韋則商滅之昆吾顧當是既滅于夏而復立之亦猶豕韋為商所滅其後世仍為商伯古五伯所謂商有豕韋是也舉自帝命不違至此皆紀湯事及按長發自契外獨相土以及于湯其他皆不之此祭法所謂二祧也凡曰祖廟者始祖也始祖而下四親而上于廟以次當毁擇其中之有功德為二祧蓋百世不毁者合始祖二祧與四親廟共為七廟伊尹曰七世之廟可以觀德所謂觀德者指二祧而言也商二祧猶周文世室武世室但商合二祧為七廟周除二世室為七廟耳愚按商太甲為太宗大戊為中宗武丁為高宗三宗皆别立廟在七廟之外昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王業危也代朱注承上文而言昔在則前乎此矣豈謂湯之前中衰時與按殷侯振為有易所殺上甲微復國未久復返商丘皆震且業也不然何至湯僅有七十里乎蘇氏云信矣天之子商也降之卿士而後商室以興臣一説降于卿士謂湯屈己以下賢所謂學焉而後之也君奭篇云成湯受命時則有若伊尹太甲時則有若保衡伊尹保衡止是一人一稱其名一稱其官也上云實維者指其人下云實者指其功左右謂佐湯敷政奏勇以伐夏救民成也此言禘于太廟而以伊尹配享也周公時命王記功宗以功作元祀其典實倣于此位何休云禘所以異祫者功臣皆祭據盤庚篇告有之辭曰兹豫大享于先王爾祖其從與享之此篇正功臣配享之事當為盤庚世作愚按尹為商宗臣非徒功臣也當湯崩嗣君早世太甲失德尹放之而自攝政俟其改過自新足以繼湯乃使復辟卒稱太宗使湯之後無尹商之為商不可知矣尹之從祀何疑長發七章一章八句四章章七句一章九句一章六句楊氏曰詩頌長發為大禘但述玄王以下而不及于所自出之帝則安得謂之禘詩乎愚按周頌亦未嘗及于帝嚳豈周頌無禘之樂章乎意者始祖所自出之帝與天同為至尊不可得而頌但頌其配之者而已周頌思文郊詩也亦祗頌配天之后稷未嘗頌天也然此篇首言長發其祥已隱然推其所自矣朱子疑為祫祭則天子夏秋冬三時之祭皆祫其以功臣配享惟在祫蒸耳周禮凡有功者銘書于王之大常祭于大蒸司勳詔之衛孔悝之鼎銘曰勤大命施于蒸彝鼎亦謂配享于蒸祭也此詩以為祫蒸亦可但彼乃周禮而殷禮别無所考惟據盤庚大享之言與此詩序參之禘之説為是按禘之名義有三一曰時禘王制曰天子犆礿祫禘祫嘗祫蒸諸侯礿犆禘一犆一祫嘗祫蒸祫及周改春祭曰祠夏曰礿惟蒸嘗如舊而以禘為殷祭則時禘之名至周而廢一曰吉禘謂喪畢即吉而致新死者之主于太廟若竹書之吉禘于先王左傳晉人言寡君之未禘祀是也一曰大禘爾雅以為大祭禮大傳篇謂不王不禘王者禘其祖之所自出以其祖配之如商周以稷契為始祖而稷契之所自出則嚳也其漢儒皆以大禘為合祭羣廟宋儒泥大傳中以祖配之一語謂禘其始祖之所自出則配之者始祖一人而已故朱子疑長發廣及羣廟宜為祫祭之詩馬端臨謂大傳首曰禮不王不禘王者禘其祖之所自出以其祖配之即繼之曰諸侯及其太祖大夫士有大事省于其君干祫及其高祖據此只共説一祭天子則謂之禘所謂不王不禘而禘則及其祖之所自出諸侯則不可以言禘而所祭止太祖大夫士又不可以言祫必其先有功勞見知于君許之祫則干祫可及其高祖蓋共是合祭祖宗而以君臣之故所及有逺近故異其名也何氏謂禘之為言諦也諦者審也説文謂諦審昭穆也而夏祭名禘者天子四時之祭自春犆礿而後其三時皆祫禘為時祫之始則三昭三穆在焉吉禘之名禘者亦為新入廟之主將以其班祔二者之義皆取辨其昭穆也然則大禘之禮祭其祖之所自出于始祖之廟七廟之主皆在明矣又據大傳文諸侯及其太祖大夫士于祫及其高祖則是但據見在五廟三廟而言以此例天子禘其祖之所自出亦惟以見在七廟之主配耳所謂未毁廟之主也若夫合毁廟未毁廟之主而皆祭于太祖則謂之大祫然大祫雖及于毁廟而不及于太祖之所自出則其禮差小于大禘故曰禘大而祫小也大禘與郊並重故國語謂禘郊之事則有全蒸又謂禘郊不過繭栗是也祫又有小祫謂之時祫王制所謂祫禘祫嘗祫蒸是也其所合祭者惟及未毁廟之主大抵大禘之禮重于大祫追逺祖也大祫之禮别于吉禘隆合祀也吉禘之禮廣于小祫敘新主也小祫之禮異于犆礿嫌黷祭也吉禘獨新主為然小祫則每歲皆有時劉歆謂禮去事有殺故春秋外傳曰日祭月祀享歲貢終王祖禰則日祭曽高則月祀二祧則時享壇墠則歲貢大禘則終王德盛而遊廣親親之殺也彌逺則彌尊故禘為重矣按歆云大禘則終王者謂每一王終新王即位則行大禘之禮蠻夷各以其琛貢來助祭也愚按馬説甚核因思魯禘亦只是祫祭特賜以禘之名耳故詩書未見言魯禘其祖之所自出為何人也魯禘與嘗並舉即王制所謂祫禘祫嘗皆時祭也周升夏禘為大祭以礿當禘而以禘為殷祭然則周賜魯以禘牲用白牡亦猶待宋之禮客而不臣耳而魯亦有大祫之祭春秋文公二年大事于太廟公羊傳曰大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳于太祖未毁廟之主皆升合食于太祖五年而再殷祭漢儒謂五年而再殷祭者三年而祫五年而禘也宋儒楊氏謂殷祭指大祫也五年再舉謂三年一祫五年再祫耳愚謂五年之祫魯之所謂禘也亦猶諸侯之祫上及其太祖而不能推其所自出之祖魯特以禘為名也殷武序曰祀高宗也按史記武丁修政行德殷道復興武丁崩子祖庚立立其廟為高宗數朱注此蓋特為百世不遷之廟不在三昭三穆之既成始祔而祭之之詩也劉歆謂天子三昭三穆與太祖之廟而七七者其正法有常數者也宗不在此數中苟有功德則宗之不可預為設數故殷于太甲曰太宗大戊曰中宗武丁曰高宗周公舉殷三宗以勸成王由是言之宗無數也何氏云當祖庚時武丁于七廟中正為考廟今如為武丁别立一廟則是考廟虛主也若謂祀武丁于考廟又别為武丁自立廟則武丁有二主矣以愚意之武丁雖自立廟然當世數未盡時必仍居七廟中而虛其新廟及親盡應毁之日乃始遷其主于新廟與七廟同享祀為百世不遷之宗斯不與羣祧等耳愚按周家文武二世室創自周公文武正在七廟之數二世室亦虛以待也但商既以相土與湯為二祧即周之二世室矣三宗之廟正如朱子所云特為百世不遷之廟不在昭穆之數耳何氏以與考廟二主為疑則周之宗祀文王于明堂以配上帝未聞别設主也豈祭時遷主以往祭畢仍歸廟耶撻彼殷武奮伐荆楚罙入其阻裒荆之旅有截其所湯孫之緒朱注賦也毛傳缺國毛云撻疾意也殷武殷王武丁也荆楚荆州之楚也孔云荆是州名楚是國名周有天下始封熊繹為楚子之嚴氏云禹貢有荆州即荆楚也又有荆岐則雍州荆朱注殷武殷王之武也泛鄭云有鐘鼓曰伐罙冒也氏山巇曰險水隔曰阻言則通用裒聚也吕云裒荆之旅謂入其巢穴其衆無所遁逃窮而保聚如勾踐栖于會稽之類也有截其所謂王師所在截然無敢犯之者猶常武所云截彼淮浦王師之所也曰湯孫謂高宗言無愧為湯孫也下文曰昔有成湯商是常本此降竹書夏桀二十一年商師征有雒克之遂征荆荆則奮伐荆楚固成湯已事爾易曰高宗伐鬼方三年克之師竹書武丁三十二年伐鬼方次于荆三十四年王克鬼方則鬼方與荆楚明非一國愚按鬼方大抵在荆州之地山林險逺不時出沒為中國患而楚人僄勇輕悍好亂相倚以煽動者常也克鬼方使荆楚失其險阻之恃伐荆楚使鬼方絶其窺伺之路也維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常此紀高宗因荆楚聽命而諭告之辭也道季氏云詩稱商邑稱景山皆北亳也盤庚既沒殷日衰楚人叛之其患之所及必常在淮北如春秋時楚之凌虐陳宋也北亳即宋地也公羊傳云楚有王者則先服無王者則先叛教鄭云楚國近在荆州之域居中國之南方言為聲所加正朔所及也氐羌乞姓孔云氐羌之種後世仍存在秦隴之西漢隴西郡有氐道羌道今陜西臨洮府寧夏岷州靖虜衛文縣所四川龍州松潘疊溪皆羌地曰自彼者舉絶逺以例其餘見不止氐羌觀下文莫敢句可見竹書載湯即位之次年氐羌來賓又八年初巡守定獻令則氐羌其先至者享獻也世見曰王孔云謂其國嗣王即位乃來朝也曰常猶云故事也曰者氐羌相謂之辭承湯言故商王慎中云方城漢水之間地大人衆形阻而俗雜介錯于商邑之吭而近不一于夏而非純于夷未能以為內而不可以為外先王固欲梁圉其山川井邑其人民以固威嚴之勢而立長久之安非如氐羌之荒忽惟其來享來王而已天命多辟設都于禹之績歲事來辟勿豫禍適稼穡匪解此下二章紀高宗戒敕諸侯之辭蓋因荆楚既服而遍敕之也朱注多辟諸侯也來辟來王也設都于禹之績鄭云禹平水土弼成五服而諸侯之國定故云然歲事如周禮春朝夏宗秋覲冬遇之類其來以時故曰歲事即朝覲述職也與來享來王不同豫高宗自謂也適通作謫禍重而謫輕言爾為歲事而來者其必毋為我所禍謫惟勤于民事使民稼穡不怠則禍謫可免矣天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福鄭云降下也謂天既命爾為諸侯則時時下而臨視之不僣不濫二句高宗自表其待諸侯之法左傳蔡聲子引此詩曰善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人遑暇也暇義與怠近不敢怠遑猶言刑賞之法不敢假借也慢説文云怠慢也遑急也何氏謂不敢過寬而失之若僣于賞而無罰是怠也不敢過急而失之猛若濫于罰而無賞是遑也或賞或罰總之以民事為斷愚按此承上章申以勤民之戒也言天意即在民心天既時時臨視而下民之視聽更有嚴于天者敬民斯以敬天也侯下國衆諸侯也言我以此命爾下國者誠望爾諸之小心免于禍謫也如是則設都禹績以封建爾者爾之福也不則禍隨之矣福與上章禍字相應商邑翼翼四方之極赫赫厥聲濯濯厥靈壽考且寧以保我後生毛云商邑京師也為翼翼整飭貌極表也按極者屋脊居屋之中故以中言昔成湯所居為四方諸侯之所取中今高宗之所居猶是也屬厥聲承上章命于下國言赫火盛貌洪範五事言火故曰赫赫厥靈承首章奮伐荆楚言中衰之後氣象更新如新沐新浴者故曰濯濯書無逸篇云肆高宗之享國五十有九年可謂壽考矣而寧安也季氏云言天下治安也我後生謂後高宗生者指時王作廟者而言愚按湯都南亳為商高宗都亳為殷篇首已稱殷武而此云商邑謂武丁承成湯之武以盡復成湯之舊則今日之殷都即名為商邑可矣名商邑者所以表厚子商之中興也壽考則經營必周而貽謀子孫者必孫之所以崇報不容已歟陟彼景山松柏丸丸是斷是遷方斫是虔松桷有梴旅楹有間寢成孔安此章專言作廟之事今景山即北亳之山也景亳因山得名為湯所盟地睢州有景山毛云丸丸易直也此指松柏之本身言下文為桷為楹皆取諸松柏也斷者截之于所生之地遷者徙之于造作之處毛朱注方正也謂正以繩墨也斫謂削以斧斤也穀云虔敬也孔云工匠皆敬其事不惰慢也梁傳云天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫之桷斫之則斫正指桷而言孔云桷者椽也柱梴長貌旅陳也朱注衆也説文云間闌也陳列衆似處處皆有間闌楊森云猶今之簷柱加闌干也中之寢也一説間者不過其度之意别朱注寢廟按高宗功德盛大今特為設寢廟與大宗大甲中宗大戊號為三宗既成則人心甚安猶閟宫篇云萬民時若也愚按孔安就百世不遷而言也殷武六章三章章六句二章章七句一章五句按詩為立高宗新廟而作而序云祀高宗也申培説帝乙之時武丁親盡當祧以其中興功高存而不毁特新其廟稱為高宗而祀之愚按史記武丁之廟已立于其子祖庚之時豈高宗殁即祀于新廟而歌此詩耶何氏以為雖别立廟而武丁仍居七廟中俟親盡當祧乃遷主于新廟以為百世不遷之宗若然則新廟虛設何以有祀廟之詩豈當時既稱宗不云考廟耶商制不可考未可以周禮相律也謂詩作于帝乙之時亦無所據商頌五篇十六章一百五十四句田間詩學卷十二
