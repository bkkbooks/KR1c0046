body:
  text: 田間詩學卷四桐城錢澄之撰魏譜略魏者虞舜夏禹所都之地在禹貢冀州雷首之北析城之西周以封同姓焉其封域南枕河曲北涉汾水至春秋魯閔公元年晉獻公按舜滅之以其地賜大夫畢萬自爾而後晉有魏氏都蒲坂禹都安邑孔云蒲坂安邑皆與逼近謂境内有其都耳魏不居其墟也愚按魏自晉獻以封畢萬城在陜州芮城縣五里漢河北縣也左傳晉使魏壽餘以魏叛入秦秦伯師于河西魏人在東杜預註今河北縣于秦為在河之東今平陸縣是也平陸縣北有魏侯城即古魏國晉獻公所滅以封畢萬者志又云平陸縣本虞國地則魏南與虞接壤而北逼于晉其地陿隘故晉先滅魏而後取虞魏一之九蘇氏云魏地入晉久矣其詩皆為晉而作故列干唐風之前猶邶􅅠之于衛也葛屨序曰刺褊也魏地陿隘其民機巧趨利其君儉嗇褊急而無徳以將之愚按惟魏地陿隘故機巧趨利以其耕稼無所衣食不給故機巧以生人主復為褊急儉嗇之行則不為趨利之民所附宜其亡也糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之朱註興也毛傳缺寒毛云糾糾猶繚繚也禮夏葛屨冬皮屨葛屨非禦之其今既敝而繚纒之猶謂可以踐霜執婦功毛云摻摻猶纎纎也婦人三月廟見然後鄭云言女手者未三月未成為婦也使未三月婦縫裳者利其事也屨要裳腰襋衣領好人猶言貴人輔氏云糾糾葛本不可以屨霜自儉嗇者言之亦可以履霜矣摻摻女手本未可以縫裳自褊急者言之亦可使之縫裳矣愚按即臧文仲妾織蒲類也玩兩可以字但思省事苟可而已好人提提宛然左辟佩其象揥維是褊心是以為刺毛云提提安諦也宛辟貌左辟以右讓人而自避居左謙也象揥貴人飾也凡撙節者必退讓佩象揥而左辟謙徳可風所可刺者褊心耳褊心指上章所言也葛屨二章一章六句一章五句愚按魯公儀休為相去織婦拔園葵惡其奪細民之利也魏俗儉不足刺刺其以士夫之家親鄙細之事如此篇以女縫裳後篇采莫采藚皆與民争小利也與去織婦㧞圜葵事正相反耳故序謂刺褊也汾沮洳序曰刺儉也其君儉以能勤刺不得禮也申培説晉人刺其大夫之詩于晉自成公即位始有公族餘子公行之官官初設晉魏滅于晉獻公成公為獻公孫固知此為晉詩非魏詩彼汾沮洳言采其莫彼其之子美無度美無度殊異乎公路朱註興也毛傳缺之蘇氏云汾水出于晉其流及魏沮與王制沮澤沮同義凡小而水所止曰沮犬而水所止曰澤迷洳説文云漸濕也河莫菜也孔云五方通謂之酸冀州人謂之乾絳汾之間謂之莫驪無度言不可以尺寸量也有怪而惜之之意即初姬之亂詛無蓄羣公子自是晉無公族成公位乃官卿之適子而為之田以為公族又官其餘子亦為餘子其庶子為公行杜預註餘子適子之母弟也趙盾請以括為公族而自為旄車之族乃餘子之職也鄭云公路主君之旄車彼汾一方言采其桑彼其之子美如英美如英殊異乎公行沮洳廣指汾旁所侵之地一方就近水之一處而言比前為差狹矣采桑親蠶事也彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族一曲水流曲處比一方又狹矣班固地里志云魏在晉之南河曲藚陸璣疏云今澤瀉也愚按采莫采桑采藚非大夫自采使其家人采之耳皆與小民争衣食之利也以大夫之家食肉衣帛居移氣養移體故有無度如英如玉之美而下侵小利若此殊不似貴人所為與孟獻子所謂畜馬乘不察于鷄豚者逺矣汾沮洳三章章六句何氏以為刺晉君疎逺公室而信任卿族故因汾水之間有隠居不得位者以采莫采桑采藚起興愚按春秋世卿雖有賢者在下豈能于上其信任卿族不獨晉為然也園有桃序曰刺時也大夫憂其君國小而廹而儉以嗇不能用其民而無徳教日以侵削故作是詩也何氏謂魏詩皆晉詩也晉獻公嬖驪姬欲立其子使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙惟二姬之子在絳國人憂之故托興于園以比絳也桃與棘比驪姬與其娣而其實則比奚齊與卓子也肴之食之言君將立之也史蘇告大夫曰二三大夫其戒之乎亂本生矣此心憂之實據矣園有桃其實之殽心之憂矣我歌且謠不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之葢亦勿思毛傳興也朱註同祀桃果之賤者家語孔子云果屬有六而桃為下祭不用不登郊廟詩意謂圉之中僅有桃棘二者皆賤品也而其實充殽充食比國羣公子皆出獨存奚齊卓子其母皆賤而反得寵必有廢立奪嫡之事故心憂也歌爾雅云徒歌曰謠説文作䚻云肉言也唐人謂徒曰肉聲是也歌謠正以寫所憂其士蒍狐裘䝉茸之歌之類與言我士詩人自謂也以歌謠為驕謂其指斥時事長無忌彼人是哉二句亦不知我者之語愚按彼人指荀息之輩荀息曰君立臣從何貳之有當時必有以此言為是者而轉訝已之云云為已甚也何其者猶云何遽至是也再言心之憂矣因不我知者之言而益重其憂也其誰知之重嗟歎者嗟舉國無人知亂之將作也兄子隲祥云史蘇憂晉亡郭偃謂于晉何害士蒍曰夫子戒也抑二大夫之言其皆有焉子曰何其其郭偃之流乎園有棘其實之食心之憂矣聊以行國不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之葢亦勿思陸氏云大者棗小者棘葢若酸棗也于文重束為棗並束為棘棗性重喬棘則低矣孟子曰養其樲棘則為賤場師葢果實之賤者也吟行國散步國中有禾黍荆棘之歎即屈原行澤畔之意園有桃二章章十二句何氏以為晉人因獻公將黜太子申生而作愚按左傳閔元年晉侯作三軍公將上軍太子申生將下軍以滅耿滅霍滅魏還為太子城曲沃葢自克魏而後讒言彌興故以其詩𨽻魏風明其為禍本歟陟岵序曰孝子行役思念父母也國廹而數侵削役乎大國父母兄弟離散而作是詩也郝氏云陟岵之詩皆行役者述其父母兄弟臨行告誡之語陟彼岵兮瞻望父兮父曰嗟予子行役夙夜無已上愼旃哉猶來無止朱註賦也毛傳缺之爾雅云山多草木曰岵嚴鄭云孝子行役思其父戒上以下供上役也氏云上猶赴也謂赴役也如赴官曰上官赴工曰上工七月詩上入執宫功以由田野入都邑為上此以由家居赴道途為上猶俗諺云上路也猶來者庶幾其來也陟彼屺兮瞻望母兮母曰嗟予季行役夙夜無寐上慎旃哉猶來無棄爾雅云山無草木曰屺章鄭云此又思母之戒無母曰子季謂少子也觀下有兄可見嚴氏云寐猶今言醒睡也行役在途存亡戒心早夜不可安寢毛傳謂母尚恩是也陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死偕毛云懼也囑其必行者俱也猶言勿離伴侣耳念徐士彰云孝子思親不言己之念親而反言親之己則所以存諸心者更切不言己之自慎而言親之欲其慎則所以保其身者益至矣陟岵三章章六句左傳晉文公奔翟時從者五人狐偃一也而狐毛不與及文公入秦毛與偃俱従以不應懷公之召其父狐突死焉豈文公周游列國時毛以舅氏之戚復繼偃而至耶何氏謂此詩狐偃所作愚按當是偃初奔翟時突與毛俱尚在晉故有瞻望父母及兄之語十畆之間序曰刺時也言其國削小民無所居焉水經註云右魏國城南西二面并去大河可二十餘里北去首山十餘里處河山之間土地廹隘故魏風著十畆之詩也十畆之間兮桑者閑閑兮行與子還兮朱註賦也毛傳缺魏十畆甚言其偪側古者一夫授田百畆地隘不足耕墾也十畆之外兮桑者泄泄兮行與子逝兮魏地狹人稠采桑者無所得桑閑閑泄泄絶無與争桑之意以其桑少無可争也十畆之間二章章三句朱註謂政亂國危賢者不樂仕干其朝而思與其友歸于農圃故其辭如此愚按民所恃者農桑農桑無地則民將離矣古者三年大比民數遷徙不禁還者仍還其故土逝者去而别徙矣伐檀序曰刺貪也在位貪鄙無功受䘵君子不得進仕爾坎坎伐檀兮寘之河之干兮河水清且漣猗不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮朱註賦也毛傳缺體毛云坎坎伐檀聲檀漣通作瀾劉熈云瀾連也波轉流相及連也木堅軔可為車為輻為輪比君子之材能任重而行逺也寘置也伐而置之河干置而不用也不稼不穡指當時居高位者皆無功竊禄之小人也之何運亮云河水至濁伐檀而置之河干無有見用期庶㡬待河水之清乎清且漣猗四字虚想之辭以言終無時也曰周禮云種穀曰稼榖可収曰穡毛云一夫之居㕓此曰三百㕓則三百夫之家易云逋其邑人三百户論語稱伯氏駢邑三百葢下大夫食邑制也此云取禾以食邑所入言耳愚按檀以喻賢材伐檀則進賢者以自喻也檀堅而難伐猶賢者之難進也伐檀而置之河干猶進賢而棄之無用之地也因河干而思河水雖濁且有清時朝政濁亂竊禄者滿朝將何由清乎彼君子自不見用然君子亦自不肯與竊禄者同素餐也詩葢進賢者嗟所薦之不得用耳坎坎伐輻兮寘之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮伐輻承上伐檀而言老子云三十輻共一轂説文云輻輪轑也轑葢輪中木之直指者爾雅云河流百里一小曲千里一曲一直億㕓之内有囷每囷各得禾秉一億故詩曰我庾惟是其禾數也三百億即下三百囷也秉把也别爾雅云豕生三豵二師一特註云猪生子常多故其少者之名承狩獵言皆言田豕也坎坎伐輪兮寘之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飱兮言伐輻又言伐輪摠見檀可為車所伐者惟此一檀而已爾雅小波為淪毛云小風水成文轉如輪也囷説文云廩之圜者圜謂之囷方謂之廩者莊子吾未嘗好田而鶉生于宎貆特鶉皆舉其小言之貆為貉子特為豕子特比貆為易得而鶉比特為尤小然且皆縣之于庭以見未嘗擇其大而舎其細則貪之至也夕飱餔也謂晡時食也人旦則食飯則食飱字林云水澆飯也伐檀三章章九句愚按大戴禮投壺篇云凡雅二十六篇其八篇可歌伐檀其一也曹魏時得漢雅樂郎杜夔能歌文王鹿鳴騶虞伐檀四篇皆古聲辭以列國變風與南雅并列而摠稱之為雅豈以其音節不以其辭意耶碩䑕序曰刺重斂也國人刺其君重斂蠶食于民不修其政貪而畏人若䑕也碩䑕碩䑕無食我黍三嵗貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所朱註比也毛傳缺屋碩䑕即鼫䑕也能許愼云五技䑕也能飛不能上能游不能渡谷緣不能窮木能走不能先人能穴不能覆身亦名鼯鼠荀子云鼯鼠五技而窮是也黍者五穀之長詩頌其饟伊黍註云豐年之時雖賤者猶食黍明黍足貴也矣貫説文云習也言女習聚斂以為常至今已三嵗周禮三年大比民數改定版籍此時聽民遷徙故鄭云古者三年大比民或于是徙也碩鼠碩鼠無食我麥三嵗貫女莫我肯徳逝將去女適彼樂國樂國樂國爰得我直羅氏云麥者接絶續春交夏之時舊穀已絶新穀未升民于是乏食而麥最先熟故以為重董仲舒曰春秋于他穀不書至無麥禾則書之重之也食黍不已至于食我麥則民已囷乏極矣嚴氏云直伸也言受抑于此而求伸于彼也碩鼠碩鼠無食我苗三嵗貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號謝氏云食黍不足而食麥食麥不足而食苗苗者禾方樹而未秀也勞慰也首章言顧者存諸心次章言徳者施諸政此章言勞者見諸言也至徒慰人以言而猶不肯則虐之至矣蘇氏云欲適樂郊而不可得故曰誰為樂郊可長號而求之哉碩鼠三章章八句愚按魏與秦僅隔一河左傳晉使魏壽餘偽以魏叛者以誘士㑹既濟則魏人噪而還近可知矣其後秦孝公開阡陌招三晉之民耕種以富其國亦因三晉之人稠地隘易以逃亡故可招而至也觀此詩去女適彼殆先為之兆矣魏國七篇十八章一百二十八句唐譜略唐者帝堯舊都之地今曰太原晉陽是也堯始居此後乃遷河東平陽成王封母弟于堯之故墟曰唐侯南有晉水至子燮改為晉侯野其封域在禹貢冀州太行恒山之西太原太岳之至曽孫成侯南徙居曲沃近平陽焉當周公召公共和之時成侯曽孫僖侯儉不中禮國人閔之唐之變風始作其孫穆侯又徙于絳云愚按太原今太原縣也晉水所出故春秋戰國時皆曰晉陽堯為諸侯時居此後為天子即都平陽矣周成王以封其母弟叔虞曰唐侯今清源縣有陶唐故城俗謂之姚城是堯之故都而唐城又在翼城縣則堯之裔所封也周遷之于杜故為唐杜氏考太原與清源接壤皆為晉陽則當時叔虞所封之唐未必即今太原縣治也因唐有晉水故叔虞子燮改為晉侯燮孫成侯徙居曲沃地里志云即聞喜縣亦非今曲沃也成侯孫穆侯又徙于絳至昭公始以故所都曲沃封桓叔成師而自徙于翼翼在絳東晉于是分而為二魯惠公三十年桓叔伐翼其子莊伯繼之迨孫武公以魯桓公八年滅翼遂併晉國葢晉自穆侯徙絳昭侯徙翼及武公併晉又都絳也絳即今絳州其絳縣則春秋時晉所謀遷之新田耳唐一之十朱註其詩不謂之晉而謂之唐葢仍其始封之舊號耳季札聞歌唐風曰思深哉其有陶唐氏之遺民乎蟋蟀序曰刺晉僖公也儉不中禮故作是詩以閔之欲其及時以禮自虞樂也此晉也而謂之唐本其風俗憂深思逺儉而用禮乃有堯之遺風焉郝氏云國奢濟之以儉國儉濟之以禮晉自僖公之時俗尚固陋儉不中禮蟋蟀之詩諷其終嵗廢禮也孔云樂記禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文註云禮主其減人所倦也樂主其盈人所歡也進謂自勉强惟恐倦怠反謂自抑止惟恐奢放詩人既勸樂惟恐過度故戒之使用禮也蟋蟀在堂嵗聿其莫今我不樂日月其除無已太康職思其居好樂無荒良士瞿瞿朱註賦也毛傳缺主毛云蟋蟀蛬也九月在堂聿遂也除去也康樂職也邠風十月蟋蟀入我牀下固知九月尚在堂也所鄭云君雖當樂亦無甚太樂欲其用禮為節也居之事謂國中政令也瞿瞿顧禮義也詩按瞿瞿有左顧右盼計後思前之意樂何氏云此原不為及時行樂發論正意止在好無荒四字却從今我不樂倒翻來而急以正意喚醒愚按唐以耕稼為俗嵗暮之樂不過斗酒相慰勞耳而已慮其荒儉之至也蟋蟀在堂嵗聿其逝今我不樂日月其邁無已太康職思其外好樂無荒良士蹶蹶邁逺行也按嵗聿其莫可驚也未㡬而莫者又將逝矣日月其除可惜也未幾而除者又將邁矣歐陽子云職思其外廣周慮也過朱註葢其事變或出于平常思慮之所不及故當而備之也毛云蹶蹶動而敏于事輔廣云思之雖周而為之不敏亦無益矣蟋蟀在堂役車其休今我不樂日月其慆無已太康職思其憂好樂無荒良士休休周禮庶人乘役車孔云收禾納稼亦用此車牛車也鄭云役車休則農功畢無事也慆久也即詩慆慆不歸之慆其思其居思其外正思其所可憂者惟主于思憂而憂庶可免也休休爾雅以為儉也亦有安足之意所謂不願乎其外也蟋蟀三章章八句朱註謂民間嵗晚務閒之時乃敢相與燕飲為樂而又遽相戒以無過樂之辭序以為刺僖公儉不中禮愚按詩無刺儉之意勸以不可不樂即戒以不可過樂語氣之開合如此意在相勉以儉也葢唐之風尚如此班固所謂君子深思小人儉陋是也山有樞序曰刺晉昭公也不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能灑掃政荒民散將以危亡四隣謀取其國家而不知國人作詩以刺之也是時桓叔有不軌之謀昭公不知諸大夫難顯言之故作此詩以使之覺悟非相勸為樂也與其齷齪以待亡何如快樂以永日所以發其傷痛之心而振其欲死之氣詩人語苦而意蹙廹矣山有樞隰有榆子有衣裳弗曳弗婁子有車馬弗馳弗驅宛其死矣他人是愉毛傳興也朱註同北樞榆屬亦名荎即刺榆也江南有刺榆無大榆惟方多有之秦漢故塞其地皆榆故曰榆塞是以江南無榆但見樞耳晉地山隰兼有之二有字謂土産所宜當以時取用伐去復生惜而不伐則亦枮死山中為無用之物而已謂也孔云曳者衣裳在身行必曳之子大夫相愉通作覦非詩人之意謂此岌岌者國也此衣裳車馬之物必我輩所能久享何不及今曳婁馳驅之而坐視為他人所覬覦乎愚按漢文帝賛衣不曳地似言其短曳則衣拂地之謂婁僂通因其曳也故婁而攝之以行山有栲隰有杻子有庭内弗洒弗埽子有鐘鼔弗鼔弗考宛其死矣他人是保栲爾雅云山樗也亦類漆樹古諺云櫄樗栲漆相似如一莊子吾有大樹人謂之樗樗以不材而壽杻爾雅云檍也為木多曲少直枝葉茂好正名曰萬嵗以檍有億萬之義也謝朓詩風動萬年枝今以冬青為萬年枝非也詩以栲杻取興豈以栲全天年杻號萬嵗有長保之義故耶山有漆隰有票子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室漆可成琴瑟栗可供籩實故以興下文酒食鼔瑟之事按上章鐘鼔不言日此言何以不日鼔瑟者以士大夫無故不徹琴瑟也登羅氏云登歌惟王備琴瑟諸侯有瑟而無琴燕禮歌有瑟而已所以别于王也日也永日者言來日已短宜及今為樂以延引此呂氏云詩人豈真欲馳驅飲樂者哉激發感憤之至耳呂禄棄軍其姑呂嬃悉出珠玉寳器散臺下曰無為他人守也即此詩之意山有樞三章章八句朱註謂此詩答前篇之意而解其憂言不可不及時為樂然其憂愈深而意愈蹙矣愚按唐俗儉其風土為之也到今猶然未必有刺儉者此殆士大夫相告語行樂之辭正慮其所有為他人有耳葢激發之辭深于勸儉者也揚之水序曰刺晉昭公也昭公分國以封沃沃强盛昭公㣲弱國人將叛而歸沃焉嚴氏云沃有簒謀潘父隂主之將為内應昭公不知此詩正發潘父之謀忠于公者也若真欲從沃則是潘父之黨必不作此詩以漏泄其事也異時潘父弑昭公廹桓叔晉人發兵攻桓叔桓叔敗可以見國人之心矣凌濛初云素衣朱襮何等服物我聞有命何等宻謀而明明見之篇什不敢告人此陽雖為沃隂以聳晉厮養卒所謂名為求趙王實欲燕殺之也是巧于告宻者揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂毛傳興也朱註比也鑿按揚水弱白石剛以喻政令不行頑梗者多也鑿水去而石立也素衣猶純衣即絲衣也襮者繡刺黼文為褗褗者領也此諸侯中衣之制鄭云諸侯繡黼丹朱中衣繡當作綃中衣以綃黼為領丹朱為純也嚴國人具此服將以進之桓叔見欲奉為諸侯耳氏云子指叛者下文君子指桓叔此言子者設言欲叛之人如潘父之徒也言欲從此人往沃以見桓叔其意謂國中有相與為叛以應曲沃者矣此㣲辭以泄其謀欲昭公聞之早為之備也揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂皓白貌水㣲而石顯也凡朱繡繡讀為綃于綃上刺為黼文故謂之綃黼也繢是畫綃是刺綃上刺黼以為衣領然後名之謂襮故爾雅黼領謂之襮則朱繡即朱襮也特異其稱耳鵠者曲沃邑名晉衰沃盛從沃之事既成則可以免禍而無憂矣楊之水白石粼粼我聞有命不敢以告人徐鍇云粼粼水流石間不駛也言水落而石見也昭桓叔簒謀已定如石在水中昭然共見所謂司馬之心路人皆知之也曰我聞者通國皆知之辭命桓叔之命將命其徒以舉事也曰不敢告人則固已告矣揚之水三章二章章六句一章四句愚按沃自桓叔至武公凡屢破晉晉人終不服従相與攻而去之逾數世迫于王命而後不敢不聴當昭公之初晉人之心豈從沃哉此詩故為黨沃之辭乃隂輸其情以告昭公使早為備也朱註以為國人將叛晉而歸沃故為此詩豈有欲叛之人自述其叛志以見諸篇什者乎且叛人之詩又何録焉椒聊序曰刺晉昭公也君子見沃之盛强能修其政知其蕃衍盛大子孫將有晉國焉申培説唐昭侯封公子成師于曲沃成師治聚盛强師服憂之而作是詩昭嚴氏云此詩言桓叔之强而不及昭公其意則憂公之弱言在此意在彼椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且毛傳興也朱註興而比也類爾雅云椒榝醜莍榝茱萸也醜類也椒與茱萸之皆有莍莍者褁實之房也此椒之為物小而芳烈聊且植之耳今其實蕃衍如喻沃也彼其之子指昭公昭公奄有邦國雖碩大而孤立無朋無朋寡助也椒雖聊植之手其枝條日以長逺言助者多也愚按逺條者言椒植于彼而條及于此比桓叔在沃羽翼遍晉國也惟朋皆為沃所有故之子無朋椒聊之實蕃衍盈匊彼其之子實大且篤椒聊且逺條且上章言盈升此言盈匊言益多也不復以升較矣之篤者厚也因昭公之于沃無猜忌而美以篤厚名愚按淮南子云夏蟲不可以語氷篤于時也篤字亦不達時變之謂椒聊二章章六句何氏謂椒聊之實比從桓叔于曲沃者其黨繁盛也彼其之子指晉之忠臣如師服之流時晉人多趨曲沃而之子獨介然特立不與之為黨故稱以碩大無朋而守志篤信不移也然羽翼既成枝條布濩勢必至遍地皆椒胥晉人而化為沃人矣之子且柰何哉綢繆序曰刺晉亂也國亂則婚姻不得其時焉鄭云不得其時謂不及仲春之月章朱註男女有失其時而後得遂其婚姻之禮者首婦語夫之辭次章夫婦相語之辭末章為夫語婦之辭綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何毛傳興也朱註同譬毛云綢繆猶纒綿也耳蘇氏云合異姓以為婚姻如錯取衆薪而束之薪之為物束則合之而釋之則解是則綢繆固之而後可以望其合也毛云三星參也按參以孟冬之昏見于東方曰在天季冬昏見于東南隅曰在隅正月昏見于南方曰在户戸南向也古者自九月霜降至二月氷泮為婚姻之期故以參為候為鄭云三星謂心也心為二月之合宿故嫁娶者以候昏而火星不見嫁娶之時也見按心三月昏見于東五月昏見于東南隅六月昏于南方當戸七月西流九月之昏西伏戌位而參始東出心出則參退而婚禮終參出則心退而婚禮始今心正見故為不得其時鄭云今夕何夕言此夕何月之夕乎而女以見良人言非其時也子兮子兮或謂女或謂男皆自詩人稱之綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何芻説文云刈草也配不以正猶之束亂草而已五毛云隅東南隅也鄭云心星在隅謂四月之末月之中愚按邂逅不期而遇謂六禮不備也綢繆束楚三星在户今夕何夕見此粲者子兮子兮如此粲者何楚在衆薪中特為翹楚故以興粲者見其美異于他女耳毛云參星正月中直户故云在户鄭云心星在户謂五月之末六月之中為粲者美稱言女雖美而婚非其時于禮目之以奔可惜也見者自詩人旁觀者見之非指男女相見也愚按啓齒而笑之為粲過時得偶幽憂久而為之一粲耳綢繆三章章六句愚按序云國亂婚姻失時此於初婚之時旁人為之慶喜之辭薪與芻與楚之束猶男與女之婚合異以為同也非綢繆則束之不固比之同牢合􅈟多其繁數禮文皆所以綢繆之也三星昏見于東移時而東南隅又移時而南葢綢繆之久而夜既深矣子兮子兮皆自旁人謂之良人為女謂男也粲者男謂女也邂逅謂男女相謂也如此何諧謔之辭慶喜之餘乃作此語杕杜序曰刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所併爾有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉毛傳興也朱註同酢杜與棠類赤者為杜白者為棠棠實甘杜實澀而無味語云澀如杜是也毛云杕特貌葢樹之特生者其湑湑潤澤貌生嚴氏云木無枝葉則根上土燥而木易枯有特之杜湑湑其葉雖無旁木之䕃而葉獨足以庇其本根也人踽踽無所親也無所親曽杕杜之不若矣行之猶言路人也比親宻也佽助也則言他人不足恃不如同父之人也若以他人可恃路人亦人胡不見親彼見我之無兄弟胡不相助以非同父故情不相闗耳兩胡不喚醒之辭愚按人無兄弟人字自行之人謂我而言有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉毛云睘睘無所依也説文云目驚視也獨行多懼故有此狀白虎通云姓生也人所稟以生者也按姓與氏有辨姓者所以系統百世使不别氏者所以别子姓所出故言姓即在上言氏即在下同姓雖非同父猶愈于他人耳杕杜二章章九句朱註謂此無兄弟者自傷其孤特而求助于人之辭愚按晉士蒍與羣公子謀譖富子而去之又使羣公子殺游士之二子而桓莊之族以盡詩人殆知其謀而以是諷羣公子歟羔裘序曰刺時也晉人刺其在位不恤其民也羔裘豹袪自我人居居豈無他人惟子之故朱註賦也毛傳缺口鄭云羔裘豹袪卿大夫在位之服也袪孔云袂也袂是袖之大名袪是袖頭之小稱其通皆為袂以深衣云袂之長短反屈之及肘是通袪皆為袂也毛云居居懷惡不相親比之貌為居通作倨漢書丞相條侯至貴居以居倨也居居言其一性驕狠無所顧惜羔裘豹褎自我人究究豈無他人惟子之好毛云褎猶袪也説文云衣袂也究説文云窮也曰究究者毎事窮究到底不留餘地孔云北風刺虐則云攜手同歸碩鼠刺貪則云適彼樂國此則念其故舊恩好不忍他去足見唐風之厚羔裘二章章四句愚按亦晉人憂曲沃之逼而在位者不恤其民驕居刻核故作詩以警之我人謂晉大夫他人指沃也時事至此晉人猶戀戀故主異時沃屢破晉而晉人不叛有以也夫鴇羽序曰刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也晉自潘父弑昭侯納桓叔不克晉立昭侯子孝侯為桓叔子莊伯所弑復立孝侯弟鄂侯莊伯伐之桓王使尹氏武氏助之鄂侯奔隨已而曲沃叛王王命虢公伐曲沃而立鄂侯子哀侯後為莊伯子武公虜而殺之晉立哀侯子小子侯武公又誘殺之于是王又命虢仲立哀侯之弟緡此序所謂大亂五世而詩所稱王事靡盬也是詩其作于桓公十四年王命立緡之時乎肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍父母何怙悠悠蒼天曷其有所毛傳興也朱註同無孔云鴇鳥連趾性不樹止鳥鴇無舌兔無脾葢鴇舌連趾不木栖水鳥也水木栖既失其常又無後趾尤不得其所止矣北栩爾雅云杼也或云橡斗一名槲鄭樵云南多槲多櫟即一物也致物叢生曰苞齊人名曰稹鄭云稹者根相迫迮捆貌以王命征伐謂之王事翼與曲沃攻伐不休禍起于桓王之助曲沃咏靡盬譏之也奮周昌年云此言王事靡盬與他處不同他處意在忠此則直以失所而志怨耳肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷有其極極止也言何時得止此征役也征役止則得耕田以供子職矣肅肅鴇行集于苞桑王事靡盬不能蓺稻粱父母何甞悠悠蒼天曷有其常鴇行羡其以類聚傷已之不如也之甞口試其味也郝氏云米之精者曰梁良也穀大者亦曰梁今高粱之類鴇羽三章章七句愚按桓王初助沃以伐晉沃既叛王王又命虢公伐沃屢立晉君皆為晉人所殺戰争不息此所謂王事靡盬也晉猶鴇乎所集惟栩與棘桑其不足以栖托審矣無衣序曰刺晉武公也武公始并晉國其大夫為之請命乎天子之使而作是詩也申培説武公偁弑三君而取其國盡以寶器賂周僖王王命之為晉侯國人作此詩以刺之左傳桓八年王使立緡于晉至莊公十六年乃云王使虢公命曲沃伯以一軍為晉侯武公雖已封侯而僅立一軍者以其篡晉得之故晉雖大而禮僅從小國也豈曰無衣七兮不如子之衣安且吉兮朱註賦也毛傳缺王毛云侯伯之禮七命冕服七章専言衣者古禮命諸侯則皆以衣錫之春秋文元年天王使毛伯來錫公命公羊傳云錫者何賜也命者何加我服也曲沃自桓叔乘潘父之難入晉為晉人敗歸其後屢得屢失亦知不受王命之不安矣此衣既受于天子則可以杜絶衆忿壓服人心而無終朝三禠之患所以賂王請命者意正在此但嚴氏云五代劉仁恭謂梁使者曰旌節吾自有之要長安本色耳與豈曰無衣之言一也如郝氏云子指王使也言我豈不能自製此服但不子之所齎來者借重王命為安吉耳豈曰無衣六兮不如子之衣安且燠兮毛云天子之卿六命車旗衣服以六為節三典命職云上公九命侯伯七命子男五命天子之公八命卿六命大夫四命説者以為在王朝則全乎臣故命數儀等從隂以近王而屈出就封全乎君加一等命數儀等從陽以逺王而伸晉侯爵出得七命則入為王卿正得六命也晉之先君見經傳者如燮父事康王文侯輔平王皆入為王卿六衣亦晉故物也以燠與煖同服久則煖命出天子無更易之患故可久而煖也無衣二章章三句愚按郝氏謂虢叔錫命大夫作詩以美其君非美之也葢大夫苦晉國人心不服喜于得王命以鎮壓之向王使稱謝耳其辭氣悖慢與唐世藩鎮坐邀旌節者無以異也有杕之杜序曰刺晉武公也武公寡特兼其宗族而不求賢以自輔焉愚按三國時賈詡謂袁紹使者曰歸語袁本初兄弟不相容焉能用天下國士乎即此詩意有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之毛傳興也朱註比也杜鄭云道左道東也日之熱恒在日中之後道東之人所宜休息也今人不休息者以其特生隂寡也持丘光庭云日中之後樹隂過東杜生道左樹既寡而隂更過東無休息之所故人不來也若朱註噬發語辭安言武公剪滅宗族而得國無親此彼賢人君子肯與共事而適我乎我者自詩人稱其君國而言也中心好之二句亦出自詩人之意言君子相率以去雖好之亦無自而飲食之也有杕之杜生于道周彼君子兮噬肯來游中心好之曷飲食之毛云周曲也國朱公遷云道左則闢道周則迂適者久居其遊則時一至焉猶之遨遊而已有杕之杜二章章六句何氏謂玩詩語意毋乃為龍蛇之怨而志過乎緜上餓隱欲授餐而無從此固文公所心惻也葛生序曰刺晉獻公也好攻戰則國人多喪矣郝氏謂獻公好戰國人多死于戰詩人托死者之妻悼亡以刺之葛生蒙楚蘞蔓于野予美亡此誰與獨處毛傳興也朱註前二章興也後二章賦也似蘞本草云一名兎荄作藤生根似天門冬疏云蘞括樓幽州人謂之烏服亦孔云此二句互文葛言生則蘞亦生蘞言蔓則葛蔓葛言䝉則蘞亦蒙郝氏云葛生蘞蔓指死所也尸膏草野失其骸骨故曰亡此鄭云予美我所美之人謂其君子也愚按誰與獨處二字為句與易匪宼婚媾句法正同猶言寂寞誰與乎獨處而已亡此猶云亡于此地也葛生蒙棘蘞蔓于域予美亡此誰與獨息毛云域塋域也息止也纍詩翼云葛生蒙棘蘞蔓于域宛然荒塚纍祭掃悲哀之景角枕粲兮錦衾爛兮予美亡此誰與獨旦范氏云角枕之粲錦衾之爛則其嫁未久也愚按予美亡此此者正指葛蒙蘞蔓之域因閨中之衾枕粲爛益念荒塚之荆棘凄凉耳獨旦猶言長夜漫漫何時旦也夏之日冬之夜百嵗之後歸于其居鄭云思者于晝夜之長時尤甚永日因夏而永則日之思比夜之數為多夜因冬而則夜之思比日之數為多以見無時不思也居鄭云墳墓也愚按歸于其居承上文三獨字來言今雖獨處幸百年之後有我為伴也冬之夜夏之日百嵗之後歸于其室由夏日而冬夜由冬夜而夏日無嵗不思没身焉而已室鄭云塚壙也滕公墓銘云佳城鬱鬱三千年見白日吁嗟滕公居此室是也葛生五章章四句朱註謂婦人念其夫久從征役不歸而作愚按篇中蘞蔓于域及百嵗之後等句其為悼亡之作無疑采苓序曰刺晉獻公也獻公好聽讒焉鄒氏云史蘇之占曰挾以銜骨且懼有口公曰何口之有口在寡人寡人弗受誰敢興焉而後竟受讒而不知也采苓采苓首陽之巔人之為言苟亦無信舎旃舎旃苟亦無然人之為言胡得焉毛傳興也朱註比也陽苓爾雅云大苦也即甘草采首山一名雷首即首山也鄭云采苓采苓言苓之人衆多非一也皆云采于首陽首陽信有苓矣今之采者未必盡于此山然而人必信之喻事有似而非苓埤雅曰苓生于隰葑生于圃則首陽之巔不必有其下不必有苦其東不必有葑按胡得焉者問其何處得來也凡人言為讒與否未可知且勿輕信則將一槩舎置付之不問乎亦且不可如此但當究其言之何自來耳不嚴氏云推其所自來則虚實立見讒言之得行由問其所由來而遽信之耳漢昭帝悟燕王上書之詐葢察其書所由來也今輔廣云讒譖之人不畏人之不聴而畏人之能審雖不聴彼將浸潤而入之則異日或不能不聽矣惟能審察而有以見其情偽之所以然則不惟不敢進而亦無自而進矣此止讒之法也采苦采苦首陽之下人之為言苟亦無與舎旃舎旃苟亦無然人之為言胡得焉苦即苦菜也月令苦菜秀即此是孔云荼也内則濡豚包苦用苦菜也采葑采葑首陽之東人之為言苟亦無從舎旃舎旃苟亦無然人之為言胡得焉葑即蔓菁上苦下甘甘苦相半也愚按蘦甘而苦讒者之入人必先甘而後苦葑則甘苦相半猶一句言其好一句言其惡也讒人所以甞試人君者無所不用矣采苓三章章八句愚按苓甘以比奚齊卓子苦以比太子申生葑上苦下甘以比重耳夷齊乎首陽之巔升之于上也下者墜之于下也東為日初出之隅過時則不照也國人已聞驪姬之謀故為然疑之語以儆動獻公唐國十二篇三十三章二百三句秦譜略秦者隴西谷名于禹貢近雍州鳥䑕之山堯時有伯翳者實臯陶之子佐禹治水水土既平舜命作虞官掌上下草木鳥獸賜姓曰嬴歴夏商興衰亦世有人焉周孝王使其末孫非子養馬于汧渭之間封非子為附庸邑之于秦谷至曽孫秦仲宣王命作大夫始有車馬禮樂侍御之好國人美之秦之變風始作秦仲之孫襄公平王之初興兵討西戎以救周平王東遷王城迺以岐豐之地賜之始列為諸侯遂横有周西都畿内八百里之地其封域東至迤山在荆岐終南惇物之野至𤣥孫徳公又徙于雍云本孔氏云嬴伯翳之後按伯翳即伯益聲轉字異一人也佐禹治水有功賜姓嬴氏或問姓氏如何分别朱子謂姓是總稱氏是後來次第分别如魯姬姓其後有孟氏季氏皆為姬姓而氏不同也愚按今秦州有秦亭為秦始封之地初伯益之後中潏居西戎以保西垂邑于此伏羲陵在焉六世孫大洛生成及非子非子養馬汧渭之間今隴州南三里尚有秦城是其地也本紀言非子居犬丘犬丘漢之槐里今興平縣去秦州甚逺本非秦地何以本紀云分大洛之國地封非子别為附庸耶則非子所居之犬丘必非此地當即隴州故秦城是耳其後西戎滅大雒宣王命非子曽孫秦仲為大夫伐西戎不克死焉及其子莊公滅西戎盡得大洛之地莊公子襄公以兵送平王東遷平王賜以岐豐之地迨襄公子文公獵至汧渭之㑹曰昔周邑我先秦嬴于此後卒為諸侯乃卜居之則文公復徙居非子故墟也文公孫寧公徙平陽今邵孫是也寧公子徳公始徙雍今鳳翔是也皆在岐西自徳公以後世居雍春秋時秦晉徃來每稱自雍及絳至孝公乃徙咸陽即今咸陽縣也葢由西以漸至于東若云非子所居犬丘即漢之槐里文公因其故都則秦久居岐以東矣文公以後豈更西遷而居雍耶秦一之十一愚按編詩者晉之後即繼以秦以明晉亡而秦興也車鄰序曰美秦仲也秦仲始大有車馬禮樂侍御之好焉郝氏云秦自非子始封為附庸非子曽孫秦仲入為周宣王大夫禮天子之大夫視伯于是始有車馬寺人與諸侯同故秦人剏見誇美有車鄰鄰有馬白顛未見君子寺人之令朱註賦也後二章興也毛傳缺多毛云鄰鄰衆車聲也白顛的顙也陸化熈云車則聲衆故鄰鄰然馬多則色奇故有白顛有寺人閹人周禮天子有之按左傳齊有寺人貂晉寺人披宋有寺人柳是諸侯之官亦有寺人令使也言君子尚未得見但見其徃來奔走者有寺人以供使令也嚴氏云秦前此所未有故詩人美其始有也刪沈守正云夫子刪書以秦誓為殿知代周者秦也秦風以寺人之令為冠知亡秦者寺人也阪有漆隰有栗既見君子並坐鼓瑟今者不樂逝者其耋爾雅云陂者曰阪下者曰隰三按阪秦地多有之地里志隴西有隴阪即今隴山秦記其阪九回欲上者七日乃越高處東望秦川發羅氏云燕秦千樹栗故栗惟秦特饒秦饑應侯請五苑之果蔬橡棗栗以活民可驗也二句誇其土饒物産也愚按秦聲初不過彈筝叩缶耳鼓瑟鼓簧變為夏聲宜聞者之共樂也生長西垂其上下等威本自脱略今初為士大夫習中國威儀然驕嫚成俗一時未能遽變故未見則寺人傳令用新制也既見則君子並坐仍故態也外則君臣内猶儕偶耳故其人便而樂之阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亡尚書以琴瑟為堂上之樂笙簫為堂下之樂鼓瑟堂上常御之樂也鼔簧堂下甚盛之樂也嚴氏云言貴生前得意不則虚老嵗月耳此強毅果敢之氣勇于有為已有安能邑邑以待數十百年之意矣秦之能强者在此而周人之氣象變矣車鄰三章一章四句二章章六句申培説襄公初為諸侯周大夫與燕美之而作愚按逝者其耋其亡等語殊非過客之辭序説為是駟驖序曰美襄公也始命有田獵之事園囿之樂焉鄭云始命命為諸侯也秦初為附庸也百史記秦文公元年居西垂宫三年文公以兵七人東獵至汧渭之㑹乃卜居之此詩當即是文公東獵之事駟驖孔阜六轡在手公之媚子從公于狩朱註賦也毛傳缺四月令孟冬乘鐵驪馬色深黑如鐵也阜高大也馬八轡詩每言六轡者葢駕馬之法有游環以止驂馬之外出有脅驅以止驂馬之内入有脅驅矣則驂馬之内轡無所施繋于軾前而已嚴孔云驂馬内轡納之于觖故在手者惟六轡耳氏云在手言把握其轡能制馬之遲速惟手之是聽也在如師之耳目在吾旗鼔之在以末章載獫觀之知其為大田也奉時辰牡辰牡孔碩公曰左之舎拔則獲奉謂以兩手翼之驅獸而聚之以待君射也辰牡猶言時獸毛云冬獻狼夏獻麇春秋獻鹿豕羣獸孔云公曰左之是公命御者從禽之左逐之欲從禽之左而射之也逐禽由左禮之常法註曰射必中左乃為中殺處拔鄭云括也亦作筈筈㑹也謂與弦相㑹乃受弦孔云既言公曰則是公自舎之獸應弦而獲言善射也遊于北園四馬既閑輶車鸞鑣載獫歇驕養鳥獸曰􅁐􅁐有垣曰園地官載師云以埸圃任園地明去其國近也朱註曰事既畢故遊于北園輶車輕車也鄭云輕車驅逆之車也孔云驅者驅禽使前趨獲逆者御還之使不出圍田僕掌田設驅逆之車車驅之而犬獲之故知非君車也衡鈴在衡曰鸞在軾曰和鑣馬銜鐵也乘車則鸞在此在于䮽故異于乘車也嘗爾雅云長喙獫短喙歇驕也古者狩以講武未以犬從禽載犬者秦之陋愚按鄭箋以遊在先而狩在後謂遊于北園之時時已習其四種之馬故田則克獲也吾謂狩畢而遊喜六轡之應手乃贊其駟鐵曰四馬亦既閑矣以輶車載犬亦因其獵獲有勞而休息之且寵異之也皆田事既竣矜能得意之態鑣齊襄好犬牽犬以鬈偲之士秦襄好犬載犬以鸞之車後世犬馬之好此為嚆矢矣駟驖三章章四句序美襄公始有田狩之事愚按史載秦文公東獵至于汧渭則此宜屬文公文公居西垂而東獵其亦有略地岐豐之意乎小戎序曰美襄公也備其兵甲以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉小戎俴收五楘梁輈游環脅驅隂靷鋈續文茵暢轂駕我騏馵言念君子温其如玉在其板屋亂我心曲朱註賦也毛傳缺小六月詩元戎十乘天子之車也諸侯之戎車謂之戎俴淺也收軫也考工記言軫方以象地即車箱是也載孔云軫者車之前後兩端之横木也所以收斂所故名收焉兵車以馳突為事車箱中空無所收載取其輕利也故曰俴收毛云五五束也楘厯録束交也孔云五楘是轅上之飾言以皮革五處束之所束之處因以為文章厯録然輈即轅也一木當車底中考工記云三分其長二在前一在後其制從後軫至前軫稍曲而上以便兩服馬之進退至施衡之處又曲向下横一木為衡以駕馬因轅形穹窿上曲如屋之梁故謂之梁輈一云制如舟底故名輈也五分其輈之穹每分各束以皮葢恐曲處多是斵成不隨木理易致折耳游環以皮為環即皮圈引兩驂馬之外轡並兩服馬之内外兩轡俱貫于圈内而執之所以制驂馬使不得外出故又謂之靳左傳云如驂之有靳無取于靷也却游者游移不定之義以其在兩服兩驂背上或前或無常處脅驅著服馬之外脅以止驂之入孔云以一條皮上繋于衡後繋于軫驂馬欲入則此皮約之按左右兩邊皆有以此物正當服馬之脅而隔斷兩驂于其外如驅之使不得相近者然故名曰脅驅隂揜軌也軌車下横木以持輪者亦謂之轊以板側揜之曰隂繋靷于此頸孔云車衡之長惟六尺六寸止容二服而已驂馬不當衡别為二靷以引車故毛云所以引也繋驂馬之頸後繋隂板之上朱註靷以皮二條前孔云鋈續是作環相接以白金飾續靷之環按隂與靷原是兩物不相聨屬今綴環于隂板而繋靷于環以聨屬此兩物故名此環為續鋈即今所謂流金是也文茵車中所坐之虎皮也暢轂長轂也轂者車輪之中外持輪内受輻者也按輪之心為轂轂中横截者謂之軸兵車之轂長三尺二寸若大車轂止長尺半耳兵車貴長轂者以其馳驅險阻慮轂短則脱輻也也五楘梁輈所以御兩服也游環二句所以馭兩驂終之駕我騏馵仍主兩服而言即下章騏駵是中是也漢酈道元云上邽故邽戎國秦武公十年伐邽縣之改天水郡其鄉居悉以板葢屋葢西戎之俗也膝孔云馬色之青者名為騏其色作綦文郭璞云馬皆白為惟馵後左脚白直名馵愚按管子有曰甲不堅密與俴者同實將徒人與俴者同實注俴單也言甲不堅與單身無甲者同徒卒無器械亦與單身同也今馬無鞍轡者亦曰俴馬下章俴駟是也四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子温其在邑方何為期胡然我念之承上章駕我騏馵而言駵疑即馵爾雅有駵白駁葢馬有駵色又有白色者名之曰駁上章因其白在足題之以馵此因其體為駵而題之以駵耳驂陸氏云騏駵中駟騧驪上駟驂以騧驪淮南子云欲馳服欲步于毛云黄馬黒喙曰騧驪馬深黒色云盾干也畫龍上合而載之以為車蔽觼説文環之有舌者其形象玦通作觖轡軜驂内轡也馬孔云四馬八轡而言六轡明有二當繫之故驂内轡曰軜不須牽挽繋于軾前繋處有鐶曰觼以白金為飾之按脅驅繫之衡與軫靷則繫之于隂板而軜則繋于軾者也耳邑西鄙之邑也西方早寒以其徳憶其温胡然我念之乃自問之辭俴駟孔羣厹矛鋈錞蒙伐有􅁐虎韔鏤膺交韔二弓竹閉緄滕言念君子載寢載興厭厭良人秩秩徳音韓詩云駟馬不被甲曰俴駟此未進戰時也孔羣言和調也毛云厹矛三隅矛也曲禮云進戈者前其鐏進矛者前其錞鋭底曰鐏平底曰錞云朱註鋈錞者以白金鋈矛之下端平底者也毛蒙討羽也伐中干也鄭云蒙龎也討雜也畫雜羽之文于伐曰龎伐􅁐文貌陸化熈云厹矛以敵人蒙伐以自衛鋈之畫之俱尚文采之意以膺馬胸之帶刻金飾之曰鏤或云膺弓室之胸言虎皮為韔而以金鏤飾其胸非鈎膺也以上下文皆言弓不宜及馬飾耳氏交韔二弓孔云交二弓于韔中謂顛倒安置之王云韔必二弓如有副馬以備壊也于竹閉一名䪐亦作祕周禮註云弓檠也弛則傅之弓裏備損傷也以竹為之緄繩也縢約也弓體欲正故以竹為閉象弓之形納于弓之裏用繩約之而後納于韔考工所謂紲也謂陳祥道云秘以閉之故亦謂之閉緄以繫之故亦之紲如此則納之韔中可以定徃來之體祛翩反之病矣有毛云厭厭安静也秩秩常也愚按先秦之世良人為君子通稱呂氏紀序意曰秋甲子朔朔之日良人請問十二紀註良人君子也厭厭安也秩秩有序也首章思其温温之徳此思其秩秩之音皆宛然在耳目間何氏以為襄公之救世父國人思之良是小戎三章章十句史記秦本紀云莊公生子三人長男世父世父曰戎殺我大父仲我非殺戎王則不敢入邑讓其弟襄公為太子自將撃戎襄公立二年戎圍世父于犬丘世父擊之為戎所虜嵗餘復歸世父何氏謂是詩之作當是世父遇虜之年襄公興師伐戎戎因秦師車甲之盛自知不敵故歸世父耳篇中言念君子念世父也在其板屋念世父被虜在戎地也温其在邑憶其居犬丘之邑而今返邑之無期也厭厭秩秩二句言世父之足繋人思也國人思之如此襄公大舉兵往救所以人樂為之用也蒹葭序曰刺襄公也未能用周禮將無以固其國焉按秦至襄公子文公始有岐豐之地此詩當屬之文公蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡游從之宛在水中央毛傳興也朱註賦也即郭璞云蒹萑之未秀者即今之荻葭葦之未秀者今之蘆蒹高數尺今人以為簾箔因此為名也今白露况周之徳澤霜以况秦之肅殺也岐豐之地為秦有秦變周道猶露之凝而為霜蒼蒼者其何以堪豐伊人追思昔日治天下之人指文武也文王都豐依灃水武王都鎬鎬依鎬水故以在水一方言之下毛云逆流而上曰遡洄順流而曰遡游愚按秦地諸水皆發源隴外以達豐鎬故由岐而西為逆流由岐而東為順流遡洄從之則秦都是也畏法令之慘礉悲行路之艱難遡游從之則豐鎬吾舊都焉先王之遺澤未冺猶宛在其地也宛在者猶云夢想所存葢思周之甚耳蒹葭凄凄白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻凄通作萋晞乾也鄭云未晞未為霜也時當八月雖邊塞早寒而露亦有未盡凝為霜者以喻王澤之猶未熄也湄孔云水草交際之處水之岸也略躋陞也逆流漸上與陞高同也坻水中地之高者蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚曰采采者非一辭也先言蒼蒼繼言凄凄至是可以采矣猶是八月之時白露方下而未止也子貢曰文武之道未墜于地白露未已之况也小按秦都是時尚在鎬京之右沚小渚也爾雅云洲曰渚小渚曰沚小沚曰坻蒹葭三章章八句朱註謂此詩不知所指申培説君子隱于河上秦人慕之而作是詩愚按秦以攻戰為事詐力相傾其上不重好修之士下亦不知有恬退之節所謂隱君子者誰與即有之秦人亦必不慕之矣終南序曰戒襄公也能取周地始為諸侯受顯服大夫美之故作詩以戒勸之歐陽子謂自戎侵岐豐周遂東遷雖以岐豐晹秦而終襄公之世不能取之但嘗一以兵至岐至文公始逐戎而取岐豐之地則是詩咏文公也愚按本紀謂文公收周地至岐岐以東獻之周終南山在岐之東南則是併得岐東之地非惟自岐以西也終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉毛傳興也朱註同與終南即中條山周都豐鎬面對終南梅通作枚汝墳篇條枚義同至止鄭云受命服于天子而來也逐戎之後奄有岐豐之地終南遂為秦鎮故盛美之玉藻云錦衣狐裘諸侯之服也又云君衣狐白裘錦衣以裼之之渥丹鄭云言赤而澤也其君也哉蘇氏云嚴憚辭也蔡汝楳云秦人稱其君曰其君也哉而生其矜心周書曰擩子王矣而生其懼心敬肆所以關乎盛衰也終南何有有紀有堂君子至止黻衣繡裳佩玉將將壽考不忘紀通作屺毛云基也謂山基也爾雅云山如堂曰密郭璞以為形如堂者以五色刺文謂之繡以黒青兩色繡為兩已相背則名黻衣之章用繪裳之章用繡故云繡裳佩玊見非三命黝珩之舊也壽考不忘祝其居此位服此服長久安寧不忘王命也愚按紀言山之條分枝析如網之有紀也堂言山之展勢開基地形寛平也上章條梅謂其材木足用此章謂形勢可居望君之建都于此也終南二章章六句愚按岐豐之地自幽王被殺犬戎盤據其中平王以賜襄公使之自取襄公不能取也易世之後至文公始逐戎而有之葢至是而周之遺民乃重見終南山重覩中國之衣冠也美之為君祝以壽考周人自是始為秦人矣黃鳥序曰哀三良也國人刺穆公以人從死而作是詩也應劭云穆公與羣臣飲酒酣言曰生共此樂死共此哀于是三子許諾及公薨皆從死匡衡謂秦穆貴信而士多從死即其事也在括地志云穆公冢在岐州雍縣東南二里三良冢雍縣一里故城内逈不相及葢從死而非同塟也而申培説秦穆公卒世子罃以三良殉之秦人傷之作是詩蘇子瞻亦云穆公生不誅孟明豈有死之日而忍用其良罪康公也孔云不刺康公而刺穆公者是穆公命從已死此臣自殺從之非後主之過也愚按穆公養士能得志而令之死是即穆公死之也葢霸主之恩惠結人不知王者蕩蕩無私之道也三良從死非殉塟也此後人弔三良墓之詩交交黄鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身毛傳興也朱註同哲交交羣飛徃來之貌止郝氏云黄鳥知時以比賢棘與桑楚不當止而亦以譏三子也從穆公者謂從死也此事後之言觀穆公稱諡可見特傑出之稱奄息為百夫之特故願以百身贖之後皆倣此為朱子云三人者不食其言以死從君而詩人不以美者死不為義不足美也晏平仲謂君為社稷死則死之斯得矣愚按臨其穴是後人弔墓者登臨其壙穴而念秦法之酷三良一時併命甚可懼也若以三良臨穴而惴慄則先自殺矣而猶惴惴于臨穴乎交交黄鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身黄佐云桑人所嘗采亦非安止之地與棘相似防坊通言其行有坊表也交交黄鳥止于楚誰從穆公子車鍼虎維此鍼虎百夫之禦臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身楚人所嘗刈亦與桑相似敵禦猶敵也言其才徳出衆一人足以百人也黄鳥三章章十二句楊慎云蒙恬傳曰昔秦穆公殺三良而死罪百里奚而非其罪然則百里奚亦不終秦真少思哉愚按諡法名與實爽曰繆繆通作穆此詩特表其諡當時或因此事而加此諡也晨風序曰刺康公也忘穆公之業始棄其賢臣焉申培説秦君遇賢始勤終怠賢人譏之鴥彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多毛傳興也朱註同子爾雅晨風鸇也鴥疾飛貌待程子云以晨風興君取其去來之疾人君好賢士有道則賢者歸之禮貌不至則浩然去矣猛郝氏云鸇搏撃羣鳥其疾如風秦俗尚武功士以鷙為賢故以為比臣擇君如鳥擇木故北林鬱而晨風歸喻穆公好賢故賢者望秦國來歸也鄭云穆公始未見賢者之時思望而憂之葢欽欽然惟恐不見今則忘之矣以穆公之意責康公也言忘我之事實多愚按君子指賢人也憂心謂未見賢而憂思指穆公也秦之强皆由禮賢所致後之人坐享其成忘其所以致治之故矣我者自賢者而言也遇賢禮衰詩人代為賢者懐古傷今以刺之山有苞櫟隰有六駁未見君子憂心靡樂如何如何忘我實多木叢生曰苞櫟即唐風鴇羽篇所謂栩也秦人謂之柞櫟木不出火惟櫟為然亦應隂氣也羅氏云梓榆以木兼駁馬之名又曰馬梓其樹皮青白駁犖遙視之似駁馬故名愚按上章指逺方之士歸秦者而言下二章則言秦地所産之材亦不見禮耳山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多爾雅云唐棣栘常棣棣棣之名惟常棣得專之今檖毛云赤羅也陸氏云其文細宻如羅郭璞云楊檖也實似梨而小酢可食無嚴氏云山隰皆有林木可以大國而賢人乎晨風三章章六句愚按此詩與蒹葭篇皆是苦秦思周之作謂平王東遷遂忘我周人而不顧也晨風之摶撃北林之隂幽皆以比秦礉慘肅殺之氣櫟與棣土産也種種叢生今至于櫟皮斑駁檖而成樹則歴年久矣皆周時遺植也王棄之如遺覩樹思周正以見苦秦之虐也無衣序曰刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉按史記周厲王無道西戎反王室滅犬丘大駱之族宣正即位以秦仲為大夫誅西戎仲遂死于戎王立其子莊公與兵七千使伐西戎破之盡復大駱犬丘之地命為西乘大夫居其故地犬丘此詩從征之士所作豈曰無衣與子同袍王于興師修我戈矛與子同仇朱註賦也毛傳缺玉嚴氏云曰子者行伍相爾汝也毛云袍襺也藻纊為襺緼為袍緼謂今纊及舊絮也然則純著新緜名為襺雜用舊絮名為袍戎郝氏云戈二刃旁一鈎矛即今之鎗同仇謂西反王室殺天子之命使此必討之仇也豈曰無衣與予同澤王于興師修我矛㦸與子偕作澤裏衣也以其親膚近于垢澤故謂之澤枝郝氏云㦸柄長戈柄短㦸三刃上出説文云有兵長丈六尺也地晁錯云兩陣相近平地茂草可前可後此長㦸之劒盾三不當一仇以心言作以氣言豈曰無衣與子同裳王于興師修我甲兵與子偕行甲鎧屬周禮註云古用皮謂之甲今用金謂之鎧無衣三章章五句申培説秦襄公以王命伐戎周人赴之朱義曰岐豐之地雖已屬秦然猶有先王之遺民焉故其所以相告語者如此曰王于興師欲其君奉王命而為討賊復仇之舉也志謝氏云讀文侯之命知諸侯無復仇之矣獨無衣一篇猶見人心焉渭陽序曰康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也我送舅氏曰至渭陽何以贈之路車乘黄朱註賦也毛傳缺地鄭云秦是時都雍至渭陽者葢東送舅于咸陽之山南為陽北為陰水北為陽南為隂咸陽在渭水之北故云渭陽之孔云雍在渭南晉在秦東行必渡渭路車諸侯車乘黄四馬皆黄也重耳君晉實藉秦穆之力太子罃贈以諸侯之儀所以鄭重此行而假以定晉也我送舅氏悠悠我思何以贈之瓊瑰玉佩嚴氏云送舅而有所思則思母也此詩念母而不言母但言見舅而拳拳不己念母之意自見佩玉之制惟天子用純諸侯以下則玉石雜用玉佩謂珩璜瓊琚之屬渭陽二章章四句愚按左傳重耳卒後七年康公即位相去甚逺無縁此時復述其事而著之詩豈亦有慨于令狐之役謂秦昔日曽以厚施而晉今日竞以薄報乎背晉之負秦非一事矣重耳由秦有晉入晉而即秦所謂許君焦瑕朝濟而夕設版焉此其一端也至襄公後遂與秦世仇使呂相絶秦反以令狐之役歸罪于秦且曰康公我之自出謂康公為忘本者玩渭陽之詩情辭篤摰晉之惡不暴而自著矣權輿序曰刺康公也忘先君之舊臣有始而無終也於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿朱註賦也毛傳缺凡夏屋大屋也而揚雄方言云自闗而西秦晉之間物之壯大者愛信之謂之夏法言云震風凌雨然後知夏屋之帡幪也我鄭云渠渠猶勤勤也每食無餘言今遇我薄其食纔足耳故毛云權輿始也造衡始權造車始輿曰始也承繼也言不能繼其始耳愚按夏屋渠渠言君子館餼之外時嘗置酒設宴于宫庭以為禮也今惟以食客待之但得食耳無餘賜矣於我乎每食四簋今也每食不飽于嗟乎不承權輿簋以盛稻粱容斗二升内方外圓曰簋外方内圓曰簠四簋註云禮食之盛也毛云四簋黍稷稻粱公食大夫之禮也而不飽非特無餘已愚按承上章每食無餘而言言其時雖惟有食而食尚四簋今則食不飽矣葢禮益衰而意益怠矣權輿一章章五句秦國十篇二十七章一百八十一句謝氏曰秦本戎俗不得齒中國之㑹盟春秋夷之邑于岐豐其民猶有文武成康之舊俗而秦以法馭之故其發為詩辭者類多尊君親上之義趨事赴公之敏季札聽其樂而曰是謂夏聲能夏始大憂其將有中國矣田間詩學卷四
