body:
  text: 田間詩學卷八桐城錢澄之撰北山之什二之六北山序曰大夫刺幽王也役使不均已勞于從事而不得養其父母焉何氏云篇中自叙偕偕士子則作此詩者為士非大夫矣雨無正之詩曰正大夫離居三事大夫莫肯夙夜即所謂大夫不均燕燕居息也曽我􅉏御慘慘日瘁即所謂偕偕士子盡瘁事國也陟彼北山言采其把偕偕士子朝夕從事王事靡盬憂我父母朱註賦也毛傳缺等郝氏云北山背陽之比把苦菜食苦之比士六爵之一偕偕同也言與衆士子旅行以朝夕從王之事使父母思我而憂溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢王氏云取數多謂之賢禮記曰某賢于某若干與此同義玩後章燕燕居息等語則大夫不止一人凡正大夫及三事所屬之大夫皆在故統以大夫言上章雖言偕偕士子玩此則士子之中已又獨當其勞也四牡彭彭王事傍傍嘉我未老鮮我方將旅力方剛經營四方彭彭説文作騯騯馬盛也有傍通作旁側出無方所之意言既已奉使而又每意外之王事别出多端所以勞而不得息也以鮮通作尟少也以為少而難得也将壮也未老年言方将以力言旅與膂同毛云衆也秦誓旅力既愆夏氏解謂衆力如言目力耳力手力足力是也謝氏云此為役使不均獨勞王事而作若反以王為知己忠厚之至也愚按将任也謂其肯任事也旅力方剛始以力言或燕燕居息或盡瘁事國或息偃在牀或不已于行劉公瑾云以下凡十二句為偶皆以他人之逸樂對已之憂勞所以形容不均之意詩用十二或字為六偶句對舉相形上六句所稱分六種人下六句所云則自道也首言燕燕居息指大夫也自息偃在牀以下情状各别則三事大夫之屬耳也居謂私居息謂休息言惟休息于私居無所事事事國則日從事于國也與居息對看于床安身之坐左傳薳子馮詐病掘下氷而床焉至恭坐則席也休息而偃卧于床如今仕者之引疾在告也在不已于行謂奔走道路無止日也與床對或不知叫號或慘慘劬勞或棲遲偃仰或王事鞅掌叫釋文作嘂大呼也文孔云居家用逸不知上有徵發呼召也慘慘釋作懆懆以别于下文之慘慘畏咎與劬勞連言所謂勞人懆懆也請棲遲于家或偃或仰象其夷猶自得如今仕者之急休沐得適意也肩鞅馬鞅也控馬者執鞅在手一釋手則馬逸矣身王事如納鞅掌中無時可以暫釋也與棲遲對愚按鞅掌即指勤于馳驅掌不離鞅猶言身不離鞍馬耳或湛樂飲酒或慘慘畏咎或出入風議或靡事不為湛通作酖説文云樂酒也凡酖酒而曠職者以其咎責不及故能適意如此慘憂也咎猶罪過也救過不暇其焉能樂畏者樂之反也愚按責不在身言之甚易出入優㳺髙談闊論豈知為其事者之難彼則無事不議此則無事不為雨無正詩曰匪舌是出惟躬是瘁言已不得言事而但任事之責也與徒有言者對看北山六章三章章六句三章章四句謝氏云自古君子常任其勞小人常處其逸君子常任其憂小人常享其樂雖曰役使不均我獨賢勞然君子本心亦不願逸樂也無將大車序曰大夫悔將小人也鄭云周大夫悔将小人幽王之時小人衆多賢者與之從事反見譖害自悔與小人並鄒氏云玩詩意非以大車比小人其諫士大夫之貪位擅權者乎王室不網􅀸大夫相與争政而釀釁故曰民之無良相怨一方受爵不譲至于已斯亡此大夫必力小任重又戀不能舍其所謂百憂亦不過患得患失自貽伊戚而已詩人諫以弛于負擔無徒自苦為也故曰無思百憂無將大車祗自塵兮無思百憂祗自疷兮朱註興也毛傳缺載將扶進也車孔云冬官車人為車有大車平地任之車也其駕牛酒誥曰肇牽車牛逺服賈須人傍為将之以疷病也小人進用則蠱惑君王之視聽以是為非非為是國事受其紊亂人才受其顛倒如塵障天舉世昏濁其可憂者非一端故思之而至于病也愚按大車任重駕大車之牛乃以比小人所謂力小而任重也無將大車維塵冥冥無思百憂不出于熲鄭云冥冥者蔽人目明令無所見也熲耿同小明也愚按憂思之深意中所見惟此一事欲暫昧而不能曰耿言可憂多端但勿思也有思則不出此數端時來影現耳無将大車維塵雝兮無思百憂祗自重兮雝與壅同先言塵繼言冥繼言壅小人之勢日盛一日是其始将之之過也重猶累也王氏云凡物之行不為物所累則輕而速為物所累則重而遲此言不思則已一思則百端交集徒自覺重累耳無將大車三章章四句愚按荘子曰親權者不能與人柄操之則慄舍之則悲故千古之小人不肯一日無權将大車者貪國之權者也篇中三塵字從大車來盖權勢所在囂塵集焉王茂𢎞所云元規塵汚人也貪将大車者正貪其塵耳小明序曰大夫悔仕于亂世也歐陽子云大雅明明在下謂之大明小雅明明上天謂之小明自是名篇者偶為誌别耳何氏云此西征大夫困于行役瓜期已踰而代者不至故作此詩當與北山合看明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懐歸畏此罪罟朱註賦也毛傳缺初呼明明者欲天之見察也麗説文訓艽為逺荒吉朔日也載猶更也離與同猶厯也玩二月初吉當是此時作詩之日非徂征初行之時後章云昔我往矣日月方除則知此大夫徂西在前嵗之十二月中厯一嵗猶未得歸故云載離寒暑共人指在内僚友行役之人以在朝供職者為美任稱共人羡之也後稱靖共爾位即指此人昔我往矣日月方除曷云其還嵗聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懐顧豈不懐歸畏此譴怒日月方除謂十二月也當徂征之時預計之曰何時可以言歸必嵗莫方竣此役盖以匝嵗為期也庶衆也憚癉通病也不暇謂身獨事衆勞瘁已極有不暇病者以此益睠懐在朝之共人耳愚按日月方除及下文方奥皆周之丑月上章所謂二月初吉也嵗聿云莫是夏九月十月之交采蕭穫菽正其時也若用夏正便訓不去昔我往矣日月方奥曷云其還政事愈蹙嵗聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懐歸畏此反覆奥與堯典厥民隩同義日月正在季冬氣方寒而民聚于室之時也蹙促也采蕭所以祭也穫菽所以畜也事在秋冬之交言嵗行且莫矣人皆有事于此将以為改嵗之備也詒通作貽遺也鄭云我冒亂世而仕自詒此憂悔仕之辭行共人在朝安佚但起而出宿于外便以為勞此役之苦固不知也愚按篇中畏此罪罟畏此譴怒畏此反覆似大夫行役于外而朝有讒嫉之人故憂危之甚非僅傷其久于逺役也後二章以正直望在朝之君子慮朝政之反復反令勞人得罪冀僚友之持公論耳嗟爾君子無恒安處靖共爾位正直是與神之聽之式穀以女君子指僚友即所謂共人也使蘇氏云有久勞于外則必有久安于内者故勉之無以安處為常共通作供勗之自靖以供其職則東西南北自當惟命是從矣正直指人言與者與處也言無與不正不直者處導以擇便偷安之術也嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福吕氏云前三章皆悔仕亂朝苦于勞役欲安處休息而不可得雖懐歸而自知其不可歸故後二章又戒其僚友在朝者深見亂世之不可仕也愚按後二章因已之憂危而重念僚友也盖在外者固無安處安息矣即在朝者亦不宜恒安處恒安息也罪罟譴怒反復内外皆不可測亦惟有靖共爾位以自盡臣道耳所謂靖共者非必以勞瘁為賢但好正直而黜奸邪則所闗于當世者甚大雖鬼神亦必呵䕶之矣好是正直則分别賢佞而在外勞而得罪者庶可免矣神之聴之式榖介福盖以鬼神要之也小明五章三章章十二句二章章六句郝氏云誦其辭悽惋流涕雖叙行役之苦實多悔恨之情各章念彼共人思自全之䇿惟有恭慎庶幾化憂患為景福處亂世而獲安全此其怨悔之意甚明不但為行役而作皷鐘序曰刺幽王也後儒以為刺昭王之詩㑹郝氏云是役也未必無朝而詩但言皷鐘淮水以諷其荒樂逺逰無復先王修禮輯瑞柴望祭告之典所以為刺凌濛初云此詩之刺最為微婉若非憂心一句後人必以為升歌雅樂也皷鐘將將淮水湯湯憂心且傷淑人君子懐允不忘朱註賦也毛傳缺金孔云樂器多矣必先以鐘左傳謂之金奏是先擊以奏諸樂也擊鼔為鼔擊鐘亦為鼔孔云以鼔瑟鼔琴類之故鼔鐘為擊鐘也將將將説文云鐘聲也以其連擊而聲不斷故曰將王嚴氏云周家以仁厚開國故以善人君子稱其先懐畏允信也李氏云聲之所感皆因人之哀樂將亡之政其民困故聞其聲而悲愚按于後王荒淫之時聞先王之樂而思先王之徳其所以傷周徳之衰而悲國之將亡總在言外鼓鐘喈喈淮水湝湝憂心且悲淑人君子其徳不回徐鉉云喈喈聲衆且和也湝湝衆水之貌其禹貢導淮自桐柏東㑹于泗沂水經載入淮之水流甚多故以湝湝言之回者邪曲與正相反樂以象徳觀其樂有節即知其徳之不回鼓鐘伐鼛淮有三洲憂心且妯淑人君子其徳不猶毛云鼛大鼔也即臯也按臯鼔尋有四尺長丈二是大鼔也淮南子云堯舜禹湯武王伐鼛而食奏雍而徹已飯而祭可謂至貴矣氏按周禮大司樂職王大食三宥皆令奏鐘鼔蘇云始言湯湯水盛也中言湝湝水流也終言三洲水落而洲見也言久于淮上也鄭云妯之言悼也説文云動也子華子云憂心有妯心由是以動也愚按其徳即不回之徳不猶言與後之人不相若也皷鐘欽欽皷瑟鼔琴笙磬同音以雅以南以籥不僭欽欽孔云鐘聲也郝氏云聲有度也之明堂位曰大琴大瑟中琴小瑟四代之樂器也古人作樂聲音相保而為和細大不踰而為平故用大琴必以大瑟配之用中琴必以小瑟配之然後大者不凌小者不抑五聲和矣後世有雅琴雅瑟頌琴頌瑟豈其聲合于雅頌􅁘虞書琴瑟以詠則琴瑟之聲所以應歌者也歌者在堂則琴瑟亦宜施之堂上矣笙陳暘云應笙之磬謂之笙磬應歌之磬謂之頌磬磬在東而面西頌磬在西而面東頌磬歌于西是南向北向以西方為上所以貴人聲也笙磬出于東是以東方為下所以賤匏竹也官磬有特縣者名離磬有編磬所以應十二律也周磬師掌敎擊磬擊編鐘言編鐘于磬師則知有編磬矣大則特縣小則編縣儀禮鼗倚于頌磬西紘所謂紘者其編磬之繩與則編磬在西頌磬也特磬在東笙磬也笙磬同音專指笙磬相和而言鄭樵云周世未有樂名南者惟鼔鐘之詩曰以雅以南左氏載季札觀樂有舞象箾南籥者今考南籥南之籥也象舞頌之維清也箾之舞象籥之奏南其在當時見古樂如此文王世子又有所謂胥鼓南則南之為樂古矣以籥孔云謂吹籥而舞也協不僭專就籥舞言樂之章有詩樂之容有舞以籥音舞蹈疾徐有節是謂不僭郝氏云樂所以昭徳也今樂則古樂人非古人焉得無淑人君子之思乎鼓鐘四章章五句韓詩云昭王之時作按史記昭王南巡狩不返卒于江上其卒不赴告諱之也考竹書昭王凡再伐楚其南行過淮再往不返不知此詩作于何時楚茨序曰刺幽王也政煩賦重田萊多荒饑饉降喪民卒流亡祭祀不享故君子思古焉郝氏曰此與下篇信南山甫田大田皆諷幽王而惟此篇首四語思古傷今餘皆極言古時和年豐祭祀燕享宛然身逢其盛而銜恨生今之世意在言外彼何氏云此與信南山皆為祭祀之詩而指各有異為冬祭故其辭曰是烝是享此則秋祭也以祝祭于祊一語知之周禮秋獮致禽以祀祊愚按如何氏説嘗祭也楚楚者茨言抽其棘自昔何為我蓺黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以饗以祀以妥以侑以介景福朱註賦也毛傳缺苦鄭云茨蒺藜也伐除蒺藜與棘自古之人何乃勤為此事乎我將蓺黍稷焉言先王之政以農為本茨言楚楚棘言抽互詞也相與與者黍黍相並如人之有儔侣也翼翼者稷稷輔如鳥布翅相接也吕覽云苗其弱也欲孤其長也欲相與俱其熟也欲相扶是故三以為族乃多粟與與翼翼之謂也此露積曰庾鄭云倉言盈庾言億亦互詞王氏云以上述祭之酒食所自出始而種繼而收連用五我字言一粒皆我精神則皆我孝思也字凡祭以酒食為主而牛羊俎豆佐之以為酒食以指黍稷言角享獻也妥安坐也侑勸也有禮記郊特牲云舉斚詔妥尸古者尸無事則立事而後坐也祝詔主人拜安尸使之坐尸即至尊之位或時不自安則以拜安之也尸三飯告飽祝侑主人拜三拜三侑祝言而不拜主人拜而不言妥侑相繼其禮皆在迎尸初入之時介助也景大也承妥侑來鄭謂祝以主人之辭勸尸侑飽所以助孝子受大福也濟濟蹌蹌絜爾牛羊以往烝嘗或剥或亨或肆或將祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬夀無疆孔云禮大夫濟濟士蹌蹌謂與祭者有容儀也也一作牛羊之盛言濟濟行列整齊也蹌説文云動虞書鳥獸蹌蹌烝絜通作潔劉彝云在滌而芻之也觀下文言以往嘗此則第鮮潔儲之以備用與省牲迎牲不同祭説文云祝祭主賛詞者祝祭于祊為行禮之始祊在廟門内之西既設祭于廟先求神于祊也鄭云孝子不知神之所在故使祝博求之祀輔廣云凡祀祼鬯則求諸隂焫蕭則求諸陽索祭于祊則求之隂陽之間盖魂無不之神無不在求之之備如此郊特牲云不知神之所在于彼乎于此乎或諸逺人乎盖汲汲于求神也廟祀事孔明謂事死如生禮甚明備也先祖通七而言孔云烝嘗時祭也時祭當自禰以上而言先祖者據逺可以兼近皇通作煌有光輝之意洋洋乎如在其上若有神光也神保安也言先祖之神安之而饗其祭祀也朱子謂保為尸之嘉號若楚詞所謂靈保則第五章神保聿歸之前不應變言皇尸載起矣愚按首章極言黍稷之盛所以供酒食也此則絜爾牛羊所以供牲牢俎豆也秋嘗冬烝皆取諸此濟濟蹌蹌宜屬牛羊言此時尚未舉祀特言物之具備以待祀耳觀烝嘗二字槩舉明其未即祀也以往猶云自此以往明有待也祝祭于祊以下始行祀禮執㸑踖踖為爼孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬夀攸酢自祝祭于祊以後神若或至矣此章始行薦熟之禮以尸人也必薦熟而後尸可饗也少牢禮有雍㸑有廩㸑廩㸑以炊米廩人掌之雍㸑以炊肉雍人掌之踖踖敬也爼薦肉之器孔云載諸爼之牲體博大言肥腯而得禮也燔燒肉也炙炙肝也云為爼孔碩謂薦熟也或燔或炙謂從獻也吕氏鄭云君婦謂后也祭祀之禮后夫人主共籩豆註豆薦菹醢之器庶衆也兼内羞庶羞而言周禮大賔要服以内諸侯也大客謂其孤􅀸則客小于賔即所謂衆賔耳此下言旅酬之禮毛云東西為交邪行為錯度法度也卒盡也言獻酬交錯之禮盡合法度也禮器云周旅酬六尸曾子曰周禮其猶醵與註云使之相酌也惟后稷之尸發爵不受旅是旅酬之禮尸亦有之此則專指賔主與兄弟耳祭飲而曰笑語者古者于旅也語通毛云獲得時也卒獲謂笑語盡得其時宜也格作假至也上章既言是饗矣至此始言格者前猶自孝孫之心想像之此則合廟中與主祭者如或見之亦如在之意愚按第五章次君婦于諸宰之下則似非指后意即九嬪世婦御女之屬所以佐后薦徹豆籩者故第五章云君婦廢徹因賛者多人故曰為豆孔庶莫莫者人衆而寂寞無聲也攸酢謂主有獻客必有酢神之報孝孫以福夀猶如酢耳言必然也我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億鄭云我我孝孫也久熯竭也説文云乾貌矣式法也愆過也言禮行既孝孫之筋力宜甚竭而一取法于禮終無過差敬之至也祝工官也官以工稱謂能其事也曰工祝盖周禮大之官也祝以傳達尸之詞命致告者致尸意以告孝孫使受嘏也主人受祭福曰嘏賚賜也少牢禮畧云佐食取黍摶之以授尸尸執以命祝祝受以嘏于主人苾芬孝祀以下皆祝所傳嘏詞也苾芬指黍稷言書曰黍稷非馨明徳惟馨明黍稷有馨也頌所謂有飶其香有椒其馨是也神嗜飲食謂能以孝敬享祀而神嗜之也氏卜者前知之詞肅幾期也式法也戒齊與齋同郝云稷粟也粟與通匡不跛倚敕備也一説齊酒也即五齊之齊既齊如後世飲福酒也言稷不言黍稷為五穀之長言稷可以該黍也鄭云嘏之禮祝徧取黍稷牢肉魚擩于醢以授尸孝孫前就尸受之天子使宰夫受之以筐既筐承既稷言即所以盛稷也既敕者謂祝釋嘏詞以敕之也也徐鉉云極者屋脊之棟莊子謂登屋極者登其脊最髙者為極爾極謂為衆善之極愚按如幾言其應不爽如式言其數不差謂福與徳相召且相當也周家以農事為王業之本故神錫之福自萬夀而外莫大于時和年豐而稼穡豐穰此皆嘏辭也禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼔鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私禮儀既備言祭禮中之儀節無不具舉也謂鄭云鐘鼔既戒戒諸在廟者以祭禮畢戒通作誡警敕也立徂位孝孫往立于堂下西面位也面祭畢主人出于戸外西向祝出立于西階上東祝傳神意告利成于主人按利就養也成畢也言孝子之養禮畢也神具醉止正致告之辭即告利成之意具通作俱孔云言皆醉者所祭羣廟非止一神故也盖嘗為小祫之祭鄭云載之言則也神醉而尸謖送尸而神歸出入奏肆夏尸稱皇尊之也為鼔鐘與鐘鼔有别鐘鼓者二器并作鼓鐘者擊鐘主所謂金奏肆夏也饌鄭云廢去也尸出而可徹諸宰徹去諸君婦徹籩豆而已不遲以疾為敬也愚按俟諸宰徹饌畢君婦始出而徹豆故次君婦于諸宰之後明内外不相瀆也凡祭祀畢歸賔客豆籩同姓則留與之燕所以尊賔客親骨肉也謂之燕私者對異姓言則同姓為私樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔惠孔時維其盡之子子孫孫勿替引之此章承上陳燕私之事以祭時在廟燕當在寢故祭時之樂皆復入于寢而奏之雖燕祭不得同樂而樂器則同故云皆入也也朱註于祭既受禄矣故以燕為將受後禄而綏之殽即祭祀所徹之殽也將奉持而進之也神惠均皇恩洽與祭之人無有怨者皆歡洽而相慶也莫怨具慶四字一反一正愚按神嗜以下重述本日祭祀之事而為慶喜歎美之辭孔惠孔時復賛其祭之美而于禮無所不盡也賛廢也引長也祝其子子孫孫世世勿廢此禮而長行之曲盡家人慰悦慶祝之情楚茨六章章十二句愚按序謂刺幽王之詩通篇誦之與信南山等詩皆極稱美豐登祭祀之盛絶不得所為刺譏之意朱子謂公􅀸有田禄者力于農事以奉其宗廟之祭然禮之見于少牢饋食者初無鐘鼔送尸之禮况滌牛燕毛皆天子之禮乎何氏謂為秋嘗之禮似是信南山序曰刺幽王也不能修成王之業疆理天下以奉禹貢故君子思古焉何氏謂此詩大指與楚茨畧同盖為冬祭而作篇中既言獻之皇祖又言享于祖考所謂祫烝也又趙汸云烝嘗皆祫與祠礿不同烝嘗豐于祠礿烝豐于嘗嘗以嘗新為名烝衆也可以薦者衆也特王制曰天子犆礿祫禘祫嘗祫烝犆特也祫合也祭各于其廟合享同于太廟故有三年之祫大祫也有時祭之祫小祫也小祫止于未毁廟之主大祫則並及毁廟之主信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畝朱註賦也毛傳缺南信通作伸蜿蜒之貌周禮侯執信圭與伸同用山畿内之地甸治也六十四井為甸甸方八里居一成之中成方十里出兵車一乗以為賦法鄧元錫云首章慕稷功也禹暨稷奏平成之烈烝民粒焉言禹甸稷功于禹時成也不斥言稷曾孫著之矣畇畇墾闢貌大司徒以土㑹之法辨五地之物生曰山林川澤丘陵墳衍原隰可為田者惟墳衍原隰耳春秋傳云井衍沃牧隰臯䟽謂九夫二牧二牧而當一井則原隰地之不美者也陳祥道云禹貢于九州之地或言土或言作或言乂盖禹平水土之後有土焉而未作有作焉而未乂于是時人功未足以盡地利故家五十畆而已沿厯商周則田寖開而法備矣故商七十而助周百畆而徹我指曾孫也言我疆我理則知曾孫乃立法定制者故序以為成王家後章言疆埸翼翼則疆為大界埸為小界此即八同井之疆理者順其地勢水勢之所宜也畆勢宜南則同井皆南畆勢宜東則同井皆東也劉公瑾云地之勢東南下水勢皆趨之故順其勢以為遂為溝而或南其畆或東其畆其按百畆有遂同井有溝遂横則溝從遂從則溝横遂東入于溝則其畆南矣其遂南入于溝則其畆東矣上天同雲雨雪雰雰益之以霡霂既優既渥既霑既足生我百穀朱註同雲雲一色也將雪之候如此之説文雰即氛字样也此當通作紛詩作于冬祭時因紀述舊冬之事見一嵗之田功所自始如爾雅云小雨謂之霡霂陸氏云霡者膏潤入土人之脉霂者霂厯沾漬如人沐頭惟及其上枝而已根不濡也霂言其上霡言其下愚按優渥指雪雪欲盛而遍也霑足指雨雨欲微而潤也嵗之豐登其冬必有積雪其春必有小雨故是詩雨言小雪言盛也疆埸翼翼黍稷彧彧曾孫之穡以為酒食畀我尸賔夀考萬年疆者八家同井之疆埸者一夫百畆之埸右埸通作易謂田至此又易主也翼翼言疆之左又有疆埸之左右又有埸如鳥之有兩翼也曰彧彧説文云有文章也或種黍或種稷交錯成章彧彧孔云上言百穀此獨言黍稷黍稷為穀之長故特言之所説文云穀可収穡同井之中有公田其稼皆天子有故曰曾孫之穡先畀予也尊尸與賔所以敬神也此章及下章皆事擬議之詞五六章方言祭時事中田有廬疆埸有瓜是剥是菹獻之皇祖曾孫夀考受天之祜中田公田也廬説文云寄也秋冬去春夏居便孔云古者宅在都邑農時出而就田須有廬舍以其農事地國中為廛廛里所以奠居而廬舍特田中宿息之周禮遺人十里有廬詩云廬旅荘周言蘧廬田之有廬亦若此耳盖疆埸有瓜鄭云于畔上種瓜此埸専指公田之畔八家各私其埸以種果蓏惟公田之埸當屬諸公故于此種植以盡地利所藉以獻皇祖者皆是之自出于民無與也禮云瓜祭上環按環瓜之脱華處也是剥言棗也周禮籩之實果五品一曰􅀥棗居五物之首故舉剥棗以該之菹説文云酢菜也豆之實凡七菹用言疆埸所植非特瓜可以祭也又有可剥可菹以之籩豆者但言剥菹而不言其物惟棗用剥言剥則知其為棗菹惟七種言菹則知其為七菹也禰以上皆稱祖時祭當及禰而第言祖據逺可以兼近愚按獻皇祖而受天祜言不惟皇祖之報以福夀而天已先加厚福于曾孫矣祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋鄭云清𤣥酒也酒鬱鬯五齊三酒也祭之禮先以鬱鬯降神然後迎牲牲用騂尚赤也從以騂牡及下文啓毛取血皆以牛為主牛乃牲之大者于享者祭宗廟之名周禮于天神曰祀于地示曰祭人鬼曰享人鬼者宗廟也殺鄭云享于祖考納享時也納享者謂牽牲入廟將授享人納享而謂之獻于祖考者地官云碩牲則賛賛助也謂助君牽牲入告肥是獻之也孔云鸞即鈴也謂刀環有鈴其聲中節祭義云祭之日君牽牲卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退註疏謂將殺牲故袒然則是卿大夫執之也者啓告也楚語觀射父云毛以示物物色也啓其毛取毛之色以告于祖考鄭謂毛以告純也毛以耳毛為上所謂毛牛尚耳是也其色則赤色所謂從以騂牡是也取血以祭即所謂膟也觀射父云血以告殺註云明不固故也孔云若不殺則無血故以血告殺也郊特牲云毛血告幽全之物也按血是告幽之物言牲體肉裏美善毛是告全之物言牲體外色完具中善則血好外善則毛好也之鄭云膋脂膏也血以告殺膋以升臭合之黍稷實于蕭升馨香也祭義云建設朝事燔燎羶薌見以蕭光以報氣也羶即血膋薌即黍稷是烝是享苾苾芬芬祀事孔明先祖是皇報以介福萬夀無疆烝進也獻按烝即冬祭名牲既殺矣臭既升矣于是始行享之禮謂薦熟也此時始薦黍稷故以苾苾芬芬言而何氏謂楚茨信南山同為一時之作楚茨詳于後畧于前自祭祊以前但以祀事孔明一語該之信南山詳于前自薦熟以後亦但以祀事孔明一語該之而所謂孔明則在楚茨篇執㸑踖踖以至皷鐘送尸等事也于此亦見古人文字之妙信南山六章章六句朱子疑與信南山甫田大田即為豳雅愚按詩從以騂牡明是周有天下一代所尚非邠侯所宜有且我疆我理王事也鸞刀啓毛王禮也以曽孫田之與維禹甸之並稱則其曽孫必立法定制之王者也朱註謂大指與楚茨同序云刺幽王郝氏云維禹甸之思古傷今猶前篇自昔何為之意亦刺在言外也按毛氏以谷風至信南山十篇為谷風之什甫田序曰刺幽王也君子傷今而思古焉鄭云刺者刺其倉廩空虚政煩賦重農人失職傷郝氏云首章傷今之意宛然思昔曽孫能繼古人今人不能繼曽孫也土周禮春官籥章職云凡國祈年于田祖龡豳雅擊鼔以樂田畯朱子疑楚茨信南山甫田大田四詩為豳雅何氏謂此篇及大田二詩篇中皆言田祖故禮用以迎年于田祖也又皆稱田畯故禮吹之于籥以樂田畯也愚按楚茨為嘗祭之詩信南山為烝祭之詩甫田大田皆田功報祭之詩四篇本周先代樂曲也厲王流彘禮樂散失宣王中興初年即有雲漢之詩所云祈年孔夙方社不暮具如此詩之㫖晚年不藉千畆日窮兵于外祀典荒矣四詩雖存于樂官而禮久不行樂亦罕御當必幽王之初新王即位舊典修舉而四詩復各得其用故録為幽王世之詩倬彼甫田嵗取十千我取其陳食我農人自古有年今適南畆或耘或耔黍稷薿薿攸介攸止烝我髦士朱註賦也毛傳缺又毛云倬明貌甫田謂天下田也説文云甫大也美稱也鄭云甫之言丈夫也太古之時以丈夫稅田也嵗取十千于井田之法則一成之數也朱註一成之田地方十里為田九萬畆而以其萬畆為公田盖九一之法也賖毛云尊者食新農夫食陳鄭云倉廩有餘民得貸取食之所以紓官之蓄滯亦使民愛存新穀自古豐年之法如此謝氏云民生于三代之後其命制乎天民生于三代之前其命制乎君制命之道取民常少與民常多從古以來豈無水旱霜蝗吾民常如有年者上之人斂散得其道也時馬端臨云三代有補助之制未聞責其償也春秋始有施舍已責之説家量貸而公量收之説矣鄭今適南畆専為省耘之舉耘除草也耔雝本也云于古言税法今言治田互詞烝進也髦俊也介舍也工朱註俊士秀民也古者士出于農而商不與焉愚按介助也指同井合作而言止息也指聚處講習而言烝衆也髦士總角俊少之士古者士出于農言此少壯之衆皆我髦士也以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊皷以御田祖以祈甘雨以介我稷黍以穀我士女毛云齊通作齍以六穀實之于器為六齍六穀者黍稷稻粱麥苽也曲禮稷曰明粢言齊明者于六齍中専指稷也稷為五穀之長故首舉以該之牢色純曰犧牛羊豕具曰太牢但有羊豕無牛曰少此獨言羊舉羊以該豕少牢禮也其社后上也左傳共工有子曰句龍職主土地故謂官為后土死以配社神而祭之毛謂后土者是句龍所居官職之名非與皇天對言之后土也曲禮云天子祭四方嵗徧諸侯方祀嵗徧疏云方祀者惟祀當方耳註謂祭四方祭五方之神于四郊也句芒在東后土祝融在南蓐收在西𤣥冥在北也琴瑟擊鼔據周禮為擊土鼔祖御迎也田祖先嗇王氏謂生為田正死為田猶樂官之死而為樂祖也子呉徳操曰何氏謂田祖即稷自夏以上祀烈山氏柱為稷至商始以棄代之夫啓蟄之月業郊祀后稷以祈農事矣豈宜復稱田祖與方社同祀乎孔云雨以長物則為甘以害物則為苦左傳曰秋無苦雨謂無害物之雨為民所苦也介助也黍稷當薿薿之時得雨助之則秀實在望所謂時雨化之也穀善也朱云言倉廩實而知禮節也愚按后土為中央土之神不應與祝融同位在南禮言四方除中言也詩以方社對舉明社在中央合四方而共為五祀也祝土旺四季在夏季與火同位故尤旺也后土融並祀南方亦是一義曾孫來止以其婦子饁彼南畆田畯至喜攘其左右嘗其旨否禾易長畆終善且有曾孫不怒農夫克敏朱註曾孫主祭者之稱非獨宗廟為然曲禮外事曾孫某侯某武王禱名山大川曰有道曾孫周王發是也言春秋傳曰能左右之曰以婦子農夫之婦子也曾孫之為此行也先省耘隨祈雨又復舉補助之典俾農人之婦子得備酒食以餉南畆前章云我取其陳食我農人此物此志也田畯農官喜者喜農夫之有饁以畢力于南畆也其攘朱註取也郝氏云却也左右曾孫之左右也却從者親取饁嘗也古易治也長畆竟畆也或云易即古所謂代田顔師云代易也一畆三甽前嵗之甽今嵗易其處今嵗之甽明嵗易其處以休地力而用之也每甽之長各盡其畆于中種禾曰禾易長畆也漢趙過精于代田一嵗之收常過縵田畆一斛以上縵田謂不為甽者也愚按攘有强取之義左右即農夫在曾孫左右者曾孫欲取其饁嘗之農夫以糲粗不敢獻迺強取而嘗之故有攘義庶曾孫不怒謂田畯見婦子之饁田禾之治以幾于曾孫之不怒竊自慶也曾孫之稼如茨如梁曾孫之庾如坻如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬夀無疆承上章農夫克敏而預期其秋成大有終歸恩于上也嚴氏云種之曰稼斂之曰穡散則相通此以稼對庾先言稼後言庾是稼為在田未刈之禾庾為已刈入倉而露積之禾也朱註茨屋盖言其密比也梁車梁言其穹隆也也鄭云古之税近者納總逺者納粟米然則稼猶總庾則為穀而露積也曰曾孫者農夫喜悦以為皆君之稼君之庾謂秋毫皆君賜也坻水中髙地也京髙丘也四起曰京庾為露積未入倉也于是求千倉以貯之先治倉而後求萬箱以輸載之故先言倉後言箱季氏云前章言農夫之慶曾孫期望其民之辭也此章言農夫之慶農夫喜慰其君之辭也福必曰介者謂凡人獲福必冥冥中有以隂助而黙相之也甫田四章章十句序以為刺幽王之詩朱子謂述公卿之有田禄者力于農事以奉方社田祖之祭然觀茨梁坻京千倉萬箱之語明為有國者規模也何氏謂為雩祭而作與七月諸篇皆邠侯公劉之詩而周公追述之愚按邠地皆在戎狄之間草剏都邑安得禮文明備如此其為周公之制作無疑大田序曰刺幽王也言矜寡不能自存焉鄭云幽王之時政煩賦重而不務農事蟲災害穀風雨不時萬民饑饉矜寡無所取活故時臣思古以刺之何氏謂與上章皆豳雅也盖秋省斂因而報祭于方也大田多稼既種既戒既備乃事以我覃耜俶載南畆播厥百穀既庭且碩曾孫是若朱註賦也毛傳缺地郝氏云大田猶言王田也出鄭云將稼者必先相之宜而擇其種季冬命民五種計耦耕事修耒耜具田器此之謂戒是既備矣至孟春土長冒橛陳根可拔而事之種擇其種也謂或利先種或利後種或宜髙燥或宜下濕也冬備具也總上二者言榖種與田器咸具也此指去言乃事即下文俶載播穀是也此指孟春之月善覃爾雅作剡剡鋭利也俶善也言以鋭利之耜往其事于南畆也氣農書云土長冒橛陳根可拔耕者急發謂春候地始通椓橛木長尺二寸埋尺見其二寸立春後上塊散土沒橛陳根可拔以此時耕一而當四二十日以後和氣去即土剛耕四不當一七月篇言三之日于耜是以剡耜發土在孟春之時所謂俶載也播種則四之日舉趾時也毛云庭直也言不巻曲月令季春之月生氣方盛陽氣發泄句者畢出萌者盡逹所謂處也碩大也庭碩皆以苗始生時言言苗自生葉以上皆條直茂大也孫鄭云若順也朱註苗之生者皆直而大以順曾之所欲自首章至第三章皆代為農夫之詞既方既皁既堅既好不稂不莠去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火方房也謂孚甲始生而未合時也種實未堅者曰皁古文無皁字疑作早謂穀之早者與下文穉字對看齊民要術云凡田欲早晚相雜然大率欲早早田倍多于晚堅充實之義吕覽曰子能使藁數節而莖堅乎子能使穗大而堅均乎早嚴氏云禾雖已堅實或大風所偃或淫雨所腐或霜所殺之類則損壊而不好力稂重粱也莠似苗也也鄭云無稂莠擇種之善民之専時氣之和所致食心曰螟食葉曰螣食根曰蟊食節曰賊者亦食穉者偏甚故舉以言之孔云蟲災之甚稙經傳蟊多與賊連言當即一種耳桑柔詩曰降此蟊賊以食葉食心苗本猶在今下食其根則無苗矣名為賊深惡之也瞻卬詩曰蟊賊蟊疾賊言其自外至疾言其自内生中朱註苗既盛矣又必去此四蟲然後可以無害田之禾然非人力所及也故屬望于田祖之神如捕蝗者夜中設火火邊掘坑且焚且瘞古之遺法此四蟲非蝗類或亦火可治之有渰萋萋興雨祁祁雨我公田遂及我私彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利渰雲興貌萋萋雲行貌陸氏云渰水氣之雲也和祁祁舒遲貌徐也雨徐則入土鄭云古者隂陽風雨時其來祁祁然而不暴疾禾穉即無害田穉之穉斂收也穧爾雅云穫也孔云之鋪而未束者秉把也有鄭云百穀既同種多齊熟收刈促遽力皆不足而不穫不斂遺秉滯穗故聴矜寡取之以為利鄧元錫云天澤先之公也不必先已地利公之人也不必在已曾孫來止以其婦子饁彼南畆田畯至喜來方禋祀以其騂黒與其黍稷以享以祀以介景福甫田婦子之饁饁耕者此饁穫者喜者喜其趨穫事也來方禋祀報成之祭也言曾孫此來非特省斂而已又舉行禋祀之禮禋説文云潔祀也周語内史過曰精意以享禋也方者四方之神以下騂黒之牲推之但祭南北二方而已騂南方色黒北方色也牧人職云凡望祀各以其方之色牲毛如之何氏謂取騂色者以螟螣蟊賊投畀炎火故報祝融取黑色者以雨我公田遂及我私故報𤣥冥也祝融主火𤣥冥主水騂以享以祀二句農人祝願之詞毛云牛也黒羊豕也各舉其色互文大田四章二章章八句二章章九句朱子云前篇上之人以我田既臧為農夫之慶而欲報之以介福此篇農夫以雨我公田遂及我私而欲其享祀以介景福上下之情所以相賴而相報者如此何氏云彼為雩祭此為報成之祭彼為省耘此為省斂愚按何氏省耘省斂之説是矣而以前篇為雩祭所據者以祈廿雨也此為方祭直據來方禋祀一語于方字生解鑿甚矣瞻彼洛矣序曰刺幽王也思古明王能爵命諸侯賞善罰惡焉朱子謂天子㑹諸侯于東都以講武事而諸侯美天子之詩言天子至此洛水之上御戎服而起六師也周郝氏云按各首章二句悽然有河山今昔之感昔公營洛都朝㑹巡狩以明賞罰故立政曰文子文孫其克詰戎兵以陟禹之迹方行天下至于海表罔有不服成康既沒周道寖衰久曠盛典宣王中興復古詩人有車攻之頌幽王嗣服荒于酒色武備不修㑹同遂廢故詩人覩洛水而思先烈也瞻彼洛矣維水泱泱君子至止福禄如茨韎韐有奭以作六師毛傳興也朱註賦也指洛水名摰仲治云古之周南今之洛陽也君子先王如茨厚積也言天子能朝諸侯以行賞罰為子孫奠不拔之基故美其福禄如是韎説文云茅蒐染韋也韐合韋為之即韠也與韍制同韍用布帛韠用韋也周官所謂韋弁兵事之服也奭通作赩赤貌陳暘云韠之色視裳而已兵事韋弁服韋弁服纁裳故貴者以朱芾卑者以韎韐則韎韐非天子之所御乃将士之戎服耳作猶振作也瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室鞸説文云刀室也猶今之刀鞘也云琫刀鞘上飾也劉熈云室口之飾曰琫珌説文佩刀下飾亦作鞞鞞卑也盖鞞琫雖皆刀鞘之飾而鞞猶在其下也毛云天子玉琫而珧珌諸侯盪琫而璆珌大夫璙琫而璆珌士珕琫而珕珌子此詩槩言琫珌而不言其所飾之物當是通天及諸侯而下言之愚按此言天室既奠貽子孫以萬年之安所謂保其家室也瞻彼洛矣維水泱泱君子至止福禄既同君子萬年保其家邦蘇氏云福禄既同言與諸侯共之也邦家邦指天下王者以天下為家故曰家瞻彼洛矣三章章六句陳櫟云國家不忘講武所以久福禄而保治安也後世如晉武廢武備不戒不虞宜其禍之速矣愚按先儒謂東遷以後無雅序以為刺幽王亦未見刺意盖追述宣王東都之㑹思車攻之烈耳謂宜萬年以保家室不意一傳而家室之禍如此裳裳者華序曰刺幽王也古之仕者世禄小人在位則讒諂並進棄賢者之類絶功臣之世焉孔叢子載孔子曰于裳裳者華見古之賢者世保其禄也母何氏謂此詩以裳華起詠興同姓也鄭桓公以王弟始封于鄭及于武公相繼入為周司徒周人咏武公也愚按史幽王初任皇父為司徒五年作都于向八年以鄭桓公為司徒當是皇父謝事而桓公代之桓公善于其職故詩人慶親賢進用而周室有復興之望也如何説詩其為桓公作乎裳裳者華其葉湑兮我覯之子我心寫兮我心寫兮是以有譽處兮毛傳興也朱註同棣裳與常古文本一字言裳謂常棣也郝氏云常其華同蒂故比兄弟非親非族鮮有以常棣比者云湑葉上露貌葉得霑潤則華之承露可知楊慎裳裳者華其葉湑兮氣相屬潤相滋也常棣之華鄂不韡韡體相親意相承也愚按我詩人自我也謂向者外戚小人用事内外蔽錮雖有憂國之心莫能輸寫今親賢在位則我心庶幾得以寫乎我心寫而是親賢在位者亦為聲譽之所歸矣處猶歸也裳裳者華芸其黃矣我覯之子維其有章矣維其有章矣是以有慶矣芸黃盛也與郝氏云芸通作耘隕同愚按黃之盛則將有隕落之漸此以興小人用事之時宗枝日就零替而幸有之子文章粲然不受彫傷者在也周易凡曰有慶皆通國家而言又桓公為司徒以典司文教為職非其徳之有章何以稱其職乎裳裳者華或黃或白我覯之子乗其四駱乗其四駱六轡沃若或黃或白由白趨黃其勢不能復白以喻宗枝雖有存者摧殘之餘不足復振若之子有文武之才詩人所由屬望而深慶也乗其四駱必其時有出使從戎之事以見其才無所不可下章所謂左宜右有是也上章維其有章是其文也此言乗其四駱是其武也左之左之君子宜之右之右之君子有之維其有之是以似之毛云左陽道朝祀之事右隂道喪戎之事愚按君子指王也左之右之猶言輔弼也謂之子以其賢能輔王之政而政無不宜以其賢能弼王之徳而徳皆固有固有者言王徳本無缺欠向為小人蔽錮使自失其徳耳似嗣也嗣宣王也惟本有其徳是以克嗣先王之業詩人因桓公初任以為天牖王衷去昏即明故屬望之如此乃其時褒姒方與虢石父之徒相比為惡一桓公其如王何而桓公方以王室多難且預求逃死之地矣天之所廢不可興也裳裳者華四章章六句朱子謂天子美諸侯之詩所以荅瞻彼洛矣也盖因其首篇與蓼蕭首章文勢相似故云然耳予于蓼蕭篇已辨其非上之美下者矣北山之什十篇四十六章三百三十四句桑扈之什二之七桑扈序曰刺幽王也君臣上下動無禮文焉鄭云動無禮文舉事而不用先王禮法威儀也愚按幽王承宣王中興之後諸侯宗周其初朝覲燕享以禮後且惑溺邪嬖荒迷于酒諸侯漸以不朝又惑于褒姒與申繒搆怨卒以烽火之戲為諸侯所畔至于滅亡詩人述燕享之禮以親諸侯盖警亂于未形矣交交桑扈有鶯其羽君子樂胥受天之祜毛傳興也朱註同者交交飛往來貌桑扈竊脂也九竊之言淺也竊脂淺白色也郯子云九扈為農正扈民無淫者也徐九扈皆農桑候鳥故先王命官以主農桑之事鉉云扈止也婬者過時也扈民不婬為止民使無過時也咏有鶯毛云鶯然有文章也或曰鶯即倉庚小雅兩桑扈皆曰交交秦風咏黄鳥亦曰交交意其參錯往來之狀殆相類也異桑扈與鶯並言以興春朝之時爵有尊卑姓有同皆在班列如鳥之不一其族者然也賈誼云胥者相也樂胥猶古樂府云今日樂相樂言獻酬欵洽君臣相樂故能受天之福即下文所言之屏之翰也愚按交交此往彼來所謂樂胥也交交桑扈有鶯其領君子樂胥萬邦之屏領頸也鳥將飛則先奮其頸秉屏小牆當門中者所以禦外而蔽内曹氏云魯周禮而齊不敢圖何屏如之有禮則安無禮則危秦襄公未能用周禮則無以固其國之屏之翰百辟為憲不戢不難受福不那翰幹也所以當牆兩邊障土而築牆者稟憲法也言天子謹禮則百辟諸侯皆以天子為憲奉王章也多戢斂也難慎也不戢戢也不難難也那多也不多也朱註謂豈不斂乎豈不慎乎受福豈不多乎古語聲急而然也愚按那語詞總承上三不字來即起不然之意兕觥其觩㫖酒思柔彼交匪敖萬福來求兕觥罰爵也罰觩角上曲貌善言先王于燕享之禮制兕觥以為爵寓戒也兕觸酒能發人之剛或至抵觸欲人顧此物則雖以酒㫖可嗜必思所以和柔其性情不敢過飲失禮而為酒所困也交交接于一堂之謂升降酬酢皆其事也敖依左傳作傲愚按交者自下而上彼交指諸侯之上交謂其情義上通也則惟以道接之匪敖所以荅彼交也受福不那自我受福言萬福來求自福就我言彼交與首句交交應敖則失交交之誼矣桑扈四章章四句朱子謂天子燕諸侯之詩左傳衛侯饗苦成叔寗惠子相苦成叔傲寗子曰苦成家其亡乎古之為饗食也以觀威儀省禍福也詩曰彼交匪傲萬福來求今夫子傲取禍之道也何氏以此詩為饗禮愚按寗子引詩以譏苦成叔當饗而傲未嘗謂此為饗時之詩而苦成叔與之相悖也鴛鴦序曰刺幽王也思古明王交于萬物有道自奉養有節焉按序意以前二章為交于萬物有道聖王愛物不忍殘其偶也後二章為自奉養有節雖天閑之馬愛養有方不妄費也其何氏謂申后失寵此詩追述幽王娶申后之事美初昏之時人效萬年之祝正如唐髙宗欲廢王皇后長孫無忌述太宗佳兒佳婦之語耳鴛鴦于飛畢之羅之君子萬年福禄宜之毛傳興也朱註同云鴛鴦匹烏也鄭云止則相偶飛則為雙月令註罔小而柄長謂之畢孔云畢羅異器畢則執以掩物羅則張以待烏萬鴛鴦匹鳥其飛必雙或畢或羅皆可雙而得之年以傳世之久言書云惟曰欲至于萬年惟王子子孫孫是也孔子曰大昏萬世之嗣也詩詠萬年福禄即此意也愚按鴛鴦不再匹以刺幽王將黜申后而立褒姒也鴛鴦在梁戢其左翼君子萬年宜其遐福鄭云戢斂也鴛鴦休息于梁上斂其左翼以右翼掩之隂陽相下之義也爾雅云鳥之雌雄不可别者以翼右掩左為雄左掩右為雌生陸氏云止言左翼者凡鳥左顧則怒作右盼則喜飛而起則仰左翼飛而下則仰右翼故摰鳥下擊皆先側左翅于張子厚云禽鳥並棲一正一倒戢其左翼以相依内舒其右翼以防患于外盖左不用而右便故也鴦鴛鴦于飛畢之羅之皆可得所謂飛則為雙也鴛在梁戢其左翼以相向所謂止則為偶也乗馬在廏摧之秣之君子萬年福禄艾之周禮馬四匹為椉椉馬一師四圉三乗為皁一趣馬二皁為繫一馭夫六繫為廏一僕夫計一廏之馬凡二百一十有六應乾之策廏摧莝也秣粟也莝鄭云古者明王所乗之馬繫于無事則委之以有事則予之以穀言愛國用也愚按乗馬乗字平聲即君所乗之馬所謂路馬也在廏言不見御而莝秣如常古之厚道也艾久也齊魯之間凡尊老謂之艾亦以其久于世也乗馬在廏秣之摧之君子萬年福禄綏之愚按此因申后失寵將有廢黜之憂詩人託興諷王而效萬年之祝勸其存厚道也鴛鴦二章喻昔時伉儷之相得也乗馬二章望王之念舊恩也王之乗馬閒而在廏不廢秣莝以其舊也况后之事王已數十年乎諷在言外相前二章一則曰福禄宜之再則曰宜其遐福王后得福禄固其宜也後二章一則曰艾之艾久也言如此而後福禄久長也再曰綏之綏安也言如此而福禄始能安享也四言君子萬年皆祝其存心久長勿中道而改他也鴛鴦四章章四句愚按序意以為幽王暴虐剥膚取之而草蒮用之殺胎覆巢鳥亂于上民窮財盡而馬有餘粟故詩人思明主而託鳥獸以寓刺焉朱子謂此諸侯所以荅桑扈之詩亦無所據何氏因白華之詩同鴛鴦在梁二語據以為幽王廢后而追述其始昏之事頍弁序曰諸公刺幽王也暴戾無親不能宴樂同姓親睦九族孤危將亡故作是詩也嚴氏云族人因王不宴樂同姓藉以為辭而告以禍敗之故非欲王宴樂之也是時驪山之禍將作人情不保朝夕幽王方且飲酒無度詩人豈復勸其宴樂哉效郝氏云幽王日與羣小酗于酒親族疎逺無由得其忠兄弟皆為路人危亡已至而深宫之飲不休故詩人借飲酒以致願見之情非為酒也有頍者弁實維伊何爾酒既㫖爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松栢未見君子憂心奕奕既見君子庶幾説懌毛傳興也朱註賦而興又比也弁頍説文云舉首也或云著弁貌弁皮弁也惟皮上下通服之伊何猶云何所為乎不過日從事于飲食而已今之叩閽求見者非疎逺之人而至戚兄弟也情誼闗切將欲輸微忱于王而非有他故也生蔦寄生樹也本草一名寄屑博物志謂女蘿寄絲絲寄生木上根不著地而唐樂府云絲故無情隨風任顛倒誰使女蘿枝來強縈抱兩草猶一心人心不如草則為二種明矣上施者蔓延之義松嚴氏云蔦與女羅延于松柏之視松柏以為命柏殞則二草亡矣繹懌與繹通書曰庶言同則論語繹之為貴是也愚按弁以况王穀梁傳云弁冕雖舊必加于首周室雖衰必先諸侯王者之在人上猶弁之在人首也王為海内之所共戴闗係如何而乃日以㫖酒嘉殽與羣小沈湎不返乎宗族兄弟至親休戚與共猶蔦蘿之托命于松柏亡則俱亡也今與羣小日荒于酒致兄弟不得進前一效其忠告其憂可知則又屬望曰倘得見之盡所欲言或欣然有當于王心未可知也庶幾者幾倖未可知之辭有頍者弁實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧何期猶伊何也期語辭也虢或云何期謂何所期約王寵任小人所期者不過石父之輩耳具通作俱言同姓兄弟皆來見王非止一二人之私憂過計也毛云怲怲憂盛滿也按丙位南方火地也心火上炎因狀憂為怲為臧善也庶幾王能改圖善耳有頍者弁實維在首爾酒既㫖爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴弁所以荘首羣臣之有王如衣服之有冠冕也弟土山曰阜阜者厚也鄭云猶多也上章只言兄此兼言甥舅者見凢屬親戚無不痛國之将亡故合詞求見以兾王之悔悟也嚴氏云霰集雪即繼之不待遲久喻死亡之兆已見近在旦夕無多日矣長郝氏云今夕何夕死喪近矣而君子惟怡然晏樂夜之歡不輟如後世敵兵四合而帳中夜飲亡國之慘千古一轍杜甫所謂東方漸髙柰樂何也長歌可以代泣其頍弁之謂乎頍弁三章章十二句朱子以為燕兄弟親戚之詩死喪無日庶幾相見詞㫖哀傷古人勸人燕樂多為此言如逝者其耋他人是保之類愚按雨雪二句明言禍亂之幾兆矣非勸人燕樂之詞也車舝序曰大夫刺幽王也褒姒嫉妒無道並進讒巧敗國徳澤不加于民周人思得賢女以配君子故作是詩也郝氏云是時褒姒専暱忠諌無路詩人不得已思得賢媛以為内助猶陳風東門之池思淑姬也漢書成帝欲立趙飛燕為皇后諌大夫劉輔上書引里語曰腐木不可以為柱畢人不可以為主與此詩惡褒姒而思賢女意正相類豈此時申后以廢黜故或幽憂以死耶不然何以不思復故后而思王别選新昏耶愚按文王之世宫人思得淑女以助宫闈之治幽王之世宫人思得賢女以奪褒姒之寵宫人朝夕親近妃后故思之尤切也姒疑申后初廢宫中思得小君懼褒之正位也間闗車之舝兮思孌季女逝兮匪饑匪渇徳音來括雖無好友式燕且喜毛傳興也朱註賦也事毛云間闗設舝貌有崎嶇勞碌之意孔云舝無則脱行乃設之孌美也説文云慕也愚按詩人于女每賤孟而貴季故曰有齊季女盖宫人思季女以易褒姒而即設舝以迎之通篇皆虚擬之詞之思孌非有其人也匪饑匪渴思之深也徳音有徳言也括當作佸㑹也長舌在宫久不聞徳音矣思得季女嘉言集于吾耳也好友自謂玩好友為平等之稱其意未即望以為后但欲季女至褒氏黜而廢后可復正位也依彼平林有集維鷮辰彼碩女令徳來敎式燕且譽好爾無射依説文云倚也平林林茂則平也美薛綜云雉之健者為鷮尾長六尺里語曰四足之有麃兩足之美有鷮之鄭云平林之木茂則耿介之鳥往集焉后無妒忌行險詖之心能庇其所賴而淑女從焉如平林之集鷮雉也碩大也愚按碩女指宫人之中賢而自謙非好友者輩也其饑渇徳音已久而今來季女令徳之教則燕喜歡譽豈有厭射哉辰者時也言碩女之得其時也雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無徳與女式歌且舞殽通作肴凡非穀而食皆曰肴愚按治中饋者衆妾之事自謙不足以供酒肴惟季女庶幾飲之食之不以酒肴為重也此自衆妾言下言無徳相助自碩女言即首章雖無好友之意必時幽王與褒姒沈湎無度其見于頍弁之詩者酒求㫖肴必求嘉此欲反其所為言雖無美味以供庶幾飲食之不似如褒姒之厭縱其口腹也陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心寫兮柞郭璞以為栩即柞櫟也著曹居貞云柞堅忍之木其新葉將生故葉乃落附甚固鮮通作尠少也詩詁云接見曰覯愚按析薪比男女牉合泛論昏姻之事柞須新葉生故葉始隕詩人盖欲得季女以易褒姒猶以新葉易故葉也湑兮謂新葉也言使得黜褒姒而親季女以正宫闈之化即我輩分卑少得進見我之憂思亦為寫去矣髙山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心仰説文云舉也謂舉首而望也下鄭云景明也景行猶云明白正路也上行字謂道行字謂人之步趨愚按二句思得季女在宫中以為六宫師法也言髙山之共仰知卑人之不足為主矣言大道之共趨知邪人之不可與行矣四牡騑騑二句望其至之速也馬騑騑行而不息六轡調和如琴聲相應自當安驅而速至既至使我即見其大昏居中宫之位而我心始慰也言新昏則舊之已棄可知通章皆虚擬之詞非有是人非有是事車舝五章章六句左傳昭公二十五年宋元夫人生子以妻季平子叔孫昭子如宋聘且逆之宋公享昭子賦新宫昭子賦車舝義取此詩思得賢女以配君子也朱子謂燕樂其新昏之詩若只為士大夫新昏而作當列諸風何以入雅青蠅序曰大夫刺幽王也國語史伯曰夫虢石父讒諂巧佞之人也而立以為卿士與剸同也周法不昭而婦言是行用讒慝也此詩刺王聴讒當為太子宜臼被讒而作營營青蠅止于樊豈弟君子無信讒言毛傳興也朱註比也下二章興也蒼營營往來貌樊藩也青蠅與蒼蠅異種陸氏云蠅善亂聲青蠅善亂色故詩以青蠅刺讒遂漢書昌邑王夢青蠅之矢積階東以問郎中令龔遂引此章云云謂陛下左側讒人衆多如是青蠅惡矣註云惡即矢也按青蠅之惡在矢止則布穢飛則不能也嚴氏云青蠅但集于在外之樊籬若不必惡之也然則營營往來將入宫室汚几席不但止樊而已喻讒人為亂漸至迫近當防其微也駒左傳襄公十四年㑹于向范宣子将執戎子駒支支辭訖賦青蠅而退宣子辭焉使即事于㑹成豈弟也愚按豈弟賛詞然寓有優柔不斷之意䜛言所由以得入若英斷之主自畏避而逺去矣營營青蠅止于棘讒人罔極交亂四國朱註棘所以為藩也註一云棘者刺人之物楚詞云藜棘樹于中庭王逸云以言逺仁賢近讒賊也罔極為機詐叵測也戎交亂四方之國如虢石父構王伐申以至吕繒西蠢然俱動所謂交亂也王克云人中諸毒一身死之中于口舌一國潰亂詩曰讒人罔極交亂四國四國猶亂况一人乎故君子不畏虎猶畏讒夫之口讒夫之口為毒大矣營營青蠅止于榛讒人罔極構我二人毛云榛所以為藩也者榛小栗亦有刺房故可以與棘同為藩也孔云構構合兩端令二人彼此相嫌交更惑亂也輩二人為聴讒者與被讒者指彭焱云讒人指虢石父四國指申繒諸國二人即王與后也青蠅三章章四句申培説厲王之世讒言繁興君子憂之而作愚按厲之世如蜩如螗如沸如羹國步蔑資亂况斯削有由然矣然不若幽王信讒奪嫡為較然有據也史稱厲王暴虐幽王昏而不暴其稱豈弟以此乎賔之初筵序曰衛武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫液武公既入而作是詩也此詩首章言燕射飲酒有禮次章言祭祀飲酒有禮而後言今人飲酒之不如也愚按此篇或以為東遷後詩謂衛武公于平王世始入為卿士幽王時未嘗入周攷平王以武公為公非卿士也諸侯初即位未有不朝于王受王錫命者史記載武公立四十二年平戎于周豈有四十二年之諸侯而未嘗入朝者乎朝則有賔射助祭之禮殆目覩王之飲酒無度而述賔祭飲酒之禮發端以諷之以其為王朝獻納之詞故列之于雅賔之初筵左右秩秩籩豆有楚殽核維旅酒既和㫖飲酒孔偕鐘鼔既設舉醻逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵朱註賦也毛傳缺事孔云上八句言射初飲燕之事下六句言大射之禮射有三一大射二賔射三燕射按賔射即周禮所謂饗射因饗燕而射皆所以娛賔大射乃將祭而射所以擇士飲酒特其中之儀節耳于射義云天子將祭必先習射于澤宫射中者得與祭不中者不得與于祭不得與於祭者有讓削以地得與于祭者有慶益以地此諸侯入朝助祭而射之禮也初筵初即席也左右賔與主人為禮隨其左右之宜而折旋揖讓皆不亂也菹楚列貌殽豆實也核加籩也旅陳也鄭云豆實醢也籩實有桃梅之屬凡非穀而食之曰殽按梅桃有核之物故稱核也首二句紀賔初升筵之禮次三句紀官所饌之物飲酒孔偕乃紀與宴之人時大射儀曰初主人獻賔賔酢主人次主人獻君于奏肆夏卒爵樂闋主人受君酢乃酬賔賔告于擯者請旅諸臣君許乃舉旅行酬即此所謂舉酬逸逸也禮以宰夫為主人君于臣雖為賔不親獻也鄉以上皆諸侯之禮天子禮亡相去當不甚逺耳按射記云天子熊侯白質諸侯麋侯赤質大夫布侯畵以虎豹士布侯畵以鹿豕按燕射之禮自天子至士皆一侯上下共射之毛云大侯君侯者以君所射故謂之大張毛云抗舉也鄭云舉鵠而棲之于侯也朱註抗也凡射張侯而不繫左下網中掩束之及將射司馬命張侯弟子脱束遂繫左下網也大射儀旅酬之後納工歌鹿鳴管新宫畢司射適次袒袂遂執弓挾乘矢於弓外見于弣右巨指鉤弦自阼階前曰為政請射即此所謂弓矢斯張也非射夫之弓矢也夫天子六偶以諸侯為之諸侯不足始取給于卿大鄭云射夫衆射者也所謂偶也獻奏也既比衆偶乃誘射射者乃登射各奏其發矢中的之功的質也祈求也射者與偶發矢之時各心競云我以此求爵女勝者飲不勝者所謂飲觶也彼指侯爾指賔愚按古人飲酒惟祭祀賔客養老三事此章言賔射次章祭祀非射以擇士而祭之禮籥舞笙鼔樂既和奏烝衎烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賔載手仇室人入又酌彼康爵以奏爾時承上章大射之禮既畢射而中得與于祭之事應籥舞文舞也舞羽龡籥祭祀用之笙有與瑟琴相者鹿鳴之鼔瑟吹笙是也有與磬相應者鼔鍾之笙磬同音是也有與歌相應者儀禮歌魚麗笙由庚之類是也有與鼔相應者此言笙鼔是也禮孔云烈祖功烈之祖也嚴氏云百禮事神之衆以洽百禮者言助祭之人既多則可以合舉事神之衆禮也百禮既至言行禮之時至也壬通作任林謂衆列如林也衆禮次序行之各有其時當其時至有身任其事者又有林立以待事者凡皆駿奔走于廟中也鄭云嘏為尸與主人以福主受神之福于尸則主之子孫皆湛樂也既湛之後各酌獻尸尸酢而卒爵是謂各奏爾能仇讀曰㪺室人有室中之事者謂佐食也又復也賔手把酒室人復酌為加爵也王氏曰先王用酒常以祭祀必有禮樂籥舞笙鼔有備樂也以洽百禮有備禮也劉公瑾曰武公因酒過作詩乃盛稱飲酒之禮盖酒非有過也飲者常至于過也飲者于初筵亦未有過也其終既醉則不能無過也公之悔過亦慎終如初而已愚按宗廟之内以異姓為賔室人猶言家人同姓是也此主人與賔獻酢已畢賔告于擯者請旅諸臣之事手仇者賔手挹酒以示敬也室人受而卒爵又以醻賔曰入者凡執事之臣皆入席而舉旅行醻也康爵疑即所謂無筭爵也祭祀既畢賜以盡歡康安也盖心無復事而安飲也爾時謂其時可以飲矣或云以奏謂奏陔夏也歡燕既洽賔可以出之時則奏陔陔之為言戒也又即醻也賔之初筵温温其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞僊僊其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩鄭云此復言初筵者既祭王與族人燕之筵也謂反反顧禮也幡幡輕數也飄揚之意曰既醉止酌康爵時也此時飲無筭爵又徹羃盡歡勢必至于醉也屢舞以舞屬客勸飲古者飲酒歡必起舞所以極歡心敘誠意也抑僊通作躚説文云蹁躚旋行也僊僊本為舞容説文云按也謂強自按抑也毛云怭怭媟嫚也秩即左右秩秩之秩以折旋揖讓言既醉則忘其初筵之秩矣孔云小人未醉身有惡態強自掩飾及其醉酒則舊態盡出故荘子謂醉之以酒以觀其態愚按自三章以下盖酌彼康爵以後武公見有酒失者以之自誡即以諷王也屢舞僊僊以下所言威儀皆舞時之威儀也未醉而抑抑既醉而怭怭至于不知其秩則威儀全失是之謂既醉矣賔既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側弁之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐徳飲酒孔嘉維其令儀號呼呶讙也僛僛舞不能正也傞傞舞不止也頃郵與尤同過也側傾也俄説文云行頃也言俄之間數側其弁徳孔云醉前無失為有徳既醉為愆以喪之是伐其也晏子飲景公酒日暮公呼具火晏子辭曰詩云側弁之俄言失徳也屢舞傞傞言失容也既醉以酒既飽以徳既醉而出並受其福賔主之禮也醉而不出是謂伐徳賔之罪也嬰卜其日未卜其夜公曰善再拜而出朱註飲酒之所以甚美者以其有令儀耳今若此則無復有儀矣愚按古人飲酒以舞相屬或因以賈禍者有之如灌夫起舞屬蚡蚡不起夫徙坐語侵之張磐舞屬陶謙謙不為起固強之雖舞而不轉曰不當轉耶曰不可轉轉則勝人遂至相恨江表孫譚酒酣屢舞而不知止顧雍所以深責之也此詩言屢舞至于一而再再而三則醉甚不知其所以然矣酒以合歡原期于醉無算爵所以勸醉也既醉何病然醉斯可以出矣惟醉而不出失禮喪徳為可醜耳此詩為醉康爵奏陔夏之後昏醉喪儀而不肯出者諷也凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾太怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又凡此者槩言飲酒之禮飲酒一也醉與不醉有異故設監史以伺察之朱註監史司正之屬所以察儀法也史淳于髠説齊威王曰賜酒大王之前執法在傍御在後或立之監即執法也或佐之史即御史也此古王者燕飲之制至戰國時尚存以不臧謂失禮伐徳也鄭謂王立監使視之又助史使督酒欲令皆醉也醉者已不善為人所惡復取未醉者罰之反以不醉為耻盖疾之也式勿從謂以下設為監史告不醉者之辭所以深惡夫醉者也彼嚴氏云彼人已醉勿就其位而與之言與之言則愈更號呶是使之大為怠慢也角言自言也語與之語也由從也嚴氏云童羊無羖未有無角者童而羖必無之物醉人之言多不可聴則以必無之物困之識記也愚按醉人易怒凡坐上有言必須檢㸃非可以言者勿言恐觸其怒也與之語必諒其可以從者語之匪是勿漫語也下文由醉之言謂其言皆不自由而由其醉耳又即酬也禮主人獻賔賔飲而酢主人主人飲之而又酌以醻賔是故醻酢之禮盡于三爵前章室人入又所謂加爵也多又則加而又加也賔之初筵五章章十四句朱子從韓氏序謂詩意與大雅抑戒相類必武公自悔之作若飲酒自悔正宜與淇澳等詩入衛風耳何以入雅劉公瑾云酒誥言謹酒之意以為父母慶克羞耉羞饋祀則皆可用酒若反開飲酒之端者亦若武公謹酒而言因射而飲因祭而飲之意也飲酒之禍内則喪徳外喪威儀此詩言徳者一而言威儀者五酒誥言徳者八而言威儀者一詳畧互相備矣武公其得于武王康叔之家法與篇按毛傳自甫田至賔之初筵為甫田之什十魚藻序曰刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉愚按序謂思武王正所以刺幽王也是時幽王為讒佞所惑方有舉兵伐申之謀而君臣日以飲酒為事詩人憂之述武王在鎬之宴謂以獻豈而飲也今時勢如此而謀伐人國未豈而樂遽先從事于飲酒憂危之情見于言外竹書紀幽王以十年伐申是時人已知其謀矣魚在在藻有頒其首王在在鎬豈樂飲酒朱註興也毛傳缺為頒大首貌魚以依蒲為得其性也兩言在者詩人自詳審之詞言魚何在乎在于藻王何在乎在于鎬也説劉彞云魚出游水面則露其首故見其頭大也豈文云還師振旅樂也周禮作愷魚在在藻有莘其尾王在在鎬飲酒樂豈莘長貌外飲酒樂豈言與諸臣飲至共樂此豈也言謂今之飲酒非昔之飲酒者也魚在在藻依于其蒲王在在鎬有那其居魚雖以藻為樂而所據必在于蒲魚之潛于淵猶鳥之集于菀蒲者魚所以藏身之固也一云水深則魚樂淺水有藻而魚在焉露其頒然之大首復驚逝而露其莘然之長尾盖在淺水故逃竄窘廹首尾俱見也蒲生近岸其水愈淺依于其蒲意更窘促刺幽王也那安貌愚按武王甫克商即憂天保之未定于是有營洛之意盖不敢即安也有那其居猶言暫時假居耳其志未嘗一日忘四方之虞也今遂以鎬京為不拔之基君臣但飲酒而已其智不及依蒲之魚猶知所以藏身也魚藻三章章四句朱子謂天子燕諸侯而諸侯美天子之詩愚按所以美之者亦僅述其飲酒之樂而已與諧媚之稱觴誦萬年者相去幾何凡詩必有為而作不然聖人何取焉采菽序曰刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵㑹之而無信義君子見微而思古焉孔叢子載孔子曰于采菽見古之明王所以敬諸侯也愚按菀栁之篇明為諸侯不朝而作此詩特陳先王時待諸侯來朝之禮與菀栁並載殆一時一人之作不必言刺而刺在篇外矣采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼毛傳興也朱註同也羊則苦豕則薇毛云菽所以芼太牢而待君子鄭云菽大豆也采之者采其葉以為藿味孔云王饗賔客有牛爼其汁則芼之以藿調以五盛于鉶謂之鉶羹聘禮君賜卿歸饔餼米百筥筥半斛夫人使大夫歸饔餼米有八筐者有六筐者筐五斛夫百筥以多為榮而所實少八筐六筐以少為貴而所實多則筐大而筥小矣惟何錫予之心口相問之詞周禮車直名路五路玉路不以錫金路以封同姓象路以封異姓革路以封四衛木路以封藩國乗馬四馬也所以駕路車者鄭云𤣥衮𤣥衣而畫以卷龍也凡冕服皆𤣥衣纁裳衮卷與衮同是畫龍而升降有别升龍為卷降龍為則天子之服名卷上公之服名衮也巻衮皆指龍而言公衣五章裳四章而衣以衮為首子男衣三章裳二章而裳以黼為首此言𤣥衮及黼舉公及子男以該侯伯也觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所届觱沸狀水噴出之貌曰檻泉爾雅云正出謂涌出也李廸云水泉從下上出涌泉以興君子自下國朝于王室也所周禮雁醢芹菹芹生水中取其香潔以薦宗廟菹亦用待君子也旂建在車上淠淠動也嘒説文云小聲也王氏云言其聲之細則無敢馳驅也又届主也見旂聞鸞漸來漸近至是而見其車上之人見其駕車之馬則君子于是至矣儀鄭云諸侯來朝王使人迎之因觀其衣服車乗之威所以為敬且省禍福也愚按春秋傳列國乗車皆四馬而或謂之驂或謂之駟此以驂駟並言亦據來朝者之所稱因而稱之以見來者衆耳赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福禄申之朱註賦也之芾通作韍諸侯赤韍弁鄭云冕服謂之韍其他謂韠孔云士之有爵猶大夫以上有冕也士有韎韐猶大夫以上有芾也古韍與韠俱是蔽膝之衣韠以韋為之易乾鑿度云者田魚而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存其蔽前者重古道不忘本也股說文云髀也鄭云脛本曰股孔邪幅如今行縢也偪束其脛自足至膝故曰在下云邪纒于足謂之邪幅内則子事父母有偪即此所以利趨蹌也以上兩句皆紀諸侯入朝之禮服交上交于天子也紓緩也言諸侯相率趨朝不敢緩也功命錫命也示孔云祭統謂古者明君爵有徳而禄有必于太廟不敢専也賜在廟故神得福禄之愚按蔽膝之制據此而言今朝祭之服猶有其遺制但前後皆有蔽不似此獨蔽前耳或以為是膝之衛所以謹拜跪者謬矣維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從鄭云以柞為興者柞之葉新将生故乃落于地以喻繼世以徳相承者殿鎮也孔云軍行在後曰殿取其鎮壓之義韓萬福攸同所謂君臣並受其福也右平平辨治也詩通作便便閑雅之貌言諸侯左之臣便便習禮辨事相率以從也左傳晉魏絳引此詩謂便蕃左右汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福禄膍之優哉游哉亦是戾矣紼繂也今人繩索之大者亦稱為繂益纚繋也曰纚傍從麗有相附之意維則聯絡之使固也易拘繫之乃從維之以喻維繫諸侯之心不一而足也葵揆也膍厚也一説葵膍皆實字沽用葵性向日曹植云若葵藿之傾葉太陽雖不為回光然向之者誠也天子葵之言天子鑒其乃心王室亦如葵之向日故即以葵擬之膍説文云牛百葉也周禮醢人脾析即此言其狀分析也莊子謂之膍胲以喻福禄之駢繁不可數紀也愚按優游指來朝之諸侯既無憂讒畏譏之思亦無飛揚跋扈之態上下相信進退自安不惟天子有以維繫諸侯而諸侯亦自眷戀而不去戾止者猶云得其所止也一云戾通作麗著亦字是上下相麗不散之意采菽五章章八句朱子謂天子所以荅魚藻也然彼言豈樂此言來朝二詩殊不相蒙角弓序曰父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩焉何氏謂刺幽王寵任昏姻而踈逺同姓之詩序所謂刺讒也愚按漢書谷永上書請抑褒閻之亂息白華之怨後宫親屬饒之以財勿與政事以逺皇父之類損妻黨之權然則十月之交所言皇父卿士番棸蹶楀等大抵皆褒姒姻婭也故正月之詩曰洽比其鄰昏姻孔云劉向引此詩以為幽厲之際朝廷不和轉相非怨詩人疾而憂之曰民之無良相怨一方所謂相怨者殆指兄弟與昏姻而言耶騂騂角弓翩其反矣兄弟昏姻無胥逺矣毛傳興也朱註同鄭毛云騂騂調利也不善紲檠巧用則翩然而反云喻王與九族不以恩禮御待則使之多怨去朱註弓之為物張之則内向而來弛之則外反而何氏謂王于兄弟無偏用偏舍之理如弓一張一弛角幹有互為内外之時張時則角在内幹在外弛時則幹在内角在外王惟一于昏姻而不任兄弟是角恒在内幹恒在外也相胥相也無胥逺矣謂王之視弟兄不必與昏姻大懸絶也爾之逺矣民胥然矣爾之敎矣民胥傚矣朱註賦也愚按逺専指逺兄弟而言王既疎逺之天下之人皆以王之兄弟不足親矣王逺兄弟而親昏姻是王教天下以兄弟之不如昏姻也天下有不相傚而趨附昏姻者哉以此兄弟之勢日衰而昏姻之氣燄益盛交相為瘉皆由此也此令兄弟綽綽有裕不令兄弟交相為瘉朱註賦也有令善也瘉病也有言王之親踈失宜在宗族之中令善者固寛然容不以介意其不善者激于怨毒不能自制與昏姻交相搆釁而為王之病矣民之無良相怨一方受爵不讓至于已斯亡朱註賦也愚按此章承不令兄弟而言言其交相為瘉亦人情無足怪也相怨一方正指無良之實謂各據所居之地位各持所見而不肯相下以至于相怨也怨不在大即一爵之酒受之不讓且逞忿以亡其身况事有大于此者乎兄弟之于昏姻得意與失意相形懻忮恚恨亦情所難免也老馬反為駒不顧其後如食宜饇如酌孔取朱註比也任此章言王之于昏姻宜擇其可任者任之其不可者但寵之以爵厚之以禄不宜使與政事也如優老馬者惟飼之以芻秣而已今反以為駒使之任重後将有不勝其任之患也饇飽也孔甚也此輩志在爵禄而已如食者予以盡飽飲者予以盡量其志足矣予之以政是反為之禍也一説饇飫通說文云不脱屨升堂謂之飫不鄭云孔取謂度其所勝多少凡器之孔其量大小同謂滿則止耳二句皆反言以規之諷其知止足也毋敎猱升木如塗塗附君子有徽猷小人與屬朱註比也愚按猱之好升木猶小人之好攀附要人也人見昏姻之人得勢攀附者衆矣而更斥逺兄弟惟昏姻是聴是益敎之也塗本善于附著者以比小人之情以小人附小人猶以塗附塗其合也易矣如塗塗字指昏姻塗附塗字指小人黨徽美也猷道也言惟徽猷之君子能自愛不入其若小人惟知目前之利爭與之為屬矣昏姻之人為小人攀附所以益搆鬭兄弟也徽猷先王所謂正其五品為之孝友也君子所守惟此自與昏姻之人不合雨雪瀌瀌見晛曰消莫肯下遺式居婁驕朱註比也雪晛日氣也進曰者于日未出擬議之詞雨喻昏姻之讒言以離間兄弟者愚按兄弟受讒者初猶庶幾王心偶一憬悟如日氣之乍見使雨雪頓消乎而不意王之盡信之也下自謂也言皆被其讒無或遺者讒既見信遂自居能讒以驕人屢信其讒所以屢驕之也兄弟因之以益怨也雨雪浮浮見晛曰流如蠻如髦我是用憂朱註比也不浮浮積之厚而浮于地上雅流流而去之喻王能去讒以至宗族解體爾云八蠻在南髦西夷也書作髳蠻髦猶言相視如胡越耳愚按兄弟與昏姻互相仇恨如蠻之與髦各為種類終不能合國禍之所由日深也故詩人深憂之角弓八章章四句朱註亦謂刺王不親几族而好讒佞使宗族相怨之詩愚按朱子以兄弟昏姻並言言皆不可以疎逺幽王之世外戚用事何嘗疎姻婭乎且為讒佞者皆褒姒之親黨也此詩指王信昏姻之讒兄弟為是菀栁序曰刺幽王也暴虐無親而刑罰不中諸侯不欲朝言王者之不可朝事也采菽序有云幽王侮慢諸侯數徵㑹之而無信義何氏謂此詩當作于舉烽火悉至至而無宼之時愚按當為太子奔申王徵諸侯伐申以求太子而諸侯不應作詩以明志也有菀者栁不尚息焉上帝甚蹈無自暱焉俾予靖之後予極焉毛傳興也朱註比也路菀茂木也尚言此菀然森茂之柳雖枝葉低垂行之人不可就以休息乎喻王室雖卑天下未嘗不欲宗周而王自獲怒于上帝也蹈如樂記發揚蹈厲之蹈謂頓足而怒厲也暱説文云日近也言天怒如此不敢親暱于王以從王欲罹其禍也鄭桓公謂王室多難吾何地可以逃死况外諸侯乎力極與劇同屈原傳所謂勞苦倦極是也言我欲竭以靖王室而王将求之已甚雖欲休息不可得己愚按菀栁指申國方強太子可以藉庇䕃也王欲徵諸侯兵伐申以求而殺之此上帝所甚怒者敢悖天以暱于王乎申之禍未可靖也即使予從王以靖之後將復極其志于申之與國如繒與西戎之類是也禍寧有己乎有菀者栁不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁焉愒息也瘵病也後愒憩通之邁逺征也言使我征伐有功將益用以勤逺也有鳥髙飛亦傅于天彼人之心于何其臻曷予靖之居以凶矜朱註興也言傅臻皆至也彼人斥幽王也王之心無有極也愚按此章指褒姒而言彼人謂褒姒也以下國之賤女奪嫡為后如鳥之髙飛亦既戾于天矣而又欲殺太子以安伯服其心寧有底極乎前篇云俾予靖之謂王使之也此云曷予靖之自審其不可也曷猶何也矜毛云危也言何為從王為此而自居凶惡之名以取危亡也菀栁三章章六句朱註亦宗序説謂王者暴虐諸侯不朝而作此詩愚按王雖不道而臣子朝貢之禮不可不修若相戒不朝是悖慢無君之甚夫子録之何也當思諸侯所以不至之情庶幾有可原矣桑扈之什十篇四十三章二百八十二句都人士之什二之八彼都人士序曰周人刺衣服無常也古者長民衣服不貳從容有常以齊其民則民徳歸一傷今不復見古人也鄭云長民謂凡在民上倡率者也變易無常謂之貳孔云正舉都邑者以都邑之士切近政化有道先被其徳無道先化其淫此時奢淫巧偽都邑尤甚故舉古之都邑以刺今焉愚按幽王之時艷妻煽處外妾寵倖爭以淫靡相尚冶容竒服都邑士女化之觀大東之詩曰西人之子燦燦衣服舟人之子熊羆是裘則西京風俗可知故詩人傷之致思于彼都彼者彼一時也前二章言都人士庶之家後三章則指卿大夫家也言彼時無論貴賤其服飾皆有法度威儀可觀傷今之不復覩也彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望朱註賦也下皆同毛傳缺孔黃黃狐裘色也以裘皮非一狐之腋故重言之云狐色不等狐白非若不服郊玉藻云君子狐青裘豹褎至黃狐庶人亦服之特牲云黃衣黃冠而祭所以息田夫也愚按歸者書云歸其有極是也行即指上二句而言言同歸于京師之習尚不襍以五方之風氣也萬民謂四方之民以京師之人為之表式曰望此章黄狐之裘與下章臺笠舊說皆以為野人之服而經稱之為都人士盖古者取士于農甫田所謂攸介攸止之象即髦士也若農而非士則不改之容與有章之言豈所以贊野人者乎彼都人士臺笠緇撮彼君子女綢直如髮我不見兮我心不説臺夫須也都人之士以臺皮為笠緇皮為冠緇孔云前章裘則冬所衣此章笠則夏所用撮髮以布為冠從其儉也出笠以禦暑雨有柄曰簦無柄曰笠文季氏云臺笠田時所用緇撮居家時所用説云綢密也又訓直綢皆指髮言第見其髪綢密而條直婦之首容但如其髮而止無増飾也愚按出田則為農居家則為士彼君子女指士庶人之妻謂女有君子之行者也故貴賤皆可以稱命婦首服有副編次三等副則盛飾也編則列髮為之假作紒形加于首上次則次取他人之髮與已髮相合為紒謂之髮鬄今曰如髮而已明士庶之妻未有命者之服但順其髮之綢直不令散亂采緑詩云子髮曲局衛風云首如飛蓬皆言其亂而不理也彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結充耳惟冕服有之石為瑱塞實其耳琇通作秀琇實者王肅云以美尹尹氏也世為周公卿鄭云吉讀為姞尹姞周室昏姻之舊族也后左傳鄭石葵曰吾聞姫姞偶其後必蕃姞吉人也稷之元妃也韓奕篇云為韓姞相攸言其汾王之甥則姞為周室戚里而尹為世卿周室之昏姻貴此二姓也苑猶屈也積也以苑以言其思之不已結言其思之不解愚按此章充耳琇實指公卿大夫君子女指其室人也言當時卿大夫唯擇二姓為昏故閨門之内皆有禮法可觀自豔妻以下賤奪嫡一時化其淫俗娶妻但娶容色不論族姓以致人倫道喪而故家之流風盡矣上章云不見謂不見其服飾也此云不見謂不見其儀範也彼都人士垂帯而厲彼君子女卷髮如蠆我不見兮言從之邁帯大帯也帯毛云厲帯之垂者左傳所謂鞶厲是也孔云大之垂者名之為紳而復名為鞶者紳是厲之名厲是垂之貌蟲卷通作鬈説文云髮好也一曰髪曲也毒螫之長尾為蠆短尾為蠍蠆尾長能卷曲故卷髮似之當是假紒之形即首服中之編也此言命婦之飾邁行也愚按言從之邁者必當時賢大夫見王室將亂先幾挈家出都以避居采邑者如鄭桓公寄孥于虢鄶是也詩人傷時亦欲從之去矣匪伊垂之帯則有餘匪伊卷之髮則有旟我不見兮云何盱矣鄭云此言士非故垂此帯也帶于禮自當有餘也女非故巻此髮也髮于禮自當有旟也象髮于旟者謂如旌旟巻舒之狀毛云揚也愚謂卷者不欲其揚也盱張目也愚按此因卿大夫盡室既去之後思其家士女之威儀不可復見矣云何盱者言典型已盡而一時相尚淫侈之俗皆目所不忍覩者将張目以何望乎都人士五章章六句朱註謂離亂之後人不復見昔日都邑之盛人物儀容之美而作此詩所以歎息之也是為東遷以後之詩豈以彼都者自東都而指西都耶厲王流彘之後都邑已非其舊不必東遷故註又以周為鎬京愚按詩詞未見有亂後情景如黍離之所傷也當為幽王時嬖寵淫侈相尚都人化之如後世髙髻大袖之為服妖也詩人懐古刺今刺而不露所以為雅采緑序曰刺怨曠也幽王之時多怨曠者也郝氏云幽王使人不以道詩人託閨怨以刺之古者用民之力嵗不過三日新昏不從政恤其私也今使其室家暌離匹婦銜怨故聖人録是詩以明王道本乎人情耳終朝采緑不盈一匊予髮曲局薄言歸沐毛傳興也朱註賦也下同之自旦及食時為終朝兩手曰匊緑王芻也易得菜終朝采之而不滿手怨曠之深憂思不専于事屈説文訓匊為左手詩話謂屈掌曰匊則匊是一手其掌耳局卷也婦人夫不在則不飾容夫輔廣云薄言歸沐恐君子之或歸也季氏云為將歸有期故汲汲沐以待夫此以方及五日之期為言也終朝采藍不盈一襜五日為期六日不詹衣蔽前謂之襜至藍染草也五日六日者五月之日六月之日也期五月而歸今六月猶不至是以憂思詹與瞻同之以豳風一之日二之日例之則三之日為正月四日為二月五之日為三月六之日為四月也别月令仲夏之月令民毋刈藍以染註此月藍始可此謂期以三月當歸至四月猶未瞻見今又及采藍之時則過五月矣水後漢劉瑜疏云天地之性隂陽正紀隔絶其道則旱為并詩云五日為期六日不詹怨曠作歌仲尼所録之子于狩言韔其弓之子于釣言綸之繩韔弓衣也亦云弢綸韔其弓者孔云弛弓納于韔中也理絲曰愚謂理絲而合之為綸愚按此下二章皆思之不至而預擬其歸後之詞意以逺出不歸歸則不令復出耳往狩則納弓于韔絶其射獵之念不欲其習武事也若舍狩而釣則合絲為繩以資之可與偕隱矣下章言釣不及狩其意可見其釣維何維魴及鱮維魴及鱮薄言觀者陸氏云魴魚之美者鱮魚之不美並舉之可以槩衆魚矣愚按此又虚擬其夫往釣釣而多獲其釣只在近地故已得以往觀豈致如今之逺出不返相見未有期耶皆意想之詞非有是事采緑四章章四句朱註謂婦人思其君子之詩何氏謂六日正四月也疑與四月維夏篇同時事一為征夫之詞一為思婦之語黍苗序曰刺幽王也不能膏潤天下卿士不能行召伯之職焉朱註宣王封申伯于謝命召穆公往營城邑故將徒役南行而行者作此愚按幽王之時申后被黜申伯與王室相怨詩人追叙召伯營謝之烈見宣王尊禮元舅之隆一以感悟王心一以絶申伯召戎之念也芃芃黍苗隂雨膏之悠悠南行召伯勞之毛傳興也朱註同韋芃芃長大貌之以隂雨能澤物興召伯能撫下昭云召康公子穆公虎也勞之謂慰其勞苦恤其饑渇撫循勸勉如天澤沃然其勞也盖膏也愚按自鎬京至謝謂之南行我任我輦我車我牛我行既集盖云歸哉朱註賦也下同車此下二章皆召伯之語所謂勞之也孔云任輦牛是轉運所用鄭云營謝轉餫之役有負任者有輓輦者有將車者有牽傍牛者周漢書註駕人以行曰輦夏二十人而輦殷十八人十五人凡輦一斧一斤一鑿一梩一鋤周輦加二板二築我任謂役人所各任之器皆載于輦也朱註牛所以駕大車也即轉餫之車也矣集就也言百物具備易以集事事既集庶可言歸嚴氏云示以歸期安其心也我徒我御我師我旅我行既集盖云歸處鄭云召伯營謝邑以兵衆行其士卒有步行者有乗車者五百人為旅五旅為師春秋傳曰君行師從卿行旅從任孔云旅屬于師徒行御車即指師旅之人上章輦車牛以載工作之器言此章徒御師旅以受工役之人言肅肅謝功召伯營之烈烈征師召伯成之肅肅嚴正貌烈烈威武貌謝言召伯善于慰勞人皆趨事赴功而謝之功以成即今信陽州也功工役之事也状烈説文云火猛也烈烈其猛于趨事愚按烈烈謂其勞績之昭著也師即指南行之衆成之謂其以撫循為激勸所以功易成也原隰既平泉流既清召伯有成王心則寧土治曰平水治曰清郭蔡汝南云清水道所以平原隰也上章言建城治宫室等事至此相其原隰之宜通其水泉之利則召伯營謝之功于是乎有成矣崧髙之詩一則曰南土是保再則曰戎有良翰王心之寧可知愚按言外謂宣王之所以篤厚于元舅者如此而後王以褒姒之蠱惑遂與為仇讐深可傷也黍苗五章章四句朱註謂此詩與大雅崧髙相表裏愚按崧髙之詩曰因是謝人以作爾庸則城謝既取諸謝人矣而召伯復以徒御師旅往者盖新滅之謝遽而動衆興役慮其生心故以師徒協濟之亦所以彈壓之也隰桑序曰刺幽王也小人在位君子在野思見君子盡心以事之鄭史伯謂王棄髙明昭顯而好讒慝暗昧惡犀角豐盈而好頑童窮固去和而取同是則幽王之世佞諛用事而諫臣被廢棄在野者多矣觀末章云云詩人所思之君子必直諫之士在草野不忘君者也隰桑有阿其葉有難既見君子其樂如何毛傳興也朱註同阿隰説文云阪下隰也阿通作娿難通作儺即娜也那是枝葉條垂之状下隰之桑枝葉搖曳喻君子在野不以窮困為意有從容自得之貌愚按樂者兩人相得之謂詩人見滿朝佞諛無一可與言者思得見在野之君子深談時事以共抒其憤懣而為樂也隰桑有阿其葉有沃既見君子云何不樂沃光澤貌言如膏之沃也喻君子處約其徳益充盛為人所利賴猶桑之能衣被斯民也徐光啓云其樂如何者欲自言而非言語之所能形容也云何不樂者欲自止而非在我之所能遏抑也隰桑有阿其葉有幽既見君子徳音孔膠幽黒色也不幽之為言窈也葉盛而密窈然作深黒色稀疎則能也言從徳出曰徳音膠固也盖昔聆其徳音佩服于心固結而不能解也愚按徳音即下章遐不謂矣孔膠即下章何日忘之心乎愛矣遐不謂矣中心藏之何日忘之嚴氏云心乎言由中也愛謂愛君也遐之言胡也胡之言何也皆音之轉也遐不猶言無不也謂猶告也序所謂思見君子盡心以事君即此愚按遐不謂矣知無不言也言君子雖昔日以盡言去位而其言發于忠愛字字深切時弊至今中心服念不置所謂徳音孔膠也此所以欲見是人而與之深談為樂也隰桑四章章四句朱子謂此喜見君子之詩詞義大槩與菁莪相類愚按孝經子曰君子之事上進思盡忠退思補過将順其美匡救其失故上下能相親也引此詩之末章云云夫進思盡忠退思補過心乎愛也将順其美匡救其失遐不謂也則此詩所思之君子必為匡救主上之正士而非尋常燕飲之賔矣白華序曰周人刺幽王也幽王取申女以為后又得褒姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治周人為之作是詩也按史厲王之末漦化為𤣥黿入王後宫後宫童妾既齔而遭之既笄而孕無夫而生子懼而棄之宣王之時聞檿弧箕服之謠有夫婦賣是器者使執而戮之逃于道而收所棄妖子以亡奔褒褒人有罪入于王以贖罪是為褒姒孔云厲王之末流彘之嵗也帝王世紀謂幽王三年嬖褒年十四是先幽王立十一年而生其生在宣王三十六年也自宣王三十六年上距流彘之嵗中間共和十四年共為五十年童妾以七嵗而齔時遭之至生女時其年五十六矣計遭後八年始笄笄四十二年而生作為妖異故不與人道同白華菅兮白茅束兮之子之逺俾我獨兮毛傳興也朱註比也下同謂白華野菅也已漚為菅孔云漚之柔軔異其名之菅因其在野未漚者為野菅也白陸氏云菅茅屬也而其華白故一曰白華詩序曰華孝子之潔白也茅亦潔白詩曰白茅純束孔子謂茅之為物薄而用可重也職歐陽子云言二物各有施可以並用如妻妾各有可以並居曰鄭謂王之逺我欲使我獨也老而無子獨褒姒譖申后之子宜臼出奔申也愚按菅茅皆况申后逸詩云雖有絲麻不棄菅蒯雖有姬姜不棄憔悴則菅蒯乃憔悴之比白者賛其潔白也束者稱其守禮也是時申后年齒已長幽王寵新棄舊故以菅茅為况逺逺棄也獨单也英英白雲露彼菅茅天步艱難之子不猶朱註英英輕明之貌白雲水上輕清之氣當夜而上騰者也露即其散而下降者也愚按上章以菅茅為况此言菅茅微物猶上承天露而已廢處離宫恩澤不被殆菅茅之不如矣天步艱難謂天下將亂也猶謀也謂王不謀國事而惑邪嬖也天步艱雖即指日月告凶不用其行也日月君后之象今失其常是天步之艱難有為之祟者也滮池北流浸彼稻田嘯歌傷懐念彼碩人滮水流貌豐鎬之間水北流按水經注云鄗水北流西北注與滮池合九域志云京兆府氷池名滮池滮北入鄗又北合渭是皆北流矣水羅氏云稻性宜水故五穀外别設稻人之官専理事鄭云池水之澤浸潤稻田使之生殖喻王無恩意于申后滮池之不如也愚按白雲託興傷天澤之不被也滮池託興傷地澤之不通也申后見廢而獨處是無天地也嘯歌者既嘯而後歌所謂長歌之哀過于痛哭也傷懐者懷思往事而自傷也此想見申后在宫之情事念者詩人念之也滅碩人指申后也周失申后而殞于戎衛失莊姜而于狄兩人所闗不小故皆以碩人稱之樵彼桑薪卬烘于煁維彼碩人實勞我心卬我也烘燎也煁烓竈也服食家凡烹飪宜桑薪取其火不急不慢有文武兼濟之道煁爾雅以為烓孔云烓者無釡之竈其上然火謂之烘用鄭云桑薪薪之善者宜以炊㸑今反以燎于烓竈焰事物而已喻申后之反見卑賤也釡郝氏云卬與仰同漢書卬給縣官謂仰給也以無之竈仰桑薪以烘美材而賤用之嫡后見棄何以異此心碩人指后我詩人自我也念此不平而為勞耳皷鐘于宫聲聞于外念子懆懆視我邁邁懆懆憂貌説文云愁不伸也邁不顧也王宫中擊鐘聲聞于外言宫閫之地四方所由觀化之失徳不可掩也愚按此章后不以己之失位為恨而以王之惡聲逺播為憂故箋云此言申后之忠于王也懆懆者不忍忘君邁邁者絶之已甚曰念曰視厚薄分明有鶖在梁有鶴在林維彼碩人實勞我心鶖秃鶖也矣蘇氏云鶖鶴皆以魚為食然鶴之于鶖清濁有間今鶖在梁而鶴在林鶖則飽而鶴則餞矣幽王進褒姒而黜申后譬如養鶖而棄鶴也鴛鴦在梁戢其左翼之子無良二三其徳鴛鴦匹偶相隨之鳥以喻王與后也戢歛也歛左翼者謂右掩左也愚按在梁承上章來因在梁有鶖而追念昔日鴛鴦之在梁也戢翼相向雌雄之和睦宛然忽棄嘉偶而求别配曾烏之不如矣衛風云士也罔極二三其徳刺夫婦之相棄背正此謂也此章専以責王使之子不二三其徳雖百褒姒何能為其怨之也切矣有扁斯石履之卑兮之子之逺俾我疷兮扁卑貌王鄭謂石乗石也周禮王行則洗乗石疏云乗石者所登上車之石王起有洗乗石賦云承玉趾以増麗拂衮衣而更妍洗列周經履合詩雅蒙履踐也履之卑兮是倒句文法言此乗石也時得王之踐履而我獨無由與王相親近斯石之不如也疷病也説文云病不翅也猶言不止于病病之甚耳愚按石之扁也以履之而卑謂踐履之久而扁者益以卑也乗石以久雖卑猶不忍棄而履如故后之事王厯年已久寧乘石之不如而逺棄之也按竹書幽王三年始嬖褒姒五年世子宜臼出奔申夫能出奔必已成人訃后之生世子當在宣王之世而王之娶后亦已久矣故以乗石况之言其久也首章末章皆代為申后之語兩我字謂申后也與諸章異白華八章章四句漢書註引此詩序幽字下有王廢申三字謂刺幽王廢申后也愚按此詩為申后見廢詩人傷之而作篇中碩人之稱詞義皆指后決非后自作也朱子謂后被黜而作此詩以碩人謂幽王則古今宫闈之詩豈皆宫中人自為之耶緜蠻序曰微臣刺亂也大臣不用仁心遺忘微賤不肯飲食敎載之故作是也鄭云微臣士也幽王時禮廢恩薄大不念小尊不恤卑故本其亂而刺之愚按古者諸侯貢士于天子故飲食敎誨後車之載皆先王之制也幽王時侯國不貢士士之賢者無由上達故作此詩追述盛時待士之禮玩道之云逺我勞如何豈敢憚行畏不能趨諸語明傷諸侯不貢已無由以至京師也緜蠻黃鳥止于丘阿道之云逺我勞如何飲之食之敎之誨之命彼後車謂之載之毛傳興也朱註比也下同也毛云緜蠻小烏貌丘阿曲阿也緜説文云聯微謂鳥聲之微細相連不絶如緜而烏語不可與人解擬以蠻也斯月令季春勉諸侯聘名士禮賢者黃烏善鳴正在時因以起興車鄭云後車倅車也即副車古諸侯貢士以己之副與之乗之敬愛之至也漢書髙帝下詔求賢令御史中執法下郡守其有意稱明徳者必身勸為之駕是後車載士之風漢世猶存緜蠻黃鳥止于丘隅豈敢憚行畏不能趨飲之食之敎之誨之命彼後車謂之載之鄭云丘隅丘角也憚難也謂豈敢憚于徒行乎畏不能及時疾至也疾行曰趨自傷無車馬不能跋涉也緜蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之敎之誨之命彼後車謂之載之鄭云丘側丘旁也恐極至也國語云齊朝駕則夕極于魯國道之云逺不能至其所也古者三年一貢士大國三人次國二人小國一人此典廢而士之仕進絶矣其曰畏不能趨畏不能極則不貢之失已見豈有諸侯貢士而尚煩士之畏奔走乎緜蠻三章章八句按序言大臣不用仁心遺忘微賤大臣即指諸侯也不能飲食之所謂不用仁心也不能敎誨而薦揚之所謂遺忘微賤也瓠葉序曰大夫刺幽王也上棄禮而不能行雖有牲牢饔餼不肯用也故思古人不以微薄廢禮焉郝氏云幽王日荒于酒羣臣宗族罕得進見詩人託興瓠葉以訓恭儉瓠賤而葉兔小而首至薄也牲牢饔餼不用而取其至薄善誘之意弟何氏云誦頍弁之詩旨酒嘉肴徒為羣小設而兄甥舅不得沾其餘瀝分其一臠故寓言瓠兔以諷若曰何時得被此禮乎是亦足耳幡幡瓠葉采之亨之君子有酒酌言嘗之朱註賦也下同毛傳缺鍇幡幡瓠葉貌庶人之菜也君子指王也嘗徐云口試其味也凡臣侍食于君有先嘗之禮愚按嘗之試其味而已不敢過飲也子左傳昭公元年趙孟叔孫豹入于鄭鄭伯兼享之皮戒趙孟禮終趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻子其從之子皮曰敢乎穆叔曰夫人所欲也又何不敢乃享具五獻之籩豆于幕下趙孟辭私于子産曰武請于冢宰矣乃用一獻有兔斯首炮之燔之君子有酒酌言獻之朱註有兔斯首一兔也兔以首言猶數魚以尾也後毛曰炮加火曰燔鄭云飲酒之禮既奉酒於賔乃薦羞獻獻主人酌以賔也有兔斯首燔之炙之君子有酒酌言酢之炕火曰炙主孔云炕舉也謂舉於火上以炙之客報人曰酢賔既卒爵而酌主人也有兔斯首燔之炮之君子有酒酌言醻之醻導飲也今鄭云主人既卒酢爵又酌自飲卒爵復酌進賔猶俗之勸酒孔云欲以醻賔而先自飲以導之其實飲訖進酒于賔乃謂之醻也行按禮主人導飲之後賔受爵却不飲奠于席前乃旅酬之禮今此一獻禮薄當無旅酬之事愚按獻之酢之醻之所謂三爵也盡此三爵而已不敢為無筭爵之飲與首章嘗之同義瓠葉四章章四句朱子以為燕飲之詩郝氏謂幽王日荒于酒詩人託興瓠葉以訓恭儉是也漸漸之石序曰下國刺幽王也戎狄叛之荆舒不至乃命將率東征役久病在外故作是詩也或謂幽王東征之役史傳無所經見竹書紀厲王三年淮夷侵雒王命虢公長父伐之不克是詩之作當在厲王之世愚按四月篇有云我日構禍是出征事也曰滔滔江漢南國之紀非東征之實紀乎竹書紀幽王十年王師伐申申遷于謝界在楚地以周視之亦東征也漸漸之石維其髙矣山川悠逺維其勞矣武人東征不遑朝矣朱註賦也下同毛傳缺截漸漸釋文作嶃嶃嶃通作斬言石之森立状如斬然也劉彞云漸漸之石維其髙矣謂所厯之路石皆亷利傷人之足割馬之蹄不可以踐履也不獨漸漸而已其髙峻峭拔非攀援則不可以登也間其山窮者川斷之也其川盡者山間之也重重相不可極不曰悠逺乎説文云勞劇也鄭謂勞勞廣闊一作遼唐詩有勞勞亭畔草言其遼逺也遑暇也言無朝夕之暇也漸漸之石維其卒矣山川悠逺曷其没矣武人東征不遑出矣毛云卒竞也言徧厯此石也因鄭云卒者崔嵬也謂山顛之末沒猶盡也上章石路阻絶不前而歎山川之悠逺此言既過此石而山川之悠逺仍復如故則登厯何時而可盡也一説沒字状深箐懸洞杳杳深入之意不朱註不遑出謂但知深入暇謀出也有豕白蹢烝涉波矣月離于畢俾滂沱矣武人東征不遑他矣蹢蹄也駭爾雅亦作豴云豕四豴皆白為􅘻疾􅘻駭同孔云者躁疾之言白蹄名之為駭是躁於餘豕矣馬毛云将久雨則豕進涉水波雨韓詩注云犬喜雪喜風豕喜雨箕好風畢好論衡云孔子出使子路齎雨具有傾天果大雨子路問其故孔子曰昨暮月離于畢後日月復離畢孔子出子路請齎雨具孔子不聴出果無雨子路問其故孔子曰昔者月離其隂故雨昨暮月離其陽故不雨俾滂沱矣是未雨而預料其雨以為月離于畢實使之若歸咎于月者然嚴氏云不遑他矣對苦雨一事而言謂之他不遑他者愁苦極而智慮廢惟雨是憂耳尚能講求制勝之事乎漸漸之石三章章六句此詩言東征之士深入苦雨師人扶病不暇其不能克敵可知郝氏謂風雨則失天時險逺則失地利久役則失人和君不仁而好戰亡可立待矣漸漸之石以下三詩悽愴哀颯亡國之音也苕之華序曰大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也苕之華芸其黄矣心之憂矣維其傷矣毛傳與也朱註比也而毛云苕陵苕也将落則黄圖鄭云陵苕之華紫赤繁本草云即今之紫葳經云凌霄花也則華爾雅云荂也木謂之華草謂之榮邢昺云木名華月令季春桐始華是也草則名榮月令仲夏木槿榮是也然草亦名華鄭風隰有荷華是也愚按淩霄引蔓依木是藤本非草本也苕附木而生猶王室之弱依諸侯以自立也王以無信義而失諸侯如花之生意將盡不能自託于木矣當其時者惟有哀傷耳苕之華其葉青青知我如此不如無生毛云華落葉青青然衣鄭謂華衰而葉見也有羅氏云周室之于諸夏猶服之有冠冕水木之本源盖有深根固植之義不特以其在物上而已今苕雖居髙在物之上然荏弱而託于物所自恃者微矣故見其華則為之憂傷逮其華落而葉存則不如無生矣牂羊墳首三星在罶人可以食鮮可以飽朱註賦也劉牂羊牝羊也墳大也羊瘠則首大也羊牂或作䍧晝云晉文公不服羔裘君臣皆衣䍧䍧非美毳而競之者隨君所好也曲毛云罶曲梁也寡婦之笱也按罶為曲梁之笱非梁也郝氏云觀諸陸産牝羊無字見墳然之大首而已觀諸水族澤梁無禁罶中水静見三星之影而已山童水竭閭里蕭條饑人但得食足矣安望其飽乎光鄭云三星在罶言不可久也喻周将亡如心星之耀見于魚笱之中其去須臾也苕之華三章章四句朱子謂詩人自傷逢周室之衰而作愚按苕蔓生附木乃女寵小人之比青青者葉喻衆小人之黨附褒姒者流因牝雞司晨以致天怒人怨饑饉兵戎海内蕭條皆女寵致之也何草不黄序曰下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也按經有征夫之語故序以用兵不息為言凡出使行役皆名曰征不必征伐也朱子以周室將亡征役不息行者苦之故作此詩何草不黄何日不行何人不將經營四方朱註興也毛傳缺言鄭云自嵗始草生而出至歳晚矣何草而不黄乎草皆黄也何日不行言嵗已将盡可休息矣而行猶未已此只就己一人言下句推廣言之見行役者不獨一人所以為時事慨也何草不𤣥何人不矜哀我征夫獨為匪民王氏云草既黄而死矣歳暮之時死而復生其色既𤣥則又改嵗矣小明篇大夫以十二月西征中厯一嵗至後嵗之二月猶未得歸四月篇大夫亦以去嵗六月征伐南國至今嵗四月猶未歸以此而推當時征途所見其為草之𤣥而黄者多矣其無妻曰矜從役者皆過時不得歸故謂之矜謂失室家之樂也視先王以民待民今王之犬馬故曰匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇陸氏云兕抵觸虎搏噬先王驅而逺之則率彼曠野兕虎之所宜今征人如此則可哀矣按孔子厄于陳蔡引此章二語亦為被人驅逐使循行於曠野無所栖泊也朝夕不暇猶言無朝無夕也有芃者狐率彼幽草有棧之車行彼周道説文云芃草盛貌以言狐者状其毛尾長也中棧車役車也鄭云狐草行草止孔云狐本草之獸故可循彼幽草人非禽獸何為行彼周道常在野外與狐在幽草同乎愚按狐性善睡率彼幽草猶得止息也棧車之士日行周道而不止是狐之不如矣何草不黄四章章四句此詩與北山相表裏北山為行役之士所作此詩為行役之人所作二詩皆有經營四方之語其為同時共事明矣禮云士乗棧車其士即此征夫所從者也都人士之什十篇四十三章二百句田間詩學卷八
