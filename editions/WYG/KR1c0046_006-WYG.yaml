body:
  text: 田間詩學卷六桐城錢澄之撰小雅按雅題不曰周者以所載皆周室之詩于異代無涉故不言周也餘詳二雅論中小大雅譜略小大雅者周室居西都豐鎬之時詩也始祖后稷由神氣而生有播種之功于民公劉至於太王王李厯及十載越異代而别世載其功業為天下所歸文王受命武王遂定天下盛徳之隆也大雅之初起自文王至於文王有聲據盛隆而推原天命上述祖考之美小雅自鹿鳴至於魚麗先其文所以治内後其武所以治外此二雅逆順之次要於極聖賢之情著天道之助如此而已矣又大雅生民及巻阿小雅南有嘉魚及菁菁者莪周公成王之時詩也傳曰文王基之武王鑿之周公内之謂其道同終始相成比而合之故大雅十八篇小雅十六篇為正經其用於樂國君以小雅天子以大雅然而饗賔或上取燕或下就何者天子饗元侯歌肆夏合文王諸侯歌文王合鹿鳴諸侯于鄰國之君與天子于諸侯同天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合鄉樂此其著略大校見在書籍禮樂崩壊不可得詳大雅民勞小雅六月之後皆謂之變雅各以其時亦顯善懲過正之次也小夾漈鄭氏曰正變之言不出於夫子未可信也雅節南山之刺大雅民勞之刺謂之變雅可也鴻鴈庭燎之美宣王崧髙烝民之美宣王此可謂之變乎詩之次第皆以後先為序文武成康其詩最在前故二雅首之厲王繼成王之後宣王繼厲王之後幽王繼宣王之後故二雅皆順其序國風亦然斷斷無有正變之説也朱子云雅者正也正樂之歌也其篇本有大小之殊而先儒説又各有正變之别以今考之正小雅燕饗之樂也正大雅㑹朝之樂受釐陳戒之辭也故或歡欣和悦以盡羣下之情或恭敬齋荘以發先王之徳辭氣不同音節亦異多周公制作時所定也及其變也則事未必同而各以其聲附之其次序時世則有不可考者矣鹿鳴之什二之一雅無列國之别毛氏以次列為什如軍法十人為什自鹿鳴至魚麗十篇為鹿鳴之什朱子據儀禮終以南陔而次魚麗于白華之什鹿鳴序曰燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後羣臣嘉賓得盡其心矣鄭云飲之而有幣酬幣也食之而有幣侑幣也謂儀禮于燕禮鄉飲酒禮皆歌鹿鳴四牡皇皇者華之升歌三終大射禮亦歌鹿鳴三終官學記云大學始教皮弁祭菜示敬道也宵雅肄三其始也鄭氏謂宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩盖以居官受任之美誘喻其初志故曰官其始也三左傳叔孫豹如晉晉悼公享之工歌鹿鳴之盖三詩同節所謂三終也呦呦鹿鳴食野之苹我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行毛傳興也朱註同鹿陸氏云鹿性警防分背而食以備人物之害按分背而食食則相呼羣居則環其角於外以防物之害已苹爾雅云藾蕭也郭璞云今藾蒿也唐徳宗問宰臣詩食野之苹苹是何草楊珏以爾雅藾蕭為對上曰詩疏葉圓而花白叢生野中似非藾蕭今按詩疏中都無此語不知何出孔云燕禮于客之内立一人為賓使宰夫為主與之對行禮其實君設酒殽羣臣皆在君為之主羣臣總為賔也燕禮云若與四方之賔燕則迎之于大門内四方之賔惟迎之為異其燕皆與臣同嚴氏云鼔動也謂動其聲也在笙以匏竹合而成聲而在八音中獨以匏稱所重匏也瑟在堂上笙在堂下古者主人三獻禮成之後而樂作記所謂凡舉爵三作而不徒爵故作樂以樂之按燕禮篇小臣納工工四人二瑟小臣左荷瑟面鼓執越内絃右手相入升自西階北面東上坐小臣坐授瑟乃降註小臣相工者也工四人謂二瑟二歌左荷瑟以左肩擔瑟也面鼓謂可鼓者在前也越瑟底孔也内絃以瑟絃側向身也右手相以右手扶瞽也授瑟相者以瑟授瞽工也嚴氏云吹笙則動其簧而發聲承筐指幣帛言或疑燕禮無用幣之文周語云先王之燕體解節折而共飲食之于是乎有折俎加豆酬幣宴貨以示容合好則燕禮亦用酬幣也言朱註周行大道也古者於旅乞語故欲于此聞其也又曰君臣之分以嚴為主朝廷之禮以敬為主然一于嚴敬則情或不通而無以盡其忠告之益故先王因其飲食聚㑹而制為燕饗之禮以通上下之情臣記曰私恵不歸徳君子不自留焉盖其所望于羣嘉賔者惟在示我以大道則必不以私恵為徳而自留矣嚴氏云以告我者為好我盖道之使言也愚按鹿得食則相呼呦呦而食以興僚友間無猜無忮同享君賜和樂可知周行大道明王者求言不取捷近也呦呦鹿鳴食野之蒿我有嘉賔徳音孔昭視民不恌君子是則是傚我有㫖酒嘉賔式燕以敖蒿菣也郭璞云今人呼為青蒿香中炙啖者為菣通爾雅云蘩之醜秋為蒿則蘩蕭莪之類至秋老成名為蒿酒鄭云徳音先王道徳之教也昭明也視古示字飲之禮于旅也語謂嘉賔所語明先王之徳教以示民也盛鄉射禮云古者于旅也語孔云賔筵之初禮樂方言語則慢矣迨至旅酬則禮已成樂已備於是而語乃無嫌也云燕通作宴安也賈逵謂不脱屐升堂曰宴敖毛逰也有舒泰自由之意愚按徳音孔昭盡于視民不恌一語周家以忠厚立國不恌固其舊徳而乃相勉以是則是傚若惟恐不及其訓者其所以求言者切矣即所為示我周行也君臣主敬至于旅酬之時則相與釋其矜持而導以舒泰庶幾從容欵洽而上下之情始大通也賔天官書箕為敖客註敖調弄也與拘謹相反盖燕者望其樂而勿拘謹也呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼔琴和樂且湛我有㫖酒以燕樂嘉賔之心芩莖如釵股葉如竹蔓生澤中下地鹹處牛馬亦喜食之陳𤾉云八音以絲為君絲又以琴為君故爾雅既釋五音即次以琴而必先言瑟者瑟與琴相需為用異于琴者以絲分而音細耳書琴瑟以詠大傳大琴大瑟皆並言之然鄉飲酒禮二人皆左何瑟燕禮小臣左何瑟樂記清廟之瑟詩並坐鼓瑟何不日鼔瑟皆不及琴者以瑟見琴也盖何氏云首章言鼔瑟吹笙至此復言鼔瑟鼓琴者旅酬将終作無算樂之時也按禮旅酬既畢無算爵以醉為節不限數也公有命徹幕初公尊有幕徹之示欲罄此尊也然後升堂反坐作無算樂向者獻酬有節笙歌間合皆三終今曰無算不限三也湛從甚言樂甚也燕安也則范氏曰夫婚姻不備則貞女不行也禮樂不備賢者不處也賢者不處豈得樂而盡其心乎愚按周家以燕飲接其臣下情深而文備略君臣而講賔主上下一體于是以用其力誰不為用導之言誰不言者成周太平之治由此其致也後世君尊臣卑分既懸絶情益濶疎抗節敢言者少矣雖召對顧問為時無幾天威不測豈能盡其所言乎是故燕飲乞言為周家一代大政所在鹿鳴之冠小雅有以哉鹿鳴三章章八句申培説天子燕賔師之歌據儀禮飲酒禮工歌用之遂以為上下通用之樂郝氏云詩本天子燕羣臣嘉賔而作猶闗雎本后妃之徳雖鄉射燕禮用之未可遂為鄉射燕禮之樂歌也朱子亦云本為燕羣臣嘉賔而作其後乃推而用之鄉人也四牡序曰勞使臣之來也有功而見知則説矣鄭云稱王事者西伯受商王之命以統諸侯使臣往來皆王事也郝氏云凡風雅歌文王之事非即作于文王之時周道大行而後禮樂興是成王周公之世矣故稱王事稱天子文武同焉左傳襄公四年穆叔如晉晉侯享之工歌鹿鳴之三三拜韓獻子使行人子員問之對曰四牡君所以勞使臣也敢不重拜魯語則云晉侯使行人問焉對曰四牡君之所以章使臣之勤也敢不拜章孔云歌于使來之時則勞其來也而極言在外之情如此則章其勤也勞其來者此詩之用章其勤者此詩之意四牡騑騑周道倭遲豈不懐歸王事靡盬我心傷悲朱註賦也下同毛傳缺指騑騑行不止貌騑即驂也曰騑騑于四牡之中特兩驂而言倭通作逶倭遲回逺也也盬不堅固也恩毛云思歸者私恩也靡盬者公義鄭云無私非孝子也無公義非忠臣也君子不以私害公不以家事辭王事也孔云我心傷悲正謂念憶父母下章云將父母是范氏云臣之事上也必先公而後私君之勞臣也必先恩而後義朱註臣勞于事而不自言君探其情而代之言上下之間可謂各盡其道矣之程子云上不知下之勞則下不自盡其力故四牡義廢則君臣缺矣四牡騑騑嘽嘽駱馬豈不懐歸王事靡盬不遑啓處毛云嘽嘽喘息貌馬勞則喘息白馬黑鬛曰駱也陸氏云駱性耐勞而今喘息不平如此以甚苦故按聲之緩者曰嘽亦勞極而疲緩之義啟跪處居也何澍云啓跪而有所陳也古者坐以膝着地以股着腓有所敬則伸其股而跪所謂長跪也禮君子更端則起起即跪也居即坐也不遑啓處謂我心傷悲其故正在于此處輔廣云我心傷悲既述其私恩之不能忘不遑啓又述其公義之不可已吕氏云説文煑海為鹽煑池為盬盬苦而易敗故註為不堅固翩翩者鵻載飛載下集于苞栩王事靡盬不遑將父朱註興也下同為翩説文云疾飛也班羅氏云隹鳩孝鳥少皥氏以司徒一名祝鳩似鳩而臆無繡采又頭有贅養老之杖以鳩為飾取其孝鳥也栩將奉也扶持奉侍之謂鵻之飛也亦下而集于不若使者之行久不返不獲養父母也丈禽經曰鵻上無尋鷚下無常言二鳥之起不過尋不逺而復而王事靡盬之臣則征役不得蹔息也翩翩者鵻載飛載止集於苞杞王事靡盬不遑將母把枸檵説文云枸把也愚按上兩章為奉使初發之辭此兩章以翩鵻起興又為久役未返之辭言物猶得所止而人子乃久缺乎孝養君人者所以深不自安也駕彼四駱載驟駸駸豈不懐歸是用作歌將母來諗朱註賦也四二章云四牡騑騑嘽嘽駱馬則知四牡皆駱故名駱陸氏云古者天子之卿純四故曰駕彼四駱又曰乗其四駱若諸侯之卿則不能具純駟矣嚴氏云走馬曰馳不馳而步疾曰驟言載驟駸駸則其尚在行役而未能遽歸可見矣耳是用作歌非使臣作是歌也上設言其情以勞之諗告也左傳辛伯諗周桓公是也父將母來諗言以己思欲將母之情來告於其母也母愛子之情雖一而父或猶知大義母未必不牽于私情故思所以慰其意者如此愚按是用作歌將母來諗欲使臣以此歌告之其母知上之曲體子情以慰親也玩其詩沉鬰曲折一如使臣自道其情而實上人代為之言則使臣無可復言矣所以感之深而益盡其心于王事也先王之善用人心如此四牡五章章五句序言此詩所以勞使臣之來儀禮以為上下通用之樂朱子疑本為勞使臣而作其後乃移以他用耳愚按鄉飲酒歌此亦以其勤王事而念父母有忠孝之道焉皇皇者華序曰君遣使臣也送之以禮樂言逺而有光華鄭云言臣出使能揚君之美延其譽于四方則為不辱命也曹居貞云燕以遣之所謂送以禮也歌以樂之所謂送以樂也使郝氏云此文王之詩後王遣使臣皆用之使臣受不同總之宣上徳達下情耳人君深居清穆四方艱難疾苦無由周知故使臣以周諮為先務愚按此詩若以戒夫使臣者而托于其自道之辭以發之皇皇者華于彼原隰駪駪征夫每懐靡及朱註興也後四章賦也毛傳缺下皇皇猶煌煌也華草木之華也毛云髙平曰原濕曰隰忠臣奉使能光君命無逺無近如華不以髙下易其色乗駪説文云馬衆多貌盖同時出使之臣觀后章所或駒或騏或駱或駰知非一使耳諸使臣皆同此懐故曰每懐春秋外傳所謂懐和為每懐也靡及者如恐不及事也特朱善云不曰使臣而曰征夫則不使臣此心其屬亦此心也我馬維駒六轡如濡載馳載驅周爰咨諏説文云六尺以上馬五尺以上駒夫陸氏云大夫乗駒血氣未定則有蹄齧之患故大乗之下文騏也駱也駰也䝉上之文宜皆為駒云如濡鮮澤也周左傳穆叔曰忠信為周歐陽子周為周徧之雖有馳驅之勞不忘國事周詳訪問因以廣博聞也對爰于也咨訪問也諏説文云聚謀也國語穆叔晉君曰皇皇者華君教使臣曰每懐靡及諏謀度詢必咨于周敢不拜教臣聞之曰懐和為毎懐咨才為諏咨事為謀咨義為度咨親為詢忠信為周君况使臣以大徳敢不重拜左傳又稱咨事為諏愚按為國事周詳訪問即忠信之義苟非實心體國必濶畧而不周矣我馬維騏六轡如絲載馳載驅周爰咨謀如絲言條直也稱毛云言調忍也咨事之難易為謀左傳又咨難為謀杜預註問患難也我馬維駱六轡沃若載馳載驅周爰咨度沃若言潤澤也義毛云咨禮義所宜為度國語稱咨左傳稱咨禮也我馬維駰六轡既均載馳載驅周爰咨詢陰白雜毛曰駰均調也之咨親為詢謂兩意親信促膝籌畫言无不盡如舜詢于四岳即此詢也按諏有參伍意謀有審顧意度有折衷意詢有詳究意各以先後為序皇皇者華五章章四句序曰君遣使臣春秋傳曰君教使臣遣者其事也教者其意也燕禮鄉射酒禮亦皆用之而大學始教亦以此先焉則教之道存焉耳愚按輶軒之使上以宣布徳意下以采聴風謠今其遣之也専教使臣以諏度詢謀非僅采聴而已使臣能體上意以克盡其職則海内人情無不達利弊無不知王者身不下堂而明見萬里則使臣所係與諫臣等所以臨遣而送之以禮樂誠重之也荘子云大聲不入于里耳折栁皇荂則嗑然而笑折栁逸詩也皇荂疑即此篇豈鄉飲酒人熟聞之故易解耶常棣序曰燕兄弟也閔管蔡之失道故作常棣焉左傳周襄王以狄伐鄭富辰諫曰不可昔周公弔二叔之不咸故封建親戚以藩屏周召穆公思周徳之不類故紏合宗族于成周而作是詩無韋昭云穆公召康公後穆公虎也周室既衰厲王道親親禮廢故召穆公思周徳之不類而合宗族于成周復修作棠棣之歌以親之愚按穆公厲宣時人是時周都鎬京所謂東都王城也成周即雒邑也所以奠九鼎而居殷稹民者敬王時避子朝之難始遷于此合族成周之説殊不足信序謂文武以天保以上治内安得有厲宣變雅雜于其中其為周公作無疑詩據春秋傳富辰謂穆公作據國語以為周文王之皆富辰語也杜預以作詩為作樂而奏此詩常棣之華鄂不韡韡凡今之人莫如兄弟毛傳興也朱註同而爾雅云唐棣栘常棣棣惟常棣得以棣名栘則開反合者也鄭云承華者曰鄂不當作柎柎鄂足也弟常棣一跗輙生二鄂兩兩相麗故稱韡韡興起兄同生之義孔云華下有鄂鄂下有柎公按萼花蕊也不花蒂也不作柎又作趺又作跗感于往昔管蔡之事骨肉相殘有餘恫焉故指兄弟之情誼以告人欲今世之為兄弟者皆相親也死䘮之威兄弟孔懐原隰裒矣兄弟求矣朱註賦也念威畏懐思也鄭云死䘮可畏惟兄弟之親甚相思盖他人見威則避兄弟見威愈懐也原隰野外也裒斂尸也郝氏謂指成王殺管叔之事禮公族有罪磬于甸人不與國人慮兄弟故曰原隰也求尋覔也愚按兄弟之情于死䘮時始見荘子云以利合者廹窮禍患害相棄也以天合者廹窮禍患害相收也脊令在原兄弟急難每有良朋况也永歎朱註興也故禽經云脊令友悌註云脊令共母者飛鳴不相離取以喻兄弟唐明皇時有脊令數十集麟徳殿木上魏光乗作頌以為天子友悌之祥朋况通作怳永嘆長太息也人遇患難之時毎有良相憐為之驚怳而長嘆耳無所用其力也有朱子云急難淺于死䘮言不待死䘮然後相收但急難便當相助下文又云方且鬭䦧于内而忽有外侮則同心禦之益見至情不容己矣兄弟䦧于牆外禦其務每有良朋烝也無戎朱註賦也廢䦧毛云狠也務鄭云侮也外言兄弟雖有小忿不懿親雖偶鬭狠于内倘遇侮之來終是協力相禦良朋衆莫能助也愚按烝衆也禦侮之事豈無良朋之衆相助然誰肯為戎首乎必兄弟也無為之首者朋友雖衆亦無與為戎也永嘆是朋友之至情無戎亦朋友之本分到此時始覺兄弟之足恃甚于朋友矣䘮亂既平既安且寧雖有兄弟不如友生朱註賦也愚按工既字情辭甚痛外侮既消則无所用禦侮者矣是以急難之兄弟不如永歎之友生儐爾籩豆飲酒之飫兄弟既具和樂且孺朱註賦也王毛云儐陳也飫私也不脱屨升堂謂之飫周語云公立飫則有房烝親戚宴享則有殽烝燕禮云皆脱屨乃升堂少儀云堂上無跣宴則有之宴則由坐而脱屨明飫立則不脱矣是詩為宴兄弟而作故以飲酒發論母程子云孺親慕之義小兒親慕父謂之孺子愚按此下三章皆提醒首章莫如兄弟之意既厯變故之後益信兄弟當親耳妻子好合如鼔瑟琴兄弟既翕和樂且湛朱註賦也娣此又因兄弟之和樂而更進之妻謂兄弟之妻即姒是也子謂兄弟之子即從父昆弟是也盖非特兄弟親愛雖我之妻與兄弟之妻我之子與兄弟之子亦當使之和合而無間也鄭云合者如鼔瑟之聲相應和也人按鼔宫宫動鼔角角應一氣以相感耳王與族宴則宗婦内宗之屬亦從王后于房中宗婦同姓卿大夫之妻内宗同宗之内女嫁于卿大夫者襄二年葬齊姜齊侯使諸姜宗婦來㑹葬諸姜者謂齊同姓之女宗婦謂齊同姓之婦也翕説文云起也兄弟同心如鳥之合兩羽而齊奮起也愚按翕之一字早有禦侮于未形之意宜爾室家樂爾妻帑是究是圗亶其然乎朱註賦也孥上章言妻子槩指兄弟之妻子此言爾室家爾妻則謂在我之家室妻孥也帑通作孥鳥尾曰孥左傳禆竈曰嵗棄其次而旅于明年之次以害鳥孥鳥謂朱鳥之宿孥鳥尾也妻子為人之後猶鳥之有尾故以孥稱其王氏云人情皆知保其室家私其妻子而罕知厚兄弟然兄弟不和以至毁其室家危其妻子者有之矣管蔡是也使亶信也亶其然乎問辭也輔廣云不自以為然而之返求諸心以見其真情實理之所在所蘇氏云小人思慮不能及逺常以兄弟之于我無損益不知兄弟相親乃所以宜室家樂妻孥者患其淺陋而不信故使之深思而逺圗之以信其然否吕氏曰告人以兄弟之當親未有不以為然者也苟非是究是圗實從事于此則亦未有誠知其然者也不誠知其然則所知者亦名而已常棣八章章四句郝氏云誦常棣而周公無殺管蔡之事明矣盖二叔得罪王室與天下雖有可殺之罪而公終無殺兄之心天下以討罪人為大義而公終以不能全兄為不仁故于康誥曰弟弗克恭厥兄兄亦不念鞠子哀大不友于弟此詩亦云雖有兄弟不如友生自怨之情慘然盖傷管叔之死而恨己之不能救也伐木序曰燕朋友故舊也自天子至于庶人未有不需友以成者親親以睦友賢不棄不遺故舊則民徳歸厚矣伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聴之終和且平毛傳興也朱註同章詩人多相因之辭如伐木而感鳥鳴因以起興首取鳥鳴後二章取伐木寓意則一聲鄭云嚶嚶兩鳥聲也嚶其鳴矣遷處喬木求其友求其尚在深谷者其相得則復鳴嚶嚶盖一鳥鳴曰嚶此鳥鳴而又有彼鳥以應則為嚶嚶也驚歐陽子曰考詩義是為鳥在木上聞伐木之聲則鳴而飛遷于他木方其驚飛倉卒之際猶不忘其類相呼而去其在人也可不求其友乎程子曰神之聴之乃誓神明心之語願終久相與和好而不變也終者久要之義真氏云玩其詩只見為人之求友不為君之求友先王樂道忘勢但知有朋友相須之義而不見有君臣相臨之分也伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲洒掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎程子云山中伐木非一人所能為必有同事之人既同其事則相親好成朋友之義况士君子乎許許衆人共力之聲淮南子所謂舉大木者前呼邪許後亦應之是也釃猶濾也毛云以筐曰釃以藪曰湑按藪草也左傳包茅不入王祭不供無以縮酒藪之謂也藇美貌郝氏云多而齊也羜未成羊也天子謂同姓諸侯謂同姓大夫皆曰父異姓則稱舅念曰寧曰微皆意中忖度之辭寧猶豈也微無也顧也寧適不來慮其適然有故而不來也微我弗顧慮其無乃不我肯顧也周禮註云進食于尊曰饋肥羜之下既言以速諸父又洒掃以速諸舅則又是一禮上為燕禮下為食禮燕言諸父食言諸舅互文以相通也羜羅氏云諸父用羜羜則小羊諸舅用牡牡乃大牛為食禮義親而禮數牡為享禮意重而禮厚諸父諸舅禮各有宜也愚按先諸父後諸舅者周之宗盟異姓為後也深咎過也慮不來者將毋以己有過而不來也自反而望之切矣伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失徳乾餱以愆有酒湑我無酒酤我坎坎鼔我蹲蹲舞我迨我暇矣飲此湑矣説文云坡陀曰阪伐木已畢置之于從髙臨卑之地以便轉移也衍嚴氏云水溢也言灑酒之多也籩豆有踐陳設之盛也儕鄭云兄弟父之黨母之黨也朱註兄弟朋友同之稱兼同異姓言失徳猶言失禮也漢宣帝詔曰夫酒食之㑹所以行禮樂也今郡國或擅為苛禁禁民不得具酒食相賀召由是廢鄉黨之禮令民無所樂非所以導民也詩不云乎民之失徳乾餱以愆毛云湑莤之也酤一宿酒也糟莤音縮左傳所謂包茅縮酒謂以茅泲之而去其也鄭云酤買也特設言之以見相愛之情耳非必無酒即使酒盡猶當為我酤買之篤于朋友不以有無為辭也下文飲此湑矣知不待酤也鼓所以為舞節故説文謂坎舞也盖應舞之節也愚按飲必以暇有及時為樂之意非其時則不得飲故勸之以盡歡也伐木三章章十二句舊作六章章六句朱子以每章起伐木改併三章禮有饗有食有燕此詩次章羜牡是用太牢則同于饗且陳饋八簋又言籩豆有踐則同于食言湑我酤我是無算爵也鼔我舞我是無算樂也則同于燕月令季冬之月命樂師大合吹而罷註云嵗將終與族人大飲作樂于寝以綴恩也此篇疑即季冬大飲三族之詩天保序曰下報上也君能下下以成其政臣能歸美以報其上焉鄭氏云下下謂鹿鳴至伐木皆君所以下臣也臣亦宜歸美以崇君之尊而福禄之以答其歌也天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶朱註賦也毛傳缺不保者抱持愛護之意以受命于天故曰天保定者移之謂歐陽子曰詩人爾其君者盖稱天以為言行俾爾以下望之也俾使也孰使之天使之思若啓若翼是也君子謂之善頌善禱乃單盡也周家以忠厚開基今厚而益盡其厚書謂單文祖徳是也以新易舊曰除如新舊嵗之交曰除嵗言除者謂福之新也今之授官者皆曰除官是也方中履曰除猶授也多益謂多受益也易損之六五曰或益之十朋之龜弗克違莫不庶之謂也鄧元錫云單厚自盡也多益盡人也内盡于已外盡夫物然後美善大備下所謂戩穀也天保定爾俾爾戩穀罄無不宜受天百禄降爾遐福維日不足戩與剪同盡也糓善也言盡善也罄盡也盡無不宜所謂宜民宜人是也百禄以盛言遐福以久言嚴氏云滿招損謙受益故福禄雖盛而不自止足所謂吉人為善維日不足也天下無徳外之福詩人歸美之中有責難者寓若盡以為言福禄全篇皆容悦之辭矣天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不増爾雅云髙平曰陸大陸曰阜大阜曰陵岡應劭云阜者茂也言平地隆踊不屬于山陵也説文云山脊也水鄭云川之方至謂其縱長之時也愚按山阜岡陵皆有定體有定則不能増益惟川源深流長而方至則又盛長之初其増不可量也吉蠲為饎是用孝享禴祠烝嘗于公先王君曰卜爾萬夀無疆吉謂諏吉日少牢饋食云大夫先與有司諏丁巳之日至明日乃筮其日之吉凶也蠲潔也饎熟食儀禮有饎㸑註炊黍稷曰饎夏享獻也孝以盡志享以盡物爾雅云春祭曰祠祭曰礿秋祭曰嘗冬祭曰烝礿即禴也夏祭以樂為主故曰禴自殷以上春禴夏禘秋嘗冬烝至周公去夏禘之名以春禴當之更名春為祠而以禘為大祭實董仲舒云春上豆實夏上尊實秋上杌實冬上敦豆實韭也尊實麫也杌實黍也敦實稻也一年之中天賜四至至則上之此宗廟所以嵗四祭也君曰者皇尸傳先君之意以嘏主人之辭所朱註文王時周未有曰先王者此詩必武王以後作也曹居貞曰天保皆祝君之福此詩原其因祭而受福也神之弔矣詒爾多福民之質矣日用飲食羣黎百姓徧為爾徳此承上章祭祀言文弔至也猶言祖考來格也所詒通作貽多福即下所稱是也王氏云民無施其智巧也日用飲食而已所徧為爾徳鄭云言則而象之徧臣民之為皆爾之徳愚按民安其質耕食鑿飲朝饔夕飱此外無事是為至治神之詒以多福莫大于此如月之恒如日之升如南山之夀不騫不崩如松柏之茂無不爾或承毛云恒弦也亦作縆縆大索即弦之義始升通作昇説文云日上也鄭云月上弦而就盈日出而就明崩自上墜下曰崩不騫是無缺損指山之一處言不是無傾覆指山之全體言承奉也言臣民承奉上徳雒誥所謂其永觀朕子懐徳是也愚按不言月望日中而曰恒曰升取漸進為極盛也無不爾或承䝉上松柏言謂無不憑藉爾之大徳而受其庇䕃也天保六章章六句鄒氏云史記武王克商憂天保之未定于是有營洛之意此詩之作盖在東都既成後矣居周逸書王云定天保依天室自洛汭遷于伊汭易毋固其有夏之居我南望三塗北望嶽鄙顧瞻有河粤詹洛伊毋逺天室盖意欲營洛也及成王即位追武王之意使召公相宅周公復卜申視卒營築居九鼎焉故疑此詩為營洛後周召報命而致其祝頌之辭采薇序曰遣戍役也文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸也季氏曰古者出師以喪禮處之則無燕樂故無遣詩及其獻捷代還則歌凱以歸故極美其功而曲序其情以為勞也時鄒氏曰序以采薇為遣戍夫楊栁依依則正薇柔也雨雪霏霏則正嵗暮時也撫今追昔道其實厯之景如此若云預道歸時之景豈有方遣之日而遂以為昔往是莊子所謂今日適越而昔日至矣采薇采薇薇亦作止曰歸曰歸嵗亦莫止靡室靡家玁狁之故不遑啓居玁狁之故朱註興也毛傳缺無毛云作生也猶言怒生也仲孔云月令仲春之月作大事孟秋乃命將帥今春遣兵以患難既逼不暇待秋故也行此代為將士追述之言謂昔以仲春薇生之時出斯時即念當何時歸乎曰歸者心口相語也念歸之切慮其當在嵗暮也男有室女有家今逺去久離男不得以室為室女不得以家為家矣今毛云玁狁北狄也鄭云北狄匈奴也采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載饑載渇我戍未定靡使歸聘柔鄭云脆脕之時謂心憂憂歸期之逺也烈烈言内熱也我戍未定未至戍所而安止也聘問也孔云謂同行無歸人誰可使問其家之安否也愚按此未至戍所中途欲寄家訊也薇由作而柔而剛皆自出門及一路所見以志天時之變也采薇采薇薇亦剛止曰歸曰歸嵗亦陽止王事靡盬不遑啓處憂心孔疚我行不來戴侗云薇冬晚抽芽至春柔矣夏而剛宜芼豕陽者謂正陽之月已月也首章言嵗暮預期之辭此言嵗陽即景之辭也盖因見薇剛而知孟夏至也愚按首章不遑啓處是初上道别父母之詩此則巳至戍所而念父母之詩既至戍所王事為重不暇顧其私恩矣憂心孔疚憂王事也我行不來奮然自誓之辭一月三㨗之功己兆於此矣彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷爾華盛貌戎説文云麗爾也猶靡麗也一作薾五常常棣也路主帥所乗若下文戎車則總括戎而言路車亦在其内耳即周禮車僕所掌有戎路廣車闕車苹車輕車戎路革路王在軍所乗也廣車横陳之車備更迭戰者闕車逰軍乗以補闕者苹讀為屏所用對敵以自蔽隠者輕車所以馳敵致師者此五者皆兵車所謂五戎也士孔云路為君子之車左傳鄭子僑叔孫豹王賜之路是卿車得稱路也業毛云業壯也駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘朱註賦也耐三捷之後戍事未畢未敢弛備遽歸盖北狄畏暑寒計三捷當在盛夏之時宣王所以六月興師也秋氣折膠弓弩始勁故秋冬又易為侵暴必留屯以防之騤説文云馬行威儀也鄭云腓當作芘厞何氏云腓即厞字説文云隠也禮記取廟之西北薪用爨之楚辭隠思君兮厞側皆訓隠言戍士亦藉是車以自隠蔽也之陳祥道云古之用兵險野人為主易野車為主車于戰動則足以衝突止則足以營衞將卒有所芘兵械衣装有所齎也弭翼翼言馬之欲行如鳥舒翼也象弭弓反末也者弓弰之名馳之則反曲故云弓反末以象骨為之服矢服也以魚皮為之言行間之人整肅器械無日不然雖無事之時凛如敵至以玁狁往來飄忽至如風雨不可以一日忘備也蔡汝南云豈敢定居由君子有不測之畧豈不日戒由君子有不懈之心采薇雖咏戍役之情而将道亦自可見昔我往矣楊栁依依今我來思雨雪霏霏行道遲遲載渇載饑我心傷悲莫知我哀朱註賦也嫋栁楊之下垂者楊栁之揚起者依依者初抽條時嫋欲有所依也楊栁與采薇相應雨雪與嵗暮相應雖程子云言行道遲遲則見歸思之切盖思家心急速亦覺遲耳嚴氏云莫知我哀言莫知其勞苦乃所以深知之也愚按二章之言饑渇謂甫出門便有此苦此章之言饑渴謂一日未到家猶有此苦也自上言莫知我哀則知之者深矣采薇六章章八句竹書文王十一年周公季厯伐翳徒之戎獲其三大夫來獻捷何氏謂此詩即王季伐翳徒之役備嚴沆云據汲冢周書序云文王立西距昆夷北玁狁謀武以昭威懐則此詩與出車其為文王詩無疑出車序曰勞還率也愚按舊謂此詩與采薇同時之作玩篇中述其往也黍稷方華正當仲夏與楊栁依依既不同月序其來也雨雪載途正當早春與雨雪霏霏又不同時當文王之時豈止一出師乎二篇非一時之作後王勞還師者皆以為宴勞之詩因其詩而分别用之耳我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣朱註賦也毛傳缺王爾雅郊外為牧謂前軍之先行者也謂我來者承命令簡發此戎車也出車已在于牧而王命促發故親至郊牧促其剋期上道盖事急不可緩也此章文王承王命遣南仲之事毛云僕夫御夫也其棘急也謂速則邉防可固緩則衝突可虞故曰維棘矣此行専以築城為事與六月之師不同愚按文王為西伯専征伐值玁狁西戎並犯中國于是承帝乙之命簡料車徒而命南仲為将往禦之故稱天子稱王事禀命帝乙雖專征伐不敢自擅也我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫況瘁朱云郊在牧内盖前軍已至牧而後軍猶在郊也北龜蛇曰旐考工記云龜蛇四斿以象營室按營室方七宿也者旄干旄也旌竿之首飾以旄牛尾曰旄鄭云設旐屬之于干旄而建之戎車孔云此旐彼旄一言彼一言此便文耳于彼新田于此菑畆之類也鳥隼曰旟考工記云鳥隼七斿以象鶉火也所陸化熙云出車在郊視前在牧之車此為后車則見止是設旐建旄而設旟建旄己在彼牧故亟接之曰彼旟旐斯盖因言車之所建而兼舉前後軍言之耳董氏云禮曰徳車結旌武車綏旌綏謂垂而舒之也昔晉治兵建而不斾壬午復斾諸侯畏之則知垂旌所以為戰也按斾惟旐有之斾斾者合旟旐飛揚之象而言愚按此章文王出車之事已竣可以還報天子矣軍既出而悄然心憂僕夫向載以來者今復御而歸亦因其憂心而為之况瘁所謂臨事而懼也王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄首二章止言奉王命出車耳未明言所命謂何此方言所命之事毛云方朔方即六月所謂侵鎬及方郡縣志夏州朔方縣什賁故城即漢朔方縣之故城也今寧夏衞是也什賁之名盖蕃語也交龍為旂孔云旂盖南仲所建王國大夫視外諸侯分得建旂不再舉旟者旟為前軍既己前發大將當居中軍統後軍繼進故但言旂旐也天子命我二句述南仲稱王命以令衆也季氏云城朔方所以斷戎狄往來之路西戎道絶使不得相為犄角則可以駕玁狁而出其上故曰于襄蔡沈云襄駕出其上也愚按前二章言我者文王之辭此二章代為南仲之辭文王以王命命南仲仲因得謂天子命我耳懐山襄陵謂四邉皆水也凡襄者就邉而言今築朔方之城所以畫玁狁于邉外不令侵入中國耳昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啓居豈不懐歸畏此簡書上章天子命我二句是南仲語此則全托南仲之辭鄭云黍稷方華朔方之地六月時也塗凍釋也時吕氏云采薇之所謂往遣戍時也此詩之往在道也采薇之所謂來戍畢時也此詩之來歸而在道時也愚按此章是城工已畢歸戍在道復被簡書命伐西戎直至深春始還末二語可見王事多難與首章語意相同而此更為伐西戎起語言所以遲至雨雪載塗而後歸者以西戎助玁狁為虐復承王命徂征自北而西歸計轉緩故不遑啓處也喓喓草蟲趯趯阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎草蟲鳴則阜螽躍而從之以興夫唱婦隨其象如此張衡謂大火流則草蟲鳴正深秋候耳君子室家斥南仲之辭我則室家自我也此詩言我者三首二章我者文王之辭中二章我者代為南仲之辭此章我者則代為南仲室家之辭作曹氏曰西北二虜相犄角為寇故征玁狁則西戎伐西戎則玁狁平愚按此章盖室人思征夫之情自秋盡冬初屈指城工之畢日盼其歸而不意後有伐戎之羈遲也禦玁狁而伐西戎漢通西域以斷匈奴右臂即用是法也孟子曰文王事昆夷惟與西戎連和乃可以全力制北狄耳然非薄伐不能要其和也此詩専為城朔方以禦玁狁而以餘力伐西戎以孤玁狁之勢兵家之勝算也春日遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷鄭云伐西戎以凍釋時反朔方之壘休息戍役至此時而歸執生擒也訊問也謂其渠魁當訊問者醜衆也愚按訊醜皆伐西戎所執獲者若玁狁則第城朔方以備之耳未嘗有交戰之事既城朔方則玁狁不能乘虚為害而西戎可伐西戎既敗則有以剪玁狁之羽翼而玁狁可平事實相因也出車六章章八句愚按竹書紀宣王三年命大夫仲伐西戎後儒謬以為南仲而謂此詩為宣王世之詩考史記彼乃秦仲也與此無涉枤杜序曰勞還役也王氏云上之人能知其下中心委曲之情而形于歌咏則下悦之出車枤杜是也上之人不能知而其下自陳其勞苦之状悲傷之情則怨也揚之水鴇羽是也愚按此詩専代征人之婦而言其情盖征夫之所念者父母妻子也父母與子相念之情可對人言夫與婦相念之情有不可對人言者而上能代言之曲體人情之至所以令人深感也有枤之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止毛傳興也朱註賦也牝樹之特生者為枤枤杜與棠相似説文云牡曰棠曰杜陸化熙云杜雖以識時序之變而取義于枤亦因征夫在外而傷其孤特無依也睆明貌言杜實之厯厯在眼也吕氏云杜之有實秋冬之交也十月為陽至十月猶未歸則以朔方城畢復有西戎之征室人不知而謂征天今已閒暇可以歸矣愚按繼續也嗣續之無己也自閨人之屈指歸期日復一日而言也盖往役之始其日為王家之日及期以後其日則我之日也故曰繼嗣我日有枤之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止萋萋新葉也萋承上章言枤杜睆實是去年十月間物色今杜葉萋則實落而又生葉為今年三二月矣卉木萋止復從枤杜而推廣之見萋萋不獨一枤杜也計此時征夫歸已在道而室人不知猶悲思也心我女自我也女自上人謂之也陟彼北山言采其把王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺把枸把也采杞即在卉木萋止之時父母舅姑也憂我父母言貽我父母之憂蔣悌生曰此四句見于北山詩辭義俱同而此為正雅北山為變雅何也枤杜之詩在上之人叙戍役之勞以閔之也北山之詩役者自言其勞而有怨懟之心也辭義同而苦樂之意異矣幝幝車敝貌痯病也檀車耐用而亦敝牡馬有力而亦病以見其久且勞也愚按車敝馬罷非目所見以行役之久料之征夫不逺亦上之人所以慰其婦婦不知也匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫邇止匪通作非期鄭云君子至期不裝載意不為來矣疚病也期歸也逝往也言所計之歸期今已往恤憂也憂心孔疚女心之傷悲也而多為恤憂我父母也不獨我憂之父母亦憂所謂多恤也大事先筮而後卜小事則龜筮不相襲偕止謂相襲俱作以心之惶惑不定故無不為也㑹合也謂合卜筮之繇而皆曰近也辭輔廣云征夫不逺料想之辭也征夫邇止决定之也嚴氏云此詩四章皆不言戍役來歸之事惟述其未歸之時室家思念之切如此則今日之歸其樂為何如所以慰勞之也愚按過期不至則以疑而益憂疑則可憂者多矣疾病死傷皆疑中事即皆憂中事故曰而多為恤戍士之遣本從南仲以城朔方城工既竣復移師以伐西戎其室家不知也故歸期之逺近上之人知之而婦不知惟以過期不至而傷悲憂恤耳四征夫句皆上人寛慰其婦之詞枤杜四章章七句鄒氏曰舊以為勞還役若檀車四牡豈所槩于卒伍其為勞戍臣可知也車孔疏謂役夫以從征之故其甲士三人所乗之皆備四馬故曰四牡非庶人尋常得乗四馬也且篇中敘其室家私情正與東山詩之勞歸士等耳視出車篇之勞還率迥别矣南陔序曰孝子相戒以養也朱註此笙詩也有聲無辭舊在魚麗之後以儀禮考之其篇次當在此篇按毛傳枤杜之後即次以魚麗以足鹿鳴之什十而無辭者不在什内朱子據儀禮正之于是毛氏所分之什不能復依而自為之什鹿鳴之什十篇一篇無辭凡四十六章二百九十七句白華之什二之二朱註毛公以南陔以下三篇無辭故升魚麗以足鹿鳴什數而附笙詩三篇于其後因以南有嘉魚為次什之首今悉依儀禮正之白華序曰孝子之潔白也朱註笙詩也華黍序曰時和嵗豐宜黍稷也有其義而亡其辭鄭云孔子正雅頌各得其所時俱在耳篇第當在于此遭戰國及秦之世而亡之矣朱註亦笙詩也鄉飲酒禮鼔琴而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦鼓瑟而歌鹿鳴四牡皇華然後笙入立于縣中奏南陔白華華黍南陔以下今無以考其名篇之義然曰笙曰樂曰奏而不言歌則有聲而無辭明矣所以知其篇第在此者意古經篇題之下必有譜焉如投壺魯鼔薛鼓之節而亡之耳也郝氏云鄉射亦儀禮也云奏騶虞貍首騶虞有辭亦云奏周禮有九夏國語稱金奏肆夏樊遏渠按肆夏即時邁樊遏為韶夏即執競渠為納夏即思文皆有辭而皆云金奏則奏亦辭也金奏九夏有辭笙奏南陔白華獨無辭乎又周禮籥章以籥龡豳詩即七月也籥吹七月猶笙吹南陔白華華黍也豳有辭而南陔以下獨無辭乎又明堂位祭統升歌清廟下管象象即維清也謂管奏維清于堂下管有辭而笙獨無辭乎愚按古鄉飲酒禮歌鹿鳴四牡皇華而笙南陔白華華黍盖欲其外盡君國之事而内修孝養之禮也魚麗序曰美萬物盛多能備禮也文武以天保以上治内采薇以下治外始于憂勤終于逸樂故美萬物盛多可以告于神明矣此燕饗通用之樂歌魚麗于罶鱨鯊君子有酒㫖且多朱註興也毛傳缺云按易離麗也小過飛鳥離之即此麗也罶説文曲梁寡婦之笱無所留也王雪山謂後世有魚麗之陳陳凡五每陣又各有五敵入其中者無有得出罶者曲薄也當回曲周匝魚之入其中者亦無得而脱也云鱨揚也一名黄揚鯊鮀也陸璣云吹沙也陸氏鱨性善浮鯊性善沉毛云太平而後微物衆多取之有時用之有道則物莫不多矣㫖且多皆指酒而言愚按此詩即魚之盛以見品物蕃阜國家豐亨大有君臣可以燕樂非指魚為燕饗所薦之羞也魚麗于罶魴鱧君子有酒多且㫖魴即鯿魴方鯿扁也魴出溪水者謂之槎頭鯿鱧鮦也陸氏云今𤣥鱧是也諸魚中惟此魚膽甘可食多且㫖言不徒以多而已多而㫖乃可為貴愚按首章㫖且多重在多也此章多且㫖重在㫖也盖既多則未必盡㫖多矣而㫖如故見主人之情始終濃厚也魚麗于罶鰋鯉君子有酒㫖且有鰋鮎也郭璞云今鰋額白魚也按鰋身圎性偃似非鮎魚鯉赤鯉也有言用之而愈有也餘歡未殫爵斚吏陳見主人愛客之無已也故以㫖且有終焉物其多矣維其嘉矣物其㫖矣維其偕矣物其有矣維其時矣前三章所言者禮文也後三章所言者禮意也殽物指殽也承上文而言不特酒多酒㫖酒有而諸之物亦多亦㫖亦有也也嘉美也惟其嘉美此賓客故備物之多如此偕俱言有恭敬之意與之俱也時謂可以燕饗之時不蘇氏云多則患其不嘉㫖則患其不齊有則患其時今多而能嘉㫖而能齊有而能時言曲全也魚麗六章三章章四句三章章二句朱註按儀禮鄉飲酒及燕禮前樂既畢皆問歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也言一歌一吹也然則此六者盖一時之詩而皆為燕享賔客上下通用之樂由庚序曰萬物得由其道也朱註此亦笙詩謂間歌魚麗則奏此篇毛氏以南陔白華華黍置魚麗之前以由庚崇丘由儀三詩總置南山有臺之後今按由庚三詩與朱子篇次正合南有嘉魚序曰樂與賢也太平君子至誠樂與賢者共之也鄭云樂得賢者與共立于朝相燕樂也朱註此亦燕饗通用之樂歌南有嘉魚烝然罩罩君子有酒嘉賔式燕以樂朱註興也毛傳缺云南謂冮漢之間方蜀都賦云嘉魚出于丙穴黄震周都西北以南之魚為美故云南有嘉魚未必獨指丙穴之魚也丙穴之魚飲乳泉而美亦未必原名嘉魚也嚴氏云下文樛木非木名則嘉魚亦非魚名詩人以魚之嘉瓠之甘者喻賢者耳烝然以言衆也詩話云魚罩有自上而下者今提罟也有自下而上者為撩罟即罶類淮南子云罩者抑之罾者舉之為之雖異得魚一也南有嘉魚烝然汕汕君子有酒嘉賔式燕以衎汕説文云魚逰水貌逸毛云樔也鄭云樔者今之撩罟也陸氏云魚欲則罩之使入魚欲伏則汕之使出云衎飲食之樂也易飲食衎衎南有樛木甘瓠纍之君子有酒嘉賔式燕綏之長而瘦者曰瓠短項大腹曰匏匏苦瓠甘之嚴氏云樛木喻王屈己下賢則賢者得以上進綏謂燕飲以安之醴酒不設而穆生去盖禮貌衰則不能安賢者之心也愚按樛木下垂甘瓠上附上下交也綏安也情文纒綿周至以安嘉賔之心使其係心于我如甘瓠之纍樛木也翩翩者鵻烝然來思君子有酒嘉賔式燕又思鄭云鵻壹宿之鳥一于其所宿之木也喻賢者有専壹之意于我孔云頻與之燕言親之甚也禮上公三燕侯伯再燕是又燕也而蘇氏云魚非有求于人而人則取之以為賢者亦如是吾則强求之與非也瓜蔓于地是豈可强使從人哉然其遇樛木也未嘗不纍之而上物之相從物之性也豈有賢者而不願從人者哉獨患不之求耳招嚴氏云人主之于賢始則多方勤求之繼則禮貌延之其後則聞風自至如翩然飛者孝鳥鵓鳩羣然而自來也南有嘉魚四章章四句何氏謂文王為西伯統治南國故周南樛木喬木皆咏南國所有此詩為文王燕南國賔客之作毛傳以魚麗終鹿鳴之什而南陔白華華桼三篇不與自南有嘉魚至吉日凡十篇為南有嘉魚之什而由庚崇丘由儀三篇不與正郝氏云菁菁者莪以上六篇皆成王之詩謂之小雅六月以下四篇宣王之詩謂之變小雅崇丘序曰萬物得極其髙大也朱註此亦笙詩間歌南有嘉魚則笙崇丘南山有臺序曰樂得賢也得賢則能為邦家立太平之基矣鄭𤣥謂春入學舍菜合舞秋頒學合聲于是時也視學則遂養老此章萬夀眉夀黄耉等語皆為養老咏也據鄉飲酒禮燕禮笙入而後皆間歌此詩則周公未作儀禮之前已有之故朱子以為燕饗通用之樂南山有臺北山有萊樂只君子邦家之基樂只君子萬夀無期毛傳興也朱註同云臺夫須也舊説夫須莎艸也可為蓑笠都人士詩臺笠是也羅氏以夫須與莎為兩物臺者莎草可為衣以禦雨編之若甲毶毶而垂故雨順注而下然或藉而卧則不能隔雨名曰夫須盖匹夫所須也莎俗謂之香附子自是二種萊萊草名其葉可食陸氏云兖州人蒸以為茹謂之烝杖按來黎音近即藜也初生葉可食大則為樹可為歐陽子云髙山多草木如周多賢才也期限也言夀未可期限也祝劉公瑾云或疑賔客不足以當萬夀之語士冠禮辭亦云眉夀萬年今古器物銘所謂用蘄萬夀用祈眉夀萬年無疆之類皆為自祝之辭則以萬夀祝賔固其所矣愚按此詩為養老作先美其徳后祝其夀期其老而益老也南山有桑北山有楊樂只君子邦家之光樂只君子萬夀無疆基所以安也光所以榮也南山有把北山有李樂只君子民之父母樂只君子徳音不已把如樗一名狗骨或云與李並舉皆可食之物即枸檵也上章言邦家之基之光賛其徳之辭此正指其徳之實足為人所利賴故曰民之父母古者養老有乞言合語之禮内則篇云五帝憲三王有乞言五帝憲者養氣體而不乞言有善則記之為惇史三王亦憲既養老而后乞言亦微其禮皆有惇史愚按乞言者從之求善言合語者旅酬而合語也君子父母斯民就養之時亹亹談説曽無懈倦故曰徳音不已也南山有栲北山有杻樂只君子遐不眉夀樂只君子徳音是茂栲山樗也杻檍也解見唐風夀睂夀秀睂也日遐與何通盖音近也萬夀無期萬無疆願其後之辭也遐不睂夀遐不黄耉美其今日之辭也是茂謂徳音之盛盖期望過此以往善言益多也南山有枸北山有楰樂只君子遐不黄耉樂只君子保艾爾後枸枳枸也枝語云枳枸來巢言其味甘故飛鳥喜而巢之子著端大如指長數寸美如飴能令酒味薄以為屋柱則一屋之酒皆薄析詩詁云其子生枝端横析岐出状如析栱土人謂栱木朱子云吾鄉呼為兼勾味甘而解酒毒黄楰爾雅云䑕梓也郭璞云楸屬今人謂之苦楸黄髮也耉老人面凍黎色若浮垢者艾方言云汝潁梁宋之間謂養為艾保之為義安也之為義養也後後日也自此以後夀尚未有窮期故祝以安養也南山有臺五章章六句左傳襄二卜年季武子如宋報向戍之聘歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也愚按燕禮既問歌此二詩而魯君臣復舉二詩為賦是樂章歌者自歌而賦者自賦不相碍也由儀序曰萬物之生各得其宜也合由庚崇丘三篇有其義而亡其辭鹿鄭云此三篇者鄉飲酒燕禮用焉燕禮又有升歌鳴下管新宫新宫亦詩篇名也辭義皆亡無以知其篇第之處臺朱註此亦笙詩間歌南山有則笙由儀蓼蕭序曰澤及四海也郝氏云篇中言燕者安樂之意非飲酒也據詩次第此篇朝諸侯下篇方與之燕飲蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮毛傳興也朱註同莤蓼長大貌一云草蒼蒨貌其蕭香蒿也湑説文訓莤以茅泲酒也蕭之受露状沾濡有似于茅之泲酒受露則色愈蒼蒨故以蓼言譽處猶言為聲譽之所歸也愚按鄭云燕安也有自然之義所為時然後言樂然後笑也詩中不見有燕飲之事當是繼世諸侯初見天子而誠服賛嘆之辭君子指天子我心寫兮謂諸侯之一見而輸誠也上下相接笑語皆出于自然盛徳感孚如此宜其為聲譽之所歸矣盖昔想望之而今始得睹之也蓼彼蕭斯零露瀼瀼既見君子為龍為光其徳不爽夀考不忘瀼瀼露蕃貌見為龍見能膏澤下民為光能照臨下土愚按為龍為光即後世稱其人主有龍鳯之章天日之表是也爽差也君臣之間不恃有甚隆之禮而恃有不爽之徳祝之以夀考望之以不忘固知主徳之不爽決不忘今日之分誼耳蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令徳夀豈泥泥露濡也豈弟樂易也愚按嗣世之諸侯未見天子初謂天威難邇既見之而甚安和樂易不自知有天子之尊其所以協和諸侯猶之協和其兄弟也兄弟兼同姓異姓言自天子稱之為叔父伯父舅氏自諸侯承之謂天子待之如兄如弟云爾有此令徳夀而且豈盖不僅夀考而已自今以后夀考之年皆豈樂之境頌祝之至也蓼彼蕭斯零露濃濃既見君子鞗革沖沖和鸞雝雝萬福攸同濃濃厚貌鞗轡也革轡首也即郭璞云馬轡所杷之外有餘而垂者謂之革則鞗轡之别名而革乃轡之外垂者鞗以皮為之故曰鞗革沖冲轡垂貌馬周禮註云和鸞皆以金為鈴鸞者在衡和者在軾動則鸞鳴鸞鳴則和應舒則不鳴疾則失音雝雝言得其和也鄭云此説天子之車飾諸侯燕見天子天子必乗車迎于門是以云然愚按如鄭説則此詩為諸侯之賛美天子蓼蕭四章章六句愚按朱註謂諸侯朝于天子天子與之燕以示􅄌惠故歌此詩然詩中未見有飲酒之事若來朝而燕之詩則露斯篇是矣朱子以君子指諸侯謂為天子褒美諸侯之詩鄭箋謂皆以下頌上辭義覺順湛露序曰天子燕諸侯也鄭云諸侯朝覲㑹同天子與之燕所以示慈惠露左傳文公三年衞甯武子來聘公與之宴為賦湛不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正于王王宴樂之于是乎賦湛露則天子當陽諸侯用命也今陪臣來繼舊好君辱貺之其敢干大禮以自取戾杜預註云朝正者朝而受政教也郝氏云前篇來朝此篇賜燕朝以期旦禮主于辨也飲以昏夜情主于合也燕何氏云諸侯朝正于王王行饗禮畢而之于寝愚按周禮燕饗之禮上公三饗三食三燕侯伯二饗再食再燕子男一饗一食一燕此或為侯伯再燕之詩耶湛湛露斯匪陽不晞厭厭夜飲不醉無歸毛傳興也朱註同而歐陽子曰天之潤澤于物者若雨若雪其類非一獨以露言者露以夜降者也因其夜飲故近取以為比君留而盡其私恩之義厭厭安也夜飲私燕也謂燕禮云宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為大燭于門外燕禮輕無庭燎設大燭而已是夜飲之禮古誠有之其禮一獻四舉酬降脱屨升堂無算爵無算樂君曰無不醉賔及卿大夫皆對曰諾敢不醉此云不醉無歸是也湛湛露斯在彼豐草厭厭夜飲在宗載考歐陽子云言在彼豐草杞棘者以露之被草木如王恩被諸侯耳草茂則得露多諸侯賢則受恩厚也于儀禮受賔聘享則于太廟享食則于禰廟惟燕行寝故云宰膳具官饌于寝東此云在宗載考盖享畢而燕言既在宗廟行饗禮矣更在路寝成此燕禮也考成也湛湛露斯在彼杞棘顯允君子莫不令徳把棘并言棘木低小則把非大木可知以後章例之桐椅相類把棘亦當相類杞即枸把也蘇氏云露之在草也如将不勝其在木也則能任之矣將言其無不醉也故以豐草興之將言其醉而不亂故以把棘言信謝氏云顯者其心明白洞達允者其心忠誠慤朱註君子指諸侯為賔者也其桐其椅其實離離豈弟君子莫不令儀鄭云謂夜飲之禮飲酒不至于醉而能善其徳善其儀此陔節也孔云當奏陔夏之節猶善威儀稱人之美者必舉其終故知為陔之節也酒燕禮賔北面坐取其酒脯以出奏陔夏謂取所執脯以賜鐘人于門内霤遂出是也易輔廣云豈弟樂易也樂易者恐其或畧于威儀樂而威儀無不令善所以為成徳也也季氏云此詩前二章以君之歡飲者言欲其盡歡後二章以臣之承恩者言喜其盡敬也樂而不淫所以懐諸侯而天下畏之愚按豐草以比諸侯之微弱不能自立者在宗載考謂朝于京師而始成諸侯也王者為天下之所宗故王室號為宗周把棘小木以比諸侯之位卑而地小者桐椅大木以比諸侯之位髙而地大者無小無大莫不承上恩澤而皆能慎其徳謹其禮以各盡君臣之美也湛露四章章四句鄭氏引陳敬仲辭桓公之語以卜其晝未卜其夜為夜飲之禮秪施于同姓愚按左傳為敬仲飲桓公酒非桓公燕敬仲也既燕飲有宵而設燭之禮安見止可行于同姓乎桓公欲以火繼亦燕飲故事耳本未嘗踰禮敬仲以義辭之臣之享君弗納于淫臣之道也亦未嘗引禮以拒也然則湛露之燕厭厭夜飲其非有同姓異姓之分别明矣白華之什十篇五篇無辭凡二十二章二百四句按毛傳自南有嘉魚至吉日凡十篇無辭者不與為南有嘉魚之什田間詩學卷六
