body:
  text: 田間詩學卷十桐城錢澄之撰蕩之什三之三蕩序曰召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也鄒氏云通篇托之文王歎商危言不諱而卒不能啓王之聰故異時彘之亂國人圍王宫召公曰昔吾驟諫王王不從以及此難驟諫者非獨春秋外傳所載諫監謗數語蓋蕩之詩尤最危焉天萬時華云反覆説紂賈山之借秦為喻也反覆説霍光之謂王行自絶于天也蕩蕩上帝下民之辟疾威上帝其命多辟天生蒸民其命匪諶靡不有初鮮克有終朱注賦也下同毛傳缺非孔云此下諸章皆言文王曰咨此獨不然者見實殷商之事故于章首不言文王以起發其意也律朱注蕩蕩廣大貌辟君也為威説文云姑之稱漢有婦告威姑之文後因借氣勢可畏之義上辟通作僻邪僻也指在位者言對帝言故稱下民愚按詩人見在位者之邪僻也歸其咎于上帝疑上帝之蕩蕩疏闊聽下民之為辟而不之理也已又曰豈惟蕩蕩且疾威矣似人之為辟皆上帝命之且非偶有而已所見皆然是多辟也豈上帝欲虐害斯世故多降此輩以速其虐乎夫民受天地之中以生謂之命以今多辟觀之其命有不可信者矣蓋咎天之深也而卒為解之曰此其辟非人之初也乃其終也初非不善惟末路墮壞以至于此則使天命匪諶者皆人之為非天之咎也與諸家皆以多辟指厲王謂不敢斥君故借言下民書髙宗肜日篇言惟天降下民意同愚謂厲王之虐皆邪臣導之如下諸章所稱者則多辟定為王臣言也文王曰咨咨女殷商曽是強禦曽是掊克曽是在位曽是在服天降慆德女興是力鄭云厲王弭謗穆公朝廷之臣不敢斥言王之惡故止陳文王咨嗟殷紂以切刺之歐陽子云以下條陳王者之過惡言此等事皆殷紂所為文王咨嗟以戒于初而厲王踐而行之于後也曽是怪詫之詞上二句曽是言何乃有是人下二句曽是言何乃用是人也強禦暴虐之臣掊克聚斂之臣孔云強任威使氣之貌禦猶禦人以口給之禦斂掊取物之名鹽官入水取鹽為掊或云掊褒通聚也克勝也逆取于民而民無如之何以為勝也也強禦即下多懟之強禦也掊克即下式內之寇攘吕覽云厲王染于虢公長父榮夷終其即此輩乎乂毛云服服政事也與在位對孔云謂非徒備官委任之慆滔同書云象恭滔天起興起也登庸之謂滔德之人雖由天降亦由汝興之故其惡惟恐為之不力耳篇中女而爾皆指王文王曰咨咨女殷商而秉義類強禦多懟流言以對寇攘式內侯作侯祝靡屇靡究而亦女也也作詛通祝咒通屇極究窮也愚按秉與柄同即柄用之謂義類猶言善類也謂王初年亦嘗柄用善人而強禦之輩轉以王聽之不專而有懟心流言不根之言也蓋不欲自已出之而引流言以對使王自疏斥之也寇攘奪劫之名即掊克之人也善人既黜乃進掊克之輩用事于內蓋酷吏與聚斂之臣未有不相濟為惡者于是毒遍海內怨謗沸騰詛祝之聲靡有窮極雖欲弭謗可勝弭乎文王曰咨咨女殷商女炮烋于中國斂怨以為德不明爾德時無背無側爾德不明以無陪無卿鄭云炮烋自矜氣健之貌終吕正獻公謂小人聚斂以佐人主之欲而不知其為害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸于上也云毛云背無丞側無人也無陪二也無卿士也孔左傳曰物有陪二天生季氏以二魯侯諸侯以上卿為二則天子陪二惟三公矣冢宰雖亦二王治事當從六卿之列愚按貪酷之人假王靈以肆其虐天下不之測但見王之威怒日行于中國其聚斂也所以為王斂怨也而王反以之為德周語謂榮夷公專利其即指此乎不明爾德由左右前後無輔導之益至爾德不明則舉錯顚倒以致公卿陪二之重皆失其人矣文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜酒誥注云飲酒齊色曰湎謂其飲酒者皆醉面色齊同也朱注式用也止容止也不義與上章義類相反不義從式推所以湎酒之由惟不義之人是從是法因遂以飲酒為樂事而君臣交湎耳既愆爾止四句湎酒之容也雖俾晝作夜視靡明靡晦更進言其沈醉不醒白日昏昏然亦如夜也文王曰咨咨女殷商如蜩如螳如沸如羮小大近喪人尚乎由行內奰于中國覃及鬼方蜩螳皆蟬也如蟬噪如沸羮皆亂意也指怨謗之聲前章所謂詛祝也小大近喪言民情如此大小臣民死喪將至尚由此而行不肯改轍侈毛云奰怒也不醉而怒曰奰史記云王行暴虐敖國人謗王王怒得衛巫使監謗者以告則殺之王益嚴國人莫敢言道路以目此所謂奰于中國也覃延也按易髙宗伐鬼方詩言髙宗伐荆楚則鬼方當在荆楚地史記楚世家云周厲王之時暴虐熊渠畏其伐楚亦去其王此云覃及者正謂峻厲之威及于逺方也文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典型曽是莫聽大命以傾不時猶言厄運舊者兼舊人舊法而言其型謂典册所載之法愚按王不用舊以為朝無老成人也縱無舊人尚有舊法典型具在曽無一語可聽乎老成人即穆公自道併同志如凡伯芮伯之類皆是而云雖無者不敢自當之詞大命以傾預卜其必然也文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不遠在夏后之世人亦有言即顛沛以下三語是也趨顛仆也沛拔也揭見根貌撥猶絶也沛者水之下之貌順其勢也本仆地之勢如之諸説文云揭髙舉也而蘇氏云商周之衰典型未廢侯未四夷未起其君先為不義以自絶于天莫可救止正猶此耳殷鑒在夏蓋為文王歎紂之辭然周鑒之在殷亦可知矣愚按樹根深藏于土忽然而顛根反出于上故曰揭凡木之顛必根本先絶當其未顛枝葉無害人未嘗知其絶也逮一旦沛然而顛而所絶之處乃揭起而見耳民心者國家之根本也民心失則根本絶王行政用人如此皆鑿喪根本之道也蕩八章章八句鄭樵云三百篇詩皆可被之絃歌故琴中有鵲巢操騶虞伐檀操白駒操皆今詩文又古人謂之雅琴頌琴古之雅頌即今之琴操琴者禁也將以禁人之邪心故以歌乎詩如文中子歸而援琴鼓蕩蕩之什乃知聲至隋末猶存愚按厲王使衛巫監謗民不敢言王喜告召公曰吾能弭謗矣召公力諫謗之不可弭而亦不敢顯言王之虐以自涉于謗至是乃托為文王歎紂之辭言出于祖先雖不肖子孫不敢以為非也過指夫前代雖至暴之主不得以為謗也其斯為言之無罪而聽之足以戒乎抑序曰衛武公刺厲王亦以自警也郝氏云朱子謂武公作此詩專以自警非也詩中侯度小子等語皆自責以告王昔商紂荒于酒微子曰我沈酗于酒孝子諭親必先自責忠臣誨君引為已過詩言溫厚故導君惟以自警幽王距厲王所百年矣武公為幽王卿士追維往事以明鑒戒故曰告爾舊止曰言示之事曰取譬不逺蓋指流彘之事也劉公瑾云賔筵抑詩所以得入二雅者豈公作此二詩在于王朝為卿士之日而二詩之體製音節又有合於大小雅乎愚按武公為諸侯歷宣幽平三王之世未有不入朝者故賔筵之詩因朝王而見王之飲酒無度愆于威儀作詩以諷之此殆繼賔筵而作故亦以威儀為主所以自警而誨王也考武公年九十有五卒于平王之十三年則平戎之嵗其年已八十有三古七十曰耄毛氏又云八十曰耄計武公入朝時幽王昏亂已極正當末年公是時已踰八十矣故曰既耄詩作于幽王時序以為刺厲王直以篇終有曰喪厥國取譬不逺以厲王為幽王戒也蕩詩戒厲王取鑒于殷此詩戒幽王取鑒于厲前車之覆轍一也以厲王為之祖再世而子孫不能諱其惡以為鑒焉故編詩者列之于厲王之世抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾朱注賦也毛傳缺下抑抑密也隅亷角也人方中發云抑抑自下也即文敬慎之義鄭云密審于威儀者是其德必嚴正也如宫室之制內有繩直則外有亷隅靡哲不愚言哲亦無威儀也職主也猶云常也疾者孔子所云民有三疾是也戾朱注反也衆人之愚蓋其稟賦之偏宜有是疾哲人而愚則反其常矣庶鄭云王政暴虐賢者皆佯愚不為容貌如不肖然衆也衆人性無知愚是其常也賢者而為愚畏懼于罪也以按幽王之時上下沈湎無復威儀猶狂國之人反不狂者為狂哲人效之亦自同于愚人以祈免禍故曰靡哲不愚第三章所云興迷亂于政顛覆厥德荒耽于酒是也興者尚也謂一時相尚以此愚按愚字承上維德之隅更進一解靡哲不愚老子所云君子盛德容貌若愚蓋欲德之泯其隅也然所謂愚者不同有庶人之愚顛覆荒迷是也此其愚也疾為之也有哲人之愚即馴謹朴訥是也斯其愚正與庶人之愚相反者也無競維人四方其訓之有覺德行四國順之訏謨定命遠猶辰告敬慎威儀維民之則競強也覺德行即德之見于威儀者音毛云覺直也爾雅訓為梏梏與校通按校與覺相近禮記緇衣篇引此詩作有梏德行梏猶校也義取拘束收斂于首抑抑二字亦似相承訏大也謨謀也定審定不改易也命號令也逺猶者長慮却顧思其所終稽其所敝也辰告以時播告也按訏謨毋見小利定命不事紛更逺猶務圖久安辰告務中時宜四者以敬慎威儀為本無威儀則民無所則此皆文具而已四國之順不可必也而曹風云其儀不忒正是四國惟其父兄子弟足法後民法之則施政頒令之故事不可以愚民審矣此與首四句相應愚按無競惟人自勝而已不與人競也而四方聽焉一如吾有以訓之也有覺德行無以示人人自有覺也而四國服焉不期順而自順也皆抑抑之所致也二章專説前王之敬慎無競四句言前王之德訏謨二句言前王之功功德如此而必以敬慎威儀為本以為民則文武相承何至于今不然也故下緊接以其在于今其在于今興迷亂于政顛覆厥德荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑今指幽王之時政朱注興尚也覆迷亂于政三句一氣注下迷亂于國不治也顛厥德身不修也總惟荒湛于酒而已之興者謂朝廷君臣一時相尚飲酒從者謂從沈湎人飲也紹謂所承之緒敷求先王謂廣求先王所行之道也共通作恭刑通作型法也明刑謂成法之昭垂者敷求以事言克共以心言愚按通篇皆武公使人敕已而警之之辭武公未嘗自作一語凡女者皆敕武公也韓序謂其飲酒悔過而作當必入朝之時王與之燕飲荒湛無度公不能以禮自持而悔也弗念厥紹三句即上章所言先王之德而今弗念也所謂明刑者敬慎威儀而已義在諷王詞只責己女雖湛樂以下使誦者問之也謂女雖湛樂是從當其從時果遂百事俱廢竟弗念先人之緒乎先人之道謂何而女罔敷求典章明明而女罔克共何也皆問以責之肆皇天弗尚如彼流泉無淪胥以亡夙興夜寐灑掃庭內維民之章修爾車馬弓矢戎兵用戒戎作用逖蠻方皇天弗尚尚字與上興字相應言女君臣所尚如此而皇天弗尚也違天所尚則喪亡及之如彼流泉言其趨下之易也淪陷也胥皆也淪胥即皆陷溺之倒文也無通作毋言毋相率陷溺以至于滅亡也夙興七句武王所謂不泄邇不忘逺者是也自其迷亂于政言之凡事之大者且置不理何有細微寢興灑掃舉細以該大也凡事在近者且或遺忘何況遐逺武備蠻方舉逺以該近也章表也逖通作逖逺也愚按此章承上迷亂于政一句戒而勉之質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也朱注質成也愚謂使各安本分而已與天保篇民之質矣同解蓋自夙夜灑掃率民以勤敬得來侯度者諸侯所守之法度也口上專言威儀此兼以話言威儀形于身話言出于皆德之符也鄭云柔安嘉善也宫王潢云柔嘉即從容中禮之謂曰無不者內自深外至大庭動容周旋之間無不中禮也玷缺也圭國之守器玷尚可磨猶不至于喪國言之不慎則危亡之禍隨之故曰不可為也愚按威儀失者話言必乖是以賔筵幡幡之威儀與由醉之言同戒也無不柔嘉承敬爾威儀一句白圭之玷四句承慎爾出話一句勉自此以下承上顛覆厥德而戒以之無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讐無德不報惠于朋友庶民小子子孫繩繩萬民靡不承此章極言慎爾出話之事者易説文云輕也任意而言曰由言嚴氏云由言自由之言所謂惟其言而莫豫違也朕朕我也蔡雍云古者上下共稱咎繇與帝舜言稱伊尹曰惟朕以懌周公曰朕復子明辟屈原曰朕皇考是也勿捫持也其捫者謂欲言之時無人持其舌使忍而出爾雅云讐匹也孔云匹敵相報也之無言不讐兼善惡而泛論之無德不報則専指言善者下三句正承此一句而言前用戒此下則用勸也僚惠順也有德之言自然順于人心不獨同朝之臣皆以為然轉屬而下至于庶民亦莫不以為然也而子孫謂小子之後繼世而為君者此極無德不報言之謂子孫皆食其報世世為萬民所順承不獨己身得報而已此謹言之效也愚按苟字從易字來苟猶且也亦知不可言言之易者直曰且言之未必遽有所害而不知其言一出口逝而不可反矣所謂駟不及舌也詩惠于朋友庶民作一句讀小子武公自謂蓋使誦者呼而命之也視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思爾友君子指其所友之士大夫也問輯和也柔謙也顔眉目之間也遐逺也不遐有愆詞也言當交接君子之時既輯柔其顔色矣而猶自省曰得無尚未逺于愆乎蓋常人之情其修于顯者無不如此爾室獨處之地爾雅云西北隅謂之屋漏曽子問篇謂之當室之白孫炎云當室之白日光所漏入也薛應旗云屋漏非身之所處乃心之所存心曲隱微之地自家照自家慚阻略無所容如何不愧視公見之也相隂相之也之郝氏云莫豫覯者謂人不見也天下或有人不見地無有鬼神不體之處鬼神無形往來不測雖不顯亦臨猶若有失况可厭射而不敬乎錢滙云莊子謂為不善于顯明之中者人得而非之為不善于幽暗之中者鬼神得而責之君子無人非無鬼責即此意也辟爾為德俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子朱注辟君也指武公也而為德即首章所謂德隅次章所謂德行皆指威儀言鄭云止容止也淑通作俶善也説文云叔拾也凡字從叔者皆有收斂之義僭差也賊害也舊説投桃報李以踰上感下應之理則當云投之以桃報我以李不宜云投我報之也此語似教之虛懷納善凡有進美言于我者輒思所以厚報之則聞善而嘉納可知氏毛云童羊之無角者也而角自用也虹潰也嚴云虹謂幻惑也蝃蝀不正之氣暫見于天須臾散滅愚按稱君者以君位凜之也隨呼為爾以學者訓之也通篇威儀合稱此舍威言儀者止即威也孟子云動容周旋中禮動容止也周旋儀也論語云君子不重則不威以止言也故知有威可畏者動容之事有儀可象者周旋之事後易稱童牛之牿謂必自童時牿之禁其抵觸久而馴今任其童而角也無復有以制之則潰亂無不至矣以見法家拂士之不可以己而忠言不可不納也小子亦謂武公荏染柔木言緡之絲溫溫恭人維德之基其維哲人告之話言順德之行其維愚人覆謂我僭民各有心此章承上文反復以聽納之理告之以荏染柔貌為毛云緡被也蘇氏云木柔而被之絲則可以弓不柔者雖被之不從也言按柔忍之木乃弓之材以比溫恭之人乃德之基基則其造詣有待矣是故柔木不被以弦不可為弓猶恭人不進以言不能成德言緡之絲與維德之基二語互相足也話言古之善言也覆猶反也僭不信也語賢智之人以善言則順而行之告愚人反謂我不信民各有心二者競不同愚按哲人愚人與首章相應人之真哲真愚惟于聽言之時辨之於乎小子未知臧否匪手攜之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成此章蓋追悔其昔日不肯受教之事而責之之未知臧否猶俗言不識好醜指其年幼未有知識時手攜四句追維往日教者之切之言示之事示以已驗之事言提其耳附耳以丁寧也曲禮云長者與之提攜則兩手奉長者之手負劍辟咡詔之注謂傾頭與語又云口耳之間曰咡是攜手提耳皆長者教誥小子之常冒焦竑云提當音抵言附耳以教之也史記薄后以絮提文帝景帝以博局提殺吳太子揚雄酒針云身提黃泉皆作抵音夙陸燧云知則必成夙知則必夙成不聽言則不能知惟自滿故不聽耳未有不滿而不夙知夙知而尚待晚成者也愚按靡盈言為學無有足時夙暮猶言早晚夙知而暮成言其成之易也謂即使夙知亦必終其身于學問而後有成未有但知而即成者而况乎其未有知也昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄上章追咎已往此則即現在而責之言當抱子之時雖曰未知猶冀其末路有知之之日今既耄矣而其未知如故也罪首二句言天道福善禍淫昭然不爽我生時恐獲于天有何可樂而奈何爾之夢夢然湛樂是從也爾以為樂我以為憂我惟慘慘是以誨之諄諄爾惟夢夢是以聽之藐藐不惟不聽且以我言太多為煩苦之也是不以我之諄諄為教反以為虐矣皆作誦者之辭愚按兩曰未知不曰無知未者言有待也少待壯壯待老今既耄矣將待何時耶於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不遠昊天不忒回遹其德俾民大棘此章情益急而詞益痛雖呼小子以自警而所言皆王朝事蓋借已以諷王也告爾舊止所謂前事之失後事之師也大悔指喪國言謂後雖悔之亦無及矣曰庶無者望之也方者近今之詞天步近方艱難既有喪國之禍指厲王流彘之事也取譬不逺言其事甚近無多時也忒差也言天道禍福無爽有德者興無德者亡終古不差忒也與昊天孔昭句相應孔昭以理言不忒以效言回邪也遹僻也棘通作䩯大棘大困急也使民至于大困急者皆以德不順而威儀不慎之為害也愚按此章特以厲王亡國之禍警已以諷王序謂刺厲王者此也武公見王之荒酒失儀知王國之必喪而引厲王作鑒言喪國其近事也此語激切己甚不欲直陳而託其辭于訓己者之口可謂委曲深至若徒以為自警無關獻納亦何以載諸大雅哉抑十二章三章章八句九章章十句楚語左史倚相云昔衛武公年數九十有五矣猶針警于國曰自卿以下至于師長士苟在位者無謂我老耄而舍我必恭恪于朝朝夕以交戒我于是乎作懿戒以自警也韋昭注云懿詩大雅抑之篇也考武公年九十五卒于平王十三年則此詩適作于臨沒之年愚按侯包云武公行年九十有五猶使人日誦是詩而不離于其側謂之日誦者蓋作之久矣賔筵之序曰幽王飲酒無度武公既入而作是詩鄭云入者入為卿士也史記犬戎之亂武公佐周平戎有功平王命公為公後儒據之遂謂以為卿士因以此篇為東遷後之詩夫東遷以後王已為風而獨此詩入雅何耶武公之為幽王卿士固無據而賔筵為入朝之作此詩繼賔筵而作二詩皆作于王朝有關于王躬故列于二雅也王據武公年九十五以宣王十六年即位卒于平之十三年在位五十五年則是即位時已四十矣以十六年前合共和十四年計之武公生已十餘嵗流彘之事所親見也厲王之虐聞諸父祖者習矣第十章所云於乎小子未知臧否匪手攜之言示之事云云其即述前此之廷訓耶桑柔序曰芮伯刺厲王也鄭云芮伯畿內諸侯王卿士也字良夫左傳秦穆公引大風有隧章稱為芮良夫之詩貪篇中不敢斥言王而但斥當時執政者信用非人利生事以致禍亂大抵為榮夷公輩發也士周語厲王説榮夷公芮良夫諫不聽既榮公為卿諸侯不享墨子亦言厲王染于公長父榮夷終則二人正當時之用事者也菀彼桑柔其下侯旬捋采其劉瘼此下民不殄心憂倉兄填兮倬彼昊天寧不我矜毛傳興也朱注比也日毛云菀茂貌旬言隂均也有説文云旬遍也按十為旬以周匝十日言之故遍義手捋詩詁云以指歷取也逐葉摘之謂之采牽枝以循衆葉而併下謂之捋邠風采蘩祁祁采也猗彼女桑毛氏以為角而束之捋也或劉夲作鎦戕伐之義桑葉雖茂或捋之或采之又劉之三事并用則無遺葉矣而蘇氏云桑之為物其葉最盛然及其采之也一朝盡無黃落之漸故取以為比歐陽子云他木皆有枝葉獨以桑為譬者惟桑以葉用于人瘼病也殄絶也不殄心憂曹操短歌行所云憂從中來不可斷絶也而倉通作愴兄通作恍説文云狂貌填塞也憂之極愴愴之極而恍至于胸鬲俱悶塞也愚按劉留通留者桑葉采後之所遺也而更將采以盡之以比取民者之無復有遺矣四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國步斯頻朱注賦也時此言厲王時數興征伐之事夷皇王大紀載厲王荆楚寇于南獫狁寇于北淮寇于東命虢公征之不克徵斂數起虐用其民民不堪命翩歐陽子云四牡騤騤臣吏奔走于道路也旟旐有庶民召集于兵役也遣夷平也泯滅也爾雅云盡也征伐繁興侯國有調之繁故財力俱盡非謂無國不伐使皆滅也人民靡有黎言丁壯從軍死亡略盡無復有黑髮之也具通作俱禍謂兵革之禍燼説文云火餘也此句連上句串讀水頻急也今云頻于險是也又水濵亦作瀕國步蔑資天不我將靡所止疑云徂何往君子實維秉心無競誰生厲階至今為梗朱注賦也之此章言師旅敗衄之後而當事者尚有不肯休兵意毛云疑定也朱注讀如儀禮疑立之疑則疑與凝通文徂即往也徂以人之往言往以所往之地言故兩以别之一説疑惑心也民心洶洶疑新敗之後王將復興大役而王無以止其疑咸相與驚惑曰今又將往何處乎輔氏云居無所定則無以自安也徂無所往則無以避患也愚按國步蔑資與板詩喪亂同解國所資以立者民也人民喪亡如此將何資以為國乎將者扶持之意天不我將猶言天不扶持所至敗衄也禍君子指王言王實無與小醜爭勝之心而興兵之本階于用事之臣指虢公長父榮夷公輩而言乃兵端既啓亂以日滋四國逆命至今皆梗化也寬王一步所以專責用事者憂心殷殷念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔棘我圉朱注賦也土宇本屋邊之名左傳云在君之宇下言邊垂也宇可念所謂日蹙國百里也僤説文云疾也僤怒猶云疾威兵連禍結若天怒下民實使之然嚴氏云是時鎬京在西中原在東自西至東無有寧居言京師及中原皆亂也疾痻病也痻通作昏晉語鮮不天昏韋昭證狂惑之是也多我覯痻言我所遇者無非狂惑之人指當時居位謀國者言也圉邊也棘急也言朝廷信任狂惑之輩挑怨賈禍使邊垂日見告急即史言諸侯叛王東夷西戎迭見侵擾之事也為謀為毖亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺朱注賦也深毖慎也况滋也言君臣朝夕講求用兵之事非不謀不慎重也而亂反滋國反削抑知已亂之道不在窮兵乎斥爾指用事諸臣觀後嗟爾朋友之語可見蓋不欲言王但託之告朋友耳恤兼憂與收二義謂哀痛民之窮而收之也已亂之道惟在恤民然非在位皆賢者誰能代君恤之故又誨以序爵非鍾惺云舊解執熱作執持之意者熱曰執熱猶云熱不可解愚按莊子曰每况愈下况者情之似也故曰况譬亂况者猶云亂狀也言亂狀他且不知而國斯已削矣位斯民憔悴于虐政之日如處湯火之中得賢者在罷兵息民猶拔之湯火而沃諸清泠之淵也以濯解熱理勢必然若一往不解則受禍者與首禍者同歸于盡如彼舟覆其何能獨善其身哉亦相隨併及于溺而已無得脫也如彼遡風亦孔之僾民有肅心莽云不逮好是稼穡力民代食稼穡維寶代食維好朱注賦也也遡通作溯鄉也按鳥溯風而立言逆風也僾唈氣悶不得息也逆風而行其氣為風所逼悶不得出故有此苦猶民畏王之虐政喘息皆不敢舒也肅畏懼也莽當作迸小毖篇荓蜂荓亦作迸謂斥逐散走也逮及也愚按厲王得衛巫使監謗者以告則殺之王益嚴國人莫敢言道路以目民有肅心殆其時乎以民心如此離散可待而又多方以驅逐之惟恐不及也極力民代食以力代人而食者傭耕之類言國亂已而尚未亡者以有力之民皆務稼穡而得食故一時不至瓦解左傳趙孟云國君無道而年嵗和熱鮮不五稔以民得食也甚矣稼穡之足寶而務農之為好也天降喪亂滅我立王降此蟊賊稼穡卒癢哀恫中國具贅卒荒靡有旅力以念穹蒼朱注賦也歉前章言國之亂而不喪者以民務農業而年嵗無也乃今加之以災年是喪亂併至天亡之矣王矣鄭謂我王所恃而立者稼穡也害稼穡猶滅蟊食苗根者惡之深故呼以賊非二物也卒盡也庠病也贅屬也言危也春秋傳曰君若綴旒然與此贅同朱注立王謂所立之王疑滅我立王一語謂此詩作于共和之世按芣和之世厲王正存故詩人得以追敘其事而刺之也張遺云周懿王崩太子不得立孝王即位孝王懿王叔也孝王崩諸侯復共立太子燮為王是為夷王厲王父也滅我立王當指夷王言諸侯協力以共立之王今將滅矣以指夷王其辭更痛愚按王不恤民事視此中國土田皆身外棄物猶具贅耳今降此蟊賦所為具贅者亦盡荒矣則喪亂已成哀恫何極念穹蒼者自傷無擎天之力而空憂天之隕也民困至此而猶不叛者以田可稼穡力民猶以代食自給不即亂也蟊賊降而稼穡廢代食者無所用其能已于亂乎從來之亂未有不起于嵗飢者也維此惠君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺腸俾民卒狂朱注賦也之此章因喪亂之極而傷其有君無臣蓋不忍斥君非而歸其罪于執政者耳惠順也秉心猶言存心也宣布也又偏也猶謀也考察也慎審也相輔也愚按厲王虐君也詩人諱之而言王本仁惠之君民人昔所瞻仰其存心亦將大有為也蓋欲遍布其謀略不令四方有阻命者故其擇相也考之慎之皆所親信之人上所謂為謀為毖者即與此相謀也而豈知所用非人以至此乎理維彼者鄙而外之之辭指用事者不順者不順于理不順則人心天意皆不順矣自獨者言其自視獨而已目中無有二也俾使也臧善也言用獨見而欲使所為皆善何由得善也自有肺腸不通衆志徒使民迷惑以終至于狂亂而已言必激之亂也瞻彼中林甡甡其鹿朋友已譖不胥以穀人亦有言進退維谷朱注興也并行之貌以下皆責王臣之用事者食甡甡衆多許慎云鹿性旅行按鹿欲皆鳴相召志不忌也以朋友僚寀之稱指執政者自鄭云譖不信也不胥穀與自獨俾臧相應言惟以為是不用朋友相資以成其善也惡言朋友已不信矣今事勢至此進而欲言恐復見于朋友退而不言則又無以自安故曰進退維谷毛云谷窮也惟此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌朱注賦也云此章承上章因其拒諫而斥其為至愚也應劭聖者聲也言聞聲知情也嚴氐云聖人于人之言能瞻之百里之外謂望之而喻其意也狂惑也以是為非以非為是彼愚人不知是非所在反以狂惑之見自喜安肯聽言人亦誰肯言乎匪言不能謂我非不能指摘其愚也而于此若有所畏忌而不敢言如前所云進退維谷者何也憤極而自訝之詞維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒朱注賦也之迪進也説文云道也書迪簡在王庭謂導引而進也忍心與良人相反良人主于愛民忍心主于害民此者愛而內之之辭彼者惡而外之之辭顧還視也復重也如父母之于子顧念反復而不已也皆言執政于良人不肯引用而所注念綢繆者忍心之人蓋不順者所為如此愚按數建貪利之謀數興得己之役以趣民為亂皆信用忍心者所致也民本喜亂至柔而強至順而險豈肯甘受荼毒而俯首待死乎寧為云者言必至于亂也大風有隧有空大谷維此良人作為式穀維彼不順征以中垢朱注興也盡此章言執政之不順者不惟不肯引用良人且欲去之也大風爾雅作泰風云西風也穴隧與邃通謂穴之深逺者風由穴出多能害物而中之風本自大谷之空處來空則生風故大谷為大風之所自出以喻朝廷空虛則隂邪于中得以鼓扇其虐故不順者必欲盡空其善類而後已也式用也穀善也言良人作為皆善無可媒孽而不順者攻之愈力以其立朝大節皎然共見故索其曖昧之私以汙之耳征興徵同索也中隱暗也垢汙穢也蓋索􅼆求疵之謂大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖朱注興也者大風之來于隧者萬物為之摧殘貪風之出于朝士習為之敗壤其所由者深故力所及者逺也時郝氏云欲人聽從己言則以辭色接對若人指陳事誦説則謷然不顧如醉者矣鄭云誦詩書之言則冥卧如醉史記稱商鞅説秦孝公以帝道孝公睡而不應此類是也愚按德言之言與誦言之言皆同時言者一聽之則對其所言者中聽之言與言利也一誦之如醉者其所誦者詩書之言與利相反也良用者用其所聽也以吾觀所聽者匪良也而以為是反使我之言為悖矣悖倍通謂與時相倍也即不合時宜之謂因彼言之動聽使我之言自覺多悖耳嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲既之隂女反豫來赫朱注賦也譖自此章而下皆自明其作詩之意其上言朋友已而此仍呼朋友者眷眷不已猶冀萬一之聽也作承上覆俾我悖而言我豈不知言之悖于爾意而此乎作者末章所謂既作爾歌也飛蟲即飛鳥孔云蟲鳥之大名朱弋説文云繳射飛鳥也時亦者謂弋之獲少也注時亦弋獲言己之言或亦有中猶云千慮而一得也恐隂女張子厚云隂往密告于女反謂我來動也愚按隂女者謂隂以民情時弊告女也來赫者反以豫之密語而顯言之使豫為衆怨所歸也既之猶云卒之也言豫以女為朋友而親之卒之為女疏斥如此民之罔極職涼善背為民不利如云不克民之回遹職競用力朱注賦也以上章朋友既棄其言矣于此復言民之必亂皆有致之使然情詞愈切義不容己也罔極猶云不測也又云作法於涼涼爾雅云薄也左傳云虢有涼德鄭云職主也職涼謂晚近民心主于涼薄善背謂善于倍上也民情如此惟宜有以意懷之而今所以為民者皆不利于民之事且如恐其不勝而勇于為之也以是民之邪僻亦競起生心不遺餘力以為亂矣皆為民者趣之使然也民之未戾職盜為寇涼曰不可覆背善詈雖曰匪豫既作爾歌朱注賦也而民之未戾言此時民雖離散猶未至于悍然乖戾為叛也然飢寒所迫盜賊以起漸至于為寇矣前云職涼善背夫涼且不可反可背上而善詈乎此即厲王時國人謗王之實事也愚按終言亂勢已成女必諉曰非豫為之謂民情時弊豫初不知今既作爾歌言之亦既切矣爾猶不之知耶桑柔十六章八章章八句八章章六句申培説芮良夫傷厲王之失國而作是詩朱子亦疑此詩之作在共和之後若共和以後國事民情尚復如此宣王其能興乎考詩辭與國語汲冢周書竹書互相出入斷作于厲王之世無疑雲漢序曰仍叔美宣王也宣王承厲王之烈內有撥亂之志遇災而懼側身修行欲銷去之天下喜于王化復行百姓見憂故作是詩也鄭云仍叔周大夫也按春秋魯柦公五年夏天王使仍叔之子來聘字孔云仍氏叔字春秋之例天子公卿稱爵大夫稱此言仍叔故知大夫也以史記考之桓之五年上距宣王之崩七十六年至其初已百餘年矣則春秋時仍叔或即此仍叔後也春秋晉知氏世稱伯趙氏世稱孟或仍氏世稱叔也鄒氏云嘗考竹書厲之末年頻年大旱廬舍俱焚會其陟也卜于太陽兆曰汾王為祟周定公召穆公乃立太子靖為王遂大雨然則雨不係新王所禱明矣作竹書宣二十五年大旱王禱于郊廟遂雨此詩之意在此時其詩曰祈年孔夙方社不莫則涖政蓋亦有年矣愚按小雅宣王之詩即繼文武之後以明中興之嫓美于創業也大雅于文武之後而接以成王于宣王之前而列序厲王以明中興之難倍于守成也繼文武之後者以成王守文而致數十世之太平繼厲王之後者以宣王興復甫一傳而遂有亡國之禍甚矣中興之難也故小雅猶惜其晚節之衰大雅直頌其武功之盛倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽朱注賦也毛傳缺轉鄭云雲漢天河也倬光也倬然天河水氣也精光運于天時旱渴雨故宣王夜仰視天河望其候焉雲左傳梓慎云漢水祥也倬陸氏云水氣之在天為水象之在天為漢今皆然昭明回轉于上則非雨之候也此二句與末章有嘒其星皆是同時所見倬彼二句詩人述其所見為旱之象王曰以下則述王仰訴于天之辭饉薦重也臻至也孔云宣王遭旱非止一年言飢薦臻必是連年不熟也禮羣神即下經所陳上天下地從郊至宫之類也周大司徒以荒政十有二聚萬民其一日索鬼神注云索者求廢祀而修之也至按左傳凡天災有幣無牲此因日食及大水而言于水旱薦至禱祀羣神以祈福禳災則不得不用牲也祭法曰雩禜祭水旱也注云祭用少牢孔云禮神之圭器多名言圭璧為其總稱以三牲用不可盡故言無愛蓋圭壁少而易竭故言既盡旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬言旱久而益甚也謂藴積也隆盛也蟲通作爞説文云旱氣也不殄既祭此復祭彼相續不絶如下文所云也上章靡神不舉乃擬議之詞至此始行其禮宫宗廟也輔廣云先郊後宫先尊而後親也奠謂祭時進之神前瘞謂祭畢埋之于土凡酒食牲玉幣帛祝册之類皆然嚴氏云在宫之神莫尊于后稷非不臨顧我而力不足以勝旱災在郊之神莫尊于上帝力足以勝旱災而不肯臨顧我斁敗也丁當也言此耗斁之禍曽是不先不後而適當我身耶意必有以致之也愚按寧丁我躬唐太宗吞蝗使食己腸胃亦倣此意謂與其耗敗下土寧使災禍當我躬耳旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧推去也説文云排也排而去之也霆霆者雷之餘聲旱久已稱甚矣而今此前更甚如之後而人繼以雷也之朱注孑無右臂貌遺餘也周之餘民無復有半身遺者言承厲王大亂之後也昊天四句承后稷不克二句言昊天不但不臨而已似並此餘黎亦不欲為我留也先祖非果不克也其意似于冥冥之中亦隂為摧擠而然也此朱注摧滅也言先祖之祀將自而滅愚按胡不相畏句著先祖上以先祖見怒如此則上帝怒更可知旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍豫沮止也是上章言推猶欲排而去之此但言沮僅欲其止于勿更加益耳然而亦不能矣赫赫旱氣也炎炎熱氣也宙云我無所云雖我之一身亦無可容之所蓋言宇雖廣無隂以憩何氏云承上章言黎民既盡則我亦無容身之所之大命以國祚言盤庚篇懋建大命是也近謂滅亡期不逺止通作只語辭母仰視曰瞻謂下文羣公先正還視曰顧謂下文父先祖言俱無可恃賴也羣公若勾龍后稷之類左傳云封為上公祀為貴神也先正月令所為雩祭百辟卿士之有益于民者是此皆在靡神不宗之內愚按父母先祖當指后稷祈榖配帝之祖粒我蒸民非父母而何則不我助言羣公先正固無望其我助可訝者父母先祖之忍豫耳旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遁滌滌山無木川無水魃旱神也惔燎之也焦鄭云旱既害于山川矣其氣生魃而害益甚草木枯如見焚燎然炎熏通作薰説文云火煙上出也心憂之極如火之上易曰厲熏心是也旱之不已由我在位也或欲使我避位而去則旱可止乎自怨之極也愚按上章則不我助怪其聞我之告不能助也此則漢然竟不聞矣胡寧忍豫怪其不見憐憫忍加害也此則欲求棄位而遁亦不得矣皆進一步説旱既大甚黽勉畏去胡寧癲我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒黽勉言力所不堪勉強為之如黽之奮怒不自量力也畏去承上章寧俾我遁又作一轉語嚴氏云始欲遁去既又念民命方急當思救之故黽勉於此不敢去也癲病也憯曽也説文云痛也嚴氏云水旱之災皆由政失必有以自取之而特不知其故也知其故則速改矣説苑湯之祝山川曰政不節耶使人疾耶苞苴行耶讒夫昌耶官室營耶女謁盛耶何不雨之極也與此意同夙早也莫晚也月令孟冬天子祈年于天宗大割注云天宗日月星辰也大割大殺羣牲而割之也又孟春天子以元日祈穀于上帝冬方社指雩祭四方之神及后土言月自去嵗之孟已祈今嵗之穀可謂夙矣及今巳復行雩祭請雨之禮不為晚矣昊天上帝去人甚逺未能度我此心羣公先正皆稱明神鑒我祀之處宜無所恨以逞怒于我何為不我助不我聞也旱既大甚散無友紀鞫哉庶正疚哉冢宰趣馬師氏膳夫左右靡人不周無不能止瞻卭昊天云如何里朱注友紀猶言綱紀也或曰友疑作有長鞫窮也庶正衆官之長也灸病也冢宰又衆長之也趣馬掌馬之官師氏掌以兵守王門者膳夫掌食之官也道毛云嵗凶年穀不登則趣馬不秣師氏弛其兵馳不除祭事不縣膳夫徹膳左右布而不修大夫不食梁士飲酒不樂周救也無不能止言無有不能而止不為也周郝氏云里俚同漢書無俚即無聊賴之意鄭云當作賙言諸臣無有一人不蠲助以賙救百姓之困急者無有自言不能而止者以此大小臣工皆困也何氏以此章為救旱之實政散散倉廩以賑濟也散無友紀所散已多不可勝紀與下靡人不周相應里即道里也蓋君臣勞于救荒如此而天意不回不知天之去地幾何里乃居髙而不能聽卑也愚按止字與里字俱屬語辭散此後二章皆祈禱之事因祈雨而百事不治故曰無友紀首章言靡神不舉所以分遣庶正以祭百神靡人不周周遍也言遍遣也瞻卭昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卭昊天曷惠其寧毛云嘒衆星貌言陸氏云言旱久而繁星備見尤非雨之候也且正昊天則夏之時也此章勉羣臣祈救之勿怠也謂羣臣助我昭格于天既竭其精誠無餘力矣無以無餘力而怠棄爾前此之成功益求所以昭格者而圖之可也此豈為我一人計哉惟此庶正以為民之故不安久矣所求者一雨而民生以逐則衆正以安瞻仰昊天不知何時而惠我以安寧乎何氏曰我宣王自謂也我居民上一夫不獲皆我之責今求諸臣之為民者即為我也戾猶虐也因自致其不安之意曰奈何以求為我之故而戾我庶正乎必張子曰不敢斥言雨者畏懼之甚且不敢云爾淩濛初云通詩不露一雨字愚按戾即上章所言靡人不周祈救之事因勞而困苦也其寧謂得雨而勞可息也雲漢八章章十句皇甫謐以為宣王元年不藉千畝虢文公諫不聽天下大旱二年不雨據國語史記竹書以不藉千畝係宣王末年事而皇王大紀于宣王二年書天下大旱三四五年書旱六年書大旱則非不藉千畝以後事明矣愚按天之亡人國也必先奪其嵗蝗旱是也故幽厲之世皆極其飢饉以宣王厲精圖治而猶降以旱災蓋當厲王之世天意已亡周矣宣王修德禳災加以竭誠禱祀僅能彌縫天意以終其世至幽王而亡始決録宣王詩首列雲漢者以見王有回天之誠延已去之命為中興第一大業也兄子亷曰宣王中興詩頌其武功而録此詩于首謂王之能恤民也民命在嵗王以新君憂旱如此其勤恤民隱可知即此一念足以用民命而奏武功以底中興之績也嵩髙序曰尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉張文潛云周至厲王而亂極矣王室衰微諸侯肆行王且不能有國而況能建國乎諸侯背叛搆怨連禍而况能親諸侯乎賞命不行于上則褒賞申伯為可美也錫命不行于下則錫命韓侯為可善也揚子曰習治則傷始亂也習亂則好始治也方宣王之初可謂習亂矣而宣王之始能行天子之職詩人為樂其始治而好之也嵩髙維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣朱注賦也毛傳缺毛山大而髙曰嵩郭璞云今中嶽嵩髙蓋依此名云嶽四嶽也鄭云四嶽卿士之官掌四時者也因主方嶽巡狩之事在堯時薑姓為之歷虞夏商世有國土周之甫也申也齊也許也皆其苖胄堯錢柄曰四嶽只為一官四國統為薑氏之苖裔耳典曰咨四嶽史記特稱伯夷為四嶽不及其他可知矣專嶽即周禮所云嶽山雍州鎮也凡天下諸山之得以嶽名者惟此山耳一名吳山舊説指四嶽言者非嶽凡山之髙竦者皆可稱嵩稱嶽而雍州吳山獨以名中州嵩山獨以嵩名孔云此詩送申伯而及甫侯者美其上世俱出四嶽故連言之駿通作峻山髙近天亦大臣近天子之象五嶽之所以視三公也惟一云申申伯也甫仲山甫也甫父通用但詩中仲山甫吉甫作甫餘皆作父吉甫為作詩之人則以申甫並稱者為仲山甫無疑或疑甫為字申為國名稱不類舜典稱稷契稷以官契以名漢稱絳灌絳以封邑灌以姓皆不類也申後漢劉陶云周宣用申甫以濟夷厲之難此詩以甫並稱乃統為二詩發端也藩通作蕃四方自四國之外廣言之愚按先申後甫明此詩為贈申伯而作富時仲山甫名德甚重以申並稱蓋謂申伯可相伯仲借山甫以重申伯也亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功史記申本侯爵今命之為方伯故稱申伯申國在南陽宛縣謝今汝寧府信陽州方畿云申謝相近既以謝益申厥後總稱為申纘繼也于往也故何氏云時必宣王命申伯于申謝之間有所經營先自京師而往其國邑繼又從其國邑而往謝所謂王纘之事也當成周者南有申吕左傳楚子重請申吕以為賞田申公巫臣曰不可此申吕所以邑是以為賦以禦北方蓋楚得申吕而始強所以為周室之屏翰與諸季氏云謝近于荆而荆與徐連舊嘗表裏為江淮國之患宣王命將伐荆自將伐徐于是使召虎疆理江漢因使虎徹謝土田以築城定宅焉謝荆徐之要衝也其扼吭之慮逺矣愚按竹書宣王五年伐荆六年王親征徐戎其年命召穆公伐淮觀其浮江漢而下則是時南國已皆就約束矣此詩疑作于未用兵之前王將有事于荆徐以申謝為南北之吭故先命申伯出牧此地以約束南國之諸侯所謂王纘之事蓋王有志而使申伯繼其事也邑者申伯舊邑也今為方伯建都不知宜于申宜于謝要擇要衝之地足以表率南國故使召伯往定其宅登進也南邦舊在化外今進之于王化之內厥惟申伯之功許其子孫世世長有此土以世守其功也王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人前章南國是式廟議已定申伯為方伯矣此則王始錫命之也鄭云庸功也周禮曰民功曰庸即言築城之功平朱注傅御申伯家臣之長也漢明帝送侯印與東王蒼諸子而以手詔賜其國中傳蓋古制如此私人家人遷使就國也愚按前章稱王命召伯是以于邑于謝之兩議命召伯往定之逮召伯報命既定于謝乃再命往經理其事厲徹土田即黍苗篇所云平原隰清泉流之事蓋自王貪暴而稅法壞盡故于韓奕亦曰實畝實籍于江漢亦曰徹我疆土中興之美此亦可見矣遷私人即第七章所云徒御之類先定其名籍以待耳非先使之就國也申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鉤膺濯濯申伯之功指工役之事黍苗篇所云肅肅謝功召伯營之是也俶始也説文云善也蓋創始而善者也室寢廟宗廟也前曰廟後曰寢專舉寢廟君子營宫寢廟為先也藐通作邈逺也朱注深貌蹻説文云舉足行髙也毛云壯貌鉤膺樊纓也賜郝氏云鉤者馬頷下有金鉤以懸樊纓金路之飾上公同姓者也申伯以元舅為侯伯特賜以寵之膺馬當胸也樊纓九就懸當馬胸故曰膺王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保路車象路也所以封異姓諸侯者乘馬即上章所云四牡也上言馬未及車此合車馬言之鄭云圭長尺二寸謂之介非諸侯之圭故以為寶諸侯之圭自九寸而下考工記鎮圭尺有二寸天子守之典瑞職云珍圭以徵守以恤凶荒杜子春云珍當作鎮介此詩錫介圭之意王命申伯鎮撫南土使之執圭而往如王自行也介圭王之守器申伯執此即王之威靈在焉當加寶重不敢褻也愚按我圖爾居二句有人地相宜之義此非為申伯圖乃為王室圖也往近王舅二句此諭圭之詞本王之守器也今以錫王舅如王親行矣其與舅近猶與王近也敬之哉保兹南土諭圭即所以諭申伯也申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行邁説文云逺行也信邁猶云果行也水一統志云古郿城在今鳳翔府郿縣北十五里渭之北嚴氏云即董卓所築郿塢也伯還言復之鎬京南指謝也故誠歸言始成行也申改封于謝則謝是其本國以往為歸之語多倒鄭云謝于誠歸誠于謝也王孔云古人嚴氏云申伯志存王室宣恩隆元舅人疑其未必往謝故言信邁誠歸喜其果然成行也王命召伯是重復追述之辭言自王命召伯徹土田之時而已預峙其粻以供委積之用也峙本作偫按漢書張忠為孫寶設儲偫物以待需索粻食米也命式遄其行謂自京至國在道所需皆預備無有缺乏故得疾至也愚按輿地圖岐周東為郿又東為鎬其地相近王命申伯出牧遷謝必册命于廟祭統云賜爵必于太廟召誥王朝步自周則至于豐注謂文王之廟在豐然則命諸侯必至豐告廟于周受命亦豐廟也告廟畢而送之由鎬而往謝故飲餞于郿也申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲番通作皤説文云老人白也觀秦誓番番良士與仡仡勇夫對言則其為髙年之狀可知徒御指車徒之行入謝也嘽嘽安舒言得禮也禮入國不馳人周邦咸喜者京師人民聚觀而喜也戎猶女也周喜而互相謂之辭其言申伯在王朝則王朝重在南土則王朝益重以外保南土而內之王朝愈安故曰良翰與首章維周之翰相應愚按宣王封申伯而合乎人心如此以其為人望不以外戚也不顯三句吉甫推咸喜之意而誇美之雖曰王之元舅實因其有文武全才足以表率南國故周邦咸喜而恃之為良翰也申伯之德柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯此章承上文武是憲來惟有柔惠之德故能文惟有直之德故能武加一且字見其兼濟之妙揉説文云屈伸木也顔師古云揉謂矯而正之也蓋柔曲而使之直耳萬邦即四國舉其多而言曰萬邦就其方而言曰四國之按揉者強者治以剛弱者撫以柔之謂此即文武道也此追稱申伯在王朝時而言故云萬邦四國若往謝則惟式是南邦耳不得泛及萬邦也愚按誦者工師誦之以為樂曲王朝有詩必領諸樂官被之弦誦非如尋常士大夫之徒吟咏也其詩孔碩言其所陳者皆王朝之盛典中興之大政也凡聲之足以感人者曰風其風肆好謂其詩之辭縱而意洽蓋吉甫亦自得意于所作也申伯之行天子所以寵錫之至矣朋友之義無以為贈唯應贈之以言此即後世餞行賦詩之首唱矣時從子光夔曰此雅詩也而曰其風何也詩言志當豈按風雅之體而作詩者乎嵩髙八章章八句郝氏云申伯以王元舅褒封晉錫可謂厚矣未幾以幽王見黜率犬戎殺幽王而滅宗周申為戎首焉易曰匪寇婚媾反復手之間而已父子相繼宣興幽滅可不畏哉竹書紀王錫申伯命在宣王七年人紀四十一年王師敗于申則申人之逆王命已在宣王之季矣愚按申伯是時已稱番番距王師之敗相去三十餘年則逆命者必非王舅申伯矣蒸民序曰尹吉甫美宣王也任賢使能周室中興焉嵩髙蒸民二篇皆尹吉甫贈行之詩序以為美宣王蓋人君委任得人而僚友之間賦詩以相娛樂則人君之美莫大焉送朱注宣王命樊侯仲山甫城于齊而尹吉甫作詩之據竹書事在宣王七年樊一名陽樊晉語王賜晉文公陽樊之田陽人不服公圍之倉葛呼曰陽有夏商之嗣典有周室之師樊仲之官守焉按仲即山甫也仲山甫卒諡穆周語亦稱樊穆天生蒸民有物有則民之秉彝好是懿德天監有周昭假于下保兹天子生仲山甫朱注賦也毛傳缺盈蒸衆也物事也則法也彝常也懿美也真氏云天地之間莫非物也人亦物也事亦物也有此物則具此理是所謂則也性自其人人所同更無改易而言謂之彝即書言恆是也假格同謂天視有周昭明降格于下保此中興之天子乃生仲山甫以佐之凡宣王所以能全其性而無失其常者皆仲山甫之功也愚按秉彝凡民所同懿德山甫所獨下文所謂民鮮克舉之維仲山甫舉之也物各有則惟仲山甫合其則故能豫君以則後章柔嘉維則是山甫之自合其則也衮職有闕仲山甫補之是山甫之能豫君以則也仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦嘉美也則即物則之則言柔之嘉處乃其則也柔非其則即不得為嘉輔廣云令儀令色柔嘉之發于外也小心翼翼柔嘉之存于內也也古訓先王之遺典也式法也法古訓遜志典學是嚴氏云令儀令色則動容周旋中禮矣猶曰威儀是力何也有德固威儀之所自形而謹其威儀亦所以檢攝而養其德也也若順也賦布也順者坤道也臣道也事君盡禮順有犯無隱亦順也捋順匡救皆所謂止于敬耳行如綸如綍曰命喻德宣譽曰賦書曰令出惟不惟反令出而必求其行即賦之説矣王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發前章備舉仲山甫之德此言其所居之職毛鄭以為冢宰是也自式是百辟以下至王之喉舌皆命辭纘戎祖者意必其祖曽居冢宰之職書言惟周公位冢宰正百官唐權德輿謂山甫是魯獻公仲子則周公是其祖矣大朱注王躬是保所謂保其身體者也蓋以冢宰兼保與喉舌言之所從出曰王之喉舌則是膺代言之任甫曹襄云出納王命即是喉舌之司吕氏云仲山之職外則總領諸侯內則輔養君德入則典司政本出則經營四方發猶起也朱注發發而應之也愚按發如發蒙之發四方向承厲王昏亂之餘弊政因循相習不寤今得覩王之明命新政初頒積錮為之頓開也肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪懈以事一人嚴氏云此章承上章賦政之事將者奉行之義即所謂賦政於外也若順也否者不可之意上章所謂出納王命也一命之出如何而邦國順如何而邦國不順山甫具明其理順者詔王出之否則納之朱子云揚子雲謂明哲煌煌旁燭無疆遜于不虞以保天命便是占便宜底話他一生只被這幾句話誤明哲只是依本分行去無一事不當理即是保身之道今人看私了必至于孔光之徒而後已愚按山甫之保身非為身計所以事一人也身保則可以長在其位而事一人夙夜匪懈蓋以其身為一人之身也人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏強禦以人言起者見恆情如此而山甫不然正其異于凡民處茹者吞啖之名孔云不侮不畏即是不茹不吐既言其喻又言其實以充之義何氏云見仲山甫所以佐王出政者寬猛相濟仁並用各有當然之則澤所必加不靳于弱小故無不懷其德勢所必行不詘于強大故無不畏其力四方爰發有以也夫與蘇氏云詩言仲山甫始曰柔嘉維則令儀令色此漢胡廣趙成何異繼曰柔亦不茹剛亦不吐不侮矜寡不畏強禦此與漢汲黯朱雲何異胡趙柔而陷于佞汲朱剛而近于狂如仲山甫內剛外柔非佞非狂然後可以為王者之佐當天下之事矣人亦有言德輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之輶輕也輶者輕車之名故爾雅訓為輕故鄧元錫云懿德之則如毛然微乎微者也入微難蒸民具有之而鮮其舉之事我吉甫自我也度儀宜也甫圖猶度也言我嘗于物之間以所宜之見山無不合者故知德之微處惟山甫為能舉之衮職者不敢斥王之言也左傳晉士會諫靈公曰詩云衮職有缺仲山甫補之能補過也君能補過衮不廢矣季氏云言此以起下章欲其遄歸之意愚按惟山甫有是德故王朝內外之任非山甫不可我雖惜其勞而無其德不能有以助之也言外見山甫一日不可離左右東方之事不宜以勞其出也上文愛莫助之隱然是已無山甫之德不能分任其勞耳仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方鄭云祖者將行祀軷之祭也言業業健貌捷捷疾貌行者或苦于役則舉動遲緩捷捷以見其勸樂于事皆每懷靡及言不獨山甫懷如不及事之慮維征夫然蓋山甫之急公所感也毛云東方齊也古者諸侯之居逼隘則王者遷其邑而定其居蓋去薄姑而遷于臨淄也史記齊世家獻公元年徙薄姑都治臨淄計獻公當夷王之世與此傳不合歟朱注豈徙于夷王之時至是而始備其城郭之守按齊世家太公封營丘至五世胡公徙都薄姑子獻公徙治臨淄皆在青州林氏云宣王時北有玁狁南有荆楚東有徐夷故式是南邦以申伯城彼東方以仲山甫奄受北國以韓侯其為謀甚悉而犬戎自西作焉夫四隅而防其三其變即出於不備之方况一不為備乎四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心彭彭言其盛騤騤狀其容鏘鏘咏其和喈喈識其衆皆紀其出行在道之事式遄其歸吉甫告王之辭所以安山甫之心也甫遄疾也言周之望仲山也愚按吉甫二頌皆承王命作之以寵兩人之行而被之樂曲工師得以朝夕弦誦于王前也清風者其風甚微感人于不覺也穆如清風言其意思深逺可以意感而不可以言宣惟山甫自知之按誦者質言之也風諷也意在言外嵩髙誦王寵命而以諷申伯毋忘王之寵命也此篇誦山甫以諷王謂山甫宜在王側不宜有城齊之命故皆為風蒸民八章章八句郝氏謂吉甫作詩以備獻納非僚友送行私情也周衰諸侯強僭繼世不由天子裂封啓土悉自已出齊逺在東隅區區境內之城郭必以上請則宣王中興之烈足以震疊之也夫子刪詩存蒸民春秋之義也愚按文王城朔方必以南仲宣王營申謝必用召伯而城東方特命山甫蓋以其城所關係于王國者甚重非親信之大臣不任使也王命山甫本非出之于外山甫亦非重內而輕外者比也惟吉甫以王躬為國本望其在朝朝夕納誨不欲久違王之左右所以慰山甫即所以諷王也韓奕序曰尹吉甫美宣王也能錫命諸侯鄭云韓姬姓之國也後為晉所滅始左傳邘晉應韓武之穆也送朱注韓侯初立來朝受王命而歸詩人作此以之策郝氏云古者嗣君在喪稱子喪畢以士服見王王命錫車服歸始為諸侯宣王中興韓侯初立來朝尹吉甫作此詩序不本其事者詩言入覲王命纘考則繼世也言鞹鞃淺幭則喪畢也禮喪畢鹿淺􅍜革飾詩具故序不贅公又云春秋戰國時如平王命晉文侯惠王命齊桓襄王命晉文公顯王命秦孝公此四王者孱王也有所要挾不得不命非自天子出也如宣王之命韓侯能命亦能討能豫亦能奪然後謂之王命有南征北伐平淮會雒之功然後有封申錫韓之命也而併及其娶妻者天子有道諸侯秉禮親喪畢入覲歸而後議婚與春秋諸侯在喪親迎者相去逺矣奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪懈虔共爾位朕命不易幹不庭方以佐戎辟朱注賦也毛傳缺地季氏云奕奕大而疊也太梁山在韓城縣東南其臨河上當龍門之南非王遷岐所踰之梁山也梁按龍門在韓城縣北近黃河禹所鑿者龍門不鑿山以北不可田也甸治田出穀稅也地倬明貌夏韓在晉為少梁邑秦晉戰于韓原即此秦更名陽孔云韓是武王之子其封當在成王之時受命受繼世而為諸侯之命也王親命之將命之為侯伯也纘戎祖考七句王命之詞也觀末章云以先祖受命見其先世常為州牧矣無廢朕命即纘戎祖考之命也不易者仍使為州牧也不庭方謂不來朝貢之國女鄭云有不庭之方作楨幹而正之以佐助君女君王自謂也四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟茀錯衡玄衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄此述韓侯入覲之事諸侯秋見天子日覲修長也張大也皆指四牡伯介鎮圭也申侯奉王命為而有介圭之錫韓侯繼祖考為伯其先世亦必有介圭之錫入覲執之以合瑞于王也兩言入覲者上入覲承四牡言志入覲之所秉也下入覲承介圭言志入覲之所執也淑善也交龍曰旗巾車職云大旗以封同姓大赤以封異姓大曰以封四衛大麾以封蕃國李念兹云旗畫交龍龍東方之物其色青東方之氣曰淑則淑固青色也韓姬姓大旗正封同姓所用綏通作緌朱注綏章染鳥羽或旄牛尾為之注于旗竿之上為表章者也以陳祥道云衛夫人之車以翟茀齊襄公方叔之車簟茀此男女車蔽之别也所以為文錯説文云金塗也車厄曰衡塗金于軛凡冕服皆玄衣纁裳赤舄冕服之舄也上公九命得服衮冕故屨赤舄與王同也馬鉤膺樊纓也用金為鉤以拘之朱注鏤刻金也眉上飾曰錫今當盧也也莊周言齊之月題月題其象也車鞹革也鞃軾中以去毛之皮施于軾之中央持使牢固也淺淺虎皮淺毛也幭覆軾也禮記作幦周禮作幎以毛之皮覆軾曰淺幭按獸之淺毛者惟虎耳作扼鞗馬轡也革轡首之垂者厄通鄭云以金為小環往往纒扼之韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炮鱉鮮魚其蓛維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥鄭云祖將去而祀軷也屠屠地名或謂即杜也按屠杜同音晉有杜蒯通作蒯杜在鎬南韓侯返國不宜出此意必與蹶里相近覲事既畢將便道往行親迎之禮故出宿于彼顯父周之卿士凡行祖畢而後餞之餞畢乃出宿今言餞于出宿之後蓋先記韓侯所擬宿之處為下章張本而顯父之餞仍當在國門外也當是王使顯父餞之下文路車乘馬明其贈之出于王也謝氏云申伯之行王親餞之韓侯之行王使顯父餞之禮有差等也申伯以王舅故有優異耳鄭云炮鱉以火熟之也鮮魚中膾者也殽通作肴白朱注䔩菜殽也蒲蒲蒻也且多貌按蒻蒲下入泥處今俗呼蒲白筍竹萌也覲禮稱諸侯為侯氏賈公彥云言諸侯則凡之總稱言侯氏則指一身不凡之也胥疏同音爾雅訓皆公羊訓相燕胥言韓侯興顯父通相燕樂榮君寵也韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門此章言韓侯覲事畢而行娶妻親迎之禮因汾王厲王也厲王流于彘彘在汾水之上故時人以號之猶言莒郊公黎比公也叔按晉侯居翼謂之翼侯晉人納之鄂謂之鄂侯鄭段出奔共謂之共叔皆是類也舅汾王之甥指蹶父也爾雅云妻之父為外舅謂我者吾謂之甥郭璞云呼壻為甥孟子曰帝館甥于二室是也妹爾雅姑之子為甥舅之子為甥妻之晜弟為甥姊之夫為甥郭璞謂四人敵體更相為甥姊鄭云姊妹之子為甥似以韓姞當之爾雅男子謂妹之子為出未有以甥名者若外孫則稱彌甥不單名甥左傳以肥之得備彌甥是也到孔云蹶父書字不書國爵則非諸侯下言靡國不則是為聘使之人故知卿士也迎蹶父為周卿士意其采邑在畿內去王城不逺親迎也毛云諸侯一娶九女二國媵之為郝氏云諸侯娶一國之女同姓二國媵之所娶者嫡二國為媵嫡有娣有姪媵亦有娣有姪合為九女也故曰諸娣愚按蹶父為汾王之甥甥壻也則蹶父之子王姊妹之所出也詳序之以見韓侯之為國戚蓋王欲以是寵固之也蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽此章追述蹶父初為女擇韓之事視言蹶父武健故能為王聘使無國不到鄭云相也攸所也相攸謂為女擇使得所也孫姞是蹶父之姓左傳鄭石癸曰吾聞姬姞偶其子必蕃姞吉人也后稷之元妃也亦作吉都人士篇所謂尹吉是也樂孔云婦人稱姓今以姓配夫之國謂之韓姞孔韓土深美之詞川澤二句連讀以水産言麀鹿三句以陸産言訏訏甫甫大也噳噳衆也羆熊類羆雌而熊雄熊為羆之雄而稱熊猶羖為羭之羖兕為犀之牸而稱兕蓋相類為牝牡猶麋與鹿交鰌與魚遊也貓似虎淺毛者也爾雅虎竊毛謂之虦貓注云竊淺也韓季氏云魴鱮麀鹿可以供食熊羆貓虎可以供裘地物産之富如此故為樂土也也慶喜也令善也喜其已得此善居也燕安也譽樂謂韓姞之心當亦安樂而稱其得所也慶令居就相攸言燕譽則預度其後日而言愚按韓多山而亦近河故有川澤魴鱮之句溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黃羆此章當序諸次章之後三章之前因前敘事成文故置之至此則韓侯親迎禮畢且歸國矣重誦之以致其丁寧之意此詩人行文法也公朱注溥大也燕召公之國也師衆也韓初封時召為司空王命以其衆為築此城如召伯營謝山甫城齊之類也一毛云韓之先祖武王之子也受命孔云受命為州侯伯也以下文奄受北國因以其伯觀之則為北國諸侯之伯也蠻夷皆可通稱北稱蠻猶西稱夷史記胸奴傳居于北蠻是也王孔云本立侯伯主治州內因主外夷故曰因也錫韓侯以今兹言也前章錫以物此錫以命其追以下命之詞北毛云追貊更逺于百蠻今併使轄之所以盡覆此國也郝氏云墉壑所部諸國城池也畝田畝籍版籍所部諸國田賦也獻諸國所常貢之物毛云追貊之國來貢侯伯總領之也豹取赤羆取黃當是各取其美亦如裘之重狐白孔云貔皮言獻則豹羆亦獻獻貔言皮則豹羆亦獻皮也愚按宣王命召伯營謝以經略南方命山甫城齊以鎮撫東國此命韓侯為北國伯所以備玁狁也重其事權使百蠻追貊悉受總轄蓋欲聨絡北方之戎蠻皆為我用耳于是玁狁內侵不能久駐無為之間導者而我得以預設備也宣王制北狄之大計在此其韓先祖受命統治百蠻今使繼其任故曰因時因舊也而復錫之命使兼有追貊凡北方之國皆在所轄矣因所轄之地以為之伯蓋比韓先祖昔受之命更廣矣韓奕六章章十二句據竹書宣王四年命蹶父如韓鄒氏云韓為武穆與晉同祖均屬望國諸侯之向背係焉而又密邇北國為一方屏翰命蹶父如韓良有以也蹶父因是以締姻而韓侯來朝猶用繼世稟命之禮王因命之纘舊服受北國為伯愚按王命蹶父如韓則蹶父之與韓締姻亦王命之以固結之也王急欲得韓以韓為北方之障然後專事東南無復北顧之憂是以一伯收百蠻之國以九錫紓六師之勞也中興方略亦可覩矣故此章後即繼以江漢常武江漢序曰尹吉甫美宣王也能興衰撥亂命召公平淮夷嚴氏云周興西北岐豐去江漢最逺故淮夷最難服成王初年淮夷同三監以叛其後又同奄以叛伯禽就封又同徐戎以叛至厲王之時四夷交侵宣王一命吉甫北方旋定繼命方叔伐蠻荆其後又命召公平淮南之夷命皇父平淮北之夷南方之役至再至三必東土平然後西京安此江漢常武所以為宣王之終事而係之大雅之末也首劉汝楨云宣王淮上之役武功告成也六月北伐事四夷采芑之南征次之荆蠻既平乃伐淮夷故常武江漢二篇一是自將伐徐一是命將伐淮二師當一時並發王則將本朝之六師而穆公則徵兵江漢以行也據竹書事在宣王七年江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪朱注賦也毛傳缺本季氏云召公代淮夷必自江漢順流而下故所征江淮之地而併漢言之也古者畿兵不出所以重內調兵諸侯各從其方之便武王伐商實用西土至于征徐以魯平淮夷以江漢滔滔順流貌王氏云以其衆逝也頌孔云淮夷在東國召公伐淮夷當在淮水之南魯所伐淮夷應在淮水之北當淮之南北皆有夷也後漢書云殷武乙衰東夷浸盛遂分遷淮岱薦居中土求索也左傳曰率師以來惟敵是求是也曰陳少南曰江漢常武二篇同言淮夷以地里考之江漢之滸是淮南之夷也若在淮北則江漢非由入之路曰率彼淮浦省此徐土是淮北之夷若在淮南則徐土非接壤之地緩舒通作紓説文云緩也言武夫皆不敢偷安而怠競于用命也朱注鋪陳也陳師以伐之也鄭云來求據至其境故言來來鋪據至戰地故又言來江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧湯湯水流之怒如湯沸也戰洸説文云水湧貌言武夫之勇如水之涌也語曰勝之威士氣百倍鄭云召公既受命伐淮夷服之復經營四方之叛國從而伐之克勝則使傳遞告功于王孔云知非召公親告王者以下文方云于疆于理則是召公未還故知使人告也經營兼伐叛招攜二義當時江淮之間小國尚多既勝淮夷後乃次第經營之觀下章于疆于理至于南海所經營者非但淮夷而已四方近淮夷之四方也于庶幸也用兵非人主之美事不得已而興師告成王曰王國庶定庶云者幸其僅然非以是為功也愚按厲王之亂宣王匿召公之家公以子代王死與周公行政號曰共和厲王死乃共立宣王是公于周有再造之功于王有更生之德爰立之勳猶其後也王立而不聞封賞以酬之直至江漢之役式闢四方乃錫山土田加之寵命視後之因時擁戴輒徼封爵者何如耶漢丙吉絶口不言曽孫事猶少有古意耳江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海召公伐淮夷之師從江漢往仍從江漢歸故班師至江漢之滸適承王之後命諭以且無歸也虎召穆公也穆公為康公十六世孫皆式辟以下四句命之辭也淮南諸國久阻王化今入版圖猶開闢之也四方承上章召公告成有四方既平之語也徹我疆土者謂我疆域內之土地皆以徹法行之嚴氏云王者伐叛討二之後則必去其苛政平其賦斂以慰民心故急於行徹法也朱注極中之表也周禮體國經野以為民極是其義也民嚴氏云武事僅定而即行疆理賦稅之法疑于病且疑于太急王謂非疚非棘蓋什一天下之中正我周之定制欲天下皆于王國來取中焉耳盡疆界為疆分地理為理南束其畝所謂理也蓋疆理為僭竊破壞今盡反其舊耳愚按是時荆蠻淮夷俱平故奉行徹法得至于南海也王命召虎來旬來宣文武受命召公維翰無曰豫小子召公是似肇敏戎公用錫爾祉旬遍也宣布也來勤也于孔云上章經營四方告成于王又言于疆于理至南海召虎大功在此二事今王命召虎稱敘其功則來旬來宣當指此二事也自來旬來宣以下至自召祖命皆册命之文召公召康公奭也穆公之祖豫朱注謂昔文武受命惟召公為楨幹今女無曰以小子之故也但自為嗣女召公之事耳豫小子王自稱也當毛云似嗣也作肇始也説文云始開也敏疾也公依後漢書通功説文云以勞定國也也用錫汝福即下章所陳是愚按此四句蓋謙言已德不足以比文武而惟冀召公嗣康公也無曰豫小子二句猶云豫小子不足道惟爾克似其祖耳釐爾圭瓚秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年孔云上言用錫爾祉此言錫之之事瓚釐賜也釋文云釐音賚周書用賚爾秬鬯一卣者祭時酌鬯以獻尸之器其柄以圭為之秬鬯釀秬為酒和以鬱金合一物而成主秬言謂之鬯主鬱言謂之鬱鬯皆按春官鬱人和鬱鬯以實彝而陳之詩及尚書左傳云秬鬯一卣當祭之時乃在彝未祭則在卣賜時末祭故卣盛之王毛云文人文德之人朱注先祖之有文德者謂文也方授云成王世著作皆出于周召二公周公諡文則召公固亦有文人之目此即命穆公告其祖康公也方爰發云告于文人後世所謂宣付史館也傳孔云召本岐山之陽采地之名且為畿內之國書無召穆出封之文則益之土田大于故耳未成為大國也于羅泌云錫之山川土田附庸錫魯公也錫山土田周受命錫召虎也無益地哉今周岐周也康公昔在岐周事文武有功而受采地虎嗣其烈故往岐周賜命祭統云必賜爵祿于太廟示不敢專也康謝氏云錫山川土田必使受賜于岐周用文武封公之禮以待之明賞非宣王之賞如稟命于乃祖文武也功非召虎之功如受教于乃祖康公也鄭云拜稽首者受王命策書也臣受恩無可以報謝但言使君壽考而已虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文德洽此四國對答也揚稱也休美也考成也也對揚二句自勉之詞也天子萬壽以下勉王之辭對揚王休即書説命篇所謂敢對揚天子之休命也忝王之命虎也曰召公是似曰自召祖命亦欲其無厥祖耳自今以往當益戮力王室為我祖召公成其終也王嚴氏云宣王方以武功褒虎而虎乃以文德勉宣蓋不矜已之功而納君于德意度逺矣廟朱注穆公既受賜遂答稱天子之休命作康公之器而勒王策命之辭以考其成且祝天子以萬壽也愚按周家歷世文德至武王以武定天下甫定而即偃武修文蓋天下非武功不能定非文德不能洽也以文德祝望王者猶是尊祖德也王以召祖勉虎虎亦以文武望王耳江漢六章章八句朱子謂宣王命召公平淮南之夷詩人美之鄒氏云江漢明言伐淮夷常武明言征徐國曰淮夷則淮南淮北兼舉之矣常武所云淮浦淮濆指所經歷及駐師之地未嘗指淮夷也後郝氏云成王初立周公東征三年滅國五十而徐淮定伯禽封土亦為東土重也宣王中興既命召虎經營復勤六師親討東征之兵殆與周相始終也常武序曰召穆公美宣王也有常德以立武事因以為戒然竹書宣王六年召穆公帥師伐淮夷王帥師伐徐戎皇父休父從王伐徐戎次于淮王歸自伐徐錫召穆公命自即位至此已五用兵矣按徐自伯禽時已與淮夷相倚為患費誓曰徂兹淮夷徐戎並興穆王時徐夷僭號率九夷以伐宗周淮徐為患為日久矣宣王一則遣召虎一則親督六師緣淮徐互相聲援犄而角我故分道出師以破散其勢且防其侵軼耳郝氏云召公謂惟德可懷逺天子躬擐甲胄逺問荒裔不可為常故詩美其事以常武名篇虞人之針曰武不可重用不恢于夏家常武之謂也卒也西周之禍不在淮夷近在西戎乃見詩人獻替之忠愚按宣王即位凡五出師其他皆命將獨此為親征也王親御戎行目見成功之易將必以武略自喜而輕于言兵故召公以常武名篇明武不可常也王後果以為常黷武不已卒至有千畝之敗召公見之早矣王業之衰由此一勝也故以常武終宣王之武功焉赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒惠此南國朱注賦也毛傳缺總夷厲以來威靈不振天下幾不知有王矣宣王親六師真如雷霆乍驚日月重朗故曰赫赫明明皇王命宣王親命也以皇父為大將故親命之卿士父所居之職也鄭云南仲文王時武臣也以南仲為大祖者今大師皇父是也命將必本其祖者因有世官于是尤顯大師者公兼官也蘇氏云南仲文王之所使伐玁狁者也蓋稱其世功以褒美之王應麟曰召公是似南仲大祖皆世濟其美也然逵有充超叛鑒蘇文忠慨焉或附曹羣忘漢朱文公悕焉謝氏云宣王命將多取之世臣蓋文事武備素講於家庭定亂持危常在其念慮一日用之必老成持重不以輕易誤國事也周官自冢宰而下謂之六卿大師而下謂之三公既曰王命卿士又曰大師皇父周家不特設三公皆兼職而已如周公以冢宰兼大師也仍整齊也言六師知是天子親行孔云王既親行須命元帥以統領六軍如左傳鄢陵之戰楚王雖自親行仍命子反將中軍是也修通作修説文云飭也戎兵也整齊六師具其人數以待搜軍實而講武皆修戎之事言將欲行天討也敬者居如守行如戰也戒者臨事而懼不敢輕敵也王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒毛云尹氏掌命卿士史朱注吉甫也吉甫卿士而掌策命蓋為卿而兼內也皇父三公故王親命之休父六卿故策命之氏韋昭云程國伯爵休父名也楚語觀射父云重黎世敘天地而别其分主者也其在周程伯休父其後也當宣王時失其官守而為司馬氏按司馬遷敘傳自述為休父之後則休父之為司馬明矣王郡國志云雒陽有上程聚古程伯休父之國也文居程故此加為上程朱注上章既命皇父此章又命休父者蓋王親命大師以三公治軍事而使內史命司馬以六卿副之耳左右陳行四句命休父之辭也也左右陳行鄭云使其左右陳列而敕戒之率循省視也省兼叛而伐之服而舍之二義即一統志云今泗州古徐子國徐大而淮夷小淮夷徐州之夷而服屬于徐者留爾雅云久也處説文云止也夫三事指六卿十月篇擇三冇事雨無正篇三事大是也言此行也王師所臨有征無戰天子必不久居于外爾三事諸臣為王居守當各治職事毋曠厥官以待王之歸可也愚按淮徐倡亂每每並興為犄角之勢師由淮浦以進則淮自顧之不暇而徐失所恃秪成孤窮之虜耳此王猶允塞之一端也各王師之出其軍需人役器械等事六卿皆有職掌行飭辦事事就緒然後師到成功不致稽延久居于外此王謂尹氏命三事之詞赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚承上章言大將有皇父副將有休父居守有三事王乃可以出而親征矣嚴説文云教命急也舒通作紓説文云緩也保安也言王師舒徐而安行也之王氏云江漢曰匪安匪舒此曰王舒保作彼武夫事此王者之事也承紹糾緊也遊有逍遙散誔之意紹字承嚴字遊字舒字匪紹匪遊言其嚴與舒皆適宜也愚按積弱之後東土不覩王師之出久矣一旦六飛親駕威靈氣象先已奪反者之心首章曰赫赫明明此曰赫赫業業皆自見者之震動而言築嚴紀律森嚴也几駐軍之地先營壁壘作者即興之人保則其守者也左傳鞍之戰齊侯見保者曰勉之齊師敗矣是猶勉其守也舒與嚴對嚴則軍將聽命舒則工役多壁壘固而守禦備也為繹騷謂騷擾不絶徐聞王師之出徵兵防禦一方之騷動而不虞師之猝自淮浦至也震驚者謂出其不意也已知為天子親征如雷奮霆擊天威所臨喪膽褫魄矣上言震驚徐方言王師出徐之不意以震驚之也下言徐方震驚則徐人聞王親征莫知為計而舉國震驚也王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所奮説文云翬也謂如鳥鼓翅而疾起也而震怒只一意如者自詩人窺測之詞朱注進鼓進之也闞奮怒之貌虓虎之自怒者也鋪布也布其師旅也敦厚也厚集其陳也仍就也鄭云敦當作屯濆水崖蓋阻淮水之崖以為陳也囚孫臨云仍與頻同蓋虎臣更番迭出頻執其衆而係之截説文云斷也即今所謂堵截蓋師據形勝截斷淮浦以立營一以絶淮徐之聲援一以防徐戎之奔逸坐守待斃徐人所以服也愚按宣王興師未有伐徐之震怒者當穆王時徐夷僭號率九夷以伐宗周西至河上穆王畏其方熾乃分東方諸侯命徐偃王主之厲王時淮夷侵雒王命虢公長父伐之不克及是尚倔強東方不服王化則徐淮蓋久叛而國讐宣王北伐玁狁南平蠻荆四方既定乃始出全力以攻此一隅期必蕩平而後已天兵已集而猶負固抗師故臨戰而王震怒如此不然以兹小醜何至屈萬乘之尊躬夷荒之逺命將諄諄方略周備蓋將為一勞永逸之計也所淮浦之截必堅壁深壘為持久之計故曰王師之言不敢犯也上章所謂保作者其在此乎王旅嘽嘽如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征徐國嚴氏云此章述移師征徐也軍鄭云嘽嘽間暇有餘之貌此言其移師在道之容如飛如翰只是一意言其兵不留行如鳥之飛而迅疾如羽之有翰翰羽尖也愚按必江漢之師已壓淮境而後王始移師逼徐飛翰狀士氣之奮揚江漢狀軍聲之浩汗如山之苞靜則不可撼如川之流動則不可禦也綿綿無間可伺也翼翼左右相救也不測其變化不可測也不克為不可克者以待敵也征而日濯所期一戰定徐洗滌汚染與之更新也王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸徐光啓云凡平日所為興衰撥亂安內攘外經營于廟堂敷布于海隅者皆王猶也蓋以此致徐方之來非一時兵威能使之然從孔云既同與他國同服于王也應即徐夷素所脅之國今皆率之以來則徐方無梗化者矣褒朱注江漢篇召公帥師以出歸告成功故備載其賞之辭此篇王實親行故于卒章反復其辭以歸功於天子來宣王征伐四方皆已平定獨徐方未服及今而始庭以其平獨在四方之後也反回轉也徐方中心誠服不復回轉所謂南人不復矣徐服則天下從此晏安不須用武王曰還歸不黷武也愚按猶謀也塞有充塞之義言王之謀猶處處周到無有罅漏信哉大猷之充塞也常武六章章八句朱注謂宣王自將以伐淮北之夷鄒氏云淮浦淮濆指王師所經歷之地非指淮夷也愚按淮以北即徐戎矣徐淮連界其曰徐方既同則兼徐淮而言耳瞻卬序曰凡伯刺幽王大壞也按凡伯作板詩在厲王末年歷共和攝政十二年宣王在位四十六年至幽王三年嬖褒姒八年立伯服九年王室始騷中間相距六十餘年此詩之作在幽王時計凡伯之年當為八九十嵗矣老成憂國不避禍怨故序于此詩及召旻皆以為此大壤也合正月小旻四詩疑皆為凡伯所作以詩中語意多互為出入也瞻卬昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷屆罪罟不收靡有夷瘳朱注賦也毛傳缺昊朱注此刺幽王嬖褒姒任小人以致亂之詩首言天不惠而降亂無所歸咎之詞也氏填説文云塞也謂虐政處處填塞無有寧處至郝云填顛同危也食苗根者曰蟊賊賊自外故桑柔之詩刺厲王用小人亦曰降此蟊賊指皇父石父之輩蟊疾言蟊之為苗疾疾自內生則指褒姒也孔夷平也屇極也謂無有平息止極之時此正上文填不寧之實罪罟孔云謂多立科條使人易犯若設網以待鳥獸故謂之罟愚按凡惡疾惡鬼皆曰厲即指蟊賊蟊疾所謂婦寺者是也蟊賊蟊􅔂之輩張罟不收使犯者日見其犯前痏未愈新創又加則寧有平復小愈之日乎人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆説之此章言罪罟之設蓋以刑罰為陷穽因而奪取所有所以成其為蟊賊也土田人民諸侯卿大夫所有無罪有罪兼士民而言彼淫刑以逞惟賄是求于諸侯卿大夫已如此矣又何有于士民乎宜其刑宥之顛倒也怪反者對正之稱凡事之不當然而然者則謂之反之之辭也覆猶反也董仲舒云周室之衰其卿大夫緩于義而急于利亡推讓之風而有爭田之訟則土田之為他人有者多矣正月之詩曰民之無辜併其臣僕則民人之為他人奪者多矣貪説赦也説文云解脫也周昌年云取非其有其之本謀也出入人罪正所以行其貪重在收無罪上言説有罪正以見其獨及無辜之人耳愚按有罪何以得説必有所以説之無罪之收其意亦欲使求有以説耳此極言其貪哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺哲智也則鄭云謂多謀慮也才歐陽子云士多才智為謀慮能興人之國婦有智于外事則傾敗人之國羅二句泛論古今成案懿厥哲婦厥字方指褒姒氏云梟穴土以居故曰土梟羽翼既成食母而飛梟鴟怪鴟即鵂鶹也亦名鴟鵂與鴟梟不同彼但名以其為鴟屬故謂之鴟梟耳莊子所謂鴟鵂夜撮蚤察毫米畫出瞋目而不見丘山者是也以曹居貞云階自下而上以漸而升何氏云向者降此大厲歸咎于天其實致厲固有階天不任過也導寺奄人也婦與寺常相倚為姦朝夕親近人主非君于邪則逢君之惡豈有教誨之義納忠之心哉二句泛論古今之為婦寺者以明聽信之之必致亂也愚按十月篇目為艷妻此稱哲婦婦人惑君心以艷亂國家必以哲艷而且哲毒莫大矣此如梟鴟所止人共惡之以為不祥而王方以之為美美其哲也豈知哲所以為梟鴟乎飛耳長目用人之耳目以為耳目故目曰長則長舌者亦合小人之舌而出于其舌故長也首章降此大厲本指褒姒而姒所以能為厲者則舌為之階正月之詩曰赫赫宗周褒姒滅之由此舌也婦寺隂性毒鷙意之所極不可勸止匪教匪誨猶云不可教誨也鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其蠶織鞫窮也變説文云窮理罪人也蓋以言窮之也信忮害也忒也謂其心忮害而變詐無常譖不也竟終也慝惡也譖人于始而終背其實當其譖時豈曰不已甚乎終既不驗亦怡然不以為慝也居貨曰賈蓋坐賣以待售者物相二曰倍三倍獲利之多也公事朝廷之事也愚按此章蓋言內外交通興獄鬻獄以圖利之事也所用鞫獄之人非極其忮忒則不足以羅織無罪為有罪而奪人之土田人民譖誣告也意其時必興大獄如後之所為告密者其始也受譖以致于獄其竟也納賄而反其辭極者言其始鍛鍊之酷也既極之而知告者之誣斯説之可矣乃因之以作慝慝者曖昧之陰私也蓋以獄為市耳如賈三倍言其鞫獄一次即如行賈一次以志在獲利而已三倍利之厚者也君子指在位者言今在位互相講求惟此是識也婦無公事此不指褒姒蓋一時權門外戚之婦媪內外交通而與聞朝廷刑賞之事皆舍其蠶織以為此蓋賄以成風也天何以刺何神不富舍爾介狄維豫胥忌不弔不祥威儀不類人之云亡邦國殄瘁毛云刺責也富福也神鄭云王之為政既無過惡天何以責王見變異乎何以不福王而有災害也朱注凡以王信用婦人之故也是必將有夷狄之大患今王舍之不忌而反以我之正言不諱為忌何哉人弔恤也謂遇災變而不恤也不類猶云不似也至泛指朝中之賢臣朝無人則任羣小之毒亂不邦國殄滅憔悴不止也愚按天以況王神以況諸用事之姦言此輩網稍為慝無不富者而刺則専歸于王也國語火伯云申繒西戌方強王室方騷將以縱欲不亦難乎此所謂介狄也介猶擯介之介猶云介之而使來也豫凡伯自謂也是時凡伯年近百旬以先朝耆舊故敢直言犯諫小人所共忌者惟此老耳與凡伯共事之人凋喪已盡無復有同心者人之云亡傷己之孤立無與也天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣罔即首章所言罪罟也罪罟本小人所張而民日罹其毒無可奈何而謂天實降之以禍此民也優多也言犯之者多也幾殆也言民之犯罪者殆將盡矣此章蓋于民之陷罔而益重人亡之痛也憂者憂其不知何底止也悲者悲邦國之殄瘁而將亡也愚按此章所以足上文人亡之嗟天之降罔吾人無所于逃而我猶不即死者維其優矣優者寬其期也維其幾矣幾者期已近也然我所憂所悲者不在已將死之日而在人之云亡也其人如存猶庶幾可以回天意而保邦國乎觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後觱水噴出之貌沸説文云水騰涌也檻通作濫汜也水泉從下上出者曰檻泉鄭云檻泉涌出所由者深喻已憂所從來久也女徐光啓云蓋自褒人進女之時已憂之矣史蘇識戎之亂晉方成知禍水之滅火此其類也之藐逺也鞏固也此泛諭天道雖逺無不可以固之理固之在法祖而已嚴氏云往者不可諫來者猶可追所謂式救爾後也幽王大壞至此凡伯尚欲救之拳拳之忠不能自已也陸燧云通詩生自婦人是疾無忝皇祖是藥愚按王至此時復何以救意者不求太子于申以結申繒之仇而啓西戎之禍其亡猶可以緩乎則非逺蝥疾去蝥賊不能已也瞻卬七章三章章十句四章章八句朱注謂此刺幽王嬖褒姒任奄人以致亂之詩愚按篇中有時維婦寺一語特泛論婦寺之不可近耳前後文俱無言及寺人之事幽王時寺人亂政亦未有聞者豈即召旻篇所云昏椓靡共者耶此詩蓋専刺王嬖褒姒而皇父石父之輩與之朋比表裏為害也録詩者以此次于江漢常武之後有深意焉篇中哲夫成城哲婦傾城所謂哲夫指召虎仲山甫皇父休父輩而言也以諸臣經營十數年而始定以褒姒一笑滅之而有餘凡伯不幸有期頤之壽親見其興亡故言之痛切如此凡伯身歷任數世親與諸公共事王朝獨逢其敗而痛惜諸公之早亡此亦老人不早死而傷心之至情也召旻序曰凡伯刺幽王大壞旻閔也閔天下無如召公之臣也蘇氏云因其首章稱旻天卒章稱召公故謂之召旻以别小旻而已朱注此刺幽王任用小人以致飢饉侵削之詩有按瞻卬言內惑于嬖妾召旻言外嬖于小人蓋內褒姒之寵則外無召公之臣矣故曰后宫色盛則賢者隱微羣婢倡言則善類喑啞邦國殄瘁恆必由之旻天疾威天篤降喪癲我飢饉民卒流亡我居圉卒荒朱注賦也毛傳缺疾郭璞云旻愍也虞書説云仁閔覆下則稱旻天猶急也謂天以仁閔為德今急行威怒天篤降喪以下皆疾威之實篤厚也謂厚降以死喪之禍飢饉是也卒盡也居國中也圉邊陲也位季氏云以國事為已事故曰我居圉下文我邦我皆此義此章言嵗飢民散而無可訴則歸禍于天而已天降罪罟蟊賊內訌昏椓靡共潰潰回遹實靖夷我邦此章推天所以疾威之由鄭吕氏云天降罪罟所謂天之降罔也訌潰也云訌爭訟相陷人之言也亂説文云䜋也司馬法曰師多則人䜋謂以言相惑也昏通作閽椓毁隂者也鄭云昏椓皆奄人也周禮閽人職云掌守王宫門之禁謂共與供同同刑注男女不以義交者其刑宫所椓也毛云潰潰亂也謂無有紀綱坊間聽其肆為邪僻之行指蟊賊昏椓輩也而王使之治國者實以此輩大學所謂小人之使為國家也事靖治也夷平也皆定亂之愚按罪罟本蟊賊輩所設而蟊賦輩實由天降之以害國家故歸其咎于天靡共者言閽人自有職掌今不供其職而與蟊賊輩相表裏以干預政事也臯臯訿訿曽不知其玷兢兢業業孔填不寧我位孔貶毛云臯臯頑不知道訿訿窳不供事也騰左傳謂魯人之臯臯緩也訿言不肯用力勤事徒口説而已愚按臯訿輩乃用事小人所留以充高位者尸素之流也臯臯一切迂緩訿訿徒事坐談襲為大臣之度而曽不知其玷玷者玷其位也存心兢業者憂填于中無有寧日空自多憂過計固不如此輩從容有大度耳宜我位之貶也如彼嵗旱草不潰茂如彼棲苴我相此邦無不潰止此承上章用舍失宜而言蓋人才用之得宜則如棫朴之盛日見其蕃用失其宜則如嵗旱之草同歸消滅而已旻毛云潰遂也成嚴氏云谷風有洸有潰潰訓怒小是用不潰于此章草不潰茂潰皆訓遂潰潰回遹無不潰止潰皆訓亂按水之潰者其勢橫暴而四出故怒之甚者為潰怒遂之甚者為潰遂亂之甚者為潰亂皆一理也猶苴蒯屬可以作屨其質輕微隨風棲泊無有定處所云轉蓬也如彼棲苴言其中小有才能者皆不能自立與時浮沈轉移而已季氏云無不潰止言不至于潰不止也陳偉云由邦之無人以知其必潰維昔之富不如時維今之疚不如兹彼疏斯稗胡不自替職兄斯引毛云昔之富謂富仁賢也今之疚謂今則病仁賢也時是也兹此也疏通作粗糲米也米之率糲十稗九鑿八侍御七稗蓋少精于糲矣替爾雅云廢也愚按承上章言人才之凋落如此追周昔之盛世富于才不如是之空虛也即人才之在今可謂病矣亦不如此一時之特甚也也替猶代也彼疏斯稗謂彼此相去無幾也況者似莊子曰每況愈下言近似也謂此人既不肯求人以自代而所引者惟是已近似之人斯引之而已職者言其意專主于此也池之竭矣不云自頻泉之竭矣不云自中溥斯害矣職兄斯𢎞不災我躬鄭云頻當作濵池水之溢由外灌焉今池竭由外無益者喻王猶池也政之亂由外無賢臣益之泉者中生水則益深水不生則竭喻王猶泉也政之亂又由內無賢妃益之溥猶遍也言其為害遍及內外皆蟊賊為之也其引言其憂之長𢎞言憂之大愚按池竭自頻外有賊之者也泉竭自中內有害之者也蟊賊與蟊疾表裏為姦故王澤日竭而王不知也指職兄斯引指貪位者而言養亂之人也職兄斯𢎞用事者而言造亂之人也要之斯𢎞之兄即上文斯引之兄也蓋其所引之人繼起用事為害益𢎞而引之者猶云非我所為以自逃咎得乎昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊此章望王用舊人以救亂也言鄭云先王受命謂文王武王時也召公召康公也有如者昔時賢臣多非獨召公也望陳櫟云此詩及瞻卬篇末有拳拳望治之意前詩其改過而無忝皇祖此詩望其改圖而擢用舊人審如是則否猶可泰危猶可安也見孔云于蹙國之上不言無賢臣者以不尚有舊義于下故空其名以下句互而知之愚按凡伯與召穆公同朝所稱召公即召虎而謂昔先王受命者厲王亡國宣王更立中興亦可謂之受命也江漢之詩曰式辟四方于疆于理至于南海非辟國百里乎以凡伯歷事厲王今猶在朝况與召公同時共事為宣王之舊人豈盡無有者乎悲其有舊而不用也召旻七章四章章五句三章章七句朱注亦以先王為文武召公為召康公也愚按厲王流彘周室由召穆公以再造宣王中興南征東略召伯之功為多才一傳而即有幽王亡國之禍詩人親見其興廢安得不思召公乎厲王之亂惟有召公故國亡而不亡今無其人矣題曰召旻閔周之以召公之亡而亡也蕩之什十一篇九十二章七百六十九句田間詩學卷十
