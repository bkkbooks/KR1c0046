body:
  text: 田間詩學卷一桐城錢澄之撰國風朱注國者諸侯所封之域而風者民俗歌謡之詩也諸侯采之以貢于天子天子受之以列于樂官于以考其俗尚之美惡而知其政治之得失焉舊説二南為正風所以用之閨門鄉黨邦國而化天下也十三國為變風則亦領在樂官以時存肄備觀省而垂鑒戒耳周南召南譜略譜曰周召者禹貢雍州岐山之陽周先公太王避狄難自豳遷焉商王帝乙之初命其子王季為西伯至紂又命文王典治南國江漢汝旁之諸侯于是天下三分有其二以服事殷故雍梁岐豫徐揚之人咸被其德而從之文王受命作邑于豐乃分岐邦周召之地為周公旦召公奭之采地施先公之教于已所職之國武王伐紂定天下巡狩述職陳誦諸國之詩以觀民風俗六州者得二公之德教尤純故獨録之屬之太師分而國之其得聖人之化者謂之周南得賢人之化者謂之召南言二公之德教自岐而行于南國也乃棄其餘謂此為風之正經二國之詩以后妃夫人之德為首終以麟趾騶虞為風之始所以風化天下而正夫婦焉故周公作樂用之鄉人焉用之邦國焉或謂之房中之樂者后妃夫人侍御于其君子女史歌之以節義序故爾郝氏云周岐豐也召亦岐周地名言周召者文王之世周公治內召公治外畿內曰周畿外曰召言南者指政教所及皆周有天下後追誦其事也周南亦有南國詩如江漢汝墳化由周達召南無周詩蓋専言化之及逺也周南一之一關雎序曰后妃之德也風之始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉全序載在卷首據鄭氏自風也以下至關雎之義也為大序以此為本序今從之鄉人謂鄉飲酒禮是鄉大夫三年賓興賢能之禮經云乃合樂周南關雎是也邦國謂燕禮是諸侯燕飲其臣子及賔客之禮經云遂歌合樂周南關雎是也則鄭樵云人之情樂者聞歌則感而為淫哀者聞歌感而為傷惟關雎之聲和而平樂者聞之其樂不至于淫哀者聞之其哀不至于傷此關雎所以為美也又云夫子喜魯太師之樂音節中度故曰樂矣而不及于淫哀矣而不及于傷皆從樂奏中言之非以别其文義也黃佐云燕禮鄉飲升歌三終笙入三終間歌三終乃合樂三終以為亂亂者樂之末章也關雎雖為風始以合樂在升歌間歌之後故孔子曰師摯之始關雎之亂名孔云關雎者詩篇之名金縢云公乃為詩以貽王之曰鴟梟則篇名皆作者所自名也關關雎鳩在河之洲窈窕淑女君子好逑毛傳興也朱注同女毛云關關和聲也雎鳩王雎也鳥摯而有别列傳言人未嘗見其乘居而匹處者馬雎左傳作鴡郯子云少皥氏以鳥紀官鴡鳩氏司也杜預注以其摯而有别故為司馬主法制河北方流水之通名宜毛云窈窕幽間也也孔云淑女已為善稱則窈窕為居處窈深逺窕深肆極也唐詩云窈窕九重閨魯靈光殿賦云旋室便娟以窈窕皆指所居而言逑通作仇匹也怨偶曰仇反言之也與公侯好仇同義子匡衡云孔子論詩以關雎為首詩曰窈窕淑女君好逑言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜然後可以配至尊為宗廟主也愚按宗鄭説者以太姒思淑女為助祇據序語云然毛氏以淑女指后妃朱子謂文王宫中之人于后妃始至見其德而作此詩則序所謂憂在進賢不淫其色哀窈窕思賢才而無傷善之心皆自宫人稱之參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差陸佃云三相參為參兩相差為差荇荇説文作莕菨余也亦作接餘流爾雅云求也菜叢生水中蓋順水之流而求之也按天官醢人陳四豆之實無荇菜意或為芼羮之用耳祭統曰官備則具備蠶繅衣服酒醴粢盛薦豆和羮之事皆后妃主之而內官左右相之也輾説文作展展之為言舒也轉則運動之義反復也側旁也因展轉而至于反至于側也皆臥不安席之意朱注此本其未得而言參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之采説文云掇取也可芼爾雅云搴也邢昺云擇菜也謂求而得之多則以擇而用之也菜和羮曰芼陳祥道云鄭氏謂房中之樂不用鐘磬此曰鐘鼓樂之而周禮教燕樂以磬師則房中之樂非不用鐘磬也樂鄭云琴瑟在堂鐘鼓在庭言共荇菜之時上下之皆作盛其禮也朱注此章據今始得而言采取而擇之也芼熟而薦之也之按琴瑟友之所以寫其親愛自始得時言鐘鼓樂所以鳴其和豫自既得後言關雎三章一章四句二章章八句毛傳言后妃有關雎之德是幽間貞靜之善女宜為君子之好匹能共荇菜備庶物以事宗廟也則淑女即指后妃也鄭氏以為后妃求賢女之助而三夫人以下皆化后妃之德樂后妃之事然皆不指作者之人朱子謂文王得聖女為配宫中之人于其始至見其有幽間貞靜之德而作是詩愚按朱子宗毛氏以淑女指后妃是也或疑宫人不知何指如以為王季之宫人則古者命士父子異宫彼淑女之得與否亦何預于王季宫人之憂樂也如以為文王之宫人古者諸侯一娶九女蓋必嫡夫人至而姪娣從之未有夫人未至而先有宫人者也考皇王大紀稱昌為世子娶于有莘曰太姒謂太姒至時王季固在文王無宫人審矣然嘗讀大明之篇而疑大紀所載為不足據詩曰文王初載天作之合明為文王即位之初年矣其曰文定厥祥親迎于渭造舟為梁一皆由于文王未有一語言承王季之命而行者若云大明專美文王雖王季尚存要以文王為主夫娶妻必待父母之命父在子得自為主乎周書無逸篇稱文王受命惟中身厥享國五十年史記載文王年九十七而云享國五十年當以四十七即位詩言文王初載蓋即位之初年也吾不知太姒此時為年幾何若正當及笄之年則文王且五十年齒不相當也大明詩有曰纘女維莘纘繼也吾疑太姒為文王之繼妃因悟大紀稱昌為世子娶于有莘者非太姒也意必前有莘女不祿無子文王中年艱于嗣胤續娶于莘而得太姒有不妒之德因有則百斯男之慶故周世歌誦之比其功于薑嫄也若是則關雎為文王宫人之作亦足據矣或按鄒氏忠胤亦有是説特疑古者諸侯不再娶周制非殷制也按左傳衛莊公娶于齊東宫得臣之妹曰莊薑美而無子又娶于陳曰戴媯魯惠公之元妃孟子薨繼室以聲子生隱公非嫡也又娶于宋曰仲子生而有文在其手曰為魯夫人則周制諸侯再娶之證矣文王續娶于莘猶惠公續娶于宋也戴據大戴稱文王十三生伯邑考十五生武王小謂文王與武王三齡以九十七終武王九十三終是文王殁時武王已八十二嵗書言惟十有三年春大會于孟津克商之後享天下尚有四年當享年九十九不止九十三也二戴蓋自相矛盾矣武王崩時成王年才十三是以八十五生成王也發史記載武王克殷告叔旦曰惟天命不享于殷之未生至于今六十年是武王以六十嵗克商在侯位已十三年則武王以四十八即位克商後四年而崩得年六十四嵗以文王殁年考之蓋以五十嵗生武王而非十五生武王明矣如以太姒為文王之始配以古者男子三十而娶女子二十而嫁之例準之當文王生武王時太姒必將四十矣生武王而後如管魯蔡曹郕霍衛聃皆同胞也不應前此壯年惟伯邑考一人及血氣將衰乃生子纍纍如許耶葛覃序曰后妃之本也后妃在父母家則志在于女功之事躬儉節用服浣濯之衣尊敬師傅則可以歸寧父母化天下以婦道也何氏云此詩為歸寧而作太姒在父母家所習者惟女功之事今已出嫁猶不變其素履以為不如是不敢歸見父母故序謂葛覃后妃之本也葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈毛傳興也朱注賦也留注云覃延也施移也故黃鳥摶黍也或謂之黃栗當椹熟時來在桑間里語曰黃栗留看我麥黃椹熟否亦應節趨時之鳥也初爾雅云木族生為灌灌即叢也言葛而及黃鳥狀夏之景此時葛方盛而未可刈也葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁莫莫茂密貌按莫本古文暮字曰莫莫者取稠密陰暗之義毛云濩煮之也釋文以為瀹蓋以水治之也浴曲禮云為天子削瓜巾以絺諸侯巾以綌玉藻云用二巾上絺下綌以絺精而綌粗故貴絺而賤綌也要緇衣紀云苟有衣必見其敝而引服之無射為言以古人之無斁盡如此服矣朱注蓋親執其勞而知其成之不易所以不忍厭棄則張敬夫云周自后稷以農為務歷世相傳其君子重稼穡之事其室家則重織絍之勤相與服習其艱難而咏歌其勤苦此王業之根本也故誦服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以衰言告師氏言告言歸薄汚我私薄浣我衣害浣害否歸寧父母毛云師女師也古者女師教以婦德婦言婦容婦功祖廟未毁教于公宫三月祖廟既毁教于宗室昏禮注云婦人五十無子出不復嫁能以婦道教人者為女師女出嫁隨以往按襄三十年宋災伯姬待傅至姆未至逮火而死此女師隨往女家之一證也言告師氏是已告于師氏也言告言歸俾師氏以歸寧之意告之舅姑夫子也猶毛云汚煩也鄭云煩撋之用功深阮孝緒云煩撋挼挲也夫人有副褘盛飾以朝事舅姑接見于宗廟進見于君子其餘則私也衣謂褘衣以下至褖衣禮服也蓋因女工暇而歸因歸而治服本與絺綌無關而上文服之無斁之儉德亦即可想見矣葛覃三章章六句愚按禮父母在則歸寧左傳莊二十七年把伯姬來是也父母殁則使卿寧于兄弟襄十三年楚司馬子庚聘于秦為夫人寧是也以文王中年即位娶太姒而尚有歸寧之父母則太姒與文王年齒不相當亦一證矣卷耳序曰后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險陂私謁之心朝夕思念至于憂勤也郝氏云小雅之四牡皇華采薇杕杜遣勞使臣王者所以享諸臣于外廷也卷耳則后妃所以相王于中饋也卷耳之志是采薇杕杜之治所由出也采采卷耳不盈頃筐嗟我懷人置彼周行毛傳憂者之興也朱注賦也備毛云卷耳苓耳也本草云即蒼耳麴蘖中用之以酒漿淮南子稱瞽師庶女位賤尚枲按枲者枲耳菜名即卷耳也主是官者至微賤是醢人酒人之屬也歐陽氏曰卷耳易得頃筐小器也然采采而不能頓盈后妃以采卷耳之不盈而知求賢之難得因物託意諷其君子毛云行列也師師濟濟密布朝列謂之周行而朱注周行大道也言心適念其君子故不能復采置之大道之傍也愚按言采采則采非一女嗟我懷人者因筐之不盈而思人之助之也周行大道置諸彼明有懷也以獨采不如共采之易為力喻求賢之宜亟也陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷爾雅云石山戴土謂之崔嵬毛云虺隤病也隤説文云下墜也言山髙馬退不能升也古之酌酒者必取諸罍字本作櫑刻作雲雷之象故廟堂之上罍尊在阼犧尊在西毛云姑且也人君黃金罍陟彼髙岡我馬玄黃我姑酌彼兕觥維以不永傷毛云山脊曰岡玄馬病則黃觥角爵也醉陸氏云兕善抵觸先王制罰爵以兕角為之懼其而至于抵觸制此以為酒器愚按二章三章以陟山喻者言圖治如登髙然一步艱于一步也懷者懷羣才之共事傷者傷一人之獨勞姑酌者聊以燕飲致其慰勞之情也我者我文王也陟彼砠矣我馬瘏矣我僕痡矣云何吁矣砠本作岨毛云石山戴土曰砠瘏痡皆病也吁憂也爾雅注吁作盱張目逺望也愚按末章言如陟墝埆之山寸步難進僕馬俱敝徒勞罔功更何望哉言當及其未敝而得人以助之也卷耳四章章四句朱子謂后妃以君子不在而思念之故作是詩又云豈當文王朝會征伐之時羑里拘囚之日而作與夫懿筐非后妃所宜執大路非后妃所宜遵至于登山飲酒僕馬勞憊以擬后妃殊屬不倫毛鄭以為內助文王求賢審官此因左氏引詩誤之也左傳襄十五年君子謂楚于是乎能官人詩曰嗟我懷人置彼周行能官人也毛氏據之凡詩稱周行皆謂之密布朝列因以此詩為后妃思君子敷求哲人布滿在位也左氏斷章取義引經以傅會其説豈可據彼説以解經乎愚按后妃主內事職陰教善不出於閨壼業不越乎邊饋安有干預朝政與聞人主求賢審官之事竊以葛覃之詩是太姒始嫁之時猶未離乎女也故為絺綌女功也告師氏女道也寧父母女心也至卷耳則正小君之位已久將以助成王化則求賢審官之事亦宫中所時宜勸警也卷耳以備酒漿宫中尚枲之職必有司是事者借卷耳盈筐之難以興為政之不可以寡助後二章皆比體也比之升髙歷險不惟己之勞苦難堪而僕馬之罷敝已極金罍兕觥且以是慰勉其勞瘁乎求賢共助之思蓋殷然于言外矣樛木序曰后妃逮下也言能逮下而無嫉妒之心焉張綱云木上勾曰喬下曲曰樛喬則與物絶故曰南有喬木不可休息樛則與物接故曰南有樛木葛藟纍之葛藟在下之物也以木之樛故得附麗以上南有樛木葛藟纍之樂只君子福履綏之毛傳興也朱注同蔓毛云南南土也罔陸璣云藟一名巨瓜似燕薁亦生嚴氏云動不吉謂之福履易稱視履考祥言行與吉會也故不曰祿曰履綏安也雅曰茀祿爾康矣是也南有樛木葛藟荒之樂只君子福履將之荒説文云蕪也蔓延廣逺之意鄭云將猶扶助也南有樛木葛藟縈之樂只君子福履成之毛云縈旋也通作説文云草旋貌按三章一節深一節纍繫也荒則奄之也縈旋則奄之周也綏者安也將者助之不已也成者福于是大成也愚按樛木惟能下接故葛藟始能上附未有上不接下而下輒扳附者也序謂后妃能逮下而無嫉妒之心是也樛木三章章四句何氏謂南國諸侯歸心于文王而作文王之德逺及南方如樛木之蔭下小國有所歸依如葛藟之得所係書曰文王誕膺天命以撫方夏大邦畏其力小邦懷其德者此也嚴氏謂按文王之國東北近紂都西北近犬戎故化獨南行螽斯序曰后妃子孫衆多也言若螽斯不妒忌則子孫衆多也郝氏云樛木逮下進御者衆故生子多編詩者以義相承愚按后妃不嫉妒故衆妾得以生子而所生皆為后妃之子故得衆多也螽斯羽詵詵兮宜爾子孫振振兮朱注比也毛傳缺云毛云斯蚣蝑也詵詵衆多也一一名舂黍七月詩斯螽動股文雖顛倒其實也月陸氏云字從冬冬終也至冬而終故謂之螽魯十而有螽孔子曰火伏而後蟄者畢今火猶西流再失閏也各鄭云凡物有陰陽情欲者無不妒忌維蚣蝑不爾得受氣而生子故能衆多后妃之德能如是則亦宜然言嚴氏云螽生信宿即羣飛因飛而見其多故以羽之振奮也謂奮起也重言之見衆多也螽斯羽薨薨兮宜爾子孫繩繩兮薨薨羣飛聲繩繩説文云有紀貌蓋狀子孫之長幼森然各得其序亦如螽斯之羣飛行列不亂也螽斯羽揖揖兮宜爾子孫蟄蟄兮揖輯通晉語君輯大夫就車輯或為揖蓋通用也詵詵自未飛之時言也薨薨自方飛之時言也揖揖自飛而下集之時言也蟄振振但言其奮起而已繩繩則有繼續未艾之意蟄又見其安靜以處式相好無相猶也螽斯三章章四句愚按螽斯以喻子孫之衆多不以比后妃也惟后妃不妒故子孫衆多有如此篇中全不露此意但言宜爾子孫如此使人思其所以宜者何故耳桃夭序曰后妃之所致也不妒忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家毛傳興也朱注同夭周禮仲春大會男女是月也桃始華嚴氏云夭以桃言指桃之木也灼灼以華言指桃之華也孔云桃或少而未華或華而不少夭夭灼灼並言則是少而有華者故辨之鄭云喻婦人以年盛時行宜者謂男女年時俱當之男以女為室女以男為家首章先言室後言家恆義也次章先言家後言室泰之義也桃之夭夭有蕡其實之子于歸宜其家室羅氏云麻實謂之蕡麻于植物中最為多子言桃之華色既盛又結子之多如麻子然桃之夭夭其葉蓁蓁之子于歸宜其家人陸氏云桃性華葉齊生至于有蕡其實然後其葉蓁蓁故其序如此家人謂一家之人上下左右皆處之得其道故不特夫婦相宜一家之人盡以為宜宜只是能相安也桃夭三章章四句愚按桃夭二句言婚姻之及時下二句稱女德也序謂后妃之所致也謂不妒忌則婚姻以時國無鰥民朱子譏其意狹而説疏吾觀嫉妒成俗令人以室家為苦至有不樂婚娶者過時而鰥容亦有之至于門內有妒者舉室為之不安其能宜乎風皆由上始也序説亦未為疏兔罝序曰后妃之化也關雎之化行則莫不好德賢人衆多也墨子云文王舉閎夭泰顛于罝網之中而西土服金履祥云計此詩必為此事作也愚按序謂后妃之化者以后妃宫中憂在進賢故士類興起下至兔罝之輩爭有進用之思知上之求賢切也肅肅兔罝椓之丁丁赳赳武夫公侯干城朱注興也毛傳缺以毛云肅肅敬也也兔罝捕兔之網椓杙也椓杙所張網丁丁其聲武夫猶言野人干盾也所以禦矢石城所以衛內也然歐陽子云捕兔之人布網罟于道路林木之下肅嚴整使兔不能越逸恭鄭云罝兔之人鄙賤之事猶能敬則是賢者衆多也肅肅兔罝施于中逵赳赳武夫公侯好仇逵通作馗説文云九逵道也中逵謂九道適中之處左傳嘉偶曰妃怨偶曰仇反妃而言仇猶以潔為汙以治為亂也好仇言其德堪與公侯偶耳肅肅兔罝施于中林赳赳武夫公侯腹心陸氏云椓之丁丁以有所聞施于中逵以有所見施于中林則無所聞無所見于是焉耳則好德之至也正葉氏云在野之凡夫逐兔之細事即可以知其才如日磾之馭馬寧戚之飯牛陳平之宰肉識者已知其可大用矣近蘇氏云世未嘗患無武夫獨患其不知敬而不可今武而知敬故可以為干城腹心也愚按臼季之取冀缺郭泰之取茅容臯伯通之識梁鴻皆以其在野能敬也兔罝三章章四句愚按兔罝以喻文王之網羅賢才也丁丁喻求賢之聲逺聞四方也中逵當四方之衝為人才畢集之所中林則深林隱伏之士皆入吾彀中矣前二章言奔走禦侮之士後一章言運籌帷幄之人也芣苡序曰后妃之美也和平則婦人樂有子矣采采芣苡薄言采之采采芣苡薄言有之朱注賦也毛傳缺按毛云采采非一辭也芣苡馬舄車前也宜懷妊焉芣苡好生道上牛迹中本草云子宜妊治産難薄言者聊且隨意之辭采采非一采也采此芣苡非一人也求而未得曰采之采采既得隨地行處皆有曰有之采采芣苡薄言掇之采采芣苡薄言捋之掇説文云拾取也捋詩詁云以指歷取也陸燧云舊説掇拾其穗也芣苡無取穗者子之在地者拾之未落者捋之也采采芣苡薄言袺之采采芣苡薄言襭之爾雅云執衽謂之袺謂舉衣䘳之一角也説文云以衣衽扱物謂之襭李巡云扱衣上衽于帶衽者裳之下也置袺謂手執之而不扱襭則扱于帶中矣愚按首章采之有之二句後二章分承掇之捋之采之之事也袺之襭之有之之事也芣苡三章章四句劉向列女傳云蔡人之女既嫁于宋夫有惡疾其母將改之女不從作芣苡之詩芣苡臭惡之草以喻夫之惡疾也故文選用其事而曰冉耕歌其芣苡謂伯牛有惡疾也愚按后妃有不妒之德致螽斯之慶周家侈為盛德故一時婦人以多子相尚序謂婦人樂有子者是也漢廣序曰德廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得也鄭云紂時淫風遍于天下維江漢之域先受文王之教化楚鄒氏云南有喬木題曰漢廣亦猶定之方中之為宫有饛簋飱之為小東也南有喬木不可休息漢有遊女不可求思漢之廣矣不可泳思江之永矣不可方思毛傳興也朱注興而比也喬毛云喬上竦也説文云髙而曲也爾雅云勾如羽下勾曰枓上勾曰喬胡胤嘉云樛木下垂則附之者易喬木上竦則依之者難按木枝上竦則陰少故不可休息漢水出嶓冢山至大别山入江江水出岷山東流與漢水合入于海泳説文云潛行水中也方説文云併船也爾雅謂之泭􅑉筏也泳以絶流橫渡言故屬廣方以順流上下言故屬永嚴氏云此四句轉言女自可求但須媒妁通言六禮俱備不可以非禮求猶江漢未嘗不可渡須假舟楫以濟不可凌匆泳方之耳翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思毛云錯雜也月令收秩柴薪注云大者可析謂之薪小者合束謂之柴楚水名一名荆沈括云揚州宜楊荆州宜荆地名因此士翹翹秀起之貌婦鄭云楚雜薪之中尤翹翹者昏禮壻親迎至家婦升車則壻授綏御輪以行今曰秣馬謂親迎也休鄒氏云翹薪四語與章首四句遙對蓋喬木不可錯薪則有可刈也遊女不可求于歸則有可效也翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思蔞蔏蔞也一名購郭璞云蔞蒿也下許慎云馬二嵗曰駒孔云六尺以上為馬五尺以為駒古者駕車兩服兩驂服必用牡馬驂則可用其次者耳漢廣三章章八句朱子云文王之化自近而逺先及于江漢之間而有以變其淫亂之俗故出遊之女人望見之而知其端莊靜一非復前日之可求矣愚按風俗之貞淫以女為主男子之犯非禮皆因女子之可求而始犯也不可求而邪念息矣故序云人無欲求犯禮者由貞潔使之然也夫見遊女而欲求此發乎情也知其不可求而反于禮此止乎禮義也王者不能強人使無情而使其發而能止則教化之入人者深也汝墳序曰道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也申培説商人苦紂之虐歸心文王而作是詩遵彼汝墳伐其條枚未見君子惄如調飢朱注賦也毛傳缺也遵循也汝水説文云出大盂山黃柏谷西墳大防楚辭云登大墳以逺望則此墳亦汝水崖之髙土或云今葉縣界內有汝墳城遺址徐鍇云條自枝而出枚自條而出惄蹙通恚而不得之思調飢言飢不可忍急欲救之如調理病也遵彼汝墳伐其條肄既見君子不我遐棄毛云肄幹也斬而復生曰肄也左傳晉國不恤宗周之缺而夏肄是屏謂把夏餘遐逺也言文王不以我所居逺于周地而有棄我不恤之意也魴魚頳尾王室如燬雖則如燬父母孔邇毛云魚勞則尾頳魴魚本白勞于網罟尾變而赤矣張氏曰勞苦之極從而自寬曰王室雖如燬而文王在邇有以恤我也玩此詩民雖怨紂而尚以周之故未至于泮散其可謂至德也矣汝墳三章章四句朱注汝旁之國被大王之化婦人喜其君子行役而歸因記其未歸之時思望之情如此而追賦之也愚按此汝旁之民聞文王之德化而思得一見也汝去紂都近去岐周逺墳崖最髙又有樹以蔽之思文王而不見故欲伐去條枚條肄以望西土耳蜀先主送徐庶既别望之不見令伐其當所去路之樹以望之望窮不見而後罷詩亦猶是意也篇中有未見之憂既見之喜急欲親近父母耳麟之趾序曰關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也郝氏云周南以關雎始以麟趾終召南以鵲巢始以騶虞終編詩者取德修瑞應之義著王道之茂也麟之趾振振公子于嗟麟兮毛傳興也朱注同之説文云麟牝麟也麟之趾不踐生草不履生蟲仁見于趾者也振奮也振振者言其家教仁厚公子皆奮發興起以為善也于嗟兼歎息稱羡之辭愚按振振言其子孫之將興也麟之定振振公姓于嗟麟兮定爾雅作顁也毛云題也説文無顁字當通作頂頂顛也所謂額注引或云麟有角而不以抵也姓孫也孫是子之所生故曰子孫麟之角振振公族于嗟麟兮陸氏云麟似麕圓頂一角故西狩獲麟曰有麕而角也傳曰麒似麟而無角漢終軍傳曰麟角戴肉設武備而不為害所以為仁祖陸氏云始于趾終于角每況愈上朱注謂同髙為族按禮小記曰親親者以三為五以五為九父者子之祖因上推之以及于己之祖子者父之孫因下推之以及于己之孫此以三為五也己之祖自已子視之則為曾祖自已孫視之則為髙祖己之孫自已父視之則為曾孫自已祖視之則為玄孫故又上推以及己之曽髙下推以及己之曾玄此以五為九也謂之九族麟之趾三章章三句愚按此詩美文王之子孫稱公子文王未稱王也文王以后妃不妒子孫衆多詩人以多固可羡而賢尢可羡也有關雎之德以衍螽斯之慶而後有麟趾之祥麟牝麒也其歸美后妃乎或曰公姓公族文王時尚未有也公子之振振羡辭也公姓公族之振振祝辭也三章皆咏麟德趾則膝以下也故曰公子定則視我居上矣角則益上矣故别以公姓公族非以趾屬子定屬姓角屬族總贊麟耳周南之國十一篇三十四章百五十九句召南一之二鄭譜載周南內按譜分岐邦周召之地為公旦公奭之采邑周左召右則召為漢扶風地今鳳翔以西諸屬是也舊謂扶風雍縣南有召亭即其地鵲巢序曰夫人之德也國君積行纍功以致爵位夫人起家而居有之德如鳲鳩乃可以配焉孔云后妃夫人皆指太姒也周南王者之化故稱后妃召南諸侯之化故稱夫人維鵲有巢維鳩居之之子于歸百兩御之毛傳興也朱注同首毛云鳩鳲鳩秸鞠也户淮南子謂太陰所建蟄蟲穴而處鵲巢向而為蓋鵲巢開户向太隱而背太歲嵗多風則去喬木巢傍枝善為巢者莫如鵲也鳩一宿鳥也謂一于所宿之木一曰祝鳩或曰隼與鳲鳩皆一鳥也尸鳩性一而慈祝鳩性一而孝故有尸祝之號禽經曰拙者莫如鳩不自為巢居鵲之成巢鵲修巢必以小雪日其上梁必吉日也門之向嵗必更四月中雛能飛矣巢空鳩來居之五六月鳩將雛去小雪鵲乃復來略無爽也郝氏云君夫人之德靜専以守成故鵲巢無為而已大雅曰哲夫成城哲婦傾城小雅曰無非無儀無父母貽罹君夫人而欲有為毁巢之道也風俗通云車有兩輪馬有四匹故車稱兩馬稱匹巢御迓通左傳趙孟入于鄭鄭伯享之穆叔賦鵲趙孟曰武不堪也蓋以鵲有巢而鳩居之喻晉君有國趙孟治之維鵲有巢維鳩方之之子于歸百兩將之毛云方有之也之鄭云猶嚮也上章主迎之而言故曰居之此主送而言故曰方之言向其巢之所在而將往居之也毛潘江云方並也二鳩並栖以比夫人與君同居云將送也孔云夫人之嫁自乘家車宣五年齊髙固及子叔姬來反馬何彼穠矣美王姬之車自天子以至于大夫皆有留車反馬之禮泉水云還車言邁箋謂還車者嫁時乘車今思乘以歸也知夫人之嫁自乘家車也迓之者夫自以其車迎之送之者則其家以車送之故知壻車在百兩御之之中婦車在百兩將之之中矣維鵲有巢維鳩盈之之子于歸百兩成之盈滿也鄭謂衆媵姪娣之多也章按鳩字從九諸侯一娶九女故有取于鳩也首夫家以百兩迎之次章父母以百兩將之二姓婚姻之禮以成故總曰百兩成之鵲巢三章章四句愚按文王親迎之禮見于大雅大明篇此南國諸侯被文王之化亦以親迎為重而盛其禮有如此采蘩序曰夫人不失職也夫人可以奉祭祀則不失職矣按射義士以采蘩為節樂不失職也取末章夙夜在公為三宫夫人世婦有事于蠶者皆不失其職故士射以為節云南朱注古者后夫人有親蠶之禮此詩亦猶周之有葛覃也于以采蘩于沼于沚于以用之公侯之事朱注賦也毛傳缺之毛云蘩白蒿也記季氏云蠶之未出者采蘩以洗令其易出禮祭義云古者天子諸侯必有公桑蠶室近川而為之以便浴蠶故于沼于澗皆水濵也事謂所以成君服也禮世婦卒蠶獻繭于夫人夫人曰此所以為君服與遂副褘而受之用少牢以禮之重其事也于以采蘩于澗之中于以用之公侯之宫宫蠶室也上曰于以用之公侯之事第言其旨此曰于以用之公侯之宫則已入宫親其事矣鄒氏云不言采桑而言采蘩蘩之生常先于桑古者王親耕三推而止后親蠶三灑而止蠶二十七日而老三俯三起事乃大已在三宫夫人世婦登其事而后夫人特躬為之帥賦事而不獻功故于蠶未出時第采蘩洗之而事訖矣被之僮僮夙夜在公被之祁祁薄言還歸毛云被首飾也賤少牢禮云主婦被錫注云被錫當讀為髲鬄蓋剔者之髲以被婦人之紒為飾故謂之被周禮后服首飾有副編次三者此其次也蓋指三宫夫人世婦之服耳毛云僮僮竦而敬也説文云僮通作曈日曈曨欲明也即下夙字意公即所謂公桑也當日欲明之時即起趨事自夙至夜竟日皆在公所祁祁舒遲而歸也夙而趨事至夜則可以還歸矣非君夫人之重蠶事勤于倡率安能恪共無怠如此采蘩三章章四句愚按邠風曰蠶月條桑又曰八月載績周之先世以農起家其婦人以蠶績為事關雎即次以葛覃績事也鵲巢即次以采蘩蠶事也后妃夫人始至其國首先舉行者惟此二事足以見周室之所重矣及周之將亡其詩曰休其蠶織是棄其家法也序以為夫人奉祭祀之詩考周禮后六服有三翟為祭祀之服而首飾有副編次三等后服祭服首服皆副則不用編可知況次乎此詩所稱之被即次也被非祭服固知非祭祀之事草蟲序曰大夫妻能以禮自防也朱注謂南國被文王之化諸侯大夫行役在外其妻獨處感時物之變思其君子如此郝氏云謂獨居之妻思夫則為鍾情謂初嫁之女自防則為守禮小雅以勞歸士體其情也召南以咏賢妻貴其禮也故序確而正喓喓草蟲躍躍阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降毛傳興也朱注賦也精草蟲阜螽皆蝗屬説文無喓字通作要象其結束悍之形躍説文云踊也陸氏云草蟲鳴阜螽躍而從之故阜螽曰蠜草蟲謂之負蠜婦人從夫其象有如此鄭云未見君子謂在塗時也在塗而憂憂不當君子無以寧父母既見謂已同牢而食也既覯謂已昏也昏儀云壻親受之于父母是在女家已見矣而云未見者未見其待己之禮而心憂也覯疑與昏媾義同謂成昏也陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説毛云南山周南山也蕨􅣀也其初生類鱉腳故名得陟彼南山者其志在得所采猶女子適人其志在所從也而陸氏云降所以反忡忡説所以反惙惙忡忡謂中不下降下也惙惙謂綴而不解説解也陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷陸氏云薇似藿禮芼豕以薇又謂之迷蕨莊子所謂迷陽是也惙惙之憂深于忡忡傷悲之心苦于惙惙此未見之憂一節緊一節也降則心稍放下説則喜動于中夷則心氣和平此既見之喜一節深一節也愚按曾子問曰嫁女之家三夜不息燭思相離也始以憂而忘其悲至是轉憂父母之憂已不知有當于君子否思父母之心不覺轉憂而為傷悲情之至也張衡謂大火流草蟲鳴則鳴躍在深秋之候而薇蕨皆春時所有則草蟲特以況女之從男而采蕨采薇正仲春于歸時途中所偶見也草蟲三章章七句愚按篇中語多與小雅出車詩同出車勞還率也其率隨南仲出征王者代為室人思征夫之辭曲體其情以勞之耳草蟲則作自婦人豈當日是詩已傳聞之于上而因入諸宴勞之篇邪采蘋序曰大夫妻能循法度也能循法度則可以承先祖共祭祀矣禮記昏義云古者婦人先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也注云祖廟未毁言此女于此祖有服于君為親故使女師教之于公宫公宫祖廟也既毁謂無服也則于君為疏故教于宗子之家牢孔云此教成之祭祭無牲告成事耳非正祭也于以采蘋南澗之濱于以采藻于彼行潦朱注賦也毛傳缺蘩爾雅云萍䓑其大者蘋義毛云藻聚藻也左傳蘋蕰藻之菜蕰聚也昏云魚蘋藻皆水物陰類于以盛之維筐及筥于以湘之維錡及釜毛云無足曰釡釡古作釜錡三足釜也也鄭云烹蘋藻者于魚湆之中是鉶羮之芼按湆汁鉶盛和羮器凡肉味之有菜和者則以鉶盛之故曰鉶羮芼者用菜雜肉為羮之汁先將蘋藻烹于魚汁之中始盛以鉶所謂芼以蘋藻也于以奠之宗室牖下誰其尸之有齊季女毛云奠置也宗室大宗之廟也别按大宗大夫之始祖諸侯自嫡子以外蓋為别子子始為大夫繼别子之嫡子世為大夫則立廟以祀之是為宗室南奠置于地也鄭云牖下户牖間之前古人廟堂向室在其北户東牖西皆南面去牖近故曰牖下所以不于室中者凡昏事為女行禮皆設几筵于户外取外成之義故教成之祭亦于户外設奠也者尸陳也鄭云祭事主婦設羮教成之祭更使季女成其婦禮也廟孔云知非宗子之女自祭家廟者若宗女自祭其何須言于宗室乎固知為教于宗室之女教成而祭也采蘋三章章四句序謂大夫妻能循法度朱注謂大夫妻能奉祭祀而其家人序其事以美之也孔云宗室大宗之廟若非教成之祭則大夫之妻自祭夫氏何故云大宗之廟又云三月以來教之以法度故為此祭所以教成其婦禮使季女自設其羮則尸祭皆法度之教也季女嫁即為大夫之妻故序曰能循法度可以共祭祀矣愚按射義卿大夫以采蘋為節樂循法也季女既教之以四德而後使之尸祭欲全成其婦道耳是之謂循法也甘棠序曰美召伯也召伯之教明于南國蘇氏云周公在內近于文王雖有德而不見則其詩不作召公在外逺于文王功業明著詩作于下蔽芾甘棠勿翦勿伐召伯所茇朱注賦也毛傳缺者毛云蔽芾小貌甘棠杜梨也蔽爾雅云杜赤棠白棠杜澀而棠甘字説云詩言芾甘棠以杜之美言有杕之杜以棠之惡言周禮夏官教茇舍注云草止之也孔云茇者草也草中止舍故云茇而漢書王吉傳云昔召公述職當民事時舍于棠下聽斷焉是時人皆得其所後世思其仁恩至于不伐甘棠下朱注召伯循行南國以布文王之政或舍甘棠之後人思其德故愛其樹而不忍傷蔽芾甘棠勿翦勿敗召伯所憩朱注敗折也勿敗則非特勿伐之而已猶云勿殘壞之憩古作憩本作愒説文云息也蔽芾甘棠勿翦勿拜召伯所説拜説文云首至地也謂攀下也曰朱注勿拜則非特勿敗而已程大昌云三章皆勿翦翦斷也勿拜則不伐不敗且不敢屈其枝使垂敬之至也説稅通稅駕也愚按齊景公愛其槐嚴刑以禁之置吏以守之人望而不敢指目而人傷之威不足以庇所愛也召伯之棠人自愛之惟其德也威與德之不相及若此甘棠三章章三句按譜謂文王作邑于豐分周召之地為二公采邑分施政教于六州而采其詩為風愚謂文王身為西伯召公安得于此時稱伯必武王克商以後使周召分陜而始命為二伯而後有召伯之稱何氏謂二公于文王時未嘗用事故書君奭乃周召對語之詞其歷舉文王之臣惟虢叔閎夭散宜生泰顛南宫適及武王時虢叔先死則曰武王惟兹四人尚迪有祿而已周召分陜而治在武王得天下之後而甘棠頌召伯之詩又當在康王之時考竹書召公以康王二十四年薨則是召公殁後始作是詩也玩詩辭意自是覩遺迹而興思應作于康王之世後人編入召南耳留皇甫謐云召公文王之庶子勝殷後封于北燕周佐政食邑于召輔成王康王卒諡曰康長子繼燕支子繼召按左傳富辰言文王昭十六國而無燕何也或以為王季庶子亦無所本行露序云召伯聽訟也衰亂之俗微貞信之教興強暴之男不能侵陵貞女也愚按強暴之男致貞女于獄訟而終不之從召公聽訟之明也厭浥行露豈不夙夜謂行多露毛傳興也朱注賦也仲厭足也浥濕也猶云濕透足也行露道上之露也春嫁娶之時道始有露故因以起興也左傳楚伐隨取成而還君子曰隨之見伐不量力量力而動具過鮮矣詩曰豈不夙夜謂行多露自守之謂也晉韓獻子告老公族穆子有廢疾將立之辭曰詩云豈不夙夜畏行多露杜注言豈不欲早暮而行懼多露之濡已以喻違禮而行必有汙辱誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足陸氏云雀物之淫者鼠物之貪竊者以譬強暴也禽經云雀交不一雉交不再毛云速召也獄埆孔云囚證于角核之處周禮謂之圜土則獄者核實道理之名臯陶造獄謂此也愚按雀本無角也而穿屋似乎有角女本無家也而速獄似乎有家家猶夫也女以夫為家皆實無而似有也雖聽者不能無疑逮聽明後而鼠果無牙女果無家故曰室家不足慶喜之辭誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從先獄後訟者謂先繫之獄而後置對也愚按末二句蓋已訟明出獄全其守禮之操而自幸也當必先為疑獄召公理而出之故序以為召公聽訟也室家不足亦不汝從皆訟明後之詞行露三章一章三句二章章六句劉向列女傳云召南申人之女既許嫁于酆夫家禮不備而欲迎之女不肯往夫家訟之于理致之于獄女終以一物不具一禮不備守節持義必死不往而作是詩愚按周禮仲春之月令會男女又曰司男女之無夫家者注云會男女謂初昏者也無夫家謂男無家女無夫矜寡者也此詩女不從男至于男興訟而女對獄豈委禽之時不由父母耶意即所謂女無夫者強暴之男強委禽焉而不受因有此訟耳觀詩辭皆女自為主也據孔云女為父母所嫁媒妁和否不由于已而詩皆女與男訟之辭以文王之教女皆貞信非禮不動若在父母之家女豈能自主乎必是仲春所會無夫之女也羔羊序云鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔羊也羔羊之皮素絲五紽退食自公委蛇委蛇朱注賦也毛傳缺而毛云古者素絲以英裘紽英飾也以素絲為組紃施諸裘縫為飾曰紽五合五羊之皮為一裘也百里奚五羊之皮蓋仿古制五皮小則合縫多而用絲煩五紽見其皮之大只用紽耳皮大則賤正言其儉也朝羔裘大夫趨朝之服嚴氏云緇衣羔裘諸侯日視之服卿大夫朝服亦服之其所異者君則純色臣則以他物飾其褎所謂羔裘豹袖羔裘豹袪是也玉藻云君日出視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服蓋退朝之後君適路寢臣亦適其治事之館館乃所直之廬謂公館非私家也此大夫蓋公爾忘私日恪于位以勤其官每宵衣而旰食其自公所服此羔裘故即所見稱之羔羊之革素絲五緎委蛇委蛇自公退食上章言皮以有毛故稱皮此章言革則毛已脫去而裘將敝矣緎説文云羔裘之縫也孫炎云裘縫之界域羔羊之縫素絲五總委蛇委蛇退食自公次章言革毛去而革存也此章言縫革敝而縫見也總説文云聚束也大約縫之起脊處曰紽有界限處曰緎合二為一曰總之羔裘至希革而縫見如晏子一狐裘三十年節儉至也自公退食退食自公朝夕往來出公門入私門出私門入公門此外無事是其正直也羔羊三章章四句朱注謂在位皆節儉正直故詩人美其衣服有常而從容自得如此愚按羔羊之臣儉于已而恪于位出入有常不見有宵衣旰食之勞想見太平之治官無廢事亦不好事循分自盡而已晚近功名之士目此輩為穿衣喫飯漢耳豈知此為世道之極治哉殷其靁序云勸以義也召南之大夫逺行從政不遑寧處其室家能閔其勤勞勸以義也殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉朱注興也毛傳缺也張敬夫云即鸛鳴婦歎之義將風雨則思念行者何者疑念之詞何斯之斯斯此人謂君子也違斯之斯斯此所謂室家也家遑暇也按莫敢或遑申違斯之義言所以久違室而不顧者以王事至重非惟不遑抑莫敢遑耳以嚴氏云冀其畢事來歸而不敢為決詞知其未可歸也殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉毛云側亦在其陰與左右也息孔云上言陽謂山之南此云側三方皆是毛云止也按人一呼一吸為息故謂息為止殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉鄭云下謂山足陸氏云雷髙弗雨雷在南山之下則雨矣處止也謂至家而安止也殷其靁三章章六句朱注謂南國之婦人其君子從役在外而思念之故作此詩郝氏謂西伯率南國諸侯以服事殷其大夫以西伯之命共紂之役室家念之愚按篇中斯字似指周言諸侯既已歸周而復事紂南國之大夫仍往役焉婦人疑之謂何哉業已斯矣而復違斯且莫敢或遑如此斯與彼對違斯者謂役于彼也蓋不敢質言耳歸哉歸哉歸于斯也因其違望其歸耳摽有梅序云男女及時也召南之國被文王之化男女得以及時也申培説女父擇壻之詩也摽有梅其實七兮求我庶士逮其吉兮毛傳興也朱注賦也孔毛云摽落也一曰擊也擊而落之也曰七兮者云十分之中尚七未落已三分落矣我求有選擇之意庶者未定之辭士者禮義之人曰庶士蓋女父言云爾逮及也皇皇惟恐其晚之意及此吉日而定其人非謂便于歸也女子盛年難久譬梅實之易落為父母者惟恐得壻之過時不覺其詞之急如此摽有梅其實三兮求我庶士逮其今兮三者承上而言過此以往梅之墮落益多其在者餘三分耳毛云今急詞也謂即今也摽有梅頃筐塈之求我庶士逮其謂之毛云塈取也或謂塈當作槩槩平斗斛木也謂者父母遣媒妁通言姑先定約徐俟禮行也摽有梅三章章四句愚按譙周云男自二十以及三十女自十五以及二十皆得以嫁娶先是則早後是則晚矣孫卿曰霜降逆女氷泮殺止霜降九月也氷泮正月也自季秋至孟春皆嫁娶之時過此則為仲春周禮媒氏以仲春之月會男女之無夫家者相奔不禁奔非淫奔謂不親迎也以事迫而禮簡耳故女十三而笄將以適人而父母之心急矣此詩急欲得壻然必曰求我庶士不肯適非類也曰逮其謂之必待媒妁通言也慎重如此雖于情已急而于禮不欲苟且遷就序謂被大王之化者此也小星序云惠及下也夫人無妒忌之行惠及賤妾進御于君知其命有貴賤能盡其心矣朱注以南國夫人承后妃之化能不妒忌以惠其下故衆妾美之如此妒按關雎之有樛木鵲巢之有小星皆由君夫人不之感致也嘒彼小星三五在東肅肅宵征夙夜在公實命不同朱注興也毛傳缺還朱注衆妾進御于君不敢當夕見星而往見星而故因所見以起興內則云妾雖老年未滿五十必與五日之御若妻不在妾御莫敢當夕按諸侯一娶九女夫人及二媵各有姪娣凡五日而遍其進御于望前先卑望後先尊惟每月十五十六二夕日月相對夫人當御雖夫人不在此二夕衆妾不敢當御也三毛云三心五噣噣咮也栁為咮孔云心在東方月時也噣在東方正月時也陸佃謂心之見在正春而噣之見在冬春之交不同時見也何氏云三五在東不兼言心専指噣也栁有八星步天歌云八星曲頭垂似栁近上三星號為酒享晏大酺五星守是也而參與昴皆西方之宿月令孟春之月昏參中尚書日短星昴以正仲冬皆謂見于南方也此詩作于冬春之交道其所見栁在東參昴在南正一時事也為在公公所也古者王立六宫正寢一燕寢五正寢王后所専而燕寢諸嬪以時敘御諸侯之宫半于天子其敘御于燕寢之制亦宜同也衆妾進御于君初昏見星而往將旦見星而還往來總在暗中雖夙亦是夜故曰宵征嘒彼小星維參與昴肅肅宵征抱衾與裯實命不猶參謂之實沈昴謂之旄頭皆陸氏謂進御之法姪娣兩兩當夕參昴二星也又西方之星其在于冬則以夕並見是也敘鄭云裯牀帳也漢世名帳為裯抱衾與裯即掌御于燕寢之事不猶不相若也程子曰賤妾得御于君是其可以僭恣而踰分之時乃謹于抱衾與裯而知命之不猶則教化至矣小星二章章五句愚按古者閨門雍穆雖由夫人無嫉妒之心亦由名位既定秩然有常故衆妾皆得以義命自安而以進御為夫人之惠即如是安得有後世専房之寵奪嫡之禍乎江有汜序曰美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也朱注謂汜水之旁媵有待年于國而嫡不與之偕行者其後嫡被后妃夫人之化乃能自悔而迎之故媵作此詩江有汜之子歸不我以不我以其後也悔毛傳興也朱注同還汜説文云水别復入水也孔云凡水決之岐流復本水者為汜朱子云夏水自江而别以通于漢復還入江冬竭夏流故謂之夏其入江處名夏口即詩所謂江有汜也郝氏云以汜自比以江比嫡賢女恭順之辭以婦人謂嫁曰歸追數昔日之辭春秋能左右之曰悔者嫡自恨其前日之非而改過也江有渚之子歸不我與不我與其後也處毛云渚小洲也水岐成渚已鄭云江水流而渚留是嫡與已異心使獨留不行也愚按獨留者謂不以進御而獨留不與諸娣同行非待年于國不與嫡偕行也處止其所也江有沱之子歸不我過不我過其嘯也歌鄭云岷山導江東别為沱孔云皆大水分出别為小水之名也鄭云嘯蹙口出聲嫡有所思而為之既覺自悔而歌歌者言其悔歌以自解説也愚按不我過言不以我過君寢也江有汜三章章五句愚按此詩美嫡之能悔也蔡汝南云風之江沱雅之賓筵皆取于悔由變之趨于正也易曰震無咎者存乎悔歷觀後世妒婦之惡窮凶極禍至死不已未有中道而改過者蓋妒其本性又無學問以牖之故死而不知悔也若此嫡之後也悔悔而處而歌非關雎鵲巢之德化所感而能若是乎録詩者次于小星之後以見江汜悔過之嫡即可以嫓美于小星不妒之夫人也野有死麕序曰惡無禮也天下大亂強暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也朱注謂女子有貞潔自守不為強暴所汚者故詩人因所見以興其事而美之或曰賦也野有死麕白茅包之有女懷春吉士誘之朱注興也毛傳缺水見影則驚而奔羅氏云麕一名獐獐章皇也飲郝氏云麕性淫而善奔物死則臭人皆惡之用茅包使不之覺即誘字意愚按仲春為昏時女子既笄情思初開不言其思嫁而言其思仲春之月隱詞也死麕包以白茅猶內本邪穢而外為修潔蓋知此女重禮故以此誘之言士有禮之士也下一誘字明其非真吉士直欲以禮貌愚貞女耳林有朴􅈪野有死鹿白茅純束有女如玉毛云朴􅈪小木也以野中之所見言言有死鹿在野外之林中也愚按此章言女不受誘也古者儷皮為禮死鹿至賤凡朴􅈪中皆有之誘者知女所重在禮但取茅之潔白故全用白茅束之純者全也蓋不僅包而已豈知其有德如玉白而且堅終不受誘乎舒而脫脫兮無感我帨兮無使尨也吠毛云舒徐也脫脫舒緩貌言其舉止從容也帨拭物之巾女所佩也內則云女子生設帨于門右感動也我指女子也詩人敬愛之至故以我稱之若託于女子之自道者然孔云非禮相陵主不迎客則有狗吠章左傳昭元年鄭伯享趙孟子皮賦野有死麕之末杜注謂喻趙孟以義撫諸侯無以非禮相加陵趙孟賦常棣且曰吾兄弟比以安尨也可使無吠拒范質公云通篇皆詩人美貞女刺狂夫若作女子之之辭終乏風霜之氣愚按帨巾也女子生而設帨言以巾櫛事人也感觸也無感我帨是絶其求婚之詞無使尨吠戒其勿更及門也詞雖從容而義實峻絶所謂溫而栗玉之德也野有死麕三章二章章四句一章三句愚按女子及笄之年而有懷春之心以來吉士之誘亦情所宜有者而卒能守身如玉不為所誘所謂發乎情止乎禮義也與江漢之思遊女者同歸于正非得王者教化之深不能有此何彼穠矣序云美王姬也雖則王姬亦下嫁于諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也鄭云下王后一等謂車乘厭翟之孔云王后五路重翟為上厭翟次何彼穠矣唐棣之華曷不肅雍王姬之車毛傳興也朱注同華毛云唐棣栘也沈括云即白楊也陸氏云凡物之皆先合而後開惟此華先開而後合按唐棣之華一跗輒生二蕚以比夫婦猶云並蒂芙蓉耳肅雍敬以和也王姬在車中不可見但見其車和鸞有節則肅雍之度可知愚按曷不肅雍似指諸媵之從車者言誰不肅雍也諸媵之和敬如此王姬之德可知何彼穠矣華如桃李平王之孫齊侯之子華承上棣華而言言棣華穠如桃李也亦嫁時所見毛云平正也謂武王女文王之孫孔云平王者寧王也大誥注受命曰寧王承平曰平王周公稱文王曰寧王成王稱武王亦曰寧王皆主受命而言天下既平俱得稱平王矣王按武王以元女大姬配胡公王姬無見此詩稱平當為武王豈武王之孫成王之女耶其釣維何維絲伊緡齊侯之子平王之孫毛云緡綸也維絲伊緡言合絲以為綸也釣者必合絲為綸而後得魚以興娶者必有媒妁合二姓之好而後得娶妹荀悅云尚主之制非古也釐降二女陶唐之典歸元吉帝乙之訓王姬歸齊宗周之禮也以陰乘陽違天以婦凌夫違人違天不祥違人不義由是觀之春秋書王姬之歸與此詩相表裏實萬世之法也愚按女之受聘從夫而行猶魚之受釣隨緡而去不知所釣何魚但見其為緡所牽即隨緡以行耳以喻王姬雖尊下降于齊居然有唱隨之義夫前婦後相從以歸齊矣次章主嫁者言故先以平王之孫尊王也末章主娶者而言故先以齊侯之子從夫也何彼穠矣三章章四句朱注疑平王為即東遷之平王宜臼也又因春秋有王姬歸于齊之文遂疑齊侯之子即襄公諸兒郝氏謂若以平王定是宜臼則書大誥稱武王為寧王酒誥稱為成王又是何人愚按二南決無東遷以後之詩當是成康時所作古者天子嫁女于諸侯必使諸侯同姓者主之召公輔成王康王以康王二十四年始卒則當時同姓齒德位之最尊者莫如召公意王姬下嫁于齊召公主之故以其詩係之召南也譜謂二南之詩武王録以屬之大師意或後之采詩者以此篇為召公而作故補入之騶虞序曰鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖搜田以時仁如騶虞則王道成也申培説騶虞美虞人之詩彼茁者葭一發五豝于嗟乎騶虞朱注賦也毛傳缺云毛云茁出也説文云草初生出地貌葭蘆葦也鄭記蘆始生者著春田之早晚豝豵皆害稼之獸周禮迎虎為其食田豕所以除春農之害也毛云虞人翼五豝以待公之發也鄭云君射一發而翼五豝者戰禽獸之命必戰之者仁心之至何氏云騶虞謂騶御與虞人也左傳晉悼公使程鄭為乘馬御六騶屬焉使訓羣騶知禮是騶為騶御也虞者掌山澤之官舜命益作虞周禮有山虞澤虞月令天子教于田獵命僕及七騶則田不敢斥君故呼騶虞而歎美之騶虞之仁君之仁也彼茁者蓬一發五豵于嗟乎騶虞爾雅云豕之大者謂之豜小者謂之豵按七月云言私其豵獻豜于公明豵之為小也陸氏云蓬蒿屬草之不理者也僅季氏云豝大故藏乎葭豵小故藏于蓬獸五而一發以見獸之多而取之少仁之道也騶虞二章章三句毛傳謂騶虞義獸也白虎黑文不食生物有至信之德則應之後儒遂引漢武帝獲異獸騶牙為徵蓋因虞叶作牙而附會之也又泥于麟趾為關雎之應騶虞為鵲巢之應意文王之時二獸應感而至故詩人因以發興也愚按騶虞為從畋之官無疑射義曰天子以騶虞為節樂備官也當亦以騶御虞人無不在列以充任使故謂之備官也召南之國十四篇四十章百七十七句邶鄘衛譜略商紂畿內方千里之地其封域在禹貢冀州太行之東北踰衡漳東及兖州桑土之野武王克紂以其京師封武庚三分其地置三監自紂城而北謂之邶南謂之鄘東謂之衛三監導武庚叛成王殺武庚復伐三監更于三國建諸侯以殷餘民封康叔于衛使為之長後世子孫稍併彼二國混而名之七世至頃侯當周夷王時衛國政衰變風始作故作者各有所傷從其國本而異之為邶鄘衛之詩焉愚按一統志濬縣西七十里有朝歌城即紂都也其南糟丘酒池遺迹可識漢時即其地置朝歌郡隋改為衛縣元省入濬州後廢今淇縣北門外有故殷墟碑實非朝歌也據朱序衛都河北朝歌之東則正是濬縣地矣譜云朝歌之北為邶謂朝歌以北當即自衡漳以南言之其地有羑水鎮羑里在焉稍南則比干墓應去朝歌不逺皆紂畿內地也疑邶即當在此西北百里之間但未考其故城所在耳鄘地在河以南衛自狄難後東徙渡河遷漕遷楚丘已遷帝丘皆是鄘地即今滑縣開州一帶是也河道變遷今皆屬河北矣王肅服虔謂鄘在紂都之西一統志稱新鄉縣西南三十里為古鄘國皆謬邶一之三郝氏曰邶鄘皆併于衛各因其地所得詩分為三國其實皆衛詩也孔云凡詩述夫人衛女之事而分屬三國定是此三國之人所作非夫人衛女自作也至于許穆夫人賦載馳而入鄘風于時國在鄘地夫人衛女詞為衛發故其詩屬鄘劉公瑾曰皆衛詩而分係三國者意太師各從所得詩之地而係之也柏舟序云言仁而不遇也衛頃公之時仁人不遇小人在側宋記衛自康叔受封為孟侯子康伯六傳至貞伯俱降封伯貞伯卒子頃侯立厚賂周夷王復命為侯得朱注謂婦人不得于其夫之作郝氏云忠臣不于君與賢女不得于夫情相似故忠臣常托賢女自鳴怨而不怒不遇而不忍去序所以目為仁人而其辭則似婦人語耳泛彼柏舟亦泛其流耿耿不寐如有隱憂微我無酒以敖以遊毛傳興也朱注比也中柏性內貞外固以為舟不用濟渡而泛泛流于水喻有濟川之才不見用也耿耿小明憂之貌也輔廣云人有所憂則其心耿耿然惟于憂之一路分明其他固有所不及也愚按如有隱憂者沈憂之人不知所憂何事但覺胸中有物耳我心匪鑒不可以茹亦有兄弟不可以據薄言往訴逢彼之怒朱注賦也之鑒鏡也茹納也歐陽子云火日外景金水內景鑒于物納影在內凡物不擇妍媸皆納其景我心匪鑒不能善惡皆納是以見嫉于羣小而獨不遇也兄弟僚友也列國大夫同出公族固有兄弟之誼今悉比于羣小不與同心意嚮既殊則言不相入我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也朱注賦也從此承上章往訴逢怒而言蓋兄弟責以不能委曲時而自信其心之專一終不能易其所守也云毛云棣棣富而間習也物有其容不可數也賈誼富不可為量多不可為數棣棣富也不可選衆也選棣通作逮説文云及也謂威儀無不及也皆朱注簡擇也言威儀棣棣不可得而簡擇取舍自反無缺之意愚按其人自命如此寧肯貶節以苟合取容乎故孔子引此詩以為無體之禮也憂心悄悄愠于羣小覯閔既多受侮不少靜言思之寤辟有摽朱注賦也以君子見逺識微憂先于事小人安其危而樂其所亡故憂國悄悄之心反見怒于羣小也云孔云覯自彼加我之詞受從我受彼之辭摽説文寤覺而有言曰寤辟通作擘説文云撝也擊也覯閔受侮至于寤覺之際撝手拊心皆為國事痛非徒自傷其過也錢芳標云覯閔謂所見皆可傷閔受侮謂受羣小之侮因其閔而益揶揄之也日居月諸胡迭而微心之憂矣如匪浣衣靜言思之不能奮飛朱注比也此嚴氏云微不明也日月食則微十月篇彼月而微日而微是也日食于朔月食于望今更迭而微以喻君臣之皆昏也不如匪浣衣蘇氏云憂之不去于心如衣垢之浣不忘濯也愚按次章呼僚友為兄弟則此固同姓之臣義不可去殆箕子我不顧行遁之意歟柏舟五章章六句劉向列女傳稱此詩為衛宣夫人所作齊侯之女嫁于衛至城門而衛君死保母請還女不聽遂入持三年之喪畢弟立請願同庖不可使人訴于齊兄弟齊以謂女女終不聽乃作詩此自一宣夫人非宣薑也朱子本列女傳之意改為婦人不得于其夫之詩亦因其情辭有類于婦人耳愚按劉向上封事論𢎞恭石顯傾陷正人引此詩憂心悄悄愠于羣小解之曰小人成羣亦足愠也其指又與序合但據詩辭雖有兄弟我心匪石等句與列女傳所稱不殊編詩者于邶鄘二風以兩柏舟冠其首知衛風之淫非由于紂由宣公也緑衣序曰衛莊薑傷己也妾上僭夫人失位而作是詩也左傳衛莊薑美而無子公子州吁嬖人之子也有寵而好兵公弗禁母嬖子驕所謂妾上僭而夫人失位也緑兮衣兮緑衣黃裏心之憂矣曷維其已毛傳興也朱注比也衣鄭云緑當作褖諸侯夫人祭服之下鞠衣為上展次之褖衣又次之次之者衆妾以貴賤之等服之鞠衣黃展衣白褖衣黑皆以素紗為裏毛云緑間色黃正色按玉藻衣正色裳間色是間色不可為衣但可為裳也僭嚴氏云緑字衣字皆有意義緑以喻妾衣以喻上故以二兮字點綴而丁寧之勝曷維其己言僭禮之禍將有不可言者憂在家國也緑兮衣兮緑衣黃裳心之憂矣曷維其亡嚴氏云緑衣黃裏言掩蔽而已緑衣黃裳則貴賤倒置夫人失位矣曽鞏云亡失也言此心之憂無時失去也緑兮絲兮女所治兮我思古人俾無訧兮治染治之也皎皎練絲在所染之今人爭尚此間色古未之尚也毛云訧過也孔云古人謂制禮者陳櫟曰不得于夫而不疾其妾唯思古人以自修其身憂而不傷怨而不怒此類是也愚按前二章傷緑之僭黃也此章傷時之尚緑也時方貴緑故一時婦女相尚染治此色之絲豈知古人之以其非正色而賤之也絺兮綌兮淒其以風我思古人實獲我心鄭云絺綌所以當暑今以待寒喻其失所也愚按此章傷己之違時也御絺綌于淒然寒風之候不時可知然時不可與爭也思古人處此惟有守禮安命自甘棄擲而已薑蓋一以古道自處也班婕妤怨歌行云常恐秋節至涼飈奪炎熱恕己諒人絶無爭寵之意殆將近之緑衣四章章四句序稱衛莊薑傷已謂與載馳竹竿之類皆婦人所自作也愚按若夫人自作何以不列于衛而列于邶且莊薑詩多入邶風意宫中女史之徒有邶女焉能紀其詩故傳諸邶耶不則為此詩者係邶之士大夫傷薑之失位而惡嬖之上僭猶衛風之咏碩人也燕燕序云衛莊薑送歸妾也鄭云莊薑無子陳女戴媯生子名完莊薑以為己子莊公薨完立而州吁弒之戴媯于是大歸薑逺送之于野作詩見己意燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨朱注興也毛傳缺背燕鳦也一名鷾鴯燕燕兩燕也禽經曰鳥向飛宿燕向宿背飛故莊薑以比送歸妾取其背飛之義送别之情也莊郝氏云燕雀依人為孚子也故玄鳥為祈子之祥薑于媯以子相依子亡相失故用為比至鄭云婦人之禮送迎不出門今我送是子乃于野舒己憤盡己情燕燕于飛頡之頏之之子于歸逺于將之瞻望弗及佇立以泣頡説文云直項也頏爾雅云鳥嚨也蓋鳥髙飛直上故見其項頸上向也雙燕各飛興已與媯形影相望燕燕于飛下上其音之子于歸逺送于南瞻望弗及實勞我心孔云上曰頡下曰頏飛有上下音無上下因飛而上為音曰上音飛而下為音曰下音故曰下上其音送于南者毛傳云陳在衛南朱子謂逺送于南一句可為送戴媯之驗仲氏任只其心塞淵終溫且惠淑慎其身先君之思以勗寡人鄭云任者以恩相親信也周禮六行孝友睦姻任恤是也按塞淵與文公秉心塞淵義同有困心衡慮憂深思逺之意所淑慎其身言善能謹衛其身內塞淵而外溫惠即以善慎其身也寡人薑自稱猶稱未亡人也愚按薑述媯臨時分手之語勉薑以先君為念勿記其平昔之無禮而坐視其國家破亡也其同仇報國之意隱然言外矣燕燕四章章六句愚按戴媯大歸于陳未幾石碏令其子石厚從州吁朝陳以請朝于王因使人涖殺州吁于陳蓋媯歸陳而碏之計始定媯在陳而碏之謀以成州吁不忌陳并不忌媯可謂至愚而媯之智亦深且密矣觀其與薑相得如此臨行但勗以先君之思大義凜然此豈能一日忘桓公之仇乎塞淵溫惠淑慎其身置身于萬全之地然後可以圖人薑之稱歎不置亦意其有深心耶日月序云衛莊薑傷已也遭州吁之難傷已不見答于先君以至困窮之詩也朱子云明是莊公在時所作篇次亦當在燕燕之前日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧朱注興也毛傳缺敵鄭云日月喻國君與夫人也謂日月相望之時有體同德之義毛云定止也鄭謂胡能有定為不能定完也也朱注謂其心志回惑無有定時愚按逝者一往不返之謂莊薑于緑衣之篇動思古人蓋事事欲以古道自處亦望君以古道相處而不然也日居月諸下土是冒乃如之人兮逝不相好胡能有定寧不我報報答也言以禮事莊公公不以恩答已也其何氏云寧不我顧猶望其顧也寧不我報猶望報也日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘孔云日之始照月之方望皆出東方言月盛之時有與日同也忘説文云不識也謂不記也倘能有定則昔所以待我者皆不復記憶之矣愚按德音謂其一言一笑皆不輕有有之以為德也如顧我則笑之類皆出于戲慢故曰無良日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述不得于夫而怨父母無可奈何之情也生何氏云畜我不卒猶俗云養不到老誤我一耳愚按上言不報此言報我蓋報以無禮甚于不報也然倘能有定則皆與相忘不復稱述之矣日月四章章六句愚按序謂莊薑遭州吁之難傷已不見答于先君而鄭以為未定完也朱子以為莊公在時作是也石碏曰將立州吁乃定之矣若猶未也階之為禍諺云母愛子抱州吁之寵以嬖人為之母也完之未定以莊薑之無寵也薑自傷以己之故致完之未定所憂莫大乎此而尚冀其以夫婦之誼顧我報我意在定完而已定完則公平日之無禮于已皆可以相忘而不足道矣終風序曰衛莊薑傷已遭州吁之暴見侮慢而不能正也朱子謂詳味此詩有夫婦之情無母子之意終風且暴顧我則笑謔浪笑敖中心是悼毛傳興也朱注比也莊暴狂也謂竟日狂風也説文云晞也亦風亦日比公之意態無常不可測識也則顧我則笑玩一字見原無笑意愚按莊薑以禮自守公惟無禮相加其不合宜也終風且霾惠然肯來莫往莫來悠悠我思爾雅云風而雨土曰霾不惠然肯來期望之詞莫往莫來言我不往則彼亦來薑無自往之理莊公終亦不來往來斷矣而尚思之不置薑之厚也終風且曀不日有曀寤言不寐願言則嚏説文云隂而風曰曀三章皆以終風比其狂惑始而曰暴尚有日也繼而曰霾不見日矣又重之以不日之曀總無開霽之時矣比其狂惑日甚也之嚏説文云寤解氣也今俗人嚏則云人道我此古遺語也宗鏡録云動靜無不應于心如詩之願言則嚏謂人之思已則嚏足知心應千里故得稱心靈也愚按此承莫往莫來而言言不望君之來矣或亦有時齒及于我而使我一嚏乎曀曀其陰虺虺其靁寤言不寐願言則懷曀曀即不日有曀也虺小蛇也虺虺電光之貌前三章言風此終之以雷比君之狂惑不止于昏蔽而已將有無道之事施于嫡矣能末句承上則嚏而言言君雖不齒及我而我終不釋諸懷薑愈厚愈以見公之薄矣終風四章章四句序謂莊薑遭州吁之暴見侮慢而作愚按詩辭實為莊公作也篇中直寫情事其狂惑無道之狀宛然如見國將亂矣薑非徒以失寵自傷如後世長門之怨也擊鼓序曰擊鼓怨州吁也衛州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也愚按平陳與宋専為伐鄭衛人既與宋公陳侯蔡人伐鄭圍其東門五日而還秋諸侯復伐鄭敗鄭徒兵取其禾而還此當是再伐鄭時從軍者久役于外不得歸家之作擊鼓其鏜踊躍用兵土國城漕我獨南行朱注賦也毛傳缺州鄭云此用兵謂治兵時者曽鞏云擊鼓踊躍想見吁好兵喜鬭人所甚憚州吁以為樂國人怨之正以其踊躍耳馬土土功也城築城也按漕在今滑縣治南漢為白縣戴公廬于漕即此南行伐鄭鄭在衛南也言役土功者非不勞苦猶處于境內去家不逺南行則有死亡之懼言歸何時此章追述始行之辭從孫子仲平陳與宋不我以歸憂心有忡毛云孫子仲謂公孫文仲也陳鄭云平陳與宋衛使告宋曰君為主敝邑以賦與蔡從時陳與衛相睦宋與鄭有仇衛欲伐鄭使宋為主以是陳尚未從宋故先合二國之好而後進兵也何氏云先是平陳與宋即往伐鄭既五日而還魯公子翬帥師來會復往伐鄭自夏而秋僅隔一時耳必師歸在途又聞後命未得班師故曰不我以歸也爰居爰處爰喪其馬于以求之于林之下居者久居處者暫止言不我以歸或久或暫總之無還日也喪馬謂身死馬去唐詩所謂去時鞍馬别人騎也人鄭云軍行必依山林求其故處近得之此蓋囑家以後事也左傳蹇叔哭送其子曰晉人禦師必于殽必死是間余收爾骨焉即此意也死生契闊與子成説執子之手與子偕老契合也闊疏也猶言離也言夫婦之情死生以之雖有合有離終不相棄成説謂夙誓之言執手而期以俱老蓋欲有合無離而白首同歸也愚按成説謂已成之説約以死生契闊毋相忘也又申以偕老之誓今則中道棄捐不能踐前語矣于嗟闊兮不我活兮于嗟洵兮不我信兮愚按此承上章言向以契闊為憂今所憂者豈惟闊兮且生還無望矣復申之曰洵哉不得生還矣昔日之成説不足信矣擊鼓五章章四句何氏謂伐鄭之師既歸在途復聞再往軍中寓書與家人訣别之詞後三章皆家書中語也愚按左氏魯衆仲對隱公曰州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣觀此詩畔離之端已兆于此凱風序云美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾季氏云衛有七子不能安其母之心故作此詩以自責無怨言也凱風自南吹彼棘心棘心夭天母氏劬勞毛傳興也朱注比也樂爾雅云南風謂之凱風蓋南風長養萬物萬物喜故曰凱風傳云豫章以木稱郡酸棗以棘名邦是酸棗即棘也堅強費風之長其心之生更難于幹陸氏云棘性白虎通云景風至棘造實吹彼棘心將以趣其造實也勞母之養子于少時最為勞苦故于夭夭言劬也凱風自南吹彼棘薪母氏聖善我無令人朱注興也下同薪上章言棘心夭夭是棘之初生風長之也此言棘則棘長已成薪矣棘而為薪則雖長大而不能成材明母氏之空勞也聖善明智賢淑之稱爰有寒泉在浚之下有子七人母氏勞苦浚衛邑津通典云寒泉在濮陽東南浚城水經注云濮水枝東徑浚城南而北去濮陽三十五里城側有寒泉岡即詩所云寒泉在浚之下也别按濮水在衛之南屬鄘地此為邶風邶在衛北疑有浚非濮陽之浚也愚按七子仰乳哺于母猶浚人仰汲飲于寒泉也寒泉以一勺給通邑而不倦猶母氏以一身養七子而忘勞蓋至有子七人而母益重其勞苦矣睍睆黃鳥載好其音有子七人莫慰母心郝氏云睍睆羽好貌猶熠耀也大東云睆彼牽牛檀弓云華而睆皆明也謂鳥聲誤內則曰父母之所下氣怡聲此以黃鳥興者自怨不能和顔色順詞令鳥不如也愚按莫猶無也謂鳥猶有音以悅人耳七子無可以慰母心也凱風四章章四句季氏云孟子謂凱風親之過小者也所謂過小必奉養有闕而其母憤怒諸子欲自勞苦非謂衛之淫風盛行而其母欲嫁也如此尚得謂小過哉愚按喪服傳云夫死妻稚子幼子無大功之親妻得與之適人有子七人而欲適人似無此理季氏謂為一時憤怒之辭而序亦謂七子能慰母心以成其志則母亦固有志者也從子勗仍云凱風盛于夏黃鳥囀于夏寒泉亦冽于夏此詩因即景而興情之作雄雉序曰刺衛宣公也淫亂不恤國事軍旅數起大夫久役而作是詩朱注謂婦人思其君子從役于外而作愚按篇中既不見有軍旅數起大夫久役之事亦無有婦人思其君子之情意為賢者逰宦于衛當宣公之時見其主昏國亂欲去而適有道之邦而不能去也故有始而自悔中而有思既而自解之辭雄雉于飛泄泄其羽我之懷矣自貽伊阻毛傳興也朱注同之陸氏云雉性耿介妒壟護疆雖飛不越分域一界內要以一雄為長餘者雖衆莫敢鳴詬潘嶽所謂畫墳衍以分畿也泄通作曳飛不越域故有牽曳之象毛云阻難也鄭云懷安也愚按周官士執雉此蓋仕衛之士以雄雉起興嗟其泄泄飛不出域言不能逺舉也于是悔其初至之時懷安不去而阻滯亂邦實自貽之患也雄雉于飛下上其音展矣君子實勞我心嚴氏云燕燕下上其音謂雙燕相追逐而飛鳴也此言雄雉下上其音止是一雉之音或下或上也雉飛不越分域故其鳴音近而可聞于朱注展誠也説文云轉也惟此君子展轉懷也愚按此言已身阻滯于衛如雉之飛不能逺舉其音或上或下只在近地不相離也而我所向往之君子不能往見徒展轉以勞心而已瞻彼日月悠悠我思道之云逺曷云能來朱注賦也愚按雉飛雖不越域日月則逺近所共見也明明在望而終以道逺莫致惟付之悠悠之思而已奈之何哉百爾君子不知德行不忮不求何用不臧朱注賦也在百爾君子泛指列國位者而言愚按此章因不能逺去復為自解以安身之辭謂既不能擇地以行其道惟有隨地以善其身耳凡今之在位者知何者為德行乎但我能泯其忮害貪求之心則到處相容雖危邦亦可以免患矣雄雉四章章四句愚按通篇未見有思行役之情末章不忮不求二句亦決非婦人語鄭箋以為刺宣公宣淫之事益謬矣匏有苦葉序曰刺衛宣公也公與夫人並為淫亂朱子但云刺淫亂之詩愚按非淫詩也當是媒氏以仲春會男女之無夫家者此守禮之士雖踰婚期不肯苟就而作是詩匏有苦葉濟有深涉深則厲淺則揭毛傳興也朱注比也氏匏苦匏也叔向曰苦匏不材于人共濟而已嚴云苦匏經霜其葉枯落然後乾之腰以渡水今匏尚有苦葉則其匏未堅不可用也朱注濟渡處也毛云自股以上為涉以衣涉水曰厲謂由帶以上也揭褰衣也愚按禮霜降逆女冰泮殺止以九月至正月皆可為昏有過時不能行禮者媒氏以仲春會男女之無夫家者雖奔不禁奔者謂禮不備而成昏也以禮成昏猶之以匏濟水水已深而匏未可用涉水者或厲或揭方便以從事亦猶仲春媒氏之會王者所以便民情也此章泛述其時事有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡朱注比也鳴瀰説文云滿也書羅氏云雉耿介之禽應義氣其以頸相勾化云雉不再合信也毛氏朱子皆據爾雅文謂飛曰雌雄走曰牝牡雉鳴不求其雄而求異類之牡以比之淫説文云軌車轍也轍車迹也毛云由輈以上為軌按曲禮塵不出軌以髙下言中庸車同軌以廣狹言車輪髙六尺六寸軌居輪中若濡軌則水深三尺三寸也愚按有瀰言水之滿濟盈言渡水者之衆應鷕者應聲也雄唱雌和故鷕字從唯明非其雄不也書譏牝雞詩刺雄狐左傳秦筮伐晉亦曰獲其雄狐又古樂府有雄兔腳撲搠雌兔眼迷離非以雌雄目走者耶求牡與求雄何異有鷕雉鳴象男之求女之應也北方于水不甚深處皆以車渡子産以其乘輿濟人于溱洧氓之詩曰淇水湯湯漸車帷裳皆可證也蓋于仲春之時爭往求婚譬之爭涉水以求濟而已獨曳輪不前不欲苟且以從俗也彼有鷕之雉雌雄相感而鳴亦各求其牡耳言各有其偶非吾偶也雍雍鳴鴈旭日始旦士如歸妻逮冰未泮朱注賦也自毛云納采用鴈旭日始出謂大昕之時鄭云昏禮納采至請期用昕親迎用昏歸妻者謂使之來歸于己昏家語云霜降而婦功成嫁娶者行焉冰泮農業起禮殺于此言士之娶妻當及九月霜降之後正月冰未泮渙之時愚按稱士者自重之辭鳴鴈旭旦必以禮也逮冰未泮必以時也惟其自命為士故不肯苟同于俗招招舟子人涉卬否人涉卬否卬須我友朱注比也者毛云招招號召之貌夫鄭云舟人之于號召當渡猶媒人之會男女無家者使為妃匹也愚按卬須我友是須其意中所欲得之女也女必待六禮備而行乃為士之所欲得者乃真我友也匏有苦葉四章章四句序言刺宣公夫人並為淫亂鄭云夫人夷薑也胡胤嘉云刺淫之詩未有若苦葉之辭微矣豈有所避而然與愚按春秋時淫亂不道未有如衛宣者詩人于新臺無所避豈于此偏微其辭乎朱注直以為刺淫亂之詩此皆為雉鳴求其牡一語誤耳谷風序曰刺夫婦失道也衛人化其上淫于新昏而棄其舊室夫婦離絶國俗傷敗焉申培謂邶之良婦見棄于夫而作是詩習習谷風以陰以雨黽勉同心不宜有怒采葑采菲無以下體德音莫違及爾同死毛傳興也朱注比也出習習連續不斷所謂終風也谷風詩詁云風自谷宋玉賦大風盛怒于土囊注谷曰也谷風盛怒之風也又加以隂以雨喻其夫之暴怒無休息也黽蛙也越王見怒蛙式之為其有氣以喻奮躍從事而不自量力者勉強也曰黽勉者言雖力所不堪猶勉強為之其盡心于夫如此無處可致爾怒不宜者自信之詞也葑即蔓菁菲似蓄一曰土瓜愚按葑菲根美可食葉不足觀言人之采之者得無以下體之故乎以喻婦人宜取其德不取其貌左傳臼季引此二語謂取節焉可也其德音莫違謂初時信誓之言皆好語也言猶在耳忍違乎及爾同死此信誓之言也行道遲遲中心有違不逺伊爾薄送我畿誰謂荼苦其甘如薺宴爾新昏如兄如弟朱注賦而比也者此章述其被棄而去傷其夫之恝然無情也畿疆限之名毛云謂門內也孔云周禮九畿言期限之義當是所居與人分界之處菜爾雅云荼苦菜月令孟夏苦菜秀即此荼也薺甘其實曰蒫繁露云薺以冬美甘鄭云荼誠苦矣比于己之苦則荼如薺矣愚按此章詩意婦去而夫不送言己之雖去心尚依于依欲行而足不前足與心違也為夫者縱不能逺送野即邇而畿內亦或可以薄送乎而恝然至此此所以益重其苦雖荼不如矣更念已去之後新人得意恩如兄弟則婦心之苦又寧可道哉涇以渭濁湜湜其沚宴爾新昏不我屑以毋逝我梁毋發我笱我躬不閲遑恤我後朱注比也其毛云涇渭相入而清濁異見溝洫志云涇水一石泥數斗湜説文云水清底也季氏云涇濁渭清及既合流則渭亦因涇而濁水渭因涇濁是涇以之濁以猶使也沚水渚也二既合清濁難分惟别出之渚流或稍緩則猶有清處可見發橫溪為梁梁傍開缺透水而設笱以承其下戒母我笱者懼其發取已獲之魚也愚按此章傷已之拮據成家新人坐享其有恐不知艱難而輕費之反謂舊人無所遺也如濁涇入渭使渭亦同濁俗謂清水拖入濁水是已然雖涇渭難分而渭之沚本自湜湜終不可混耳以猶任也爾豈不知我之可任乎而今寵任新人不屑我矣凡我所拮據而成之業皆囑新人囑新人善守我成慎毋逝梁發笱使我之蓄積一旦頓盡轉謂笱本無魚以有後言于我也己又念現在之身且不見容身後之事又何暇恤哉聽之而已就其深矣方之舟之就其淺矣泳之遊之何有何亡黽勉求之凡民有喪匍匐救之朱注興也吾皆為之鄭云言深淺者喻君子之家事無難易説文云方併船也泳潛行水中遊浮行水上也求鄭云言君子何所有乎何所亡乎吾其黽勉力為之有求多亡求有也救之者孔云謂營護凶事若有賵贈也孔子以為此無服之喪也不程子曰言不但治其家事又周睦其鄰里鄉黨莫盡其道也不我能慉反以我為讐既阻我德賈用不售昔育恐育鞠及爾顛覆既生既育比豫于毒朱注賦也養鄭云慉驕也説文云起也作興之意文育爾雅云也與既生既育皆以生理言鞠説云窮也張子云育恐謂生于恐懼之中育鞠謂生于因窮之際及爾顛覆鄭云及與也與女顛覆盡力于衆事難易無所辟我方文云蓼莪之詩云母兮鞠我注鞠養也又曰長育我皆母之事此詩敘其育子之勤無時不恐惟恐其育之不成鞠之不至及爾之身而顛覆宗祀也既生既育則有家又有子矣而比豫于毒所謂變恩為讐也愚按我德即上文勤家恤鄰之事阻拒也言不以我德為是使我為德之心闌也自念百事盡心而乃無一見取譬賈者百貨俱陳如買者之不顧何我有旨蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來塈朱注興也場説文云旨美也蓄積専言蓄菜禾劉公瑾云古人圃同地秋收則築圃為場以納稼來春又耕治之以種菜茹故蓄菜但以御冬也不曽鞏云人之于物得新可以捐故然厚者猶有所忍夫婦義當偕老乃姑以御窮而已其薄惡可知涌説文云洸水涌貌毛云武也徐鍇云言勇如水之也蒼頡篇傍決曰潰毛云怒也按水潰則其勢橫暴而四出故怒之盛者為潰詒相欺詒也肄説文云習也塈説文云仰塗也愚按當冬月無菜之時則旨之當春夏新蔬之時則厭之言旨蓄而厭棄已在言外有洗以下皆述其以御窮之事言向時汝之家無人經理其有也如水之乍涌而洸其消也如水之四出而潰我乃習勤以治之所謂黽勉求之者是也由今思之皆受汝詒耳今家既完且固矣汝與新人安享其成亦謂昔者之家曽有此乎不念昔者有洸有潰之時而為汝補葺塗罅者為誰也谷風六章章八句愚按衛無夫婦之倫自莊公以來久矣是以其民化之而谷風之詩作序稱衛人化其上者此也式微序曰黎侯寓于衛其臣勸以歸也此詩及旄丘皆黎人所作黎侯為狄人迫逐往衛請救衛不能救因為寓公旄丘則黎臣居守者之詩此則其從行者所作也戡孔云黎在上黨壺關縣有黎亭路史謂黎文王所者與紂都接壤在衛之西赤狄潞也晉伐潞伯宗數其五罪奪黎氏地其一也愚按左傳晉滅狄酆舒奔衛衛尚存奪黎地之罪人宜其不恤黎也式微式微胡不歸微君之故胡為乎中露朱注賦也毛傳缺視孔云以君被逐既微又見卑賤是至微也微君者其君若無有也中露猶言露處無有庇覆所謂越在草莽也式微式微胡不歸微君之躬胡為乎泥中胡安國云以事求人而人不有其事是謂微君之故以身下人而人不有其身是謂微君之躬泥中猶泥塗也中鄭曉云上言中露下言泥猶言側身天地耳式微二章章四句鄭謂黎侯為狄人所逐棄其國而寄于衛衛處之以二邑因安之黎臣勸其歸水經注云黎陽在衛郡世謂黎侯城昔黎侯陽寓于衛因以為名愚按黎國在衛西北黎之往衛自西而東故旄丘詩曰匪車不東而黎陽在衛之東不應處之以益東也且黎侯既棄其國國非黎有矣將安歸乎意必為狄所迫奔衛請救衛不之救始失其國卒賴晉復立之耳此時國猶未失也處以二邑當在失國之後非作詩時事也旄丘序曰責衛伯也狄人迫逐黎侯黎侯寓于衛衛不能修方伯連率之職黎之臣子以責于衛也此為黎居守之臣望其君之請救于衛久而不至之作列女傳云黎莊夫人者衛侯之女也黎于衛非徒為與國實以婚姻其望救以此旄丘之葛兮何誕之節兮叔兮伯兮何多曰也毛傳興也朱注同生毛云前高後下曰旄丘誕闊也鄭云土氣緩則葛闊節喻衛伯不恤其職故其臣于君事亦疏廢也曰郝氏云旄丘丘之不斷絶者葛亦不斷之物毛遂從之利害兩言而決日出而言日中不決即此意也寒觀後有狐裘蒙戎之句則自暑厯其多曰可知何其處也必有與也何其久也必有以也朱注賦也其處止也與偕也春秋帥師例能左右之曰以言何止而不來當必有與偕來者何其為時之久當必有左右之而來者屬望之切如此狐裘蒙戎匪車不東叔兮伯兮靡所與同朱注賦也所狐裘指黎君所衣蒙戎亂貌裘之敝也車指黎君秉東指衛也言我君東來請救自夏徂冬裘且敝矣而叔伯莫與我同心以拯其危奈之何哉范質公云衛兄弟之國也其臣亦兄弟也而呼以叔伯式微之臣固應如是瑣兮尾兮流離之子叔兮伯兮褎如充耳朱注賦也不瑣細也尾末也勢且至于漂散衛之君臣猶坐視一引手邪褎説文云衣袂也嚴氏云凡盛服則有瑱名為充耳非真塞其耳也褎衣博帶端拱不動充耳無聞始土木偶人耳情之急怨之深也愚按末章蓋自傷其君臣流離瑣尾極力呼號不足以動衛君臣之聽也旄丘四章章四句郝氏據史記世家衛自頃侯以前七世皆稱伯黎侯以狄難來告正望其修先業耳知錢邦芑云狄難正當晉景公之世霸國主盟不幾世矣衛之不能為伯黎豈不知之其來請救自以婚姻之誼耳愚按二詩入邶風疑黎君之寓當近邶地簡兮序曰刺不用賢也衛之賢者仕于伶官皆可以承事王者也鄭云伶官樂官也伶氏世掌樂官故以為號黃帝時使伶倫截竹吹之以為黃鍾之宫周景王鑄無射問律于伶州鳩鍾儀自稱伶人魯語伶簫吹歌及鹿鳴之三皆以樂官為伶簡兮簡兮方將萬舞曰之方中在前上處朱注賦也毛傳缺舞説文云簡兮别之也謂分别能舞與否者將使之也萬舞文武二舞之總名也春秋萬入去籥言文武二舞俱入以仲遂喪于二舞之中去其有聲者故去籥焉商頌曰萬舞有奕夏小正曰丁亥萬用入學竹書帝舜十七年春二月入學初用萬是太廟學宫皆用萬也孔云月令仲春之月命樂正習舞入學者必釋菜以禮先師此曰之方中即彼春入學時矣謂二月日夜中也尚書日中星鳥左傳馬日中而出者是也籥鄭云周禮大司樂以樂教國子樂師教國子小舞師掌教國子舞羽吹籥皆有教士之職故賢者不得志亦樂為之今乃施之公庭以供悅耳之娛屑越甚矣在前者即下文公庭之前處止也此教舞之伶官在公之前其所止之地位則在衆舞者之上頭也言日中之時舞當在學而今乃在公前嗟之也碩人俁俁公庭萬舞有力如虎執轡如組毛云碩人大德也俁俁容貌大也材有力二句與舞事無關但稱其人有武勇藝耳愚按古者樂師教舞故舞用士人瞽師奏樂而已詩稱伶官故専言其舞左手執籥右手秉翟赫如渥赭公言錫爵孔云籥雖吹器舞時與羽並執故得舞名賓筵之詩云籥舞笙鼓周禮言舞羽吹籥蓋執羽以舞吹籥為節所翟説文云山雉尾長者籥陳㿩云籥所以為聲翟以為容聲由陽來故執于左左陽故也容自陰作故秉翟于右右隂故也舞節論云翟進則籥退籥進則翟退按有力二句為武舞執籥二句為文舞先武後文蓋周時萬舞之制然耳籥左傳季札觀周樂見舞象簫南籥象簫為武舞南為文舞爵飲器毛云祭有畀燡庖翟閽寺者惠下之道見惠不過一散鄭云散受五升翟者樂吏之賤者也疑即秉翟之輩因以為稱賢者失職于此乃以畀翟之禮施之賤斯甚矣愚按上章刺意在公庭萬舞此章刺意在公言錫爵山有榛隰有苓云誰之思西方美人彼美人兮西方之人兮榛小栗苓甘草也鄭云榛也苓也生各得其所以言碩人處非其位愚按榛以實籩豆苓以備藥物盛王之世時無棄物各得其用以喻賢者皆不失職也西方美人指文王興學教士樂師籥師官皆教士之職今為公庭伶人而已不惟賢者失位官亦失職也能無傷哉簡兮四章三章章四句一章六句舊本三章章六句朱分四章今從之愚按朱注以此詩為賢者自作玩詩辭皆從旁贊歎賢者之語極贊之乃深以刺時之不用也故序曰刺不用賢泉水序曰衛女思歸也嫁于諸侯父母終思歸而不得故作詩以自見也按詩有思須與漕之語考須城在楚丘東南漕通作曹漢白馬縣皆在今滑縣也衛戴公渡河廬于此意是詩之作其于衛遷國之後乎特不知為何國之夫人作也據其所思出宿飲餞之地泲與禰不可考而干與言為二山皆邢地豈其國近邢耶邢衛同為姬姓曰諸姬與謀蓋欲過邢而問之耳北方之國由邶入衛或詩先傳諸邶故以入邶風耶毖彼泉水亦流于淇有懷于衛靡曰不思孌彼諸姬聊與之謀毛傳興也朱注同共毖深幽也説文作䎵云直視也泉水即百泉也出城蘇門山淇水出河內林慮山于言泉為衛水洪為衛地水無情而自衛出者還至衛已本衛女而不得歸衛是泉水之不如矣特以父母殁無歸寧之理故欲即諸姬而與之謀耳子劉公瑾曰夫人之嫁必有姪娣及同姓女為媵朱以諸姬為姪娣又下文諸姑伯姊謂即諸姫則諸媵中亦有夫人姑姊行也出宿于泲飲餞于禰女子有行逺父母兄弟問我諸姑遂及伯姊朱注賦也濟毛云泲地名或曰水名也沇水東流為泲泲亦作按沇水發源王屋有東西二源合流至溫為濟水西南入于河溢而出河之南為滎水又東出于陶丘合汶水入于海其流甚長安得指一處以為濟耶應别是一地名耳禰地無考大約此二地與下文干言相去不逺此言歸有出宿飲餞之處皆嫁時所經過者但念女子既嫁與父母兄弟相去已逺行止將安問乎幸諸姑伯姊近可就問也蓋自知父母殁而歸寧之非禮也左傳引此詩以為知禮謂其姊親而先姑也出宿于干飲餞于言載脂載舝還車言邁遄臻于衛不瑕有害朱注賦也畢載脂以脂塗其舝自未設舝時言載舝則脂之已乃設舝于車耳凡車不駕則脫車頭之舝將行乃設之故云然還車言乘其嫁時之車而還也按出宿飲餞之地凡兩擬所在皆意中虛想之辭之鄭云瑕猶過也一日玷也即上文諸姑伯姊問問其歸于禮無玷乎抑于義有害也我思肥泉兹之永歎思須與漕我心悠悠駕言出遊以寫我憂朱注賦也淇釋名云所出同所歸異曰肥泉考肥泉入淇之後水遂分為二一出共城東至黎陽入河一東北過漂榆邑入于海托衛女既嫁之後不得復歸故以興愚按衛女自知不可以歸前之云云已成虛想徒思肥泉而于此永歎耳須漕之思空自悠悠出遊寫憂歸念絶矣所謂發乎情止乎禮義也父楊氏謂聖人著之于經以示後世使知適異國者母終無歸寧之義泉水四章章六句何氏以此亦許穆夫人之作自傷己力不能救衛欲因邢曹二國以控于齊干與言為邢之二山夫人所以思由曹以至邢也愚按詩辭但思歸而已絶無遑迫請救之情始而思淇終而思須與漕有相去益逺之思當在戴公廬曹之日所作北門序曰刺仕不得志也言衛之忠臣不得其志耳出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉毛傳興也朱注比也財終自始至今之謂禮毛傳窶者無禮也貧者困于也無財故無以為方祈雋云艱者難也貧窶而有室人之纍尤為難耳詩不言君之祿薄而歸之于天無可奈何安之若命也王事適我政事一埤益我我入自外室人交遍適我已焉哉天實為之謂之何哉朱注賦也凡以事往來于王所者曰王事政事謂國事也毛云適之也言凡有王事至不之于他而之于我埤增也益而更益也一者無有分任者也言王事既任矣國之政事復一以相加其勞如此而貧無以為家致室人交遍之謫周書所謂弗能有好于而家者是也已焉哉三句與上文同為歎貧之辭愚按我入自外一語極盡貧窶之情在外且置勿問入自外則交謫者至才是苦處王事敦我政事一埤遺我我入自外室人交遍摧我已焉哉天實為之謂之何哉朱注賦也意敦説文云怒也韓詩云迫也蓋督促而不能副其則怒也遺通作貽謂悉以委之而不問也摧猶挫折也以貧窶之故來室人之謫而至于摧傷哉貧也交則無人不然遍則無事不然矣北門三章章七句愚按邶在衛北此殆有事于北方出北門而過其家因傷其家之貧而作者北風序云刺虐也衛國並為威虐百姓不親莫不相攜持而去焉程子謂詩為君子見幾而作非百姓相攜而去以末章攜手同車恐非賤者作也北風其涼雨雪其雱惠而好我攜手同行其虛其邪既亟只且毛傳興也朱注比也也北風冬風冬而自北則殺物雱旁通説文云普雪助風為虐虛邪通作舒徐謂寬緩也言國事孔急其去不宜緩矣愚按孟子曰不信仁賢則國空虛邪者正之反人身氣虛則邪乘虛而入國事亦然言正人失位在位皆邪人也時勢之危孰急于此北風其喈雨雪其霏惠而好我攜手同歸其虛其邪既亟只且喈通作偕説文云強也霏氛也雪落急也歸歸休也莫赤匪狐莫黑匪烏惠而好我攜手同車其虛其邪既亟只且説文云狐妖獸也鬼所乘之烏字全象鳥形但不注其目晴萬類目皆黑鳥體全黑逺而不分别其情也非狐赤烏黑滿目皆是不能分别其何者非狐何者烏以喻衛君臣同惡相濟無有出乎其類者陸氏云狐羣者烏合者又管子謂烏集之交初雖相歡後必相咄本皆利合不以道也北風三章章六句古之君子危邦則去之衛伯玉聞亂由近關出以此律之猶未為先幾作也靜女序曰刺時也衛君無道夫人無德愚按詩刺夫人也君雖無道夫人不失德可以輔邪為正如靜女為人所慕而能以禮自守使慕者息其邪心奈何夫人之從君于邪耶靜女其姝俟我于城隅愛而不見搔首踟蹰朱注賦也毛傳缺注靜以德言姝以色言城隅朱幽僻之處愚按此好色男子偶于城隅見靜女愛之因愛生癡遂妄謂女有心俟我于此也而靜女去不復見其為守禮者可知猶搔首踟蹰以冀其復見也靜女其孌貽我彤管彤管有煒説懌女美孌説文云慕也言此女之可慕也彤管鄭云筆赤管也古者后夫人必有女史彤管之法史不記過其罪殺之蓋主于規誨也愚按上章靜女既已不見其人猶戀慕不已而更通殷勤于女貽以彤管彤管所以紀過明非禮之事不敢犯也所以謝絶之者峻矣乃慕者雖覩彤管之赫然而悅懌女美有非彤管之所能却者左傳引靜女之三章取彤管焉杜預注雖悅女美義在彤管女史紀事規誨之所執此言悅而不敢犯也自牧歸荑洵美且異匪女之為美美人之貽爾雅云郊外謂之牧毛云荑茅之始生也易曰藉用白茅茅本潔白之物靜女以自況也愚按上章有彤管之贈尚不能絶其人懌悅之情復以野外之荑貽之自比于草茅之賤而有潔白之操悅懌者至此而後益信其美且異之也所異者不在美人之色而在其所貽指荑與彤管言也觀靜女之能以禮拒人而夫人之從君于邪為可刺矣靜女三章章四句朱注以此為淫奔期會之詩愚按此女既拒非禮絶不與通可也不宜有所貽贈然女在城隅必微族也見女而慕者必力能致此女也使人喻意于女女不之答貽二物以明己意直令慕者廢然自止豈非靜女新臺序云刺衛宣公也納伋之妻作新臺于河上而要之國人惡之而作是詩也新臺有泚河水瀰瀰燕婉之求籧篨不鮮朱注賦也毛傳缺而蘇氏云國人疾宣公而難言故但識其臺之所在已説文云泚清也瀰滿也郝氏云泚羞愧汗流之貌孟子謂其顙有泚是也言此臺之可羞宜其有泚雖河之瀰滿豈能挹而滌之乎常毛云籧篨不能俯者鄭云籧篨口柔觀人顔色而為之辭故不能俯也新臺有灑河水浼浼燕婉之求籧篨不珍朱注賦也即灑説文云滌也浼汙也有灑承上章言新臺之汙以河水洗滌之併纍此河水亦浼浼汙濁矣世殄絶也言如此惡物何問不鮮而不絶哉魚網之設鴻則離之燕婉之求得此戚施朱注興也戚毛云言所得非所求也戚施不能仰者鄭云施面柔下人以色故不能仰也新臺三章章四句子貢傳作親臺申培説作寴臺嚴氏云此齊人聞而惡之故作是詩以籧篨戚施詆衛君無嫌非衛人之辭也愚按宣公公然築新臺以納子婦豈畏人之譏呼即聞人譏之當不以為嫌且非必爾時之作安見不出自衛人乎無衛之淫風自新臺始前此淫詩也二子乘舟序曰思伋夀也衛宣公之二子爭相為死國人傷而思之作是詩也按伋夀爭相為死事載史記左傳考劉向新序謂夀之母謀欲殺伋立夀使與伋乘舟于河中將沈而殺之夀知不能止也因與之同舟舟人不得殺伋方乘舟時伋傅母恐其死也閔而作詩其後舟行無恙未幾又使伋之齊將使盜見載旌要而殺之夀止伋伋不可壽又欲與之偕行夀之母知不能止也因戒之曰夀無為前也夀因竊伋旌以先行及齊矣盜見而殺之伋至見夀死痛其代已死載其尸還至境而自殺毛傳以為使賦先待諸隘夀竊其節而先往云云則毛氏所載皆後一節事其二子乘舟之詩實不作于是時也二子乘舟泛泛其景願言思子中心養養朱注賦也毛傳缺云景影同養通作恙説文憂也二子乘舟泛泛其逝願言思子不瑕有害瑕玉病也思子所自處者既無瑕玷此行寧有害乎疑辭也蓋揆諸理而姑以自慰也二子乘舟二章章四句愚按二子之詩繼新臺之後昭淫報也二子皆賢者二子不死則朔不得立而衛禍不作狄人不能滅衛録詩者以之終邶風明衛之亡亡于新臺也邶十九篇七十二章三百六十三句田間詩學卷一
